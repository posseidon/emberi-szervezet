tek)","C) Szomatikus motoros neuronok","D) Vegetatív neuronok"],"correctLetter":"B","explanation":"A hátsó szarv interneuronokat tartalmaz, amelyek szenzoros információt feldolgoznak és továbbadnak más interneuronoknak vagy a mellső szarvi motoros neuronoknak. Ez az információ-feldolgozás helye a gerincvelői reflexek és a felszálló pályák felé az agy felé vezető információ szűrésében."},{"type":"BLANK","text":"A _____ az idegsejt sejtestje a csigolyaközti dúcban, amely az érzőneuron szenzoros információját továbbítja a gerincvelő felé.","answer":"pszeudounipoláris idegsejt","explanation":"Az érzőneuronok sejtestjei a csigolyaközti dúcban (dorsal root ganglion) pszeudounipoláris morfológiájú, amely egyetlen nyúlvány elágazik egy centrális (a gerincvelő felé) és egy perifériás (a receptorok felé) elágazásra. Ez az anatómiai struktúra az érzőneuronok jellegzetes."},{"type":"MC","text":"Mi a gerincvelő felépítésének egyik fő jellemzője az evolúció során?","options":["A) Teljesen megváltozott az emlősök közt","B) Alig változott az evolúció során, csak a magasabb agyi funkciókat vesztette el","C) Egyáltalán nem változott az evolúció során","D) Az evolúció során csak a fehérállomány fejlődött"],"correctLetter":"B","explanation":"A gerincvelő szerkezete és alapvető funkciói több százmillió éve fennmaradtak az evolúció során. Az első gerincesektől (halak) kezdve az emberi szervezetig a gerincvelő funkcióit és szerkezetét felismerhetően ugyanaz maradt, csak az agykéregi funkciókat végző magasabb szint fejlődött ki az emlősök körén belül."},{"type":"BLANK","text":"Az _____ egy végtagot elhajlító reflex a veszélyes ingertől való védelemre, amely poliszinaptikus reflexként működik.","answer":"withdrawal reflex (elhajlítási reflex)","explanation":"Az elhajlítási (withdrawal) reflex (azonos oldali hajlító-keresztezett feszítő reflex) a fájdalom vagy veszélyes inger hatására automatikus védekezési válasz. Interneuronokat tartalmaz, ezért poliszinaptikus, és több szegmentálisan végbemegy a gerincvelőben, amely koordinált hajlító- és feszítőizom-aktiválódást biztosít."},{"type":"MC","text":"Mi a dermatóma-térkép klinikai haszna?","options":["A) A gerincvelő-sérülés helyzetének megállapítása az érzékelés diagnosztikus vizsgálata alapján","B) Az izom-erő értékelése","C) A szívritmus mérése","D) Nincs klinikai jelentősége"],"correctLetter":"A","explanation":"A dermatóma-térkép az orvosnak segít bejelölni, hogy mely gerincvelői szegment sérül, ha az adott bőrterület érzékeltottsége hiányzik vagy módosult. Ez kritikus a spinális sérülés súlyosságának és helyzetének megállapítása, valamint a spinális anesztézia szindjének kiválasztásában."},{"type":"MC","text":"Milyen funkciót lát el a szimpatikus idegrendszer az szervezet termoregulációjában?","options":["A) Nincs funkciója a termoregulációban","B) Egyes helyeken vazokonstrikcióval és a bőr-erek szűkítésével csökkenti a hőleadást, míg másutt vazodilatációval fokozza azt","C) Csak hőtermelést fokozza","D) Csak hőleadást fokozza"],"correctLetter":"B","explanation":"A szimpatikus idegrendszer a lokális hideghatás alatt a bőr-erek reflexes szűkítésén keresztül csökkenti a hőleadást, megőrizve a magtest-hőmérsékletet. Az álló helyzetben a lábak hosszú ideig történő légvesztességből a lábak véres körülménye révén történő hajlító-reflex gyakran kombinálódik."}],"agy":[{"type":"MC","text":"Melyik agyrész felelős elsősorban a mozgások tervezéséért és végrehajtásáért?","options":["A) Kisagy (cerebellum)","B) Elsődleges motoros kéreg (frontális lebeny)","C) Hippocampus","D) Thalamus"],"correctLetter":"B","explanation":"Az elsődleges motoros kéreg a frontális lebeny precentrális gyrusában helyezkedik el, innen indulnak a gerincvelőbe futó corticospinalis pályák."},{"type":"MC","text":"Az agytörzs mely részéből erednek az II–XII. koponyaidegek zöme?","options":["A) Nyúltvelőből","B) Hídból","C) Középagyból","D) Thalamuszból"],"correctLetter":"A","explanation":"A nyúltvelő (medulla oblongata) számos agyideg és reflexcentrum által irányított autonóm funkciók (légzés, szívverés, vérnyomás) helye."},{"type":"MC","text":"Melyik kisagy-régió felel az egyensúly és a posztúra szabályozásáért?","options":["A) Laterális hemiszféra","B) Flocculonodular lebeny (vestibulocerebellum)","C) Intermediális zóna","D) Spinocerebellum"],"correctLetter":"B","explanation":"A flocculonodular lebeny a vestibularis rendszerrel kapcsolódva az egyensúlyérzést és testhelyzet-kontrollt szabályozza."},{"type":"MC","text":"A thalamus melyik szerepe a LEGFONTOSABB?","options":["A) Érzetek tudatosulása","B) Szenzoros információk átváltó központja","C) Hosszú távú memória tárolása","D) Emóciók szabályozása"],"correctLetter":"B","explanation":"A thalamus a szenzoros információkat (hallás, látás, érzékelés) a megfelelő agykérgi területekre továbbítja (relay-szerep)."},{"type":"MC","text":"Melyik hipotalamusz-funkció KÖZVETLENÜL kapcsolódik a homeosztatikus szabályozáshoz?","options":["A) Emóciók feldolgozása","B) Motoros parancsok kiadása","C) Az adenohipofízis hormontermelésének szabályozása","D) Szomatoszenzoros feldolgozás"],"correctLetter":"C","explanation":"A hipotalamusz hormon-felszabadító faktorok termelésével szabályozza az adenohipofízist, amely a testhőmérséklet, víz- és sóháztartás, energiaforrások szabályozásában szerepet játszik."},{"type":"MC","text":"Az agykérgi lebenyekre vonatkozóan melyik állítás HIBÁS?","options":["A) A frontális lebeny tartalmazza a motoros és prefrontális kérget","B) A temporális lebeny az első szintű hallásközpont","C) Az occipitális lebeny kizárólag az olfaktorikus ingerek feldolgozásáért felelős","D) A parietális lebeny a szomatoszenzoros információkat dolgozza fel"],"correctLetter":"C","explanation":"Az occipitális lebeny az elsődleges látóközpont, az olfaktorikus (szaglási) információkat a piriformis kéreg dolgozza fel a temporális lebenyben."},{"type":"MC","text":"A Broca-terület sérülése melyik tünethez vezet?","options":["A) Értés zavara","B) Beszédelőállítási zavar (expresszív afázia)","C) Motoros paralízis","D) Memóriavesztés"],"correctLetter":"B","explanation":"A Broca-terület (bal frontális kéreg) a beszédmotorika szabályozásáért felel"},{"type":"MC","text":"A Wernicke-terület melyik agyterülethez helyezkedik el?","options":["A) Frontális lebeny, motorikus kéreg","B) Bal temporális lebeny, hallásközpont környékén","C) Occipitális lebeny, látóközpont","D) Parietális lebeny, szomatoszenzoros kéreg"],"correctLetter":"B","explanation":"A Wernicke-terület a bal temporális lebeny szuperior gyrusa közelében helyezkedik el, ahol a beszédértés realizálódik."},{"type":"MC","text":"A limbikus rendszer melyik szerkezete összekapcsolódik az érzelmek, félelem és agresszió feldolgozásával?","options":["A) Hippocampus","B) Amygdala (mandelaalak testek)","C) Septum","D) Olfaktorikus bulbus"],"correctLetter":"B","explanation":"Az amygdala az érzelmek (különösen a félelem), agresszió és érzelmi memória feldolgozásában központi szerepet játszik."},{"type":"MC","text":"A hippocampus sérülése mely funkcióban okoz zavart?","options":["A) Motoros koordináció","B) Hosszú távú memória képzése és téri tájékozódás","C) Pupillareflex","D) Ízlelés"],"correctLetter":"B","explanation":"A hippocampus kritikus a deklaratív (explicit) memória konszolidációjában és a téri pályák neuronjaiban szerepet játszik."},{"type":"MC","text":"Az alvás mely fázisában semmisül meg a szem gyors mozgása (REM-alvás)?","options":["A) Non-REM 1","B) Non-REM 2","C) Non-REM 3 (mély alvás)","D) REM-alvás"],"correctLetter":"D","explanation":"Az REM-alvás (Rapid Eye Movement) során a szem gyors mozgásokat végez, ez az álmodás ideje, az izomtónus az agytörzs szabályozása miatt csökkent."},{"type":"MC","text":"Az alvás fiziológiai funkciói közül melyik BIZONYTALAN?","options":["A) Energiatakarékosság","B) Tanulás és memória konszolidáció","C) Feltöltődés és regeneráció","D) Közvetlen izomépítés"],"correctLetter":"D","explanation":"Az alvás nem közvetlenül az izomépítésre irányul (ez a fehérjeszintézis és sportedzés feladata), bár a regeneráció támogatja az izomfejlődést."},{"type":"MC","text":"Az agytörzsi hálózatos állomány (reticular activating system, RAS) mely szerepe a LEGFONTOSABB?","options":["A) Mozgáskoordináció","B) Alvás-ébrenléti ciklus szabályozása és éberség fenntartása","C) Érzelmek feldolgozása","D) Hallás feldolgozása"],"correctLetter":"B","explanation":"A RAS az agytörzs nyúltvelőjében és hídában helyezkedik el, a felsőagyi szöveteket aktiválja és az ébrenlétet, figyelmet szabályozza."},{"type":"MC","text":"Az agykamrák melyik funkcióját HELYESEN jellemzi az alábbi?","options":["A) Csont- és aggysejt-termelés","B) Likvor (agyvény) termelése és keringése","C) Motoros ingerek szállítása","D) Endokrin hormonok szilánkozása"],"correctLetter":"B","explanation":"Az agykamrák ependimalis sejtek révén termelik a likvort, amely az agy és gerincvelő körül keringve védelmet és táplálást biztosít."},{"type":"MC","text":"A testérző receptorok közül melyik a MECHANORECEPTOR?","options":["A) Kapszula-érzékelő sejttel rendelkező érzőtest (Lamellar/Pacini test)","B) Hőreceptor","C) Kemoreceptor","D) Nociceptor (fájdalomreceptor)"],"correctLetter":"A","explanation":"A mechanoreceptorok (pl. Pacini-testek, Merkel-sejtek) a mechanikai ingekre (nyomás, érintés) válaszolnak strukturális alapján."},{"type":"MC","text":"Az ínorsó (muscle spindle) melyik ingerre reagál?","options":["A) Nyomásra","B) Fájdalomra","C) Az izom nyújtására (hosszváltozásra)","D) Hőingerre"],"correctLetter":"C","explanation":"Az ínorsó az intrafusal izomrostok nyújtásáról detektál információt, amely proprioceptív feedback-et biztosít az agy számára."},{"type":"MC","text":"Az izomorsó (Golgi tendon organ) milyen érket közvetít?","options":["A) Az izom feszültségét/erőét","B) Az izom hosszát","C) Az artikuláció szögét","D) A bőr érintésének intenzitását"],"correctLetter":"A","explanation":"A Golgi tendon organ az izom és az ín között helyezkedik el, az izom kontrakciós erőjét detektálja, védelmet biztosít túlzott igénybevétel ellen."},{"type":"MC","text":"A szomatoszenzoros kortex sérülése mely következménnyel járhat?","options":["A) Vakság","B) A tudatosuló érzékelés kiesése az érintett testterületen","C) Halláscsökkenés","D) Memóriavesztés"],"correctLetter":"B","explanation":"Az elsődleges szomatoszenzoros kéreg (S1, postcentrális gyrus) sérülése a tudatosuló érzelmi feldolgozás elvesztésé vezet, bár a reflexek megmaradnak."},{"type":"MC","text":"Az érzőpályák közül melyik a DORSAL COLUMN-MEDIAL LEMNISCUS (DCML) úttal halad?","options":["A) Fájdalom és hőérzet","B) Precíziós tapintás, nyomás, vibrációérzet","C) Szaglás","D) Egyensúly"],"correctLetter":"B","explanation":"A DCML pálya ipszilaterális csontvelőjében felfelé halad, majd az agyban keresztezi a medial lemniscus képzésére"},{"type":"MC","text":"Az anterolaterális (spinothalamikus) pálya mely információt közvetíti?","options":["A) Precíziós tapintás","B) Vibrációérzet","C) Fájdalom és hőérzet","D) Proprioceptio"],"correctLetter":"C","explanation":"A spinothalamikus pálya ellenoldali keresztezésből ered, majd a gerincvelő elülső és oldalsó oszlopain keresztül a thalamusba halad, notsodol fájdalmat és hőérzetet közvetít."},{"type":"MC","text":"A gate control theory (kapuelmélét) melyik fájdalomcsökkentő mechanizmust magyarázza?","options":["A) Az opioid receptorok aktiválása","B) Mechanikai ingek (érintés) által gátolt fájdalomi ingerek feldolgozása a gerincvelői szinten","C) A fájdalomreceptorok kimerülése","D) A központi idegrendszer adapztációja"],"correctLetter":"B","explanation":"Az alapötlet, hogy érintés vagy masszázs csökkentheti a fájdalmat, mert a mechanoreceptor-ingerek az interneuronok révén gátolják a fájdalmi ingerek feldolgozását."},{"type":"MC","text":"Az alábbiak közül melyik AZ ÉRZÉKELÉS és a PERCEPCIÓ közötti HELYES KÜLÖNBSÉG?","options":["A) Az érzékelés tudatos, a percepció automatikus","B) Az érzékelés az ingek fiziológiai feldolgozása, a percepció az értelmezés","C) Az érzékelés csak a látásra vonatkozik","D) A percepció csak a hallásra vonatkozik"],"correctLetter":"B","explanation":"Az érzékelés (sensation) a receptorok által jelenlegi ingek feldolgozása, a percepció (perception) az agy által ezeknek az ingereknek az értelmezése és tudomásulvétele."},{"type":"BLANK","text":"A nyúltvelő a gerincvelőből történő átmenetnél az _____ keresztezésének helye, amely az ellenkező oldali irányítást biztosít.","answer":"piramispályák","explanation":"A corticospinalis (piramis) pályák a nyúltvelő piramiskötegében (90%-ban) kereszteződnek, ezért az agynak az egyik oldala a test ellenkező oldalát irányítja."},{"type":"BLANK","text":"A kisagy három fő régiója közül az _____ a finom mozgáskoordináció és motorikus tanulás szabályozásáért felelős.","answer":"spinocerebellum (vagy: intermediális zóna)","explanation":"A spinocerebellum a laterális gyrussíkok között helyezkedik el, a vagus és proprioceptív feedback-et feldolgozza a mozgások finomhangolásához."},{"type":"BLANK","text":"A thalamus szenzoros relais-szerepén túl, a _____ és a thalamus közötti visszacsatolás fontos az figyelemszabályozásban.","answer":"agykéreg","explanation":"A thalamus két irányú kapcsolatban áll az agykéreggel (corticothalamic feedback), amely szűri az információáramlást és az figyelmet szabályozza."},{"type":"BLANK","text":"A hipotalamusz szerepe az energia- és vízháztartás szabályozásában: a _____ centrum az étvágyat növeli, míg az _____ centrum csökkenti azt.","answer":"laterális","explanation":""},{"type":"BLANK","text":"A kérgestest (corpus callosum) az _____ agyféltekék közötti kommisszurális pályája.","answer":"jobb és bal","explanation":"A kérgestest 200 millió axonból áll, amely összeköttet a jobb és bal agykérgét, lehetővé téve az interhemiszférikus kommunikációt."},{"type":"BLANK","text":"Az agyidegek közül, a _____ az egyensúlyért és hallásért felelős (vestibulocochlearis nerve).","answer":"VIII. (nyolcadik)","explanation":"A cranial nerve VIII (vestibulocochlearis) két összetevőből áll: a vestibularis komponens az egyensúly, a cochlearis a hallás feldolgozásáért."},{"type":"BLANK","text":"A limbikus rendszer _____ szerkezete az emlékek (különösen a deklaratív memória) konszolidációjáért és a téri tájékozódásért felelős.","answer":"hippocampus","explanation":"A hippocampus a temporo-medialis lobe-ben helyezkedik el, ahol az ingramatikus memória és a helytelen emlékek átkerülnek hosszú-távú tárolásba."},{"type":"BLANK","text":"Az amygdala az érzelmi kondicionálásban szerepet játszik azáltal, hogy az érzelmi (głównie fél) emlékeket az önkéntelen _____ fejlesztésével összekapcsolja.","answer":"hálózatos állomány (vagy: vegetatív válaszok)","explanation":"Az amygdala a félelem kondicionálásában a hippocampus-hippocampus és a stresszhormonok (adrenalin, kortizol) kibocsátásához vezet a hipofizisakét-hipotalamusz-mellékvese tengelyen keresztül."},{"type":"BLANK","text":"A bazális ganglionok (striatum, pallidum, substantia nigra) mozgáskezdésének szabályozásában szerepet játszanak","answer":"sérülésük olyan betegségekre vezethet, mint az _____ vagy a Huntington-kór.","explanation":""},{"type":"BLANK","text":"A DCML pálya az agyban az _____ lemniscus-ként ismert, amely nagyobb testterületeket képvisel.","answer":"medial (vagy: medialis)","explanation":"A dorsal column-medial lemniscus pálya keresztezése után medial lemniscus-ként folytatódik a ventralis posterolateralis (VPL) thalamusig, majd szomatoszenzoros kéregre."},{"type":"BLANK","text":"A spinothalamikus pálya _____ leveleken keresztül halad a gerincvelőben, ezért az előző oldalról érkező fájdalom- és hőérzete az agy _____ felénél feldolgozódik.","answer":"elülső és oldalsó","explanation":""},{"type":"BLANK","text":"Az alvás-ébrenléti ciklus szabályozásában a _____ és a noradrenalin a felsőtest aktivációjáért felelős, míg a _____ az alvásért felel.","answer":"szerotonin (vagy: norepinephrin)","explanation":""},{"type":"BLANK","text":"Az REM-alvás során az agy _____ hullámgenerátoraként működik, miközben a test szinte teljesen mozdulatlan marad az agytörzs _____ révén szabályozott inhibiciójából.","answer":"teta (theta)","explanation":""},{"type":"BLANK","text":"A szomatoszenzoros kortex a posterior central gyrus-ban helyezkedik el, amely a _____ oldalán van","answer":"ezért egy baloldali stroke az ellenkező oldali testfeleknek az érzetét befolyásolja.","explanation":""},{"type":"BLANK","text":"A motoros kortex sérülése központi típusú _____ paraláziséhez vezethet, amely azért keletkezik, mert a korticospinalis pályák degeneration szenvednek.","answer":"flaccid (vagy: spastikus)","explanation":"A motoros kortex sérülése központi parálízist okoz, amely kezdetben flaccid, majd spastikus lehet az efferen inibiciós pályák degenerációja miatt."},{"type":"MC","text":"A prefrontális kortex melyik funkciója LEGINKÁBB az executive function-ökkel kapcsolódik?","options":["A) Érzelmek feldolgozása","B) Tervezés, döntéshozatal, impulzuskontroll","C) Szaglásfelismerés","D) Vizuális feldolgozás"],"correctLetter":"B","explanation":"A prefrontális kortex az agy végrehajtó funkciójáért felel, beleértve a tervezést, döntéshozatalt, impulzuskontrollt, valamint az értékítéletet."},{"type":"MC","text":"A Broca- és Wernicke-terület sérülésének fő különbsége:","options":["A) A Broca-sérülés halláscsökkenéshez vezet","B) A Wernicke-sérülés beszédészlelési zavarhoz, a Broca-sérülés beszédelőállítási zavarhoz","C) Mindkettő azonos tüneteket okoz","D) Csak a Broca-sérülés okoz afáziát"],"correctLetter":"B","explanation":"Wernicke-sérülés (receptív afázia): megért zavar. Broca-sérülés (expresszív afázia): beszédkibocsátás zavar"},{"type":"MC","text":"A bazális ganglionok mely neurotranszmittere a Parkinson-kórban csökkent?","options":["A) GABA","B) Glutamát","C) Dopamin","D) Szerotonin"],"correctLetter":"C","explanation":"A Parkinson-kórban a substantia nigra dopamin-neuronjai degenerálódnak, ami a bewegegésromlott mozgáskezdéshez, rigidításhoz és tremorhoz vezet."},{"type":"MC","text":"Az agytörzs melyik területe felel az abdominálistest-reflexek (Babinski-reflex) normális működésében?","options":["A) Nyúltvelő","B) Híd (pons)","C) Középagy (midbrain)","D) Nagyhalmaz (pontine)"],"correctLetter":"A","explanation":"A Babinski-reflex a corticospinalis pálya függőleges illetve a gerincvelőjében helyezkedik el"},{"type":"MC","text":"A reticular formation melyik végzetes sérülésének a leggyakoribb oka?","options":["A) Ásatási trauma","B) Agytörzs sérülés","C) Koma vagy halál","D) Mind az előzőek"],"correctLetter":"D","explanation":"Az agytörzsi sérülés (különösen a reticular formation sérülése) súlyos következménnyel jár: kóma, vegetatív állapot vagy halál"},{"type":"BLANK","text":"Az agytörzs _____ a légzésszabályozásban legalább така ugyanolyan fontos, mint a hipotalamusz.","answer":"pons és medulla (vagy: nyúltvelő)","explanation":"A pons és a medulla oblongata-ban helyezkedik el a légzés centrum, amely a CO2 és O2 szintjét monitorozza."},{"type":"MC","text":"A szemészeti szűrővizsgálatok melyik betegsége legalább 50%-ában diagnosztizálható korai stádiumban?","options":["A) Szürkehályog","B) Glaukóma (zöldhályog)","C) Rövidlátás","D) Szaruhártya-gyulladás"],"correctLetter":"B","explanation":"A glaukóma kezdetben gyakran tünetmentes, de a szûrővizsgálatokkal (tonometria, szem alatti nyomás mérése) korán diagnosztizálható."},{"type":"MC","text":"A limbikus rendszer mely szerkezete szabályozza az érzelmekhez kapcsolódó vegetatív működéseket (szívverés, vérnyomás)?","options":["A) Septum","B) Hypothalamus (hipotalamusz)","C) Hippocampus","D) Cérebellum (kisagy)"],"correctLetter":"B","explanation":"A hipotalamusz a limbikus rendszer vegetatív szabályozási központja"},{"type":"MC","text":"Az agytörzs melyik része termel az elalváshoz szükséges melatonint termelő sejteket szabályozó neurotranszmittert?","options":["A) Raphe magvak (szerotonin)","B) Locus coeruleus (noradrenalin)","C) Substantia nigra (dopamin)","D) Ventral tegmental area (dopamin)"],"correctLetter":"A","explanation":"A raphe magvak serotonin-termelő neuronjai az alvást előkészítő fiziológiai állapothoz vezetnek, amely a melatonin-termelést aktiválja az epiphysis által."},{"type":"BLANK","text":"A motoros kortex sérülése _____ típusú paraláziséhez vezethet, amely központi parálízis.","answer":"spastikus (vagy: flaccid→spastikus)","explanation":"A motoros kortex sérülése kezdetben flaccid, majd spastikus paraláziséhez vezethet, mert a corticospinalis pályák degenerációja a reflexek fokozódásához vezet."},{"type":"BLANK","text":"A limbikus rendszer _____ részei együttes működésüket az ACTH és kortizol felszabadítására koordinálják, amely a stresszválasz része.","answer":"hipotalamusz-hipofízis-mellékvese tengely (vagy: HPA-axis)","explanation":"A hipotalamusz CRH-t termel, az adenohipofízis ACTH-t, a mellékvesekéreg pedig kortizolt szabadít fel a stressz válaszában."},{"type":"MC","text":"A szomatoszenzoros asszociációs kéreg mely funkciót végzi az elsődleges szomatoszenzoros kortex mellett?","options":["A) Képi reprezentáció és test-sema (testséma) megformálása","B) Motor parancsok kiadása","C) Emóciók feldolgozása","D) Auditori feldolgozás"],"correctLetter":"A","explanation":"Az asszociációs szomatoszenzoros kéreg (S2, posterior parietal) a testséma-reprezentációért és a test-részek téri tájékozódásáért felelős."},{"type":"BLANK","text":"Az agytörzsi hálózatos állomány (RAS) a komaállapotban teljesen meghibásodik","answer":"végeredménye a _____ vagy a vegetatív (minimálisan tudatos) állapot.","explanation":""}],"latas":[{"type":"MC","text":"A szem külső rétegének hátsó 4/5 részét mely hártya képezi?","options":["A) Szaruhártya","B) Ínsz (sclera)","C) Érhártya (choroidea)","D) Retina"],"correctLetter":"B","explanation":"A fehér ínhártya (sclera) a szem külső, ellenálló és védelmi szerkezete"},{"type":"MC","text":"A szem középső rétegé három része közül, melyik szabályozza az akomodációt (közellátást)?","options":["A) Érhártya (choroidea)","B) Sugártest (ciliary body) a sugárizommal","C) Írisz","D) Retina"],"correctLetter":"B","explanation":"A sugártest (ciliary body) gyűrű alakú simaizomzata a sugárizom (ciliary muscle) a lencse domborulatát megváltoztatja az akkomodáció során."},{"type":"MC","text":"Az írisz pigmenttartalma mely funkciót végzi?","options":["A) Fénytörésben szerepet játszik","B) A szem szín meghatározása és fénysugarak abszorpciója","C) Lakrimális termelés","D) Retina-tápláláson"],"correctLetter":"B","explanation":"Az írisz melanin-tartalma adja a szem színét és segít a fényt elnyelni, így csökkenti a szem belső fényszóródást."},{"type":"MC","text":"A retina mely rétegéből erednek a látóideg rostjai?","options":["A) Csapok és pálcikák","B) Bipoláris sejtek","C) Ganglion sejtek (dúcsejtek)","D) Pigmenthámoréteg"],"correctLetter":"C","explanation":"A ganglion sejtek axonjai kilépve a szemgolyóból a látóideget alkotják"},{"type":"MC","text":"A retina mely része a legjobb látásélességet biztosítja?","options":["A) Retina periféria","B) Optic disc (vakfolt)","C) Sárgafolt (fovea centralis)","D) Ora serrata"],"correctLetter":"C","explanation":"A sárgafolt (fovea centralis) a retina központi része, ahol csak csapok vannak, ezért biztosítja a legélsebb látást (visus 1.0-1.5)."},{"type":"MC","text":"A pálcikák és csapok száma az alábbiak közül melyik HELYES arányban van?","options":["A) Pálcikák: 7 millió, csapok: 130 millió","B) Pálcikák: 130 millió, csapok: 7 millió","C) Egyenlő számban vannak","D) A pálcikák száma felváltogat a napszaknak megfelelően"],"correctLetter":"B","explanation":"A pálcikák dominánsabbak (130 millió), a csapok (7 millió) csak a sárgafolt közepén koncentrálódnak, ahol az éleslátás előfordul."},{"type":"MC","text":"A csapok mely funkciójuk az ezentúl nem igaz?","options":["A) Szín érzékelés (trichromatikus) (L, M, S csaptípusok)","B) Nappali (fotopikus) látás","C) Éleslátás","D) Gyenge fény-alapú szürkületi látás"],"correctLetter":"D","explanation":"A pálcikák felelősek a szürkületi (skotopikus) látásért (gyenge fényben), a csapok a nappali fotopikus és színlátásért."},{"type":"MC","text":"A rodopszin melyik molekulákból áll?","options":["A) Glicerol és zsírsav","B) Opszin fehérje és cisz-retinal (A-vitamin származék)","C) Hemoglobin és vasion","D) Csak fehérje"],"correctLetter":"B","explanation":"A rodopszin a pálcikák fényérzékeny pigmentje"},{"type":"MC","text":"Megvilágításkor a rodopszinban mi történik?","options":["A) A cisz-retinal transz-retinallá alakul és leválik","B) Az opszin fehérje lehasad","C) A rodopszin stabilizálódik","D) A sejt hiperpolarizálódik"],"correctLetter":"A","explanation":"A bejutó foton energiája átisomerizes az 11-cis-retinal-t all-transz-retinallá, amely leválik az opszinról, ezáltal aktiválva a transzducin-G-proteint."},{"type":"MC","text":"A fényelektromos transzdukcióban a cGMP szerepe az alábbiak közül melyik?","options":["A) cGMP nyitva tartja a Na+ és Ca2+ csatornákat sötétben","B) cGMP bontódik megvilágításkor","C) cGMP hiperpolarizációt okoz","D) Mind az előzőek"],"correctLetter":"D","explanation":"Sötétben a cGMP nyitva tartja az ioncsatornákat"},{"type":"MC","text":"A sötétadaptáció mely folyamat révén történik?","options":["A) Az írisz nyitódása","B) A pálcikák rodopszinjének regenerálódása és a retinális sejtek sensitizálódása","C) Az agynak alkalmazkodása a sötétséghez","D) A pupillaszűkülés az agytörzs hatására"],"correctLetter":"B","explanation":"Az erős fényből sötétbe lépéskor a lebomló rodopszin körülbelül 15-20 perc alatt regenerálódik A-vitaminból, ezután a szem 100-1000-szeresen szenzítívebb lesz."},{"type":"MC","text":"A látóideg-kereszteződés (chiasma opticum) mely retinafélekből eredő rostokat keresztezi?","options":["A) Az orr felőli retinaféleket (nasal hemiretin)","B) A halánték felőli retinaféleket (temporal hemiretin)","C) Az összes rostot","D) Csak a periféria felőli rostokat"],"correctLetter":"A","explanation":"A chiasma opticum-ban az orr felőli retinafélekből induló rostok kereszteződnek (kontralaterális)"},{"type":"MC","text":"A jobb látótér képe az agy mely felére vetül?","options":["A) Jobb féltekére","B) Bal féltekére","C) Mindkét féltekére","D) Az occipitális lebenyre, laterális részre"],"correctLetter":"B","explanation":"Az optikai keresztezés miatt a jobb látótér képei a bal occipitális kéregre, a bal látótér képei a jobb occipitális kéregre vetülnek."},{"type":"MC","text":"A laterális térdesteste (lateral geniculate nucleus, LGN) melyik funkcióját végzi?","options":["A) Szenzoros információ feldolgozása","B) A látási információ átváltásra a retinától az occipitális kéreghez","C) Pupillaszűkülés szabályozása","D) Akkomodáció-kontroll"],"correctLetter":"B","explanation":"Az LGN a talamuszban helyezkedik el, ahol a retina ganglion sejtjei szinaptikus kapcsolatot létesítenek az occipitális kérg neuronjaival."},{"type":"MC","text":"Az elsődleges látókéreg (V1) mely lebenyben helyezkedik el?","options":["A) Frontális lebeny","B) Occipitális (nyakszirt) lebeny","C) Temporális lebeny","D) Parietális lebeny"],"correctLetter":"B","explanation":"Az elsődleges látóközpont (V1) a posterior calcarine sulcus körül helyezkedik el az occipitális kéregben (Brodmann terület 17)."},{"type":"MC","text":"A másodlagos látóközpontok szerepe az alábbiak közül melyik?","options":["A) Fényérzet kialakulása","B) Arcfelismerés, alakok, színek felismerése, olvasás","C) Tárgy mozgásának érzékelése","D) Pupillaszűkülés"],"correctLetter":"B","explanation":"A másodlagos látóközpontok (V2, V4, V5) az asszociációs területek, ahol a komplex látási információ feldolgozódik (arcfelismerés, szín, mozgás)."},{"type":"MC","text":"A szemmozgató izmok beidegzéséért mely agyidegek felelősek?","options":["A) III., IV., VI. agyidegek","B) II., VII., VIII. agyidegek","C) V., VII., VIII. agyidegek","D) IX., X., XI. agyidegek"],"correctLetter":"A","explanation":"Az oculomotor (III.), trochlearis (IV.) és abducens (VI.) agyidegek idegzik be a hat szemmozgató izmot (4 egyenes, 2 ferde)."},{"type":"MC","text":"A pupillareflex útvonala az alábbiak közül melyik?","options":["A) Retina → látóideg → talamusz → occipitális kéreg","B) Retina → látóideg → középagy (pretectum) → vegetatív mozgató dúc → III. agyideg → írisz","C) Szaruhártya → V. agyideg → motorikus kéreg","D) Csak a szimpatikus rendszer által szabályozódik"],"correctLetter":"B","explanation":"A pupillareflex egy rövid, kétszinaptikus agyideg-reflex, amely a fény-pretectum-vegetatív magvak-III.-írisz útvonalon halad."},{"type":"MC","text":"Az optikai közegek közül, melyik tartalmazza a legerősebb fénytörést?","options":["A) Szaruhártya-levegő határ","B) Lencse","C) Üvegtest","D) Csarnokvíz"],"correctLetter":"A","explanation":"A levegő-szaruhártya határon történik a legerősebb fénytörés (kb. 49 dioptria)"},{"type":"MC","text":"A szem dioptriájánál (fénytörőképességénél), mely módosulás az HELYTELEN?","options":["A) Normális szem számára a dioptrás érték „végtelenre\" nézéskor ~42 D","B) 25 cm-ről nézéskor az akkomodáció 4-6 D-vel növekszik","C) Öregedés során az akkomodációs amplitúdó csökken","D) A lencse domborodása a fénytörés csökkentésére vezet"],"correctLetter":"D","explanation":"A lencse domborodása (akkomodáció) a fénytörés NÖVEKEDÉSÉRE vezet, az f fókusztávolság csökken, D = 1/f növekszik."},{"type":"MC","text":"A távollátás (hypermetropia) melyik korrekciót igényel?","options":["A) Homorú (negatív) lencse","B) Gyűjtő (pozitív) lencse","C) Nincs szükség korrekcióra","D) Csak éjjel kell szemüveg"],"correctLetter":"B","explanation":"A távollátás rövidebb szem-tengelyből ered"},{"type":"BLANK","text":"A retina _____ rétege olyan pigmentet tartalmaz, amely meggátol a bejutó fény visszaverődését, így sötét a pupilla.","answer":"pigmenthámoréteg","explanation":"A pigmenthámoréteg melanintartalmú, amely a bejutó fényt elnyelve megakadályozza annak visszaverődését és csökkenti a szem belső fényszóródást."},{"type":"BLANK","text":"A csapok és pálcikák _____ szinaptikus kapcsolaton keresztül kommunikálnak az agy felé haladó szignállal.","answer":"bipoláris sejtek (vagy: neuronok)","explanation":"A csapok és pálcikák fotoreceptorok, amelyek a bipoláris sejteken keresztül (interneuronok) kapcsolódnak a ganglionsejtekhez, amelyek a látóideget alkotják."},{"type":"BLANK","text":"A sárgafolt (fovea centralis) éleslátást biztosít, mert főként _____ fotoreceptorokat tartalmaz.","answer":"csapok","explanation":"A sárgafolt közepén (látógödörben) kizárólag csapok vannak, 1 csap 1 bipoláris és 1 ganglionsejt kapcsolódása révén a legmagasabb felbontóképesség érhető el."},{"type":"BLANK","text":"A rodopszin regenerációjához szükséges idő sötét adaptáció során körülbelül _____ perc.","answer":"15-20 (vagy: 15 vagy 20)","explanation":"Az erős fényből sötétbe lépéskor az embrionális rodopszin lebomlik"},{"type":"BLANK","text":"A talamusz laterális térdesteste (lateral geniculate nucleus) a _____ és a _____ között közvetít szenzoros információt.","answer":"retina","explanation":""},{"type":"BLANK","text":"Az elsődleges látókéreg (V1) az _____ lebeny _____ gyrusában helyezkedik el.","answer":"occipitális","explanation":""},{"type":"BLANK","text":"A szürkehályog kialakulásáért felelős dajkafehérje a _____.","answer":"alfa-krisztallín (vagy: alpha-crystallin)","explanation":"Az alfa-krisztallín egy stresszfehérje, amely megakadályozza a lencseprotein-aggregációját"},{"type":"BLANK","text":"A jobb szem _____ felének képe (amely a jobb látóteret fedi le) a _____ occipitális kéregre vetül.","answer":"nasal (orr felőli)","explanation":""},{"type":"BLANK","text":"A monokuláris távolságészlelés támpontjai közül az _____ az a jelenség, hogy az egyestárgyak az emberből távolodva felfelé jelennek meg a látótérben.","answer":"relatív magassági helyzet (vagy: magasságjelzés)","explanation":"A távolabb lévő tárgyak magasabban helyezkednek el a látótérben a lineáris perspektíva miatt, ez a monokuláris távolságjelenség egyik támpontja."},{"type":"BLANK","text":"Az _____ a szem vakfoltrészét kompenzáló agy-folyamat, amely kiegészíti az üres helyet a környezeti információk alapján.","answer":"perceptuális kiegészítés (vagy: agy-kitöltés, extrapolációs feldolgozás)","explanation":"Az agy a vakfolt hiányzó információját az azt körülvevő terület alapján kiegészíti"},{"type":"BLANK","text":"A csarnokvíz _____ termelődik és a pupillán keresztül az _____ szemcsarnokba jut, ahonnan felszívódik.","answer":"sugártest által","explanation":""},{"type":"BLANK","text":"Az üvegtest főként _____ tartalmú kocsonyaszerű állomány, amely a szemgolyó alakjának megőrzésért felel.","answer":"vízből (vagy: 98% víz)","explanation":"Az üvegtest (98%-a víz) finom fehérjehálózat között helyezkedik el"},{"type":"BLANK","text":"A könnyrendszer a könnymirigytől az _____ csatornán át az _____ jut.","answer":"könnyvezeték (vagy: kanális lacrimalis)","explanation":""}],"hallas":[{"type":"MC","text":"A Corti-szerv melyik struktúrán helyezkedik el?","options":["A) A dobhártyán","B) A csiga alaphártyáján","C) A Reissner-membránon","D) A kerek ablakon"],"correctLetter":"B","explanation":"A Corti-szerv a csiga alaphártyájára tapad, szőrsejtjei a hangrezgéseket elektromos jelekké alakítják."},{"type":"MC","text":"Melyik hallócsont áll közvetlenül kapcsolatban az ovális ablakkal?","options":["A) Kalapács","B) Üllő","C) Kengyel","D) Ningcs ilyen csont"],"correctLetter":"C","explanation":"A kengyel talpa az ovális ablakhoz tapad, így továbbítja a rezgéseket a belső fülbe."},{"type":"BLANK","text":"A hallócsontocskák sorrendben: kalapács, üllő és _____.","answer":"kengyel","explanation":"A kengyel az utolsó hallócsont, amely az ovális ablakra támaszkodik."},{"type":"MC","text":"Az emberi hallástartomány melyik frekvenciatartományban található?","options":["A) 16–200 Hz","B) 16–20 000 Hz","C) 100–5 000 Hz","D) 20–2 000 Hz"],"correctLetter":"B","explanation":"Az emberi fül képes a 16 Hz-től 20 000 Hz-ig terjedő hangfrekvenciákat érzékelni."},{"type":"BLANK","text":"A dobhártyafeszítő-izom a _____ csonthoz kapcsolódik.","answer":"kalapácshoz (vagy: kalapács)","explanation":"Ez az izom a dobhártyát tartja feszesen és segít a hallócsontok erősítésében."},{"type":"MC","text":"Milyen szerepe van az Eustach-kürtnek?","options":["A) A hallócsontok mozgatása","B) A nyomáskülönbség kiegyenlítése","C) A szőrsejtek támogatása","D) A folyadék szűrése"],"correctLetter":"B","explanation":"Az Eustach-kürt az orrgarattal köti össze a középfület, és kiegyenlíti a dobhártya két oldala közötti nyomást."},{"type":"BLANK","text":"A csiga felső járatát melyik ablak zárja le?<br>A) Kerek ablak<br>B) Ovális ablak","answer":"Helyes: B) Ovális ablak","explanation":"Az ovális ablak a felső járat (vesztibuláris csatorna) kezdetét, míg a kerek ablak az alsó járat (dobcsatorna) végét zárja le."},{"type":"MC","text":"Az alaphártya szélességében milyen változás figyelhető meg a csiga mentén?","options":["A) Egyenletes szélességű","B) A csiga csúcsa felé szélesedik","C) A csiga alapja felé szélesedik","D) Véletlenszerűen változó"],"correctLetter":"B","explanation":"Az alaphártya fokozatosan szélesedik a csiga csúcsának irányában, amely a frekvenciatopográfiához vezethet."},{"type":"BLANK","text":"Az alacsony frekvenciájú hangok a csiga _____ részében deformálják az alaphártyát.","answer":"csúcsa (vagy: felső vége)","explanation":"A mély hangok (alacsony frekvencia) a csiga csúcsán okoznak deformációt az alaphártyán."},{"type":"MC","text":"A szőrsejtek nyúlványainak mechanoszenzitív csatornáit milyen tényező szabályozza?","options":["A) Az endolympha sűrűsége","B) A nyúlványok elhajlási iránya","C) A hallóideg elektromos potenciálja","D) A dobhártya rezgési frekvenciája"],"correctLetter":"B","explanation":"A szőrköteg elhajlásának iránya határozza meg a kation csatornák nyitott vagy zárt állapotát."},{"type":"MC","text":"Melyik agykérgi terület alakul ki a hallásérzetből a halántéklebenyekben?","options":["A) Hallókéreg","B) Mozgáskéreg","C) Látókéreg","D) Szaglókéreg"],"correctLetter":"A","explanation":"Az elsődleges hallókéreg a halántéklebenyekben helyezkedik el, ahol tudatosul a hangérzet."},{"type":"BLANK","text":"A hallóideg rostjai a nyúltvelőben részben _____, majd átkapcsolódnak a középagyban.","answer":"kereszteződnek (vagy: decussálódnak)","explanation":"Az idegrostok parciális decussációja a hallópályában jellegzetes, ami binatális hallásról gondoskodik."},{"type":"MC","text":"A Wernicke-mező melyik agyterületen található?","options":["A) Halántéklebeny és homloklebeny alsó részén","B) Homloklebeny felső részén","C) Tarkólebeny alsó részén","D) Középlebenyek mélységében"],"correctLetter":"A","explanation":"A beszédértő központ (Wernicke-mező) a halántéklebeny és homloklebeny alsó felszínén helyezkedik el."},{"type":"BLANK","text":"A csiga középső járatát _____ járatnak nevezzük.","answer":"csigavezeték (vagy: csiga-vezeték)","explanation":"A középső járat a hártyás csiga, amely endolymphával van kitöltve."},{"type":"MC","text":"Az otoszklerózis melyik hallócsontot érinti?","options":["A) Kalapácsot","B) Üllőt","C) Kengyelr","D) Az egész hallócsontlánc"],"correctLetter":"C","explanation":"Az otoszklerózisban a kengyel fokozatosan mozgásképtelenné válik, mert szivacsos csont anyag halmozódik fel körülötte."},{"type":"BLANK","text":"A presbyacusis alatt az _____ okozta hallásvesztést értjük.","answer":"öregedés (vagy: öregség, életkor)","explanation":"A presbyacusis az időskor előrehaladtával jelentkező hallásvesztés, amely a csiga rugalmasságának csökkenéséhez vezet."},{"type":"MC","text":"A hangirány lokalizációjában melyik tényező játszik elsődleges szerepet?","options":["A) A hangintenzitás","B) A hangfrekvencia","C) Az időkülönbség és a hangerőkülönbség","D) A dobhártya vibráció amplitúdója"],"correctLetter":"C","explanation":"Az oldalsó hangforrás a két fülre eltérő időben és intenzitással hat, amely alapján meghatározható a hangirány."},{"type":"BLANK","text":"A fülkagyló rugalmas váza _____ szövetből áll.","answer":"porc (vagy: porcogénез)","explanation":"A fülkagyló rugalmas porcos szerkezetének köszönheti alakját és hajlékonyságát."},{"type":"MC","text":"Az Eustach-kürt nyitása melyik izom működésétől függ?","options":["A) A kengyelizom","B) A dobhártyafeszítő-izom","C) Az interni pterigoideus","D) Az origináció maszéter"],"correctLetter":"C","explanation":"Az izom működése segít megnyitni az Eustach-kürtöt, amely nyomásegyensúlyozást tesz lehetővé."},{"type":"MC","text":"A hallócsontok kb. hányszorosára erősítik a hangnyomást?","options":["A) 5-szöröse","B) 10-szerese","C) 20-szorosa","D) 50-szerese"],"correctLetter":"C","explanation":"A hallócsontok kb. 20-szorosára erősítik a hangnyomást a dobhártya és az ovális ablak felületarányának (15:1) és egyéb tényezők miatt."},{"type":"BLANK","text":"Az utriculus és sacculus szőrsejtjei a fej _____ helyzetét érzékelik.","answer":"mozdulatlan (vagy: függőleges, helyzetét)","explanation":"Ez a két szerkezet a statikus egyensúlyozásban játszik szerepet, a fej nyugalmi helyzetét és az egyenes vonalú gyorsulást érzékeli."},{"type":"MC","text":"Melyik szerkezet zárja le az alsó járatot (dobcsatornát)?","options":["A) Ovális ablak","B) Kerek ablak","C) Reissner-membrán","D) Támasztósejt"],"correctLetter":"B","explanation":"A kerek ablak az alsó járat (dobcsatorna) végét zárja le, ahol a folyadékhullámok csillapodnak."},{"type":"BLANK","text":"A félkörös ívjáratok az ampullájában található szőrsejtek a fej _____ mozgásának változásait érzékelik.","answer":"szöggyorsulás (vagy: elfordulás, forgómozgás)","explanation":"Az ampullae receptorai érzékenyesen reagálnak a fej rotációs gyorsulásaira a különböző síkokban."},{"type":"MC","text":"A szaglóhám melyik anatómiai struktúrában helyezkedik el?","options":["A) Az ajkak belsejében","B) Az orrüreg felső részében","C) A gégében","D) A nyelvben"],"correctLetter":"B","explanation":"A szaglóhám az orrüreg felső részén helyezkedik el, ahol receptorsejtek találhatók."},{"type":"BLANK","text":"Mennyire csökken az ízlelőbimbók száma az életkorral a 40. életév után?<br>A) Nem változik<br>B) Fokozatosan csökken<br>C) Hirtelen csökken","answer":"Helyes: B) Fokozatosan csökken","explanation":"Az ízlelőbimbók száma a 40. életév után fokozatosan csökkenésnek indul, mivel régebbiek pusztulnak, mint ahány új képződik."},{"type":"MC","text":"Hány féle alapízre érzékenyek az ízlelőbimbók?","options":["A) 2 féle","B) 3 féle","C) 5 féle","D) 7 féle"],"correctLetter":"C","explanation":"Az alapízek: savanyú, sós, édes, keserű és umami."},{"type":"BLANK","text":"Az umami íz a _____ sajtban és a paradicsomban fordul elő.","answer":"parmezán (vagy: Parmigiano-Reggiano)","explanation":"Az umami az ötödik alapíz, amely glutamátban gazdag élelmiszerekben található, pl. parmezán, paradicsom, fermentált termékek."},{"type":"MC","text":"A nystagmus az alábbiak közül melyikhez kapcsolódik?","options":["A) A halláscsökkenéshez","B) Az egyensúlyozási rendszer meghibásodásához","C) Az ízlelés zavarához","D) A szaglás elvesztéséhez"],"correctLetter":"B","explanation":"A nystagmus nem szándékos szemrezegés, amely vesztibuláris problémákra utal."},{"type":"BLANK","text":"A Menière-kór tünetei között tinnitus és _____ szerepelnek.","answer":"halláscsökkenés (vagy: szédülés)","explanation":"A Menière-kór jellegzetes tünetei a halláscsökkenés, szédülés (vertigo), tinnitus és a füladiszomfort."},{"type":"MC","text":"Melyik agyi terület felelős a szagok viselkedésünkre gyakorolt tudat alatti befolyásáért?","options":["A) Talamus","B) Limbikus rendszer","C) Agykéreg","D) Kisagy"],"correctLetter":"B","explanation":"A limbikus rendszer (hippokampusz, amigdala) a szagok érzelmeinkre és emlékünkre gyakorolt tudat alatti hatásáért felelős."}],"magatartas":[{"type":"MC","text":"A habituáció alatt mit értünk?","options":["A) Az új ingerhez való megerősítés","B) A nem veszélyes ingerre adott válasz gyengülése","C) Az érzelmi tanulás","D) A szaglóreceptorok alkalmazkodása"],"correctLetter":"B","explanation":"A habituáció az ingerekhez való hozzáadódás, amikor az organizmus egyre kevésbé reagál az ismételten megjelenő ingerre."},{"type":"MC","text":"A Pavlov-kísérlet milyen típusú tanulást szemléltet?","options":["A) Operáns kondicionálás","B) Klasszikus kondicionálás","C) Belátásos tanulás","D) Szociális tanulás"],"correctLetter":"B","explanation":"Pavlov kutyáinak nyáltermelési reflexét a csengőzaj-étel párosítás révén tanította meg, mely a klasszikus kondicionálás paradigmája."},{"type":"BLANK","text":"A klasszikus kondicionálásban az eredeti ingerrel párosított ingerek _____ ingert hoznak létre.","answer":"feltételezett (vagy: feltételes)","explanation":"Az eredetileg semleges inger (feltételezett ingert) válik csengőzaj) a feltételezett reflexet (nyáltermelés) váltja ki."},{"type":"MC","text":"Az operáns kondicionálás melyik kutatóhoz köthető?","options":["A) Ivan Pavlov","B) Konrad Lorenz","C) Burrhus Skinner","D) Albert Bandura"],"correctLetter":"C","explanation":"B.F. Skinner az operáns kondicionálás törvényét dolgozta ki: a viselkedés következményei határozzák meg az ismétlődést."},{"type":"BLANK","text":"Az erős megerősítés a viselkedést _____, a kilégelés pedig gyengíti.","answer":"erősíti (vagy: serkenti, fokozza)","explanation":"A pozitív megerősítés (jutalom) növeli a viselkedés valószínűségét, míg a negatív következmények csökkentik azt."},{"type":"MC","text":"A belátásos tanulás (insight learning) melyik típusú gondolkodást igényel?","options":["A) Mechanikus gyakorlást","B) Kísérletezést és problémamegoldást","C) Szőrös megismerés","D) Egyedüli tanulást"],"correctLetter":"B","explanation":"A belátásos tanulás hirtelen felismerésre alapul, amikor az organizmus megérti a probléma megoldásának módját."},{"type":"BLANK","text":"Wolfgang Köhler kísérletében a majmok megtanultak _____ használatával szedni a banánt.<br>A) Fát<br>B) Kötelet<br>C) Nádszálat<br>D) Szöveteket","answer":"Helyes: A) Fát","explanation":"Köhler bizonyította, hogy a majmok belátásos tanulásra képesek, amikor fadarabokat használtak meg a plafon alá erreichen."},{"type":"MC","text":"A rövid távú memória (working memory) kapacitása körülbelül hány információegység?","options":["A) 2-3","B) 5-9","C) 15-20","D) 25-30"],"correctLetter":"B","explanation":"George Miller \"mágikus szám 7\" elmélete szerint az rövid távú memória 5-9 információegységet képes tartani."},{"type":"BLANK","text":"A hosszú távú memória tárolási kapacitása gyakorlatilag _____.","answer":"korlátlan (vagy: végtelen, nagyon nagy)","explanation":"Az LTM potenciálisan korlátlan mennyiségű információ tárolására képes, évek vagy életen át."},{"type":"MC","text":"Az epizodikus memória melyik típusú információt tárol?","options":["A) Tények és fogalmak","B) Személyes, dátumozottt emlékek","C) Mozgás és képzettség","D) Szöveg és képek"],"correctLetter":"B","explanation":"Az epizodikus memória az egyéni tapasztalatok, helyzetek és azok időpontjának nyilvántartásáért felelős."},{"type":"BLANK","text":"A procedurális memória _____ és készségek tárolásáért felelős.","answer":"motoros (vagy: mozgásos, gyakorlat)","explanation":"A procedurális memória az automatikus mozgások és készségek memóriája, pl. biciklizés, írás, zongorázás."},{"type":"MC","text":"A hosszú távú potenciáció (LTP) melyik agyterületen mutatkozott először hangsúlyosan?","options":["A) Magnocelluláris mag (LGN)","B) Szerebelum","C) Hippokampusz","D) Agy kéreg"],"correctLetter":"C","explanation":"Az LTP az első alkalommal a hippokampuszban vizsgálták, amely a memória formálódásában kulcsszerepet játszik."},{"type":"BLANK","text":"Az LTP egy _____ kifejezési formáját jelenti, amely a szinapszis erősítéséhez vezet.","answer":"megerősítés (vagy: potenciáció, fokozódás)","explanation":"Az LTP a szinapszis hosszú távú erősödésének mechanizmusa, amely a tanuláshoz és memóriához kapcsolódik."},{"type":"MC","text":"A Lorenz által leírt \"bevésés\" melyik fajnál igazolódott?","options":["A) Kutyáknál","B) Madárkáknál (őzlibák)","C) Csimpánzaknál","D) Halakban"],"correctLetter":"B","explanation":"Konrad Lorenz a kacsacsibék bevésési viselkedésén mutatta be, hogy a kritikus periódusban az első mozgó objektumhoz kötődnek."},{"type":"MC","text":"Az ösztön melyik jellemzője igaz?","options":["A) Tanulással módosítható","B) Születéskor jelen van","C) Szándékosan kiváltható","D) Egyénenként azonos módon nyilvánul meg"],"correctLetter":"B","explanation":"Az ösztönök veleszületett viselkedésminták, mint a szopóreflex vagy a menekülési reflexek."},{"type":"BLANK","text":"A motiváció és az ösztön közötti kapcsolat azt jelenti, hogy az ösztön _____ a motivációt.","answer":"kiváltja (vagy: generálja, serkenti)","explanation":"Az éhség ösztöne például motivációt hoz létre az étel keresésére, mely kiváltja az étvágyhoz vezető viselkedést."},{"type":"MC","text":"Az amigdala melyik érzelmi funkcióért felelős?","options":["A) Boldogság","B) Félelem","C) Vidámság","D) Kiváncsiság"],"correctLetter":"B","explanation":"Az amigdala az érzelmi memória feldolgozásáért, különösen a félelmet kiváltó ingerek felidézésének felelős."},{"type":"BLANK","text":"A stressz hormon kortizol az _____ által termelődik.","answer":"mellékvese (vagy: adrenális gland, mellékvesekéreg)","explanation":"A kortizol a mellékvese külső rétegéből (kéreg) termelődik, és a stress válaszok részeként működik."},{"type":"MC","text":"Az REM-fázis alvás melyik funkcióhoz kapcsolódik?","options":["A) Szomatikus regeneráció","B) Álom és memóriakonsolidáció","C) Testmozgások és normális légzés","D) Mélyebb alvás"],"correctLetter":"B","explanation":"Az REM (gyors szemmozgás) alvás az álmok és a procedurális memória feldolgozásának periódusa."},{"type":"MC","text":"A neuroplaszticitás melyik folyamatot írja le?","options":["A) Az agy sejtek halálát","B) Az agy szerkezetének és funkcióinak módosulása","C) Az idegek degenerálása","D) Az neurotranszmitter csökkenése"],"correctLetter":"B","explanation":"A neuroplaszticitás az agy azon képessége, hogy új neuronális kapcsolatokat alakít ki, mely a tanulás alapja."},{"type":"BLANK","text":"A szociális tanulás Albert Bandura ___ -modelljén alapul.","answer":"megfigyelés (vagy: modell, társas, imitáció)","explanation":"Az observer-learning vagy szociális tanulás az azt jelenti, hogy az emberek mások megfigyelhető viselkedéseiből tanulnak."},{"type":"MC","text":"A szerzett félelem kiváltásának mechanizmusa mely kondicionálási típus szerint működik?","options":["A) Operáns","B) Klasszikus","C) Szociális","D) Belátásos"],"correctLetter":"B","explanation":"A félelem a klasszikus kondicionálás útján szerezhető (pl. egy trauma után egy bizonyos ingeré)."},{"type":"MC","text":"A beszéd tanulása melyik életperiódushoz van kötve?","options":["A) 0-2 év","B) 2-5 év","C) 5-10 év","D) 10-15 év"],"correctLetter":"A","explanation":"A beszéd kritikus tanulási periódusa az első 2-3 év, amikor az agy a legnagyobb mértékben fogékony az nyelvtanulásra."},{"type":"BLANK","text":"Az iskola az alábbiak közül melyik szokások kialakítására hat?<br>A) Étkezési<br>B) Szociális<br>C) Tanulási<br>D) Minden a fenti","answer":"Helyes: D) Minden a fenti","explanation":"Az iskola intézménye széles körű szokások kialakítására hat, az étkezéstől a szociális magatartásig."},{"type":"MC","text":"A megerősítés nélkül a viselkedés idővel elenyészik. Ezt melyik elv írja le?","options":["A) Kitörlés","B) Visszahúzódás","C) Szokáskezelés","D) Szenzitizáció"],"correctLetter":"A","explanation":"Az extinkció vagy kitörlés az a folyamat, amikor megerősítés nélkül a feltételezett válasz fokozatosan gyengül."},{"type":"MC","text":"A játék mely funkciót tölti be a fejlődés során?","options":["A) Fejleszti a kognitív képességeket","B) Szocializációs funkciót ellát","C) Kitölt az időt","D) Feszültségoldó"],"correctLetter":"A","explanation":"A játék összetett szerepet játszik: fejleszti az agyi funkciókat, szociális készségeket tanít és megkönnyíti az érzelmi feldolgozást."},{"type":"BLANK","text":"A kíváncsiság és az unalom közötti egyensúlyáról azt mondhatjuk, hogy az _____ az egyénnek szükséges pszichológiai állapot.","answer":"optimális ingerlés (vagy: érdekes, megfelelő, kiegyensúlyozott)","explanation":"Az emberek a megfelelő szintű ingerlésről szólnak, amely elég érdekes ahhoz hogy figyelmeztesse, de nem túl túlterhelő."},{"type":"MC","text":"Az evolúciós pszichológia szerint mely viselkedések maradtak meg az emberben az ősök óta?","options":["A) Az aggression","B) Az altruizmus","C) Az anyaszeretet","D) Minden a fenti"],"correctLetter":"D","explanation":"Az evolúciós pszichológia magyarázza, hogy az agresszió, az altruizmus és a szülőszevét olyan viselkedések, amelyek az evolúció során megőrződtek."},{"type":"MC","text":"Az alvás mely szakaszában érkezik el az első REM-periódus?","options":["A) Az éjszaka első 30 perce után","B) Az éjszaka 60-90 percénél","C) Az éjszaka 2-3 órájánál","D) Az éjszaka végénél"],"correctLetter":"B","explanation":"Az első REM-fázis tipikusan 60-90 perc alvás után kezdődik, majd az éjszaka előrehaladtával gyakrabban fordulnak elő."},{"type":"BLANK","text":"A szociális tanulás során az emberek _____ megfigyelésből tanulnak.","answer":"mások viselkedésének (vagy: másik személy, megfigyelés)","explanation":"A szociális tanulás (observer learning) annak a képessége, hogy mások viselkedéseit figyeljük meg és belőlük tanuljunk."}],"hormonrendszer":[{"type":"MC","text":"Mi az a hormon?","options":["A) Egy peptidlánc, amely kizárólag a hipofízisben termelődik","B) Az endokrin mirigyek által termelt, szisztémás hatást kifejtő biokémiai szignál","C) Egy enzim, amely közvetlenül a tápanyag-felhasználást szabályozza","D) A központi idegrendszer egy neurotranszmittere"],"correctLetter":"B","explanation":"A hormonok a belső elválasztású mirigyek terméke, a vérben szállítódnak és messzire ható, általában lassú szisztémás hatásokat fejtenek ki."},{"type":"MC","text":"Mely hormonok tartoznak a szteroid hormonok csoportjába?","options":["A) Inzulin, glukagon, növekedési hormon","B) Kortizol, tesztoszteron, ösztrogén, progeszteron","C) Adrenalin, noradrenalin, tiroxin","D) Oxitocin, vazopresszin, prolaktin"],"correctLetter":"B","explanation":"A szteroid hormonok koleszterinből szintetizálódnak, lipofil szerkezetűek, a citoplazmatikus és magbeli receptorokon keresztül hatnak."},{"type":"MC","text":"Hogyan hatnak a peptid hormonok (pl. inzulin, adrenalin)?","options":["A) Az ER-en keresztül transzláció gátlása révén","B) A sejtmembránon lévő receptorokhoz kötődve, jelközvetítő kaskádokat indítanak","C) A DNS-hez közvetlenül kötődve transzkripció aktiválása által","D) A sejtmembránban való beépülés révén"],"correctLetter":"B","explanation":"A peptid hormonok hydrofil molekulák, a sejtmembrán receptorain keresztül cAMP, IP₃, DAG és egyéb másodlagos messenger közvetítve hatnak."},{"type":"BLANK","text":"A szteroid hormonok _____ szerkezetűek és a sejtmembrán receptorjain keresztül hatnak.","answer":"lipofil","explanation":"A szteroid hormonok choleszterinből származnak, zsíroldékonyak, a citoplazmatikus és magbeli transzkripciós faktorokhoz kötődnek."},{"type":"MC","text":"Mit jelent a hormonális visszacsatolás (feedback)?","options":["A) Az endokrin mirigy folyamatos növekedése","B) A hormon termelésének szabályozása a hormon szintje vagy annak hatása alapján","C) Az idegsejtek közvetlen ingerülése","D) A táplálékciklusok szabályozása"],"correctLetter":"B","explanation":"A negatív feedback csökkenti, a pozitív feedback pedig fokozza a hormontermelést, ezáltal homeosztatikus egyensúlyt tartanak."},{"type":"MC","text":"Mely terület az endokrin szisztéma legfontosabb szabályozója az emberi szervezetben?","options":["A) A halálos agyből (medulla oblongata)","B) A nagyvagyról (cerebrum)","C) A hipotalamusz és a hipofízis","D) A midbrain és a tálamus"],"correctLetter":"C","explanation":"A hipotalamusz releasing hormonokat termel, amelyek a hipofízis hormontermelését szabályozzák, így az endokrin rendszer központi szervé válnak."},{"type":"BLANK","text":"A hipotalamusz _____ hormonokat termel, amelyek a hipofízis elülső lebenyjét serkentik vagy gátolják.","answer":"releasing","explanation":"A releasing hormonok (pl. GnRH, CRH, TRH) a hipofízis elülső lebenyjét stimulálja a megfelelő tróphormonok szintéziséhez."},{"type":"MC","text":"Melyek a hipofízis elülső lebenyének főbb hormonjai?","options":["A) Inzulin, glukagon, szomatosztatin","B) Adrenalin, noradrenalin, kortizol","C) Növekedési hormon (GH), FSH, LH, TSH, ACTH, prolaktin","D) Kalcitonin, parathormon, D-vitamin hormon"],"correctLetter":"C","explanation":"A hipofízis elülső lebenye hat különböző tróphormont termel, amelyek más belső elválasztású mirigyek működését szabályozzák."},{"type":"MC","text":"Mi a növekedési hormon (GH) elsődleges hatása?","options":["A) A vércukorszint szabályozása","B) A csontok és izmok növekedésének serkentése, az anyagcsere felgyorsítása","C) A nemi érés elősegítése","D) Az adrenalin termelésének fokozása"],"correctLetter":"B","explanation":"A GH az epifízis lemez szomatotrop sejtjeiből származik, szomatomedin mediálás révén a növekedést és a lipolízist fokozza."},{"type":"MC","text":"Mit csinál a tireotropin (TSH)?","options":["A) A mellékvese kérgét stimulálja kortizol termelésére","B) A pajzsmirigyét stimulálja T₃ és T₄ termelésére","C) A hasnyálmirigyét stimulálja inzulin szintéziséhez","D) A gonádokat stimulálja szex hormonok termelésére"],"correctLetter":"B","explanation":"A TSH a hipofízis elülső lebenyjéből származik, és a pajzsmirigyet a thyroid hormonok szintéziséhez és szekréciójához stimulálja."},{"type":"BLANK","text":"Az ACTH _____ terméke, amely a mellékvese kérgét stimulálja kortizol termelésére.","answer":"hipofízis","explanation":"Az ACTH (adrenokortikotropin hormon) a hipofízis elülső lebenyéből származik, és CRH (corticotropin-releasing hormon) szabályozza."},{"type":"MC","text":"Melyek a hipofízis hátulsó lebenyének hormonjai?","options":["A) Bármely hormon nincs a hátulsó lebenyben, csak az elülső","B) ADH (vazopresszin) és oxitocin","C) GH és TSH","D) Adrenalin és noradrenalin"],"correctLetter":"B","explanation":"A hátulsó hipofízis a hipotalamuszból származó neuronok végződéseit tartalmazza, melyek ADH és oxitocint szabadítanak fel."},{"type":"MC","text":"Mi az ADH (antidiuretikus hormon/vazopresszin) fiziológiai funkciója?","options":["A) A vér ozmotikus nyomásának csökkentése nyális termelésével","B) A vesék vízvisszaszívásának fokozása, így az urin koncentráltsága és a térfogat szabályozása","C) Az inzulin termelésének serkentése","D) Az oxitocin hatásának megelőzése"],"correctLetter":"B","explanation":"Az ADH a leszálló szakaszban és a gyűjtőcsatornában fokozza az aquaporin-2 csatornák beépülését, ezáltal a víz reabszorpcióját."},{"type":"BLANK","text":"Az oxitocin az _____ során nagy mennyiségben felszabadul és a méh simaizom összehúzódásait fokozza.","answer":"szülés","explanation":"Az oxitocin a hipotalamuszban termelődik, a hátulsó hipofízisből szabadul fel, és a szülés, valamint az anya-csecsemő kötés során kritikus."},{"type":"MC","text":"Milyen szerepe van a pajzsmirigynak az emberi szervezetben?","options":["A) Csupán a kalcium szintjének szabályozása","B) T₃ és T₄ hormonok termelése az anyagcsere-sebesség szabályozásához","C) Kizárólag a nemi érés szabályozása","D) Az inzulin termelésének gátlása"],"correctLetter":"B","explanation":"A pajzsmirigy thyroid hormonjai (T₃, T₄) az oxigénfogyasztást, a hőtermelést és a növekedést szabályozzák."},{"type":"MC","text":"Mi a pajzsmirigyserkentő hormon (TSH) által kiváltott folyamat az endokrin szabályozásban?","options":["A) A parathyroid hormon szintjének növelése","B) A pajzsmirigy T₃ és T₄ kibocsátásának fokozása","C) Az ACTH termelésének gátlása","D) Az oxitocin szintézisének csökkentése"],"correctLetter":"B","explanation":"Az endokrin tengelyen a TSH → pajzsmirigy → T₃, T₄ → negatív feedback a TRH és TSH szintjén."},{"type":"MC","text":"Mely sejtek termelnek kalcitonint a pajzsmirigyből?","options":["A) Follicularis sejtek","B) Parafollicularis (C) sejtek","C) Thyrotroph sejtek","D) Somatotroph sejtek"],"correctLetter":"B","explanation":"A parafollicularis sejtek kalcitonint termelnek, amely a csontozódást fokozza és a vése kalciumkiválasztását serkenti."},{"type":"MC","text":"Mely hormon szükséges az intracelluláris kalcium szintjének emelésére és az osteoclastok aktiválódásához?","options":["A) Kalcitonin","B) Parathormon (PTH)","C) Pajzsmirigyhormon (T₄)","D) Inzulin"],"correctLetter":"B","explanation":"A PTH a mellékpajzsmirigyből származik, a vér Ca²⁺ szintjét emeli, a csontozódást gátolja, a veseből Ca²⁺ visszaszívásást fokozza."},{"type":"BLANK","text":"A mellékpajzsmirigy a parathyroid hormon (PTH) termelésén keresztül az _____ szabályozásáért felel.","answer":"kalcium","explanation":"A PTH a kalcium-homeosztázis központi szabályozója, a vesék Ca²⁺ reabszorpcióját és a D-vitamin aktiválását is fokozza."},{"type":"MC","text":"Mit termel a hasnyálmirigy (pankász) endokrin része (Langerhans-szigetek)?","options":["A) Kizárólag enzimeket az emésztéshez","B) Inzulint, glukagont és szomatosztatint","C) Kizárólag szomatosztatint","D) Csupán peptid hormonokat"],"correctLetter":"B","explanation":"Az α-sejtek glukagont, a β-sejtek inzulint, a δ-sejtek szomatosztatint termelnek a glükóz-homeosztázis szabályozásához."},{"type":"MC","text":"Mi az inzulin biológiai funkciója?","options":["A) A vércukorszint emelése az éhezés során","B) A vércukorszint csökkentése a glükózfelhasználás és a glükogénszintézis fokozásával","C) A fehérjeszintézis teljes gátlása","D) Az adrenalin felszabadulásának stimulálása"],"correctLetter":"B","explanation":"Az inzulin a GLUT4-transzporter mobilizálása révén sejtbe szállítja a glükózt, fokozza a glikolízist és a glükogénszintézist."},{"type":"BLANK","text":"A glukagon a _____ sejtjeiből származik és a vércukorszintet megemelkedett glükóz-felszabadulással emeli.","answer":"hasnyálmirigy alfa (vagy α)","explanation":"A glukagon az éhezés során felszabadul, a máj glikogénbontásának és a glükoneogenezisének fokozása révén a vércukor szintjét emeli."},{"type":"MC","text":"Hogyan szabályozódik az inzulin és glukagon termelése?","options":["A) Csupán a hipofízis kontrollálása alatt","B) A vércukorszint alapján: magas glükóz → inzulin, alacsony glükóz → glukagon","C) Az adrenalin teljes dominanciája alatt","D) Függetlenül a glükóz szintjétől"],"correctLetter":"B","explanation":"Az intracelluláris glüko-szenzor az Langerhans-szigetekben közvetlenül érzékeli a vércukor változásait."},{"type":"MC","text":"Mely hormon a mellékvese kérgéből származik és a nátrium reabszorpcióját fokozza?","options":["A) Kortizol","B) Aldoszteron","C) DHEA","D) Adrenalin"],"correctLetter":"B","explanation":"Az aldoszteron a renin-angiotenzin-aldoszteron rendszer (RAAS) végterméke, amely a vér ionkoncentrációját és térfogatát szabályozza."},{"type":"MC","text":"Mi a kortizol (hidrokortizon) szerepe az endokrin rendszerben?","options":["A) Kizárólag a pollen ellen véd allergiás válaszként","B) A stressz hormonja: glükoneogenezist fokozza, a gyulladást gátolja, az anyagcserét emelkedik","C) Az inzulin termelésének teljes gátlása","D) Csupán az alvásritmus szabályozása"],"correctLetter":"B","explanation":"A kortizol a napszakon keresztül ciklusosan szabadul fel, a szénhidrát-, protein- és zsíranyagcserét szabályozza."},{"type":"MC","text":"Mely szerv termel adrenalin és noradrenalin?","options":["A) A pajzsmirigy","B) A mellékvese velő (medulla adrenalis)","C) A hipofízis","D) A hasnyálmirigy"],"correctLetter":"B","explanation":"A mellékvese velő szimpatomimetikus hormonokat termel, amelyek a \"küzdj vagy szökj\" válaszhoz szükséges hemodinamikus és metabolikus változásokat váltanak ki."},{"type":"BLANK","text":"Az adrenalin a szívfrekvencia és a vérnyomás _____ révén emeli meg a stressz során.","answer":"fokozása (vagy emelése)","explanation":"Az adrenalin a β-adrenerg receptorokhoz kötődve fokozza a szívösszehúzódások erősségét és gyakoriságát, vazodilatáció révén a vérnyomás emelkedik."},{"type":"MC","text":"Mely hormonok szabályozzák a női nemi ciklus hormonális aspektusait?","options":["A) Kizárólag a pajzsmirigy hormonjai","B) FSH, LH, ösztrogén és progeszteron","C) Csupán az adrenalin és a kortizol","D) Csak az inzulin és a glukagon"],"correctLetter":"B","explanation":"Az FSH stimulálja a tüszőfejlődést és az ösztrogén termelést, az LH az ovulációt és a progeszteron termelésére indukálja a corpus luteum-ot."},{"type":"MC","text":"Az ösztrogén mikor éri el a csúcságát a női nemi ciklusban?","options":["A) A menstruáció során","B) A folikuláris fázisban","C) A luteinális fázisban","D) Az ovuláció után egy héttel"],"correctLetter":"B","explanation":"Az ösztrogénszint fokozódása pozitív feedback révén az LH-szpike-et és az ovulációt indukálja a ciklus közepe táján."},{"type":"MC","text":"Mi történik az ovuláció után a corpus luteum-mal?","options":["A) Azonnal degeneráció nélkül eltűnik","B) Progeszteron termelésére kezd, amely a méhnyálkahártya felkészítésére szolgál","C) Az inzulin szintjét megemelkedik","D) Ismételt ovulációt vált ki azonnal"],"correctLetter":"B","explanation":"A corpus luteum az LH támogatása révén termel progesztert, amely a méhnyálkahártyát szekretórikus fázisba viszi az implantációhoz."},{"type":"BLANK","text":"A hCG (humán koriongonadotropin) a _____ termelésére kezd az implantáció után.","answer":"placenta (vagy trophoblaszt)","explanation":"A trophoblaszt hCG-t termel, amely a corpus luteum-ot tartja fenn és progeszteron termelésének folytatódásából biztosít az első trimeszterben."},{"type":"MC","text":"Melyik hormon szabályozza a nemi érést pubertás során a fiúknál és a lányoknál?","options":["A) Kizárólag az inzulin","B) Tesztoszteron (fiúk) és ösztrogén (lányok)","C) Kizárólag a kortizol","D) Az adrenalin és a noradrenalin"],"correctLetter":"B","explanation":"Az LH a here Leydig-sejtjeit stimulálja tesztoszteron termelésére, az FSH pedig a petefészek granulosa-sejtjeit az ösztrogén termelésére."},{"type":"BLANK","text":"A tesztoszteron a _____ sejtjeiből származik és a másodlagos nemi jellegek fejlődésénél döntő szerepet játszik.","answer":"here (vagy Leydig)","explanation":"A tesztoszteron a fiú nemi érés, a csont- és izomfejlődés, valamint a spermatogenezis fenntartásáért felel."},{"type":"MC","text":"Mit termel a pineálismirigy (epifízis)?","options":["A) Kizárólag T₃ és T₄ hormonokat","B) Melatonint az alvás-ébrenlét ritmus szabályozásához","C) Inzulint és glukagont","D) Kizárólag kortizolt"],"correctLetter":"B","explanation":"A pineálismirigy a szerotonin metoxi-transzfer szintézis révén melatonint termel, amely a circadián ritmusokat szinkronizálja."},{"type":"BLANK","text":"A melatonin szintje _____ során megemelkedik, előkészítve a szervezetet az alvásra.","answer":"este (vagy éjszaka)","explanation":"A pinealocyta a sötétségre reagál melatonin termeléshez, amely a szupraquiaszmatikus magot az alvás-ébrenlét ritmus fenntartásához képes."},{"type":"MC","text":"Mi az 1-es típusú diabétesz mellitus oka?","options":["A) A pajzsmirigy gyulladása","B) Az inzulin termelésére képes β-sejtek autoimmunis pusztulása","C) Az inzulinrezisztencia az izmok és a máj szintjén","D) A glukagon termelésének hiánya"],"correctLetter":"B","explanation":"Az 1-es típusú DM az immunrendszer β-sejteket támad, inzulinhiányt okoz, gyakran gyermekkorban kezdődik."},{"type":"MC","text":"Mit jelent a 2-es típusú diabétesz mellitus?","options":["A) Az inzulin teljes hiánya a gyermekkorban","B) Az inzulinrezisztencia fejlesztése: az erőforrások ellenére inzulin termelődik, de a sejtek nem reagálnak","C) A glukagon termelésének hiánya","D) A pajzsmirigy hormonok szintjének emelkedése"],"correctLetter":"B","explanation":"A 2-es típusú DM jellemzően a felnőttkort érinti és az alacsony fizikai aktivitás, túlsúly, genetikai tényezőkkel társul."},{"type":"BLANK","text":"Az inzulinrezisztencia során a sejtek az inzulinreceptoron vagy az intracellulárisan az _____ útvonalon jelentkező hibák miatt nem reagálnak az inzulinra.","answer":"szignalizáció (vagy jeltranszdukció)","explanation":"Az inzulinrezisztencia az IRS-1/PI3K/Akt út vesztésével vagy a szokásos szomatikus szignalizáció sérülésévé vezethet."},{"type":"MC","text":"Mi a Cushing-szindróma?","options":["A) Az inzulin termelésének hiánya","B) Az ADH termelésének túlzott mennyisége","C) A kortizol szintjének patológiailag magas szintje","D) Az adrenalin szintjének alacsony szintje"],"correctLetter":"C","explanation":"A Cushing-szindróma központi oka az ACTH-termelő tumor, vagy mellékvese adenoma a kortizol túlzott szekrécióját okozza."},{"type":"MC","text":"Mely jellegzetes tünetei vannak a Cushing-szindrómának?","options":["A) Sorvadás és hipoglikémia","B) Arcpuffadás, hátán golyó alakú zsiradéklerakódás és osteoporózis","C) Kizárólag nyirokcsomó-megnagyobbodás","D) Sorvadás és hiperpigmentáció"],"correctLetter":"B","explanation":"A hosszú ideig fennálló hiperkortizolizmus a csont-, izmok, és egyéb szövetek katabolizmusát okozza, valamint immunszupresszió is előfordul."},{"type":"MC","text":"Mi az Addison-kór?","options":["A) Az inzulin termelésének túlzott fokozása","B) A mellékveseizomzat primér gyulladása és sérülése, melynek eredménye a kortizol és aldoszteron hiánya","C) A pajzsmirigy gyulladása","D) A melatonin termelésének hiánya"],"correctLetter":"B","explanation":"Az Addison-kór gyakran autoimmunis, a tünetei közé tartozik az alacsony vérnyomás, elektrolit eltérések, hipoglikémia és rossz közérzet."},{"type":"BLANK","text":"Az Addison-kórtól szenvedő betegek gyakran mutatják az _____ jellegzetes megkötöttségét az összes szungatott felületen.","answer":"hiperpigmentáció","explanation":"Az ACTH szintjének megemelkedése következtében a melanocita-sztimuláló hormon (MSH) is emelkedik, melynek eredménye a bőr besötétedése."},{"type":"MC","text":"Mit jelent a hypothyreosis (csökkent pajzsmirigyfunkció)?","options":["A) A pajzsmirigy hormonok túlzott szekréciója","B) A T₃ és T₄ szintjének csökkenése, amely a TSH emelkedésében nyilvánul meg","C) A pajzsmirigy teljes hiánya","D) Az inzulin termelésének csökkenése"],"correctLetter":"B","explanation":"A primer hypothyreosis a pajzsmirigy auto-immuun betegségével (Hashimoto-thyreoiditis), jódmegvonással vagy sugárkezeléssel járhat."},{"type":"MC","text":"Mely tünetei vannak a hypothyreosisnak?","options":["A) Magas vérnyomás, gyorsuló anyagcsere","B) Az anyagcsere-sebesség csökkentése, a hőtermelés csökkentése, a fáradtság és a súlygyarapodás","C) Szapora szívverés és súlycsökkenés","D) Kizárólag szellemi felbomlás"],"correctLetter":"B","explanation":"A pajzsmirigy hormonhiányában az összes emésztés és termoregulátori folyamat lelassul, melynek következménye az energiafelesleg és a súlygyarapodás."},{"type":"MC","text":"Mi a hypothyreosis kezelésének alapja?","options":["A) Pajzsmirigy eltávolítása","B) Az exogén T₄ (levothyroxine) pótlása a vérszint és a TSH normalizálásához","C) Az inzulin intravénás adása","D) Az ACTH termelésének fokozása"],"correctLetter":"B","explanation":"A levothyroxine a hypothyreosis standard kezelése, amely a T₃ és T₄ szintjét helyreállítja a negatív feedback normalizálásához."},{"type":"BLANK","text":"A hyperthyreosis (pajzsmirigy túlfunkciója) eredménye az _____, a szapora szívverés és az alultápláltság.","answer":"hőérzékenység (vagy hőtűrés csökkenése)","explanation":"A T₃ és T₄ szintjének megemelkedése az összes katabolikus és termogenikus folyamatot fokozza, az oxigénfogyasztást és a kalóriaégetést növelve."},{"type":"MC","text":"Mit jelent a Graves-betegség?","options":["A) Az 1-es típusú diabétesz","B) Az autoimmunis hypothyreosis (Hashimoto-thyreoiditis)","C) Az autoimmunis hyperthyreosis, amelyet TSH-receptor ellenes antitestek okoznak","D) Az Addison-kór"],"correctLetter":"C","explanation":"A Graves-betegségben az IgG antitestek a TSH-receptorhoz kötődve konstitutív aktiválódást okoznak, az immunrendszer pajzsmirigy-serkentés."},{"type":"BLANK","text":"Az exoftalmosz (szempuffadás) a Graves-betegség jellegzetes tünete, amely az orbitális szövet gyulladása és a retrobulbáris zsiradéklerakódás miatt _____ okoz.","answer":"szempróbálódást (vagy szemkiugrást)","explanation":"Az autoimmunis válasz az orbitális fibroblastokat és az adiposus szöveteket támadja, amely szövetmegduzzadást és előrehajlást okoz."},{"type":"MC","text":"Mely receptor típusok közvetítik a hormonális jeleket a sejtben?","options":["A) Csupán az enzimek","B) Membránreceptorok és intracelluláris (citoplazmatikus/magbeli) receptorok","C) Kizárólag a mitokondrium","D) Csupán a riboszómák"],"correctLetter":"B","explanation":"Az ioncsatorna-szerkezetű receptorok, a G-fehérje-csatolású receptorok, a tirozin-kináz receptorok a membránban helyezkednek el, míg a szteroid receptorok a citoplazmában."},{"type":"MC","text":"Mely receptorok közvetítik az adrenalin és a glukagon hatásait?","options":["A) Szteroid receptorok","B) G-fehérje-csatolású receptorok (GPCR)","C) Ioncsatorna receptorok","D) Tirozin-foszfatáz receptorok"],"correctLetter":"B","explanation":"A Gq, Gs és Gi fehérjék a fosfodikészterázokhoz és az adenilciklázhoz kapcsolódva cAMP vagy IP₃/DAG útvonalon jelet közvetítik."},{"type":"MC","text":"Mit jelentenek a másodlagos messzengerek az endokrin jelközvetítésben?","options":["A) A hormonokat, amelyeket a hipofízisből termelnek","B) Az olyan molekulákat, amelyeket a membránreceptor aktiválása után felszabadulnak, a hormon hatását amplifikálják","C) Az enzimeket, amelyek az emésztéshez szükségesek","D) A riboszómákat a fehérjeszintézishez"],"correctLetter":"B","explanation":"A cAMP, IP₃, DAG és Ca²⁺ másodlagos messzengerek a sejtben intracellulárisan amplifikálják a hormon szignálját."},{"type":"BLANK","text":"A _____ a klasszikus másodlagos messenger az olyan hormonok hatásakor, mint az adrenalin és a glukagon.","answer":"cAMP (adenozin-ciklomonofosfát)","explanation":"Az adrenalin és glukagon az Gs fehérjét aktiválják, amely az adenilciklázot serkenti a cAMP termelésére, amely a PKA-t aktiválja."},{"type":"MC","text":"Milyen szerepe van a kalciumnak az endokrin jelközvetítésben?","options":["A) Csupán az idegimpulzus vezetésében","B) Másodlagos messengerként működik, amely az intracellulárisan IP₃ vagy más szignálok által felszabadul","C) Kizárólag a csontok mineralozottságáért felelős","D) Az inzulin szintezésének teljes gátlása"],"correctLetter":"B","explanation":"Az IP₃ az inozitol-1,4,5-trifoszfát, amely az endoplazmatikus retikulum Ca²⁺-csatornáit nyitja, szabad intracellularis Ca²⁺ emelkedést okozva."},{"type":"MC","text":"Mit csinál a PKA (protein-kináz A)?","options":["A) A hormonokat bomlasztja le","B) Az aktiválódott cAMP másodlagos messenger által számos fehérje foszforilálásához vezet","C) Az inzulint termelő sejtek kitöltésére serkent","D) A receptorok le degradálódnak"],"correctLetter":"B","explanation":"A PKA a kináz-kaskádok iniciálva az anyagcsere-enzimek aktiválódását/inaktivációját szabályozza pl. glikolízisé vagy glükogenolízisé."},{"type":"MC","text":"Hogy hívják a hormonok által szabályozott homeosztázis-fenntartó folyamatot?","options":["A) Neuroendokrin szabályozás","B) Autokrin kommunikáció","C) Parakrin szignalizáció","D) Hormonális homeosztatikus kontroll"],"correctLetter":"D","explanation":"A homeosztatikus kontroll a belső környezet stabilitásának fenntartása hormonális visszacsatolási mechanizmusok révén."},{"type":"BLANK","text":"A _____ egy endokrin mirigy, amely a terhesség alatt progeszteron és hCG-t termel.","answer":"placenta (vagy trophoblaszt)","explanation":"A placenta progeszteron és hCG-t termel, amely az embrió és a anya közötti hormonális kommunikációt biztosítja."},{"type":"MC","text":"Mi történik a hipotalamusz-hipofízis-poszterior tengely során az ADH kibocsátásakor?","options":["A) A hasnyálmirigy inzulint termel","B) A hipotalamusz neuronjai ADH-t szabadítanak fel a hipofízis hátulsó lebenyjéből","C) A pajzsmirigy T₄ szintjét megemelkedik","D) Az adrenalin szintjét az adrenális velő csökkenti"],"correctLetter":"B","explanation":"A magnocellularis neuronok a szupraosmotikus magban szintetizálják az ADH-t és az oxitocint, amely axonok végződésein keresztül felszabadul."},{"type":"BLANK","text":"A _____ sejtek a spermiumok termeléséhez szükséges testoszteront termelik és az FSH és LH által szabályozódnak.","answer":"Leydig (vagy interstitiális)","explanation":"A Leydig-sejtek a here interstitiális szöveti részében helyezkednek el, és a tesztoszteron termelésénél döntő szerepet játszanak."},{"type":"MC","text":"Mely folyamatban játszik döntő szerepet az oxitocin a szülés után?","options":["A) Kizárólag az embrió fejlődésén","B) Az anya-csecsemő kötődés és az anya által szintetizált tejének kibocsátása (let-down reflex)","C) A pajzsmirigy hormontermelésének elindítása","D) A mellékvese kérgét stimulálja kortizol termelésére"],"correctLetter":"B","explanation":"Az oxitocin a tejelválasztás során a mellmirigyek simaizomai összehúzódásait indukálja, a tej kiáramlásához."},{"type":"MC","text":"Hogyan aktiválódnak az intracelluláris szteroid receptorok?","options":["A) A sejtmembrán receptorain keresztül cAMP közvetítéssel","B) A szteroid hormon a sejtmembránon átjutva a citoplazmatikus receptorhoz kötődik, majd a magba kerül","C) Az enzimek direkt foszforilálása révén","D) A riboszómák aktiválódása által"],"correctLetter":"B","explanation":"A szteroid hormonok lipofil szerkezetűek, átjutnak a sejtmembránon, citoplazmatikus vagy magbeli receptorhoz kötődnek, transzkripciós faktorként hatnak."}],"immunrendszer":[{"type":"MC","text":"Mi a fizikai-kémiai védelmet biztosító első vonal az immunrendszerben?","options":["A) A B-limfociták által termelt antitestek","B) A bőr, nyálkahártyák, gyomorsav, mikrobiom","C) A T-sejtek és fagociták","D) Az interferonok és komplement-rendszer"],"correctLetter":"B","explanation":"A fizikai-kémiai védelem az adaptív immunválasz megelőzésének alapja. Az első vonal minden idegen anyag ellen azonnal védekezik."},{"type":"MC","text":"Milyen sejt az alappopulációja a veleszületett immunitásnak?","options":["A) T-limfociták","B) B-limfociták","C) Fagociták és NK-sejtek","D) Plazmasejtek"],"correctLetter":"C","explanation":"A veleszületett immunitás (természetes, nem specifikus) azonnal működik, és a fagociták (makrofág, granulocita) és NK-sejtek a fő szereplői."},{"type":"MC","text":"Mi az antigén definíciója az immunológiában?","options":["A) Egy olyan protein, amely az ellátás során szabadul fel","B) Olyan idegen anyag, amely immunválaszt vált ki","C) A szervezet saját sejtjei által termelt védőanyag","D) Az immunrendszer első vonalát képviseli"],"correctLetter":"B","explanation":"Az antigén a szervezet számára idegennek számító molekula, amely B- és T-sejtreceptorokat aktivál és antitesttermelést indít."},{"type":"MC","text":"Mely komponens nem része a veleszületett immunitásnak?","options":["A) Komplement-rendszer","B) Interferonok","C) MHC II. molekulák","D) Fagocitózis"],"correctLetter":"C","explanation":"Az MHC II. molekulák az antigénbemutatásban vesznek részt, amely az adaptív immunitás része. A veleszületett immunitás nem antigénspecifikus."},{"type":"MC","text":"Melyik limfocita-típus a klasszikus antigénbemutatás során működik?","options":["A) CD8⁺ T-sejtek","B) CD4⁺ T-sejtek és B-sejtek","C) NK-sejtek","D) Neutrofilek"],"correctLetter":"B","explanation":"A CD4⁺ helper T-sejtek és a B-sejtek az antigénbemutató sejtektől (APC) vesznek fel információt MHC II. segítségével."},{"type":"MC","text":"Mi a CD8⁺ T-sejtek (citotoxikus T-limfociták) elsődleges funkciója?","options":["A) Antitestek termelése","B) Vírusos vagy malignus sejtek felismerése és legyilkolása","C) Gyulladásos mediátorok termelése","D) Antigénbemutató sejt funkció"],"correctLetter":"B","explanation":"A CD8⁺ T-sejtek (citotoxikus T-limfociták) az MHC I. molekulákon felismerik a fertőzött sejteket és apoptózist indítanak."},{"type":"MC","text":"Mit jelent a klonális szelekció elmélete?","options":["A) Az összes T- és B-sejt azonos receptorral születik","B) Az antigén által aktivált limfociták sokszorozódnak és differenciálódnak","C) A tímuszban az összes T-sejt megsemmisül","D) Az adaptív immunitás nem működik az antigén nélkül"],"correctLetter":"B","explanation":"A klonális szelekció azt jelenti, hogy az adott antigénre reagáló limfociták klónjainak sokaságozódása történik, így nagy mennyiségű antigénspecifikus sejt keletkezik."},{"type":"MC","text":"Melyik antitest-osztály az alapértelmezett első válasz egy akut bakteriális fertőzésre?","options":["A) IgA","B) IgE","C) IgM","D) IgD"],"correctLetter":"C","explanation":"Az IgM az elsődleges immunválasz során az első termelődő antitest-osztály, nagy molekula, és hatékonyan aktiválja a komplementrendszert."},{"type":"MC","text":"Mit tesz az IgA antitest az immunrendszerben?","options":["A) Aktiválja a komplement-rendszert","B) Az első reaktáló antitest","C) Nyálkahártyák védelme (nyál, könnyek, testnedvek)","D) Allergiás válaszokat vált ki"],"correctLetter":"C","explanation":"Az IgA a lokális nyálkahártya-immunitás, az első védelmi vonal az újonnan belépő patogénekről."},{"type":"MC","text":"Milyen antiteszt kapcsolódik az allergiás válaszokhoz?","options":["A) IgA","B) IgE","C) IgM","D) IgG"],"correctLetter":"B","explanation":"Az IgE az I. típusú hipersenzitivitás (allergia) mediátora, amely hízósejtekhez és bazofilokhoz kötődik és hisztaminfelszabadulást okoz."},{"type":"MC","text":"Mi az autoimmun betegség lényege?","options":["A) Az immunrendszer nem működik egyáltalán","B) Az immunrendszer saját szövetei ellen támad","C) Bakteriális fertőzés miatt kialakult immunhiányosság","D) A B-sejtek nem tudnak antitesteket termelni"],"correctLetter":"B","explanation":"Az autoimmunitás az öntolerancia elvesztésének eredménye, az immunrendszer a saját antigéneket ismerje fel és támadja meg azokat."},{"type":"MC","text":"Melyik autoimmun betegség a pajz
