 főleg a májban termelődik és a porcsejtek osztódásához, valamint a csont növekedéséhez vezet. Túltermelődése óriásnövést (gigantizmust) okoz."},{"type":"MC","text":"A Basedow-kor (hipertireózis) mely biológiai oka miatt rendszeres betegség?","options":["A) Az agyalapi mirigy túlműködése","B) Egy kórosan képződött immunoglobulin a TSH-al hasonló szerkezetű, ezért TSH-hoz hasonló hatást fejt ki","C) A pajzsmirigy közvetlen idegstimulációja","D) Az adrenalin túltermelődése"],"correctLetter":"B","explanation":"A Basedow-kor egy autoimmun betegség. A kóros immunoglobulin TSH-szerű hatást fejt ki a pajzsmirigyön, ami a tiroxin termelésének fokozódásához vezet. Ez hipertireózis tüneteit okozza."},{"type":"MC","text":"A cukorbetegség 1-es és 2-es típusa közötti fő különbség abban áll, hogy:","options":["A) Az 1-es típus csak gyerekeknél, a 2-es csak felnőtteknél alakul ki","B) Az 1-es típusban inzulindeficit, a 2-esben inzulinrezisztencia áll fenn","C) A 2-es típusban nincs szükség inzulin terápiaára","D) Az 1-es típus csak genetikai okokra vezethető vissza"],"correctLetter":"B","explanation":"Az 1-es típusú cukorbetegség autóimmun betegség, ahol az inzulint termelő béta-sejtek pusztulnak (inzulindeficit). A 2-es típusban az inzulin termelődik, de a szövetek nem reagálnak rá megfelelően (inzulinrezisztencia)."},{"type":"MC","text":"Az aldoszteron és a vazopresszin (ADH) mely közös funkciót látnak el?","options":["A) Mindkettő növeli a vércukorszintet","B) Mindkettő a só- és vízháztartás szabályozásában vesz részt","C) Mindkettő csökkenti a vérnyomást","D) Mindkettő a szénhidrát-anyagcserét szabályozza"],"correctLetter":"B","explanation":"Az aldoszteron (mellékvesekéreg) és az ADH (agyalapi mirigy hátulsó lebenye) mindkettő a vese működésén keresztül szabályozzák a só- és vízháztartást. Az aldoszteron a nátrium visszaszívását fokozza, az ADH a víz visszaszívását."}],"immunrendszer":[{"type":"MC","text":"Melyik immunsejt-típus mutatja be az MHC II-vel komplexben az antigéneket a T-sejteknek?","options":["A) CD8+ citotoxikus T-sejtek","B) NK-sejtek","C) Antigénbemutató sejtek (dendritikus sejtek, makrofágok)","D) Plazmasejtek"],"correctLetter":"C","explanation":"Az antigénbemutató sejtek (APC-k) az MHC II molekulákkal prezentálják a fagocitált antigéneket a CD4+ helper T-sejtek felismerésére."},{"type":"TF","text":"Az IgE antitest-izotípus elsődlegesen a szisztémás bakteriális infekciók elleni védekezésben játszik szerepet.","isTrue":false,"explanation":"Az IgE az allergiás és parazitás infekciók ellen védekezik, I. típusú túlérzékenységi reakciókat vált ki hízósejtek és eozinofiltek degranulációjával."},{"type":"MC","text":"Melyik a jellemző különbség a veleszületett (innate) és az adaptív immunválasz között?","options":["A) A veleszületett immunválasz specifikus, az adaptív általános","B) Az adaptív immunválasz az első 24 órában működik maximális hatékonysággal","C) A veleszületett immunválasz nem specifikus és azonnal működik, az adaptív specifikus és memória-alapú","D) Az adaptív immunválasz neutrofilek és makrofágok által közvetített"],"correctLetter":"C","explanation":"A veleszületett immunitás fizikai védelem, komplement és fagocitózis révén gyors, nem specifikus védekezést nyújt. Az adaptív immunitás T- és B-sejtek által közvetített, specifikus és hosszú memória-periódussal rendelkezik."},{"type":"BLANK","text":"Az immunrendszer szervezetét a _____ szabályozza, amely a citokinek és kemokinek révén koordinálja az immunsejtek működését.","answer":"neuroendokrin rendszer","explanation":""},{"type":"MC","text":"Milyen mechanizmus által működik a komplement-kaszkád?","options":["A) Antitestek termelése B-sejtekben","B) Szekvenciális enzimaktivációs lánc, amely lyza membránok és opsonizálás útján baktériumokat pusztít","C) Citotoxikus T-sejtek perforin-közvetített pore-képzése","D) NK-sejtek ADCC útján"],"correctLetter":"B","explanation":"A komplement-rendszer klasszikus, alternatív vagy lektin-úton aktiválódhat, C3 és C9 komponensek a membránokat lyza, illetve fagocitózist erősít az opsonizáció révén."},{"type":"TF","text":"A plazmasejtek hosszú élettartamú memória-sejtek, amelyek éveket vagy évtizedeket élhetnek a csontvelőben.","isTrue":false,"explanation":"A plazmasejtek rövid életűek (néhány nap-egy hét), míg a memória B-sejtek hosszú élettartamúak és biztosítják a másodlagos immunválaszt."},{"type":"MC","text":"Az első vakcinázás (primér immunválasz) és a második vakcinázás (szekunder immunválasz) között melyik az alapvető különbség?","options":["A) Az első vakcinázás gyorsabb antitesttermeléshez vezet","B) A második vakcinázás magasabb affinitású antitesteket termel memória B-sejtek aktiválása révén","C) Az első vakcinázás IgE termeléshez, a második IgG-hez vezet","D) A szekunder válasz lassabb, de hosszabb ideig tart"],"correctLetter":"B","explanation":"Az anamnetikus válasz gyorsabb, magasabb affinitású IgG antitesteket termel az affinitás-érettség miatt, mivel a memória B-sejtek már somatikus hipermutáción mentek keresztül."},{"type":"BLANK","text":"Az MHC I molekulák a szervezet _____ sejtjeiről prezentálják az antigéneket a CD8+ citotoxikus T-sejteknek, míg az MHC II ____ sejtjeiről kerülnek prezentálásra.","answer":"minden","explanation":""},{"type":"MC","text":"Melyik autoimmun betegség az, ahol a szervezet saját szöveteket támad meg imunkomplexek és autoantitest-termelés révén?","options":["A) Rheumatoid arthritis","B) Celiac disease","C) Systemic lupus erythematosus (SLE)","D) Graves betegség"],"correctLetter":"C","explanation":"Az SLE az autoantitest-termelés (Anti-dsDNS, anti-szmafu) és imunkomplex-képzés jellemzi, amely glomerulonefritiszt és érszalagot okoz."},{"type":"TF","text":"A neutrofil granulocyták a veleszületett immunrendszer legfontosabb fagocitái, és az akut gyulladásos válaszban játszanak kulcsszerepet.","isTrue":true,"explanation":"A neutrofilek az elsők, amelyek megérkeznek a gyulladási helyre, és képesek a baktériumok és gombák gyors fagocitózisére."},{"type":"MC","text":"A klónszelekció elve szerint az adaptív immunválaszban melyik történik?","options":["A) Az összes B-sejt azonos specificitású antitesteket termel","B) A T- és B-sejtek véletlen klónai válogatódnak ki és proliferálnak az antigén-stimulációra","C) Az antigént felismerő sejtek szaporodnak, az erre nem képes sejtek apoptózissal pusztulnak","D) Az antigénbemutató sejtek klónszelekción esnek át"],"correctLetter":"C","explanation":"A klónszelekció Burnet elmélete szerint az antigén-reaktív sejtek klónjai expandálódnak, míg az autoreaktív sejtek eliminálódnak."},{"type":"BLANK","text":"Az IgM antitest az elsőként termelődik a primér immunválasz során, majd az affinity maturation után az IgG dominánssá válik. Az IgA a _____ védelmében, az IgE pedig az _____ elleni védekezésben játszik szerepet.","answer":"nyálkahártyákon","explanation":""},{"type":"MC","text":"Melyik citokinek szabályozzák a helper T-sejtek (Th1 vs Th2) differenciálódását?","options":["A) IFN-gamma és TNF-alpha (Th1) vs IL-4 és IL-5 (Th2)","B) IL-2 és IL-6 (Th1) vs TNF-alpha és TNF-béta (Th2)","C) TGF-beta kizárólagosan Th17 polarizálódáshoz vezet","D) Citokinek nem játszanak szerepet a T-sejt differenciálódásban"],"correctLetter":"A","explanation":"Az IFN-gamma a Th1 sejtek által termelődik (sejtes immunitás), az IL-4 a Th2 differenciálódáshoz vezet (humorális immunitás)."},{"type":"TF","text":"A HIV vírus az MHC II-t expresszáló B-sejteket közvetlen támadás útján pusztítja el.","isTrue":false,"explanation":"A HIV elsődlegesen a CD4+ helper T-sejteket támadja (CCR5/CXCR4 receptorokon keresztül), amit a CD4+ számcsökkenés jelzi."},{"type":"MC","text":"A vakcinációs protokoll melyik típusa bizonyult a leghatékonyabbnak az erős memória-védekezés kialakulásában?","options":["A) Egyszer beadott élő gyengített vakcina","B) Inaktivált kórokozót tartalmazó vakcina egyszeri adagban","C) Priming/boosting stratégia: élő gyengített vagy szubegység vakcina több adagban","D) Passzív antitestbevitellel kombinált kezelés"],"correctLetter":"C","explanation":"A primer-booster stratégia a legerősebb és legállóbb adaptív immunválaszt eredményezi az affinitás-érettség révén."},{"type":"BLANK","text":"Az endotoxin (LPS) a Gram-negatív baktériumok falából származik, a TLR4 útján az immun sejtek robusztus _____ termelésében, amely szepszisos sokk kiváltásában játszik szerepet.","answer":"citokinek termelésében","explanation":""},{"type":"MC","text":"A hipersenzitivitási reakciók közül melyik jellemzi az I. típusát (azonnali típusú allergia)?","options":["A) Citotoxikus T-sejt közvetített sejtkárosodás","B) Hízósejtekből IgE-közvetített histamin-felszabadulás percek alatt","C) Immunkomplex-depozitálódás a vesékben és érfalakban","D) Késleltetett típusú (T-sejt közvetített) allergiás dermatitis"],"correctLetter":"B","explanation":"Az I. típusú hipersenzitivitás IgE-közvetített, az allergiás antigén a mast cell-felszínén lévő IgE-hez kötődik, degranulációt és histamin-, leukotrién-felszabadulást okozva."},{"type":"TF","text":"Az NK-sejtek (natural killer sejtek) a veleszületett immunitás fontos részei, és az MHC I expresszió hiányát felismerve támadják meg a vírus-fertőzött és tumor-sejteket.","isTrue":true,"explanation":"Az NK-sejtek az \"missing self\" felismerésén alapuló surveillance-t végeznek - ha az MHC I csökken, az NK-sejtek aktiválódnak."},{"type":"MC","text":"A meningitis melyik baktériuma okozza a legsúlyosabb megbetegedést, és mely immunrendszeri komponens hiánya fokozza a fertőzés kockázatát?","options":["A) Haemophilus influenzae és neutrofil deficit","B) Neisseria meningitidis és komplement (C5-C9) deficiencia","C) Streptococcus pneumoniae és csökkent IgG szint","D) Listeria monocytogenes és CD8+ T-sejt deficit"],"correctLetter":"B","explanation":"Az N. meningitidis poliszacharid kapszulája a komplement-rendszer ellen védett. A komplement-deficiency fokozottan növeli a meningitisz kockázatát."},{"type":"BLANK","text":"A T-sejt aktiválódásához az MHC-TCR ligáción kívül _____ jelek szükségesek, például B7-CD28 kapcsolat, amely nélkül T-sejt anergizáció vagy apoptózis következik.","answer":"másodfokú","explanation":""},{"type":"MC","text":"A T-sejt receptorok (TCR) melyik jellemzője biztosítja az MHC-kötés specificitásait?","options":["A) A TCR az összes antigén ellen azonos affinitással kötődik","B) A TCR hipervariábilis régióinak (CDR1, CDR2, CDR3) révén specifikus az MHC-peptid komplexre","C) A TCR egyrétegű megújulása és az idegen antiénekre való felismerése","D) A TCR az antitestekhez hasonló monoklonális eredetű"],"correctLetter":"B","explanation":"A TCR V-régió három complementarity-determining region hordozza a specificitást. A CDR3 a V(D)J rekombinációból ered és legnagyobb variabilitást mutatja."},{"type":"TF","text":"Az adaptív immunrendszer egyik jellemzője a tolerancia, amely megelőzi az autoreaktív sejtek szövetei támadását.","isTrue":true,"explanation":"A centrális tolerancia a thymusban és csontvelőben történik, a perifériás tolerancia regulátor T-sejtek (Tregs) révén biztosítható."},{"type":"MC","text":"A T-sejt receptorok szignalizációs kaszkádja melyik protein-kinázt aktiválja először az MHC-TCR ligáció után?","options":["A) Janus kinase (JAK)","B) Src-család kináz (Lck és Fyn)","C) Bruton's tyrosine kinase (Btk)","D) MAPK"],"correctLetter":"B","explanation":"Az MHC-TCR ligáció után a CD4 vagy CD8 koproteinen lévő Lck kináz aktiválódik, amely az ITAMs foszforilálódásához vezet."}],"szaporodas":[{"type":"MC","text":"Melyik a jellemző különbség a spermatogenézis és az oogenézis között?","options":["A) A spermatogenézis 74 nap alatt 4 haploid spermát termel, az oogenézis az első meiosztásban akad meg","B) Az oogenézis már születéskor befejeződik, a spermatogenézis csak pubertáskor kezdődik","C) A spermatogenézis a pubertásig tartó meiózist eredményez, az oogenézis az ovuláció előtt akad meg","D) Az oogenézis nagyobb spermatogenézisnél folyamatos termeléshez vezet"],"correctLetter":"A","explanation":"A spermatogenézis a szpermatogónium-ból haploid spermákat termel, az oogenézis az első meiosztásban megakad (metafázis II), amely csak az ovuláció után folytatódik a második meiózisig."},{"type":"TF","text":"A meiotikus keresztezés (crossing over) az első meiosztás alatt történik, és geneti az variabilitás alapja.","isTrue":true,"explanation":"A profáz I alatt homológ kromoszómák között rekombináció történik, amely új allél-kombinációkat hoz létre a gamétákban."},{"type":"MC","text":"A menstruációs ciklus melyik hormon-kombinációja a legmagas az ovuláció előtt?","options":["A) Progeszteron és ösztrogén egyforma szinten","B) LH és FSH surge egyszerre","C) Az FSH szint csökkenése, míg az LH surge (hirtelen emelkedés) az ovulációt kiváltja","D) Progeszteron maximális szint az ovuláció előtt 48 órával"],"correctLetter":"C","explanation":"Az ösztrogén-szint emelkedése negatív visszacsatolást eredményez az FSH-ra és pozitívat az LH-ra, ami az LH-surge és az ovuláció kiváltása."},{"type":"BLANK","text":"A petefészek tüszői az ösztrogén termelésén kívül az _____ sejtjei által termelődnek, amely a progeszteront termelő corpus luteum képzésében alapvető.","answer":"granulóza","explanation":""},{"type":"MC","text":"A megtermékenyítés során milyen folyamatok zajlanak le a spermium bejutásával az övülált petesejt körül?","options":["A) A spermium acrosin-enzimje végez liziszt az übödny koronáján és a pelucidum zóna áthatlásában","B) A spermium magja közvetlenül az ovociítba lép, majd 36 órán belül fúzionál","C) Az ösztrogén szint emelkedése hívja fel a spermiumot kemotaxis útján","D) A spermium farok-mozgása lyza az ovocita hártyáját"],"correctLetter":"A","explanation":"Az akroszóma-reakció és a penetráció az akrozin és a petrológiai enzimek hasításával, majd a pronuclei fúziója a zigóta képzésére vezet."},{"type":"TF","text":"A megtermékenyítés normálisan az ampulláris régióban történik, ahol a petevezető a tüszőből felszakított petének találkozik a spermiummal.","isTrue":true,"explanation":"Az ampulláris-ithmuszi határon történik a megtermékenyítés leggyakrabban, a pete fejlődésének korai szakaszában."},{"type":"MC","text":"A blasztociszta formálódása után (5-6. nap) a méhlepény kialakulásának mely szerkezetei szükségesek?","options":["A) A trofoblaszt az extraembrionális mezoderma és amnion képzi a méhlepényt","B) A trofoblaszt szinkítial és citotrofoblaszt rétegeiből alakul ki az intersticiális és endovaszkuklális invázió","C) Az embrionális korongból származó decidua és az amnion képezik a placentát","D) A kórion alapvetően testesíti meg a méhlepény funkcióit, míg az amnion csak a magzatburok"],"correctLetter":"B","explanation":"A trofoblaszt rétegei erózión keresztül a méhnyálkahártya (decidua) vérereztést elérik, amely a nutriciós-hormonális csere alapja."},{"type":"BLANK","text":"A magzatburkok közül az _____ nyújt mechanikai védelmet, az _____ pedig biztosítja az immunológiai és antibakteriális védelmet a magzatra.","answer":"amnion, magzatvíz vagy az amniostej","explanation":"Az amnion és a magzatvíz (meconium) buják, mecanizmus-ellenes és immunológiai védelmet biztosít a magzatra."},{"type":"MC","text":"Az embrionális fejlődés melyik szakaszában történik a gastrulatio (a három csíraslég kialakulása)?","options":["A) A blasztociszta formálódása után azonnal, a 3. hét előtt","B) A 2. és 3. hét között a bikincszális tányér-formáció révén","C) Az endodermis-képzés az epiblaszt-hipoblaszt erózióján keresztül","D) A csökkentőmorfogénezis után az organogenezis alatt"],"correctLetter":"B","explanation":"A gastrulatio a 2. hét végén a primitív csík kialakulásával kezdődik, amely az eodermist (belső), mezodermát (középső) és ektodermát (külső) csíraszöveteket hozza létre."},{"type":"TF","text":"A magzati keringés jellemzője, hogy a magzati és anyai vér közvetlen keveredik a placentában.","isTrue":false,"explanation":"A magzati és anyai vér nem keveredik közvetlenül - a placenta szinciticális rétegei szétválasztják őket, amely szelektív diffúzió és aktív szállítást biztosít."},{"type":"MC","text":"A szülés első szakasza (latency phase) milyen jellegű összehúzódásokkal és méhnyakcsavarodással járul?","options":["A) Intenzív, 3-5 percenkénti összehúzódások, teljes méhnyaknyílás előtt","B) Gyakori, 15-30 perces időközű összehúzódások, a méhnyak 0-3 cm nyílásáig","C) Ritka, gyengébb összehúzódások, az aktív fázig (labor stage)","D) A Braxton Hicks összehúzódások, 60-90 másodperces időtartammal"],"correctLetter":"B","explanation":"A latency fázis a prodromal szakaszhoz közeli állapot, ahol az összehúzódások még nem nagyon erősek és nem szabályosak."},{"type":"BLANK","text":"Az oxitocin a szülés alatt az anyai _____ által termelődik, amely az uteroplacentális és postpartum-érügyeleti összehúzódásokat fokozza, valamint a szoptatás során a _____ reflexet kiváltja.","answer":"hypophízis anterior / dúdor vagy szül","explanation":"Az oxitocin a hypophízis hátulsó lebenye által termelődik (valójában az hipotálamus-ból), amely a szülést fokozza és az tejátadási reflexet (milk let-down) kiváltja."},{"type":"MC","text":"Az egyalkalmi (monozygotikus) ikrek genetikai és fejlődési jellemzője melyik a helyes?","options":["A) Teljes genetikai azonosság, 100%-ban azonos fenotípussal","B) A monozygotikus ikrek dichoriális vagy monochoriális placenta-típussal rendelkezhetnek a hasítás időpontjától függően","C) A homozygota ikrek különböző ABO csoportokkal rendelkezhetnek az antigen-szeparáció miatt","D) A monozygotikus ikrek epigenetikai különbségei miatt azonosnak tekintik őket"],"correctLetter":"B","explanation":"A zigóta korai hasítása dichoriális-diamniális ikreket eredményez, a késői hasítás monochoriális-monoamniális ikreket, amely a placenta szerkezetét és az ikrek közötti nutriciós cserehatást befolyásolja."},{"type":"TF","text":"A kétpetéjű (dizygotikus) ikrek genetikailag azonosak egymással, mint a testvérek.","isTrue":false,"explanation":"A dizygotikus ikrek genetikailag 50%-ban azonosak, mint a szokásos testvérek, mivel két különböző spermium és ovuláció-ból származnak."},{"type":"MC","text":"Az emberben mely nemi jellegek tekintendők elsődlegesnek és melyek másodlagosnak?","options":["A) Elsődleges: szemen nyilvánul meg, másodlagos: szőrzet és hangváltás","B) Elsődleges: a szaporítószervek (petesejt, spermium), másodlagos: a nagy csípő, mellékpajzsmirigy, szakállas növekedés","C) Elsődleges: a melanin szint a bőrön, másodlagos: külső genitáliák","D) Elsödleges: a prosztata és bizonyos végbélmirigy, másodlagos: a magvagy és spermium"],"correctLetter":"B","explanation":"Az elsődleges nemi jellegek a szaporítási funkcióhoz kapcsolódnak, a másodlagosak az androgén és ösztrogén hatására kialakulnak."},{"type":"BLANK","text":"A petefészek-fejlődés során a primitív germ sejtek a _____ helyről vándorolnak a petefészekbe a fejlődés első hetei alatt.","answer":"dorális mesentérium vagy yolk sac vagy nyílásból","explanation":""},{"type":"MC","text":"Az embrionális fejlődés mely szakaszában történik az organogenezis kezdete?","options":["A) Az első 2 hét alatt a gastrulatio megkezdése előtt","B) A 3. hét után, főleg a neuruláció és a szegmentáció révén","C) Az 5-6. hét között, amikor az embrió fejlett szemorvok és végtagcsírák alakulnak ki","D) A 8-12. hét között, amikor a magzat kialakul"],"correctLetter":"B","explanation":"A neuruláció a 3. héten kezdődik, amely a neurális csövet alakít ki, mely azután az agy és gerincveló primordiuma lesz."},{"type":"TF","text":"A várandósság alatti progeszteron-szint a terhesség során folyamatosan csökken.","isTrue":false,"explanation":"A progeszteron-szint folyamatosan emelkedik a terhesség alatt, a 8. hétig a corpus luteumban, majd a placentában termelődik."},{"type":"MC","text":"Az emberi születéskor mely fejlődési milestones-ot már elért a csecsemő?","options":["A) Teljes neuromuszkuláris vezérlés, járás és beszéd képessége","B) Alapvető primitív reflexek (szopási, karmigrifás, Moro reflex), szem-nyitás és hallás","C) Teljes agyi fejlődés és nyelvtanulási képesség","D) A teljes érzékiség és koordináció fejlődésben, még hiányoznak a primitív reflexek"],"correctLetter":"B","explanation":"A születéskor a csecsemő primitív reflexekkel és alapvető szenzoros képességekkel rendelkezik, az agyi fejlődés azonban a születés után még éveket vesz igénybe."},{"type":"BLANK","text":"A szoptatás során az _____ reflex a mellek stimulációjára oxitocin-felszabadulást indít, amely az anyai pótlók összehúzódásait és a tej-átadást kiváltja.","answer":"pajzsmirigy vagy tej-szedés vagy tejátadási","explanation":"A szopási ingerfelt az afferent ideghálózat útján stimulálja az oxitocin-felszabadulást az anyai előhypophízisből, ami a szülőször-reflex kiváltása."},{"type":"MC","text":"A PCOS (policisztikus petefészek szindróma) melyik hormonális jellemzővel és szöveti patológiával társul?","options":["A) Alacsony androgtén-szint, atrófiás petefészekek","B) Magas androgén-szint (hyperandrogenzém), tüszőfejlődés akadályozottsága, több kistecc petefészek","C) Alacsony ösztrogén-szint, megnagyobbodott petefészekek","D) Magas FSH-szint, csökkent LH-arány"],"correctLetter":"B","explanation":"A PCOS az inzulin-rezisztenciával, LH/FSH arány-emelkedéssel és multifollicularis petefészekekkel társul."},{"type":"TF","text":"Az endometriózis az endometrium-szövet megjelenése az uteron falán kívül, mely vérzéshez és gyulladásos válaszhoz vezet.","isTrue":true,"explanation":"Az endometriális szövet az ovariális, peritoneális és más extrauterin helyeken növekedhet, mely krónikus fájdalomhoz és meddőséghez vezethet."},{"type":"MC","text":"A meddőség okai milyen tényezők kombinációjának következménye lehet?","options":["A) Az uterin sztenózis és a méhszakadás az egyetlen lehetséges okok","B) Овуляcie-zavar, csökkent spermatogenézis, Fallopius-cső elzáródás, endometriózis","C) Csak a női hormonális zavaroknak tudható be","D) Az uterin fibroidok mindig vezetnek meddőséghez"],"correctLetter":"B","explanation":"A meddőség a női és férfi okok komplex kombinációja lehet, amely diagnostikai és terápiás megközelítést igényel."},{"type":"BLANK","text":"A placenta az anyai és magzati keringés közötti _____ szintjein működik, az első trimeszterben _____ diffúzió dominál, mely később aktív szállítássá és _____ csere-mechanizmusokká válik.","answer":"interfész vagy korai vagy szimpla","explanation":"A placenta szerkezetétől kezdve az anyai és magzati vér szétválasztva marad, diffúzión, aktív szállításon és anya-magzat vérhálózat mediálta cseren alapul."}],"hormontablazat":[{"type":"MC","text":"Melyik hormon csökkenti a vér kalciumszintjét?","options":["A) Parathormon (PTH)","B) Kalcitonin","C) Tirozin (T4)","D) Aldoszteron"],"correctLetter":"B","explanation":"A kalcitonin a pajzsmirigy C-sejtjeiből szekretálódik és gátolja a csontok kalciumleadását. A parathormon ezzel szemben EMELI a vér kalciumszintjét."},{"type":"MC","text":"Az ADH (vazopresszin) és az aldoszteron közül melyik a só- és vízháztartást befolyásoló szteroid hormon?","options":["A) ADH","B) Aldoszteron","C) Mindkettő szteroid","D) Egyik sem"],"correctLetter":"B","explanation":"Az aldoszteron szteroid hormon, a mellékvese kéreg legkülső rétegéből szekretálódik. Az ADH polipeptid hormon a hipotalamuszban keletkezik és a hipofízis hátulsó lebenyében tárolódik."},{"type":"MC","text":"Az inzulin és a glukagon termelődési helyét tekintve azonos, de hatásaik ellentétesek. Melyik igaz az elválasztásukat szabályozó tényezőkre?","options":["A) Mindkettőt az emelkedő vércukorszint serkenti","B) Az inzulin termelődését az emelkedő vércukorszint serkenti, a glukagon hatása az inzulinéval ellentétes","C) A glukagon csökkenti a vércukorszintet","D) Az inzulin a máj glikogén bontását serkenti"],"correctLetter":"B","explanation":"Az emelkedő vércukorszint az inzulin termelődésének serkentője. A glukagon az inzulin antagonistája, amely a vércukorszintet EMELI a máj glikogén bontásával és a glükózsintézis fokozásával."},{"type":"TF","text":"Az FSH és az LH egyaránt az adenohipofízisből szekretálódik és a petefészékben működik, azonban az FSH a tüszőérést, az LH az ovulációt váltja ki.","isTrue":true,"explanation":"Az FSH (tüszőserkentő hormon) a petefészékben a tüszők érését indítja el. Az LH (sárgatest serkentő hormon) kiváltja az ovulációt és fenntartja a sárgatestet az adenohipofízis elülső lebenyéből."},{"type":"MC","text":"A parathormon kiváltottának ellensúlyozására a pajzsmirigy melyik sejtjei működnek, és hogyan?","options":["A) C-sejtek, amelyek kalcitonint termelnek és csökkentik a vér kalciumszintjét","B) Follicularis sejtek, amelyek T4-et termelnek","C) Fő sejtek, amelyek parathormont termelnek","D) I sejtek, amelyek TSH-t termelnek"],"correctLetter":"A","explanation":"A pajzsmirigy C-sejtjei termelik a kalcitonint, amely a magas vér kalcium-ion szintje hatására fokozódik. A kalcitonin csökkenti a vér kalciumszintjét a csontok kalciumleadásának gátlásával."},{"type":"TF","text":"A kortizol és az aldoszteron egyaránt a mellékvese kéreg terméke, de az ACTH szabályozza az aldoszteron termelődését.","isTrue":false,"explanation":"Az ACTH a kortizol és a szexuálszteroidok termelődését szabályozza, amelyeket a mellékvese kéreg középső rétege termel. Az aldoszteron termelődésének ingere a vér alacsony nátrium-ion tartalma vagy az alacsony vérnyomás, nem az ACTH."},{"type":"BLANK","text":"Az ADH (vazopresszin) fokozza a víz passzív visszaszívását a vese _____ csöveiben, és emeli a vérnyomást.","answer":"gyűjtőcsatornáiban","explanation":"Az ADH a hipotalamuszban keletkezik és a hipofízis hátulsó lebenyében tárolódik. A vér ozmózisnyomásának emelkedése vagy a vérnyomás csökkenése kiváltja a felszabadulását."},{"type":"MC","text":"A T3 (triiódtironin) és a T4 (tiroxin) szintézisé hez nélkülözhetetlen elem?","options":["A) Kálium","B) Kalcium","C) Jód","D) Magnézium"],"correctLetter":"C","explanation":"A pajzsmirigy hólyagocskái jódot tartalmaznak, amely nélkülözhetetlen a T4 (tiroxin) és T3 (triiódtironin) szintéziséhez. A jód hiánya strumát (golyva) okozhat."},{"type":"TF","text":"A növekedési hormon (GH) termelődése szabályozása során a hipotalamusz serkentő és gátló faktorai közvetlenül az agyalapi mirigy elülső lebenyét befolyásolják.","isTrue":true,"explanation":"A növekedési hormon szintézisét a hipotalamusz neuroszekréciós sejtjeiből felszabaduló serkentő és gátló faktorok szabályozzák, amelyek az agyalapi mirigy (adenohipofízis) elülső lebenyét befolyásolják."},{"type":"MC","text":"Az oxitocin és az ADH termelődési és tárolási helye azonos. Melyik állítás HAMIS?","options":["A) Mindkettő a hipotalamuszban keletkezik","B) Mindkettő a hipofízis hátulsó lebenyében tárolódik","C) Az oxitocin az emlőmirigyek tejkiürülését teszi lehetővé","D) Az ADH a vízvisszaszívást serkenti a vese bélcsövében"],"correctLetter":"D","explanation":"Az ADH a vese gyűjtőcsövében fokozza a víz passzív visszaszívását, nem a bélcsatornában. Az oxitocin az emlő simaizomsejtjeinek összehúzódásával segíti a tej kiürülését."},{"type":"BLANK","text":"A Basedow-kór esetén a pajzsmirigy túlműködik és az elválasztott T4 hormon túlzottan fokozza az _____ anyagcserét.","answer":"lebontó","explanation":"A tiroxin (T4) általában fokozza a lebontó anyagcserét. A Basedow-kór autoimmun betegség, amely a pajzsmirigy hypertiroidizmust okoz. Tünetei közé tartozik az megnövekedett oxigénfogyasztás, megemelkedett testhőmérséklet, nervozitás és fáradékonyság."},{"type":"MC","text":"Az FSH és az LH hipotalamusz-szekretálta szabályozó faktorai között mi a közös?","options":["A) Azonos hormon szabályozza mindkettőt","B) Az FSH és LH termelődése a hipotalamusz serkentő és gátló faktorai szabályozzák","C) Az FSH-t és LH-t kizárólag az ovulációs szindróma indítja el","D) Az FSH a petesejt érésért, az LH az embrió beágyazódásáért felelős"],"correctLetter":"B","explanation":"Mind az FSH mint az LH az adenohipofízis elülső lebenyéből szekretálódik, és a hipotalamusz serkentő és gátló faktorai szabályozzák az elválasztásukat."},{"type":"TF","text":"A mellékvese velőállomány által termelt adrenalin a stresszhormon, amely emeli a vércukorszintet és fokozza a szívfrekvenciát.","isTrue":true,"explanation":"Az adrenalin aminosav-származék hormon, amelyet a mellékvese velőállománya termel. Szimpatikus idegrendszeri hatásra szekretálódik stresszhelyzetben. Emeli a vércukorszintet, a vérnyomást és a szívfrekvenciát."},{"type":"BLANK","text":"A parathormon a vér kalciumszintjét emeli a csontok kalciumleadásának serkentésével, a vesében a kalcium kiválasztásának csökkentésével és a bélcsőben a kalcium felszívódásának serkentésével, amelyhez a _____ vitamin nélkülözhetetlen.","answer":"D vitamin","explanation":"A parathormon összetett hatásrendszere: 1) a csontok kalciumleadása fokozódik, 2) a vesében a kalcium visszaszívódása fokozódik és a kiválasztása csökken, 3) a bélcsőben kalcium-felszívódás fokozódik (ehhez D vitamin szükséges)."},{"type":"MC","text":"A TSH (pajzsmirigyserkentő hormon) hatásmechanizmusa?","options":["A) Közvetlenül csökkenti a vér kalciumszintjét","B) Az adenohipofízisből szekretálódik és serkenti a pajzsmirigy T4 termelődését","C) A pajzsmirigy C-sejtjeiből szekretálódik","D) Gátolja az ACTH termelődését"],"correctLetter":"B","explanation":"A TSH az adenohipofízis elülső lebenyéből szekretálódik és serkenti a pajzsmirigy T4 (tiroxin) termelődését. A szabályozás negatív visszacsatoláson alapszik - a magas T4 szint gátolja a TSH termelődését."},{"type":"TF","text":"A kortizol az inzulin antagonistája, amely emeli a vércukorszintet a máj glükóz raktározásának csökkentésével és a szövetek (különösen az izmok) fehérjebontásának fokozásával.","isTrue":true,"explanation":"A kortizol glükokortikoid hormon, amely a mellékvese kéreg középső rétegéből szekretálódik. Az ACTH szabályozza termelődését és stresszhormon funkciót lát el. Emeli a vércukorszintet és az inzulin antagonistája."},{"type":"MC","text":"A mixödéma és a kretenizmus közül melyik a pajzsmirigy-alulműködés (hipotireoidizmus) felnőttkori tünete, és mely terméke hiánya okozza?","options":["A) Mixödéma, T4 hiánya","B) Kretenizmus, T3 hiánya","C) Mindkettő T4 hiányát jelzi","D) Mixödéma, TSH hiánya"],"correctLetter":"A","explanation":"A mixödéma a pajzsmirigy-alulműködés felnőttkori tünetcsoportja, amelyet alacsony T4 szint okoz. A kretenizmus a gyermekkori pajzsmirigy-alulműködés embrionális fejlődési szakaszban bekövetkező formája, amely szellemi és fizikai elmaradottságot okoz."},{"type":"BLANK","text":"Az Addison-kórnál a mellékvese kéreg pusztulása miatt az aldoszteron termelődésének csökkenése a bőr száraz, barna, hűvös megjelenésével és a _____ szintjének emelkedésével jár.","answer":"vérnyomás csökkenésével","explanation":"Az Addison-kór (bronz-kór) az aldoszteron-hiányra vezethető vissza. Az aldoszteron a sós és vízháztartás szabályozásában játszik kulcsfontosságú szerepet. Hiánya alacsony vérnyomást, keringési zavarokat és elektrolitcsökkentés okoz."},{"type":"MC","text":"A 1-es és 2-es típusú cukorbetegség elsődleges oka az inzulin szintjét vagy hatását tekintve?","options":["A) Túl magas T3/T4 szint","B) Az inzulin-elválasztás elégtelen vagy az inzulin hatástalanságát okozó ellenállás","C) A glukagon túltermelődése","D) Az adrenalin felszabadulásának hiánya"],"correctLetter":"B","explanation":"Az 1-es típusú cukorbetegség az inzulin-termelő béta-sejtek pusztulásával vagy tarthatatlanságával jár. A 2-es típusban az inzulin-rezisztencia (a sejtek nem válnak az inzulinra) és a csökkent termelés kombinálódik. Mindkettőben a vércukorszint magas."}]};

function init() {
  renderTopics(TOPICS);
  g('search-input').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    const f = q ? TOPICS.filter(t => t.name.toLowerCase().includes(q) || t.sub.toLowerCase().includes(q)) : TOPICS;
    g('mix-card').style.display = q ? 'none' : 'flex';
    renderTopics(f);
  });
}

function renderTopics(topics) {
  g('topics-grid').innerHTML = topics.map(t => {
    const qs = (QUIZ_DATA[t.id] || []).length;
    const [c1,c2] = t.grad.split(',');
    return `<div class="glass glass-lift topic-card" onclick="startTopic('${t.id}')">
      <div class="topic-card-bg" style="background:linear-gradient(135deg,${c1},${c2})"></div>
      <div class="topic-card-content">
        <span class="topic-emoji">${t.emoji}</span>
        <div class="topic-name">${t.name}</div>
        <div class="topic-sub">${t.sub}</div>
        <span class="topic-badge" style="background:linear-gradient(135deg,${c1},${c2})">${qs} kérdés</span>
      </div></div>`;
  }).join('');
}

// ══════════════════════════════════════════
// START QUIZ
// ══════════════════════════════════════════
function startTopic(id) {
  const t = TOPICS.find(x => x.id === id);
  if (!t) return;
  resetState();
  S.topicId = id; S.topicName = t.name; S.topicEmoji = t.emoji; S.isMix = false;
  S.questions = shuffle(QUIZ_DATA[id] || []);
  if (!S.questions.length) { alert('Nincsenek kérdések ehhez a témához.'); return; }
  showScreen('quiz');
  g('topic-emoji-q').textContent = t.emoji;
  g('topic-name-q').textContent  = t.name;
  renderQuestion();
}

function startMixAll() {
  resetState();
  S.topicId = 'mix'; S.topicName = 'Mindent keverve'; S.topicEmoji = '🎲'; S.isMix = true;
  const all = Object.values(QUIZ_DATA).flat();
  S.questions = shuffle(all);
  showScreen('quiz');
  g('topic-emoji-q').textContent = '🎲';
  g('topic-name-q').textContent  = 'Mindent keverve';
  renderQuestion();
}

function resetState() {
  S.index=0; S.correct=0; S.wrong=0; S.streak=0; S.maxStreak=0; S.answered=false;
}

// ══════════════════════════════════════════
// RENDER QUESTION
// ══════════════════════════════════════════
function renderQuestion() {
  S.answered = false;
  const q = S.questions[S.index], tot = S.questions.length;

  g('q-counter').textContent = S.index + 1;
  g('q-total').textContent   = tot;
  g('progress-fill').style.width = `${(S.index / tot) * 100}%`;

  const labels = { MC:'Feleletválasztós', TF:'Igaz / Hamis', BLANK:'Kiegészítős' };
  g('type-badge').textContent = labels[q.type] || q.type;
  g('q-text').textContent     = q.text;

  ['q-options','q-tf','q-blank','explanation','btn-next'].forEach(id => g(id).classList.add('hidden'));

  const card = g('question-card');
  card.classList.remove('fade-up'); void card.offsetWidth; card.classList.add('fade-up');

  if      (q.type === 'MC')    renderMC(q);
  else if (q.type === 'TF')    renderTF();
  else if (q.type === 'BLANK') renderBlank(q);
}

function renderMC(q) {
  g('q-options').innerHTML = q.options.map(opt =>
    `<button class="option-btn" onclick="answerMC('${opt.trim()[0]}',this)">${opt.trim()}</button>`
  ).join('');
  g('q-options').classList.remove('hidden');
}

function renderTF() {
  ['btn-igaz','btn-hamis'].forEach(id => {
    const b = g(id); b.disabled = false;
    b.className = 'tf-btn ' + (id === 'btn-igaz' ? 'igaz-h' : 'hamis-h');
  });
  g('q-tf').classList.remove('hidden');
}

function renderBlank(q) {
  const html = q.text.replace(/_{3,}/, '<span class="blank-slot blank-ph">_____</span>');
  g('blank-sentence').innerHTML = html;
  g('btn-reveal').disabled = false;
  g('self-assess').classList.add('hidden');
  g('q-blank').classList.remove('hidden');
}

// ══════════════════════════════════════════
// ANSWER HANDLERS
// ══════════════════════════════════════════
function answerMC(letter, btn) {
  if (S.answered) return;
  S.answered = true;
  const q = S.questions[S.index];
  g('q-options').querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim()[0] === q.correctLetter) b.classList.add('correct');
  });
  const ok = letter === q.correctLetter;
  if (!ok) btn.classList.add('wrong');
  onAnswer(ok, q.explanation, true);
}

function answerTF(pick) {
  if (S.answered) return;
  S.answered = true;
  const q = S.questions[S.index], ok = pick === q.isTrue;
  const ib = g('btn-igaz'), hb = g('btn-hamis');
  ib.disabled = hb.disabled = true;
  (pick ? ib : hb).classList.add(ok ? 'correct' : 'wrong');
  if (!ok) (pick ? hb : ib).classList.add('reveal');
  onAnswer(ok, q.explanation, true);
}

function revealBlank() {
  if (S.answered) return;
  S.answered = true;
  const q = S.questions[S.index];
  g('blank-sentence').innerHTML = q.text.replace(/_{3,}/, `<span class="blank-slot">${q.answer}</span>`);
  g('btn-reveal').disabled = true;
  showExplanation(q.explanation, null);
  g('self-assess').classList.remove('hidden');
}

function blankAssess(knew) {
  g('self-assess').classList.add('hidden');
  onAnswer(knew, null, false);
}

function onAnswer(ok, expl, showExpl) {
  if (ok) { S.correct++; S.streak++; if (S.streak > S.maxStreak) S.maxStreak = S.streak; }
  else    { S.wrong++; S.streak = 0; }
  g('mini-correct').textContent = S.correct;
  g('mini-wrong').textContent   = S.wrong;
  const sw = g('streak-wrap');
  g('streak-count').textContent = S.streak;
  if (S.streak > 0) { sw.classList.remove('streak-pop'); void sw.offsetWidth; sw.classList.add('streak-pop'); }
  if (showExpl && expl) showExplanation(expl, ok);
  const isLast = S.index >= S.questions.length - 1;
  const nb = g('btn-next');
  nb.textContent = isLast ? '📊 Eredmény →' : 'Következő →';
  nb.classList.remove('hidden');
}

function showExplanation(text, ok) {
  if (!text) return;
  const el = g('explanation');
  el.className = 'explanation' + (ok === true ? ' ok' : ok === false ? ' err' : '');
  const icon = ok === true ? '✅ ' : ok === false ? '❌ ' : '💡 ';
  el.innerHTML = `${icon}<strong>Magyarázat:</strong> ${text}`;
  el.classList.remove('hidden');
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function nextQuestion() {
  S.index++;
  if (S.index >= S.questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  const tot = S.questions.length, pct = tot > 0 ? Math.round((S.correct / tot) * 100) : 0;
  g('result-pct').textContent   = pct + '%';
  g('res-correct').textContent  = S.correct;
  g('res-wrong').textContent    = S.wrong;
  g('res-streak').textContent   = S.maxStreak;
  g('result-topic').textContent = S.topicEmoji + '  ' + S.topicName;
  g('progress-fill').style.width = '100%';
  let emoji='😐', msg='Érdemes még egyszer átnézni az anyagot!';
  if (pct>=90){emoji='🏆';msg='Kiváló! Felkészültél az emelt szintű érettségire!';}
  else if(pct>=75){emoji='🌟';msg='Nagyon jó! Még egy kis ismétléssel tökéletes lesz!';}
  else if(pct>=60){emoji='👍';msg='Jó munka! Nézd át még egyszer a hibás válaszokat!';}
  else if(pct>=40){emoji='📚';msg='Dolgozz rajta – olvasd el újra az anyagot!';}
  g('result-emoji').textContent = emoji;
  g('result-msg').textContent   = msg;
  showScreen('results');
  if (pct >= 75) {
    setTimeout(()=>confetti({particleCount:180,spread:90,origin:{y:.55}}), 350);
    if (pct>=90) {
      setTimeout(()=>confetti({particleCount:100,angle:120,spread:55,origin:{x:0}}),650);
      setTimeout(()=>confetti({particleCount:100,angle:60, spread:55,origin:{x:1}}),650);
    }
  }
}

function restartQuiz() { S.isMix ? startMixAll() : startTopic(S.topicId); }
function goHome()       { showScreen('topic'); }
function showScreen(n)  {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  g('screen-' + n).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function g(id) { return document.getElementById(id); }
function shuffle(a) {
  a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

init();
</script>
</body>
</html>
