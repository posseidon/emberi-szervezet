explanation":"A vérlemezkék sejtmag nélküli, apró sejttöredékek, élettartalmuk igen rövid, mindössze 5-10 nap."},{"type":"MC","text":"A fehérvérsejtek száma melyik állapotban emelkedhet jelentősen?","options":["A) Alvás közben","B) Éhezés során","C) Fertőzés és gyulladás esetén","D) Hosszú pihenőidőben"],"correctLetter":"C","explanation":"A fehérvérsejtek száma a szervezet állapotától függően változhat, fertőzés, gyulladás esetén számuk jelentősen emelkedhet."},{"type":"BLANK","text":"Az emberi erythrocyta-szám férfiakban _____ millió/mm3.","answer":"5","explanation":"Az erythrocyta (vörösvértest) száma férfiakban 5 millió/mm3, nőkben 4,5 millió/mm3."},{"type":"MC","text":"Mit jelent az, hogy a hemoglobin szaturációja pH-függő?","options":["A) A hemoglobin mennyisége a vérben függ a pH-tól","B) Minél savasabb a vér, annál erősebben köti a hemoglobin az oxigént","C) Minél savasabb a vér, annál gyengébben köti a hemoglobin az oxigént","D) A hemoglobin színe függ a vér pH-jától"],"correctLetter":"C","explanation":"Minél savasabb a vér, úgy csökken az oxigénkötés erőssége, azaz alacsonyabb pH-n a hemoglobin molekulák kevésbé kötik az oxigént."},{"type":"TF","text":"A magashegyi edzőtáborokba azért mennek, mert az alacsonyabb oxigénparciális nyomás fokozza a vörösvértestek termelését.","isTrue":true,"explanation":"Az alacsony oxigénparciális nyomás a szervezet fokozottabb vörösvértest-termelésére késztetnek, amely később az alacsonyabb szintre való visszatérés után hatékonyabb oxigénszállítást biztosít."},{"type":"MC","text":"Melyik enzim felelős a szén-dioxid szénsavvá alakulásáért a vörösvértestekben?","options":["A) Hexokináz","B) A szénsavképzéshez katalizáló enzim (szén-dioxid hidratáz)","C) Lipáz","D) Amléz"],"correctLetter":"B","explanation":"Az enzim hatására a szövetek vérplazmájában diffundáló szén-dioxid szénsavvá alakul a vörösvértestben."},{"type":"BLANK","text":"A vér pH-ja normálisan _____ és _____ között ingadozhat.","answer":"7,35","explanation":""},{"type":"MC","text":"Hány db N-tartalmú gyűrűből áll a hem szerkezete?","options":["A) 1 db","B) 2 db","C) 4 db","D) 6 db"],"correctLetter":"C","explanation":"A hemoglobin hem része 4 pirrol gyűrűből összekapcsolódott porfirinváz, melynek közepén Fe2+ helyezkedik el."},{"type":"TF","text":"A hemofília (örökletes vérzékenység) a véralvadási kaszkád-rendszer genetikailag öröklött hibája.","isTrue":true,"explanation":"A hemofília a véralvadási mechanizmusának egy öröklött genetikai hibája."},{"type":"MC","text":"Mi a trombus?","options":["A) Az érfal sérülésén kiáramló vér","B) A vérlemezke-tömítés","C) Az érben kóroságosan képződött vérrög, amely az éret elzárhatja","D) A véralvadási faktor egyik típusa"],"correctLetter":"C","explanation":"A trombózis kóros véralvadási zavar következtében jön létre, a trombus (vérrög) az érfalra kitapadva kisebb-nagyobb ereket akár el is zárhat."},{"type":"MC","text":"Mi az embólia?","options":["A) A vérrög összecsapódása","B) A leszakadt vérrög (embolus) által az érben okozott elzáródás","C) Az érfalon keletkezett sérülés","D) A vérlemezkék aktiválódása"],"correctLetter":"B","explanation":"Embólia akkor alakul ki, ha a trombus növekszik és egy darabka leszakad belőle (embolus), amely a véráram által sodorva elzárhatja egy kisebb érszakaszt."},{"type":"BLANK","text":"Az antitest termelő fehérvérsejteket _____ sejtek nevezik.","answer":"B limfociták","explanation":"A gamma-globulinok (antitestek) termelői a B limfociták."},{"type":"MC","text":"Melyik puffer-rendszer játszik a fő szerepet a vér pH-szabályozásában?","options":["A) A bikarbonát puffer-rendszer","B) A plazmafehérjék puffer-rendszere","C) A hemoglobin puffer szerepe","D) A szöveti puffer-rendszer"],"correctLetter":"A","explanation":"A vér pH-ját a különböző puffer-rendszerek tartják állandó értéken, köztük a bikarbonát puffer-rendszer játszik a fő szerepet."},{"type":"MC","text":"Hányadik faktor a trombin a véralvadás faktor-rendszerében?","options":["A) II. faktor","B) VII. faktor","C) X. faktor","D) XIII. faktor"],"correctLetter":"A","explanation":"A protrombin a II. véralvadási faktor, amely aktív trombinná alakul a véralvadás során."},{"type":"TF","text":"A granulociták a kemotaxis révén képesek a fertőzés irányába vándorolni.","isTrue":true,"explanation":"A granulociták amőboid mozgásra képesek, átlépnek a hajszálerek falán és a fertőzés irányába vándorolnak kemotaxissal."},{"type":"MC","text":"Mely szerv tartalmaz a lépben szétesett vörösvértestekből keletkezett indirekt bilirubint?","options":["A) A máj","B) A vese","C) A lép","D) A gyomor"],"correctLetter":"A","explanation":"Az indirekt bilirubin a májban vízben oldható direkt bilirubinná alakul az epén keresztül."},{"type":"BLANK","text":"A fehérvérsejtek normális száma _____ - _____ /mm3 között ingadozhat.","answer":"4000","explanation":""},{"type":"MC","text":"Mely vércsoportrendszer alapvetően az AB0-rendszeren belül működik?","options":["A) Az MN-rendszer","B) A Kell-rendszer","C) A Rh-rendszer","D) A Duffy-rendszer"],"correctLetter":"C","explanation":"Az Rh-rendszer az AB0-rendszeren kívüli, független vércsoportrendszer."},{"type":"TF","text":"A vérszegénység a vörösvértestek számának vagy a hemoglobin mennyiségének túl alacsony voltát jelenti.","isTrue":true,"explanation":"A vérszegénység olyan állapot, amelyben a vörösvértestek száma vagy a hemoglobin mennyisége túl alacsony a vérben."},{"type":"MC","text":"Melyik vitamint szükséges pótolni a vörösvértest-képzéshez?","options":["A) A-vitamin","B) B12-vitamin és folsav","C) C-vitamin","D) D-vitamin"],"correctLetter":"B","explanation":"A vörösvértest-képzéshez szükséges B12-vitamin, folsav és vas."},{"type":"MC","text":"Melyik véralvadási szakasz az első lépése a vérzéscsillapításnak?","options":["A) Vérlemezke fázis","B) Érösszehúzódás","C) Véralvadási szakasz","D) Fibrinolízis"],"correctLetter":"B","explanation":"A vérzéscsillapítás első szakasza az érösszehúzódás, ahol a sérült ér artériás részén szerotonin hatására az érfal reflexesen összehúzódik."},{"type":"BLANK","text":"Az A vércsoportú ember _____ antigennel rendelkezik.","answer":"A antigénnel","explanation":"Az A vércsoportú emberek A antigennel rendelkeznek a vörösvértestek felszínén."},{"type":"MC","text":"Milyen anyag szabadul fel a kitapadott vérlemezkékből?","options":["A) Trombin","B) Fibrinogén","C) ADP, adrenalin, szerotonin","D) Protrombin"],"correctLetter":"C","explanation":"A kitapadás hatására a vérlemezkékből olyan anyagok szabadulnak fel (ADP, adrenalin, szerotonin), melyek fokozzák a további kitapadást és összecsapódást."},{"type":"TF","text":"A fibrinolízis a sebgyógyulási folyamat utolsó szakasza.","isTrue":false,"explanation":"A fibrinolízis a vérrög lebontása, amely a sebgyógyulást követi, de nem az utolsó szakasza a vérzéscsillapításnak."},{"type":"MC","text":"Mit jelent az alvadási (trombin) idő mérése?","options":["A) Az időt, amely alatt a szöveti faktor hatására megjelenik az első fibrinszál","B) Az időt, amely alatt az üvegedénybe frissen levett vérben megjelenik az első fibrinszál","C) Az időt, amely alatt a trombin lebontódik","D) Az időt, amely alatt az eritropoietin termelődik"],"correctLetter":"B","explanation":"Az alvadási idő azt az időtartamot jelenti, amely alatt az üvegedénybe frissen levett vérben megjelenik az első fibrinszál, átlagos értéke 5-6 perc."},{"type":"BLANK","text":"A Beta-thalassemia során a hemoglobin _____ láncainak szintézise zavart szenved.","answer":"béta","explanation":"A béta-thalassemia során a hemoglobin béta-láncainak szintézise zavart szenved, emiatt a vörösvértestek feloldódnak."},{"type":"MC","text":"Az AB0-vércsoportrendszerben hány vércsoportot különböztetünk meg?","options":["A) 2 típus","B) 3 típus","C) 4 típus","D) 5 típus"],"correctLetter":"C","explanation":"Az AB0-vércsoportrendszerben az A, B, AB és 0 vércsoportokat különböztetjük meg."},{"type":"TF","text":"A kalciumion és a K-vitamin nélkülözhető a normális véralvadáshoz.","isTrue":false,"explanation":"A véralvadási folyamathoz kalciumion és K-vitamin szükséges, hiányuk vérzékenységhez vezet."},{"type":"MC","text":"Melyik fehérvértest-típus képes falósejt-funkciót betölteni?","options":["A) Limfociták","B) Granulociták és monociták","C) Csak a T-limfociták","D) Csak az NK-sejtek"],"correctLetter":"B","explanation":"A granulociták és monociták (kis falósejtek) képesek a kórokozókat bekebelezni."},{"type":"BLANK","text":"A vérplazma sárgás szín- és átlátszó jellegét a _____ határozza meg.","answer":"karotenoidok","explanation":"A vérplazma összetétele és jellegei között a karotenoid pigment felel a sárgás szín- és átlátszó jellegéért."},{"type":"MC","text":"Mi képez fehér trombus-t a vérzéscsillapítás során?","options":["A) Az összecsapódott fibrin","B) Az összecsapódott vérlemezkék","C) Az erythrocyta-ek","D) Az összecsapódott leucocyta-ek"],"correctLetter":"B","explanation":"A fehér trombus egy vérlemezkékből álló tömítés, amely az érfalak kitapadott vérlemezkék összecsapódása révén keletkezik."}],"kivalasztas":[{"type":"MC","text":"A vese glomerulusában melyik erő segíti elő elsődlegesen a szűrlet képződését?","options":["A) Kolloidozmotikus nyomás","B) Hidrosztatikus vérnyomás","C) Tubularis nyomás","D) Onkotikus nyomás"],"correctLetter":"B","explanation":"A kapilláris hidrosztatikus nyomás (kb. 50 Hgmm) tolja ki a szűrletet a Bowman-tokba. Az onkotikus nyomás (kb. 25 Hgmm) ezt gátolja."},{"type":"MC","text":"Az egészséges ember vizeletében mely anyag NEM jelenik meg és miért?","options":["A) Fehérje, mivel a szűrőberendezés negatív töltése visszatartja","B) Cukor, mivel aktív transzporttal teljes egészében visszaszívódik","C) Karbamid, mivel a máj azt szintetizálja","D) Kalcium, mivel nem szűrődik át az érgomolyagban"],"correctLetter":"A","explanation":"A fehérjéket a negatív töltésű alaphártya visszatartja. A glükóz a proximális tubulusban aktív Na+-glükóz kotranszporttal teljes mértékben visszaszívódik."},{"type":"TF","text":"A proximális tubulus mikrovillusai növelik a felszívó működés felületét, ami az aktív transzport hatékonyságának növekedéséhez vezet.","isTrue":true,"explanation":"A mikrovillusok legalább 1000-szeresére növelik a sejthártya felületét, ezáltal több transzportfehérje helyezhető el és nő az anyagcsere kapacitása."},{"type":"MC","text":"A Henle-kacs felszálló ágában milyen jellegű transzport történik és mi annak következménye?","options":["A) Passzív transzport"],"correctLetter":"A","explanation":""},{"type":"BLANK","text":"Az ADH hormon a _____ -ben termelődik és szabályozza a vízvisszaszívást az aquaporin-2 csatornák beépítésén keresztül.","answer":"hipotalamuszban","explanation":"Az ADH-t az oszmoreceptorok serkentik, ha a vér ozmotikus nyomása nő. A hormon a gyűjtőcsőcsatorna sejtjeiből az AQP-2 csatornákat a sejtmembrán felszínéhez szállítja."},{"type":"MC","text":"A glomeruláris filtrációs ráta (GFR) átlagos értéke felnőtteknél körülbelül:","options":["A) 50 ml/perc","B) 120 ml/perc","C) 300 ml/perc","D) 450 ml/perc"],"correctLetter":"B","explanation":"Ez azt jelenti, hogy naponta körülbelül 180 liter szűrlet képződik. Ebből azonban 99%-a visszaszívódik, így csupán 1,5 liter vizelet ürül ki."},{"type":"TF","text":"Az aldoszteron főként a sóvisszaszívódást növeli az eltávoli tubulusban, ennek következtében a víz visszaszívása passzívan követi az ionmozgást.","isTrue":true,"explanation":"Az aldoszteron a renin-angiotenzin rendszeren keresztül szabályozódik alacsony vérnyomás esetén. A Na+-K+ csere fokozódik, amely ozmotikus gradiensét hoz létre."},{"type":"MC","text":"Az alábbiak közül melyik erő NEM játszik szerepet a szűrőműködésben?","options":["A) A kapilláris hidrosztatikus nyomása","B) Az onkotikus nyomás","C) A szűrlet nyomása a Bowman-tokban","D) Az arteriola rugalmassága"],"correctLetter":"D","explanation":"A szűrőműködés a nettó filtrációs nyomás (Peff = Pv - Pcoll - PB) függvénye. Az arteriola rugalmassága az érnyomást tartja fenn, de nem közvetlenül hat a szűrésre."},{"type":"BLANK","text":"Ha a vérplazma glükózkoncentrációja meghaladja a _____ -t, akkor a szállítómolekulák telítődnek és cukor megjelenik a vizeletben.","answer":"200 mg/100 ml","explanation":"Az aktív transzporttal visszaszívást végző fehérjék kapacitásának felső határa. Diabéteszben a vérplazma glükóz magasabb, ezért nő a glikózuria."},{"type":"MC","text":"Milyen folyamat történik az egészséges ember fehérjementes vizeletében?","options":["A) Az átszűrt albumin a proximális sejtekben endocitózissal felveszik és feldolgozzák","B) A szűrőberendezés negatív töltése teljesen visszatartja őket","C) Mindkettő: a szűrő visszatart és a sejtekben feldolgozódnak","D) Passzív transzport által kilépnek a gyűjtőcsövekből"],"correctLetter":"C","explanation":"Az albuminok 99%-a a szűrő negatív töltése visszatartja. A fennmaradó 1% (kb. 8 g/nap) a proximális tubulus sejtjei endocitózissal felveszi és feldolgozza."},{"type":"TF","text":"A Henle-kacs ellenáramú sokszorozása miatt a szövetnedv ozmotikus koncentrációja a vesepiramisok csúcsa felé exponenciálisan nő.","isTrue":true,"explanation":"A leszálló ágban vízkilépés, felszálló ágban aktív sókilépés történik egymás mellett. Ez kumulatív hatást hoz létre, a csúcsnál a szövetnedv hiperozmotikus lehet."},{"type":"MC","text":"A dialízis működési elve az ellenáram elvén alapul. Ennek legfontosabb funkciója:","options":["A) Az vérkörözést felgyorsítani a szűréshez","B) A szennyeződések koncentrációgradiensét a teljes csőhosszban fenntartani","C) Az oldódóanyagok ozmózisos áramlásának meghiúsítása","D) A fehérjék visszaszűrésének biztosítása"],"correctLetter":"B","explanation":"Ha a dializáló folyadék az ellenkező irányban áramlik, a mérgező anyagok egyenletes sebességgel diffundálnak a vérből a folyadékba."},{"type":"BLANK","text":"Az elsődleges szűrlet keletkezésében az érgomolyag falát és a Bowman-tok falát elválasztó _____ működik szűrőként.","answer":"alaphártya","explanation":"Ez a negatív töltésű alaphártya képezi az egyetlen válaszfalat a vér és a szűrlet között. A pórusai (50-100 nm) megengedik a kis molekulákat, de visszatartják az alakos elemeket."},{"type":"MC","text":"Az ADH hiánya milyen betegséghez vezet és milyen tünetek jelentkeznek?","options":["A) I. típusú diabetes, hiperglikémia és glikózuria","B) Diabetes insipidus, nagy mennyiségű híg vizelet és folyamatos szomjúság","C) Aldoszteron hiány, sóvesztés és vérnyomáseséés","D) Veseelégtelenség, mérgező anyagok felhalmozódása"],"correctLetter":"B","explanation":"Az ADH hiányában a gyűjtőcsövek fala nem válik vízáteresztővé, így napi 15 liter híg vizelet is keletkezhet, melyet szomjúság követez."},{"type":"TF","text":"Az aminosavak visszaszívódása a proximális tubulusban Na+-aminosav kotranszporttal történik, amely az aktív glükóztranszporthoz hasonlóan ATP-igényes.","isTrue":true,"explanation":"Az aminosavak szintén szekunder aktív transzporton keresztül szívódnak vissza teljes mértékben az egészséges szervezetben, a Na+-gradient felhasználásával."},{"type":"MC","text":"A vese szűrőműködésének hatékonyságát mely tényezők befolyásolják leginkább?","options":["A) Az érgomolyagból kilépő arteriola kisebb átmérője fenntartja a magas vérnyomást","B) Az intakt szűrőberendezés (negatív töltésű alaphártya) kritikus a szűréshez","C) Mindkét tényező egyenlő fontosságú","D) Alapvetően az aldoszteron és ADH termelésétől függ"],"correctLetter":"C","explanation":"Az A) és B) egyaránt esszenciális. Az érgomolyagi kapillárisen fenntartott magas vérnyomás és a szűrőberendezés sértetlensége a hatékony szűrés alapfeltételei."},{"type":"BLANK","text":"A _____ az ozmotikus nyomás azon része, amelyet a nem diffundáló kolloidok, főleg fehérjék hoznak létre.","answer":"onkotikus nyomás","explanation":"Az onkotikus nyomás felelős a víz visszaszívásáért a kapillárisokból. Az érgomolyagban kb. 25 Hgmm, amely az átszűrt vízmennyiség miatt fokozódik a kilépő szakaszon (kb. 35 Hgmm)."},{"type":"MC","text":"A vér teljes ozmotikus nyomása (~5400 Hgmm) elsősorban milyen anyagok okozzák?","options":["A) A plazmafehérjék (albuminok, globulinok, fibrinogén)","B) A sók és kis molekulák (Na+, Cl-, K+, glükóz, karbamid)","C) Egyenlő arányban fehérjék és ionok","D) Az érgomolyagban lévő vértest sejtek"],"correctLetter":"B","explanation":"Bár a teljes ozmotikus nyomás óriási, 99%-ban a kis ionok és molekulák adják azt, mindössze 1-2%-ban a fehérjék. Az onkotikus nyomás azonban csak a fehérjékből adódik."},{"type":"TF","text":"A H+-ionok vesebeli kiválasztása az izohidria (vér pH-állandóságának törvénye) fenntartásában játszik kulcsszerepet.","isTrue":true,"explanation":"A gyűjtőcsatorna sejtjei H+-ionokat ürítik a szűrletbe. Savas állapot esetén a sejtek CO2-ből termelik a H+-ionokat, így a vér pH-ja 7,38-7,42 közötti sávban marad."},{"type":"MC","text":"Az alábbiak közül melyik testfolyadék-paraméter NEM tartozik a homeosztázis alapvető szabályozott tényezői közé?","options":["A) Ionösszetétel (izoionia)","B) Ozmotikus koncentráció (izoozmózis)","C) Vércukor szintje (glükóz homeostázis)","D) Víztartalom (izovolémia)"],"correctLetter":"C","explanation":"Az izoozmózis, izoionia, izohidria és izovolémia alapvető homeosztatikus paraméterek a vesében. A vércukor szabályozása az inzulin/glukagon rendszeré, amely vesebeli exkrécióban közvetlenül nem szerepel."},{"type":"BLANK","text":"Az _____ az érgomolyagban és a Bowman-tok üregében az érnyomás, onkotikus nyomás és szűrletnyomás közötti matematikai kapcsolat.","answer":"nettó filtrációs nyomás","explanation":"Az Peff = Pv - Pcoll - PB formula alapján számítható (kb. 10 Hgmm). Ez az érték határozza meg a szűrés mértékét az egyes pillanatban."},{"type":"MC","text":"A veseelégtelenség során mi a legveszélyesebb folyamat?","options":["A) A napi vizeletmennyiség csökkenése","B) A mérgező bomlastermékek (karbamid, kreatinin) felhalmozódása a vérben","C) A Na+ és K+ ionok kiegyensúlyozatlansága","D) Az ozmotikus nyomás drasztikus megváltozása"],"correctLetter":"B","explanation":"Az ürémia (vérmérgezés) a karbamid és kreatinin felgyülemlése miatt fejlődik. Ez neurológiai, szív- és keringési zavarokat, végül halált okozhat."},{"type":"TF","text":"A napi szűrletmennyiség (kb. 180 liter) 99%-os visszaszívódásában az aktív transzport és ozmózis együttesen, valamint a Henle-kacs ellenáramú sokszorozása által kialakított nagy koncentrációgradiens kulcsszerepe van.","isTrue":true,"explanation":"Ezek az összetett folyamatok teszik lehetővé, hogy a végső vizelet csupán 1-1,5 liter legyen naponta, miközben 180 liter szűrlet képződik."}],"idegrendszer":[{"type":"MC","text":"Az idegsejtnek mely része továbbítja az ingerületet más sejtekhez?","options":["A) Dendrit","B) Sejttest (soma)","C) Axon és axonvégfácska","D) Axondomb"],"correctLetter":"C","explanation":"Az axon a sejttestből indul és az axonvégfácskával végződik. Az axonvégfácska továbbítja az ingerületet a szinapszison keresztül más sejtekhez neurotranszmitterek segítségével."},{"type":"TF","text":"A nyugalmi potenciál a sejthártyán az aszimmetrikus ioneloszlásnak köszönhető, amely főként a Na+-K+ pumpa fenntartja.","isTrue":true,"explanation":"Az élő sejthártya belül negatív (-70 mV), kívül pozitív töltésű. Ezt az Na+-K+ ATPáz pumpa tartja fenn, amely 3 Na+-ionon átküld cserébe 2 K+-ionon befelé."},{"type":"MC","text":"Melyik ioncsatorna-típus működik az akciós potenciál depolarizációs fázisában?","options":["A) Ligand-függő Na+-csatornák a szinapszisban","B) Feszültségfüggő Na+-csatornák az axonon","C) Feszültségfüggő K+-csatornák a dendriteken","D) Szivárgási csatornák"],"correctLetter":"B","explanation":"Az axondomb membrán depolarizálódásakor feszültségfüggő Na+-csatornák nyílnak meg, Na+-ionok áramolnak be, a belső felszín +30 mV-ra depolarizálódik (csúcspotenciál)."},{"type":"BLANK","text":"Az ingerület vezetésében az axondomb (akadályok) jelenti az _____ helyet, ahol az akciós potenciál kialakulása vagy meghiúsulása eldöl.","answer":"küszöb döntési","explanation":"A dendriteken és sejtesten kialakult helyi potenciálok térben és időben összegződnek az axondombban. Ha az eredő eléri az ingerküszöb értékét, feszültségfüggő Na+-csatornák nyílnak meg."},{"type":"MC","text":"A myelinfelhő nélküli (unmyelinated) axonokon az ingerületvezetés sebessége miért lassabb?","options":["A) Mert a depolarizáció a teljes axonhosszon pontról pontra terjedhet","B) Mert az axon átmérője általában kisebb","C) Mert a Na+-csatornák száma csökkent","D) Mert a K+-ionok nem tudnak kilépni"],"correctLetter":"A","explanation":"A myelinizált axonokon az ingerület az axonmembránnak csak a Ranvier-befűződésekben keletkezhet, így az akciós potenciál ugrálva terjed (saltatory conduction). Az unmyelinated axonokon folyamatos a terjedés."},{"type":"TF","text":"A helyi potenciál amplitúdója egyenesen arányos az inger erősségével, és ez az analóg jel jellegét adja a membránpotenciál-változásnak.","isTrue":true,"explanation":"A dendriteken és sejtesten gyenge ingerek kis, erős ingerek nagy amplitúdójú helyi potenciálokat hoznak létre. Ez az inger erősségének kódolásában játszik szerepet."},{"type":"MC","text":"Az akciós potenciál repolarizációs fázisában melyik ion áramlás játszik fő szerepet?","options":["A) Na+ beáramlás","B) K+ kiáramlás az axonon","C) Cl- beáramlás a szinapszisban","D) Ca2+ felszabadulása az endoplazmatikus reticulumból"],"correctLetter":"B","explanation":"Az akciós potenciál csúcsán (depolarizáció után) a feszültségfüggő K+-csatornák nyílnak meg. A K+-ionok diffúzióval kilépnek a sejtből, amely negatív visszacsatolás és a membránpotenciál helyreáll."},{"type":"BLANK","text":"Az idegsejt olyan neurotranszmittert választ ki a synapzison, amely alapján azt serkentő vagy gátló szinapszisnak nevezik. A gátló synapszisok tipikusan _____ -ot szabadítanak fel.","answer":"GABA-t (gamma-amino-bogyósav)","explanation":"A GABA Cl--csatornákat nyit meg, amely hiperpolarizálódást okoz. Más gátló transzmitterek a glicin. A serkentő szinapszisok glutamátot vagy acetilkolint szabadítanak fel."},{"type":"MC","text":"Elektromos synapszisok (rés kapcsolatok) főbb jellemzője a kémiai szinapszihoz képest:","options":["A) Sokkal több neurotranszmitter felhasználása","B) Az ingerület egyirányú transzmisszióban történik","C) Sokkal gyorsabb ingerületvezetés és kétirányú transzmisszió","D) A szinaptikus hólyagok közvetlenül az ionokat juttatják át"],"correctLetter":"C","explanation":"Az elektromos synapszisok fehérjékből álló csatornákon közvetítik az ingerületet ionok segítségével, sokkal gyorsabban működnek. Az ionok közvetlenül átjárulnak, nem kell neurotranszmitter."},{"type":"TF","text":"Egy idegsejtnek több dendrite lehet, amelyek a szomától és az axonvégfácskáktól érkeznek információt fogadják, míg az axon csak egyetlen kivezetésként működik.","isTrue":true,"explanation":"Az idegsejt soknyúlványú szerkezete lehetővé teszi a szimultán több helyről érkező serkentő és gátló szinaptikus bemenet integrálásamukot."},{"type":"MC","text":"A szinaptikus szakadékban (szinaptikus résben) mely folyamat révén jut el a neurotranszmitter az utcai receptorokhoz?","options":["A) Aktív transzport","B) Egyszerű diffúzió","C) Receptor-közvetített endocitózis","D) Exocitózis"],"correctLetter":"B","explanation":"A neurotranszmitterek a 30-50 nm széles szinaptikus résben diffúzióval terjednek, majd megkötődnek a posztszinaptikus membránon lévő receptor fehérjékhez."},{"type":"BLANK","text":"Az akciós potenciál amplitúdója maximális (minden vagy semmi törvénye), amely azt jelenti, hogy az ingerület erőssége nem az amplitúdóban, hanem az _____ -ban kódolódik.","answer":"frekvenciában (pulzusszámban)","explanation":"Erősebb ingerek sűrűbb (nagyobb frekvenciájú) akciós potenciál-sorozatot eredményeznek, míg az egyedi akciós potenciál amplitúdója változatlan marad."},{"type":"MC","text":"A gliasejtek (glia, support sejtek) mely típusa elsősorban az axon myelinizációját végzi?","options":["A) Asztrociták","B) Mikroglya","C) Oligodendrocyta (központi idegrendszer) és Schwann-sejtek (perifériás idegrendszer)","D) Ependima sejtek"],"correctLetter":"C","explanation":"Az oligodendrocitok több axonnak biztosítanak myelinburkolatot az agyban és gerincvelőben. A Schwann-sejtek egy-egy perifériás axont burkol be, amely a vezetési sebesség növekedéséhez vezet."},{"type":"TF","text":"A depolarizáció alatt a membrán belső felszíne pozitív (+30 mV), míg az külső felszíne negatív töltésű, amely az Na+-beáramlás és a K+ kiáramlás hiánya miatt jön létre.","isTrue":false,"explanation":"A depolarizációban a Na+-ionok masszívan beáramolnak, amely a belső felszínt +30 mV-ra polarizálja. A K+ még nem lép ki jelentős mértékben. A repolarizációban K+ kiáramlás dominál."},{"type":"MC","text":"Az akciós potenciál vezetésének sebessége az alábbiak közül melyik tényezőn függ ELSŐ SORBAN?","options":["A) Az axon átmérője és a myelinburkolat jelenléte","B) A Na+-K+ pumpa aktivitása","C) Az akciós potenciál amplitúdója","D) A neurotranszmitter típusa"],"correctLetter":"A","explanation":"Myelinizált axonok vezetési sebessége 120 m/s, míg unmyelinizált axonok néhány cm/s. Az axon vastagsága szintén befolyásolja az intracelluláris vezetési ellenállást."},{"type":"BLANK","text":"Az acetilkolin az ideg-izom szinapszisban Na+-csatornákat nyit meg, amely serkentő hatást okoz. Ugyanakkor a szívizomban _____ -csatornákat nyit meg, amely gátló hatáshoz vezet.","answer":"K+-","explanation":"Ez azt mutatja, hogy ugyanaz a neurotranszmitter (acetilkolin) különböző receptor-típusokhoz kötődhet (nikotinos és muszkarin receptorok), ami eltérő hatásokat eredményez."},{"type":"MC","text":"A szerotonin neurotranszmitter elsősorban mely funkcióban játszik szerepet?","options":["A) Izomösszehúzódás a szomatikus mozgatási ágon","B) Alvás, hangulat és fájdalomérzet szabályozása","C) Adrenalin termelésének aktiválása","D) Memória konszolidáció az agykéregben"],"correctLetter":"B","explanation":"A szerotonin-szintézis csökkenése depresszióhoz, álmatlansághoz és fájdalomra való fokozott érzékenységhez kapcsolódik. Antidepresszánsok gyakran a szerotonin újrafelvételét gátolják."},{"type":"TF","text":"A depolarizáció során az axon belsejében az Na+-ionok az egyes membránszakaszok között áramolnak, amely a szomszédos még nyugalomban levő területek hipopolarizálódásához vezet (köráram-elmélet).","isTrue":true,"explanation":"Az elektrokemikai gradiens miatt a Na+-ionok a depolarizált helyen beáramolnak, majd a sejtbelsejében az még nyugalomban levő (negatív) helyek felé áramolnak. Ez az ingerület további terjedéséhez vezet."},{"type":"MC","text":"A preszinapszis axonvégfácskájában mely folyamat révén ürülnek a szinaptikus hólyagok neurotranszmitter tartalmukkal?","options":["A) Endocitózis","B) Diffúzió a membránon keresztül","C) Ca2+-beáramlás-kiváltotta exocitózis","D) ATP-függő aktív transzport"],"correctLetter":"C","explanation":"Az akciós potenciál eléréseekor feszültségfüggő Ca2+-csatornák nyílnak meg az axonvégfácskában. A Ca2+ beáramlása kiváltja a szinaptikus hólyagok membránnal való összeolvadását és az exocitózist."},{"type":"BLANK","text":"A _____ olyan gliasejtek, amelyek a központi idegrendszer területén az inflamációs válaszban és a patogének eltávolításában játszanak szerepet, miközben szerepe van az axonális szinaptikus plasticitásban is.","answer":"Mikroglia","explanation":"A mikroglya sejtek az agyban és gerincvelőben a makrofágok szerepét játsszák. Képesek patogéneket fagocitózis segítségével eltávolítani, valamint szerepük van az apoptotikus szinapszisok eltávolításában (takarítás)."},{"type":"MC","text":"A hiperpolarizáció durante a repolarizáció után miért is történik?","options":["A) Mivel a K+-csatornák lassan zárulnak, még akkor is amikor a membránpotenciál eléri a nyugalmi értéket","B) Mivel a Na+-beáramlás még nem szűnt meg teljesen","C) Mivel a Na+-K+ pumpa lassabb a K+ kiáramlásánál","D) Mivel a Cl--ionok magas koncentrációja megakadályozza a K+ visszatérését"],"correctLetter":"A","explanation":"A feszültségfüggő K+-csatornák az elektrokemikai gradiens hatása alatt tovább maradnak nyitva, még akkor is amikor a membránpotenciál már negatív lett (-90 mV körül). Ez az abszolút refrakter periódus után az akciós potenciál további iniciálását átmenetileg lehetetlenné teszi."},{"type":"TF","text":"A helyi potenciálok térben és időben összegződhetnek (szummáció) az axondombban, amely lehetővé teszi a neuronok számára az integrációt és az impulzusok erősítését.","isTrue":true,"explanation":"A térbeli szummáció során többek dendritről egyszerre érkező serkentő potenciálok összeadódnak. Az időbeli szummáció során az egy helyről egymás után érkezők összeadódnak. Ez az információ integrálásának alapja."},{"type":"MC","text":"Az endorfinok (endogén opioidok) milyen mechanizmussal fejtenek ki fájdalomcsillapító hatást?","options":["A) Direkt Na+-csatorna blokk","B) Az axon felszínén GABA receptorok aktiválása","C) Fájdalomcsillapítást végző központokba ható és dopamin felszabadulás serkentésé","D) A szinaptikus résben a neurotranszmitter eltávolításának gyorsítása"],"correctLetter":"C","explanation":"Az endorfinok specifikus receptorokhoz kötődnek a fájdalomcsillapítást végző agyi központokban, valamint fokozzák a dopamin termelődését, amely öröm és fájdalomcsillapítás érzetét váltja ki."}],"gerincvelo":[{"type":"MC","text":"A gerincvelő melyik részeiben helyezkednek el a mozgatóneuronok sejttestei?","options":["A) Hátsó szarv","B) Mellső szarv és oldalsó szarv","C) Központi csatorna","D) Fehérállomány"],"correctLetter":"B","explanation":"A mellső szarv szomatikus mozgatóidegsejteket, az oldalsó szarv központi vegetatív neuronokat tartalmaz."},{"type":"MC","text":"A gerincvelői gyökerek közül melyik tartalmaz kizárólag érzőrostokat?","options":["A) Mellső gyökér","B) Hátsó gyökér","C) Mindkettő kevert","D) Egyik sem tartalmaz idegrostokat"],"correctLetter":"B","explanation":"A hátsó gyökérben a csigolyaközti dúc pszeudounipoláris érzőidegsejtjei helyezkednek el, így csak érzőrostokat tartalmaz."},{"type":"MC","text":"Hány pár gerincvelői ideg található az emberi szervezetben?","options":["A) 12 pár","B) 24 pár","C) 31 pár","D) 42 pár"],"correctLetter":"C","explanation":"A gerincvelőből összesen 31 pár kevert gerincvelői ideg lépnek ki szelvényesen."},{"type":"MC","text":"A szimpatikus preganglionális rostok melyik gerincvelői szakaszból erednek?","options":["A) Nyaki szakasz (C1-C8)","B) Mellkasi és ágyéki szakasz (Th1-L2)","C) Keresztcsonti szakasz (S2-S4)","D) A teljes gerincvelőből"],"correctLetter":"B","explanation":"A szimpatikus rendszer torakolumbális eredésű, a mellkasi és ágyéki szakasz oldalsó szarvaiból lépnek ki a preganglionális rostok."},{"type":"TF","text":"A térdreflex egy monoszinaptikus izomeredetű szomatikus reflex.","isTrue":true,"explanation":"A térdreflex a feszítő vagy nyújtási reflex, mely közvetlen kapcsolat az érzőneuron és a mozgatóneuron között, egyetlen szinapszissal."},{"type":"TF","text":"A gerincvelő hátsó szarva elsősorban motoros funkciókat lát el.","isTrue":false,"explanation":"A hátsó szarv szenzoros (érzőneuronokat fogadó) funkciójú, interneuronokat tartalmaz. A motoros előneuronok az elülső szarvban helyezkednek el."},{"type":"MC","text":"A dermatóma fogalmán mit értünk?","options":["A) A gerincvelő egy szelvénye","B) A bőrnek egy adott gerincvelői ideggel beidegzett területe","C) A csigolyaközti dúc egy része","D) A felszálló pályák egyike"],"correctLetter":"B","explanation":"A dermatóma a szelvényezettség megnyilvánulása a bőrön"},{"type":"MC","text":"A bőreredetű szomatikus reflex melyik típusú reflex?","options":["A) Azonos oldali kettős mozgatóneuroni","B) Azonos oldali hajlító-keresztezett feszítő reflex","C) Csak felszálló pályákat érint","D) Direkten az agyba jut"],"correctLetter":"B","explanation":"A fájdalmas inger hatására a veszélyeztetett végtag hajlítóizmain azonos oldali összehúzódás, az ellenkező oldali végtagon feszítőizomösszehúzódás tapasztalható."},{"type":"BLANK","text":"Az izomorsó a combfeszítő izmomban található tokkal körülvett, módosult izomrostokra csavarodott érző _____.","answer":"idegvégződés","explanation":"Az izomorsó egy mechanoreceptor, mely az izom nyújtása során deformálódik és ingerületet hoz létre."},{"type":"TF","text":"A nyújtási reflex fő feladata az izmok túlzott passzív megnyúlásának megakadályozása.","isTrue":true,"explanation":"A nyújtási reflex védi az izmot az izomszakadástól"},{"type":"MC","text":"Az akaratlagos mozgások szabályozásáért mely pálya felelős?","options":["A) Felszálló szenzoros pályák","B) Piramispálya (leszálló motoros pálya)","C) Felszálló spinocerebellaris pályák","D) A retroflexus pályák"],"correctLetter":"B","explanation":"A piramispálya rostjai az agyféltekékből szállnak le és működésük kontrollálja az akaratlagos mozgásokat."},{"type":"MC","text":"A vegetatív reflexek végrehajtó neuronjai hol helyezkednek el?","options":["A) A gerincvelő mellső szarvában","B) A gerincvelő oldalsó szarvában","C) A testben elhelyezkedő perifériális vegetatív dúcokban","D) A pia materben"],"correctLetter":"C","explanation":"A szomatikus reflextől eltérően a vegetatív reflexekben a mozgatóneuronok teste a perifériális dúcokban találhatók."},{"type":"BLANK","text":"Az interneuronok sejttestei a gerincvelő _____ szarvában helyezkednek el.","answer":"hátsó","explanation":"Az interneuronok a hátsó szarvban találhatók, és összekapcsolják az érző- és mozgatóidegsejteket."},{"type":"TF","text":"A csigolyaközti dúc pszeudounipoláris idegsejtek központi nyúlványa képezi a hátsó gyökerezést.","isTrue":true,"explanation":"A csigolyaközti dúcban található pszeudounipoláris érózidegsejteknek egy centrális nyúlványa van, amely a hátsó gyökeret alkotja."},{"type":"MC","text":"A paraszimpatikus idegrostok melyik gerincvelői szakaszokból lépnek ki?","options":["A) Mellkasi és ágyéki (Th1-L2)","B) Keresztcsonti (S2-S4)","C) Nyaki (C1-C8)","D) Mellkasi (Th1-Th12) és keresztcsonti (S2-S4)"],"correctLetter":"B","explanation":"A paraszimpatikus preganglionális rostok csak a keresztcsonti gerincvelői szakaszból lépnek ki."},{"type":"MC","text":"Mit jelent az, hogy a gerincvelő szelvényezett?","options":["A) A gerincvelő szakaszokra osztott, melyek a csigolyáknak felelnek meg","B) A gerincvelőből kilépő idegek szelvényesen hálózzák be a testet","C) A szürgeállomány szelvényes elrendeződésű","D) A fehérállomány szelvényes kötegekből áll"],"correctLetter":"B","explanation":"A szelvényezettség azt jelenti, hogy a gerincvelőből kilépő idegek szelvényesen és határozottan hálózzák be a testet, amit a dermatómák ismerete demonstrál."},{"type":"BLANK","text":"A mellső szarvi mozgatóidegsejtekből kiinduló rostok az _____ gyökéren keresztül hagyják el a gerincvelőt.","answer":"mellső","explanation":"A mellső szarv motoros neuronainak nyúlványai a mellső gyökéren keresztül lépnek ki és érik el a vázizomokat."},{"type":"TF","text":"A felszálló pályák a gerincvelő fehérállományának hátulsó kötegét alkotják.","isTrue":true,"explanation":"A felszálló érzőpályák elsősorban a hátulsó kötegben futnak az agyvelő felé."},{"type":"MC","text":"A lófarok (cauda equina) miből áll?","options":["A) A gerincvelő végpontja után kilépő ideghalmaz","B) Az első ágyékcsigolya alatt a gerinccsatornában húzódó gerincvelői gyökerek","C) A gerincvelő keresztcsonti szakasza","D) Az érzőrostok csoportosulása"],"correctLetter":"B","explanation":"A gerincvelő az első ágyékcsigolya magasságában végződik, ezalatt csak a gerincvelői gyökerek futnak le, amit lófarknak nevezünk."},{"type":"MC","text":"A gerincvelő melyik szarva tartalmazza a központi vegetatív interneuronokat?","options":["A) Mellső szarv","B) Hátsó szarv","C) Oldalsó szarv","D) Központi csatorna körüli terület"],"correctLetter":"C","explanation":"Az oldalsó szarv a vegetatív reflexpályák beépítésén keresztül irányítja a belső szerveket, mirigyeket és a szívizmot."},{"type":"BLANK","text":"A szomatikus reflex végeredménye vázizom _____, míg a vegetatív reflex simaizmokat, mirigyeket és szívizmot érint.","answer":"összehúzódása","explanation":"Ez a fontos különbség miatt osztályozzuk a reflexeket szomatikus és vegetatív kategóriákba."},{"type":"TF","text":"Az oldalsó szarvban lévő vegetatív neuronok axonjai az elülső gyökéren keresztül lépnek ki.","isTrue":true,"explanation":"A vegetatív reflexív működésében az oldalsó szarvi vegetatív neuronok axonjai az elülső gyökéren keresztül kilépve perifériális vegetatív dúcokba jutnak."},{"type":"MC","text":"Mely pályák futnak a gerincvelő oldalsó kötegében?","options":["A) Kizárólag felszálló pályák","B) Kizárólag leszálló pályák","C) Vegyesen felszálló és leszálló pályák","D) Csak vegetatív rostok"],"correctLetter":"C","explanation":"Az oldalsó köteg vegyes összetételű, tartalmazva mind a szenzoros, mind a motoros pályákat."},{"type":"MC","text":"A piramispályán futó ingerületek hol érik el a mozgatóneuronokat?","options":["A) Az agyban","B) A csigolyaközti dúcban","C) A gerincvelő mellső szarvában","D) Az oldalsó szarvban"],"correctLetter":"C","explanation":"A piramispálya rostjai a gerincvelő mellső szarvában található mozgatóneuronokra kapcsolódnak akaratlagos mozgások szabályozásához."},{"type":"BLANK","text":"A reflexkörben a központ szabályozza a receptor _____ küszöbét.","answer":"ingerküszöbét","explanation":"A reflexkörökben kétirányú kommunikáció van: a központ felsőbb kontrollt gyakorol a receptor érzékenységére."},{"type":"TF","text":"Az érzőidegsejt sejteste a gerincvelőben található.","isTrue":false,"explanation":"Az érzőidegsejt sejteste a csigolyaközti dúcban helyezkedik el, a központi idegrendszeren kívül, a környéki idegrendszerben."},{"type":"MC","text":"A gerincvelő mely szakaszához köthetők a felső végtagot ellátó ideghalmaz (karfonat) kilépési helyei?","options":["A) Nyaki szakaszhoz","B) Mellkasi szakaszhoz","C) Ágyéki szakaszhoz","D) Keresztcsonti szakaszhoz"],"correctLetter":"A","explanation":"A karfonat a nyaki szakasz idegeiből alakul ki, mely a felső végtagok beidegzésére szolgál."},{"type":"MC","text":"Az akciós potenciál a receptortól mely struktúrán keresztül jut a központba?","options":["A) Mozgatóidegsejtnek","B) Érzőidegsejtnek","C) Interneuronnak","D) Gliasejtnek"],"correctLetter":"B","explanation":"Az érzőidegsejt továbbítja a receptoroktól az akciós potenciált (ingerületet) a központ felé."},{"type":"BLANK","text":"A térdreflex esetén a combfeszítő izom megnyúlása az _____ receptorokkal történő érzékelés révén válik ingerületté.","answer":"izomorsó","explanation":"Az izomorsó speciális mechanoreceptor, amely az izom nyújtására reagál depolarizációval."},{"type":"TF","text":"A gerincvelő vegetatív funkciói közé tartozik a vizelet- és székletürítés szabályozása.","isTrue":true,"explanation":"A gerincvelő reflexes szinten szabályozza a vizelet- és székletürítést, valamint a szexuális reflexeket is."},{"type":"MC","text":"A fájdalmas inger esetén az érzőinformáció melyik pályán jut az agyba?","options":["A) Felszálló spinális pályákon (például spinothalamikus pálya)","B) Leszálló piramispályákon","C) Oldalsó szarv rostjain","D) A mellső gyökéren"],"correctLetter":"A","explanation":"A szenzoros információ felszálló pályákon (spinothalamikus, spinocerebelláris) jut az agyba tudatosulásra."}],"agy":[{"type":"MC","text":"Melyik agyterület felelős elsősorban az érzelmi feldolgozásért, a memóriakialakításért és a motiváció szabályozásáért?","options":["A) Agytörzs","B) Limbikus rendszer","C) Kisagy","D) Agykérgi lebenyek"],"correctLetter":"B","explanation":"A limbikus rendszer (hippocampus, amygdala, hypothalamus) az érzelmi feldolgozás, memóriakialakítás, motiváció, félelem és agresszió központja."},{"type":"MC","text":"Mely agyterületek tartoznak a köztiagy (diencephalon) részeihez?","options":["A) Talamusz és hypothalamus","B) Hippocampus és amygdala","C) Nyúltvelő és híd","D) Kisagy és nagyagy"],"correctLetter":"A","explanation":"A köztiagy a talamusz és hypothalamus összeségét foglalja magában, mely az információfeldolgozás és szabályozás központja."},{"type":"MC","text":"A Broca-terület, amely a motorikus beszédért felelős, mely agyterületben helyezkedik el?","options":["A) Talamuszban","B) Frontális lebeny inferior gyrusában","C) Temporális lebeny Wernicke-mezejében","D) Nyúltvelőben"],"correctLetter":"B","explanation":"A Broca-terület a bal félteke frontális lebenyének inferior gyrusában található és a motorikus beszédért felelős."},{"type":"TF","text":"A kisagy a mozgáskoordináció és az egyensúly fenntartásáért nem felelős.","isTrue":false,"explanation":"A kisagy (cerebellum) a mozgáskoordináció finomításáért és az egyensúly fenntartásáért felelős, proprioceptív és vestibularis visszajelzések alapján."},{"type":"MC","text":"Az agytörzsi hálózatos állomány mely funkciók fenntartásában játszik kritikus szerepet?","options":["A) Motoros tervezés és végrehajtás","B) Alvás-ébrenléti ciklus, éberség és vegetatív funkciók","C) Rövid és hosszú távú memória","D) Vizuális és akusztikus feldolgozás"],"correctLetter":"B","explanation":"Az agytörzsi hálózatos állomány az alvás-ébrenléti ciklus, éberség, izomtónus és vegetatív funkciók szabályozásáért felel."},{"type":"TF","text":"Az alvásnak az energiatakarékosság és tanulás mellett a feltöltődés is a funkciói közé tartozik.","isTrue":true,"explanation":"Az alvás több elmélettel magyarázható, melyek közül az energiatakarékosság, tanulás és az agyműködés feltöltődése a legjelentősebbek."},{"type":"MC","text":"Melyik testérző pályavonal közvetíti a nyomás, vibráció és proprioceptív információkat?","options":["A) Spinothalamikus pálya","B) DCML pálya (medialis lemniscus)","C) Szpináris pálya","D) Korticospinális pálya"],"correctLetter":"B","explanation":"A DCML pálya a nyomás, vibráció és proprioceptív információt szállítja, nyúltvelőben kontralaterálisan kereszteződik."},{"type":"MC","text":"Az anterolaterális testérző pályavonal mely típusú ingereket közvetít?","options":["A) Nyomás és vibráció","B) Propriocepció","C) Fájdalom és hőérzet","D) Szőrsejtek stimulációja"],"correctLetter":"C","explanation":"Az anterolaterális pálya a fájdalom és hőérzet információit szállítja, gerincvelőben kontralaterálisan kereszteződik."},{"type":"TF","text":"Az elsődleges érzőkéreg sérülése a tudatosuló érzékelés teljes elvesztésével jár.","isTrue":true,"explanation":"Az elsődleges érzőkéreg sérülése a tudatosuló érzékelés kiesését jelenti, mivel itt alakul ki az érzet tudatosulása."},{"type":"MC","text":"A fájdalomkapumechanizmus során mely neurotranszmitterek játszanak fájdalomcsökkentő szerepet?","options":["A) Glutamát és aszkorbinsav","B) Endorfin és encefalin","C) Szerotonin és norepinefrin","D) GABA és glicin"],"correctLetter":"B","explanation":"Az endorfin és encefalin endogén opioid-szerű neurotranszmitterek, melyek a gerincvelői szürkeanyagban a fájdalom feldolgozását gátolják."},{"type":"MC","text":"Mely receptor típusok találhatók a bőr és belső szervek szöveteiben?","options":["A) Csak mechanoreceptorok","B) Fájdalom-, hő-, kemo- és mechanoreceptorok","C) Csak proprioreceptorok","D) Kizárólag hőreceptorok"],"correctLetter":"B","explanation":"A testérző rendszer több receptor típussal rendelkezik, melyek különböző típusú ingereket közvetítenek."},{"type":"BLANK","text":"A Wernicke-terület a _____ értésért felelős, míg a Broca-terület a motorikus beszédért.","answer":"beszédmegértés","explanation":"A Wernicke-terület a temporális lebeny felső részében található és a beszédértésért, Broca a frontális lebeny inferior gyrusában és a motorikus beszédért felel."},{"type":"MC","text":"Melyik agyterület felelős elsősorban az agyi lateralizáció során a beszédért és az analitikus gondolkodásért?","options":["A) Jobb agykéreg","B) Bal félteke","C) Limbikus rendszer","D) Agytörzs"],"correctLetter":"B","explanation":"Az agyi lateralizáció az agy féltekéinek funkcionális specializálódása, az embernél a bal félteke általában a beszédért és analitikus gondolkodásért felel."},{"type":"MC","text":"Az ízomorsó mely funkciót lát el a mozgásszabályozásban?","options":["A) A csontok helyzetét érzékeli","B) A hirtelen nyújtást és a nyújtás sebességét érzékeli","C) A fájdalomingereket közvetíti","D) A hőmérsékleti változásokat detektálja"],"correctLetter":"B","explanation":"Az ízomorsó a hirtelen nyújtásra és a nyújtás sebességére reagál, az izom hosszváltozásait közvetíti."},{"type":"TF","text":"Az ínorsó (Golgi-szerv) az izom összehúzódásának erejét és a fejlesztett húzóerőt érzékeli.","isTrue":true,"explanation":"Az ínorsó (Golgi-szervek) az izom összehúzódásának erejét, fejlesztett húzóerőt és nyomóingereket érzékeli."},{"type":"MC","text":"Az agytörzsi hálózatos állomány mely része szabályozza az alvás-ébrenléti ciklust?","options":["A) Kizárólag a medulla oblongata","B) Csak a köztiagy","C) Nyúltvelő és agytörzsi hálózatos állomány","D) Csak a kisagy"],"correctLetter":"C","explanation":"Az agytörzsi hálózatos állomány az alvás-ébrenléti ciklus és éberség fenntartásáért felel."},{"type":"MC","text":"A testérző receptorok közül mely típus felel a szőrszálak mechanikai stimulációjáért?","options":["A) Chemoreceptorok","B) Thermoreceptorok","C) Szőrsejt-receptorok","D) Nocireceptorok"],"correctLetter":"C","explanation":"A szőrszálak körül elhelyezkedő szőrsejt-receptorok hámsejt alapú mechanoreceptorok, könnyű mechanikai stimulációra reagálnak."},{"type":"BLANK","text":"Az érzőpályák kéreg alatti központjaiban már _____ feldolgozás is történik, nem csak az információ továbbítása.","answer":"előzetes","explanation":"Az érzőpályák kéreg alatti központjaiban már előzetes feldolgozás történik, mely szűri, összevetíti és integrálja az érzékelési információkat."}],"latas":[{"type":"MC","text":"Mely szerv tartalmazza a szem fényérzékeny receptorait?","options":["A) Szivárványhártya","B) Szaruhártya","C) Retina (ideghártya)","D) Üvegtest"],"correctLetter":"C","explanation":"A retina a szemgolyó legbelső burokja, amely a fényérzékeny fotoreceptorokat (csapok és pálcikák) tartalmazza."},{"type":"MC","text":"A szem optikai rendszerében mely réteg felelős az egyik legjelentősebb fénytörésért?","options":["A) Szem lencséje","B) Levegő-szaruhártya határfelülete","C) Csarnokvíz","D) Üvegtest"],"correctLetter":"B","explanation":"A levegő-szaruhártya határ a legnagyobb fénytörésé miatt a szem legerősebb optikai rendszere."},{"type":"MC","text":"Melyik fotoreceptor típus felelős az éles, részletgazdag nappalitásért és a színlátásért?","options":["A) Pálcika","B) Csap","C) Pigmenthám","D) Bipoláris neuron"],"correctLetter":"B","explanation":"A csapok csak a sárgafoltnál sűrűsek, 1-1 idegsejthez kapcsolódnak, így biztosítják az élesműködést és a színérzékelést."},{"type":"TF","text":"A pálcikák érzékenysége nagyobb a csapok érzékenységénél.","isTrue":true,"explanation":"A pálcikák már egyetlen fotont képesek érzékelni, míg a csapok ingerküszöbe kb. 100 foton, így sokkal érzékenyebbek."},{"type":"MC","text":"Mit jelent az akkomodáció?","options":["A) A pupilla szűkülése erős fényre","B) A szem lencséjének domborulatának megváltoztatása közeli tárgyak éles látásához","C) A retina elöregedése","D) A szaruhártya károsodása"],"correctLetter":"B","explanation":"Az akkomodáció aktív folyamat, amely közeli tárgyak fókuszálásához szükséges, a sugártest izmai kontrolláljak."},{"type":"MC","text":"A szem melyik részén található a vakfolt?","options":["A) Szivárványhártyán","B) Szaruhártyán","C) A retinan, ahol a látóideg elhagyja a szemet","D) Üvegtestben"],"correctLetter":"C","explanation":"A vakfolt (optic disc) fényérzékelő receptorok nélküli terület, mivel itt lépnek ki a ganglion sejtek a látóidegbe."},{"type":"BLANK","text":"A pálcikák fényelektromos működésében az opszennel komplexet alkotó vegyület _____ név alatt ismert.","answer":"rodopszin","explanation":"A rodopszin az opszen és cisz-retinal kombinációja, amely a fény abszorpciójára képes."},{"type":"TF","text":"A rövidlátás (myopia) korrekciójához gyűjtőlencsét kell használni.","isTrue":false,"explanation":"A rövidlátás korrekciójához homorú (negatív) lencsét használunk, mivel a kép az ideghártya előtt képződik."},{"type":"MC","text":"A látás mely szakaszán történik meg a fényelektromos jelátalakítás?","options":["A) A ganglionsejtekben","B) A bipoláris sejtekben","C) A fotoreceptorokban","D) A talamuszban"],"correctLetter":"C","explanation":"A pálcikákban és csapokban történik meg a fény energiájának elektromos jelekké való átalakítása."},{"type":"MC","text":"A szürkehályog (katarakt) lényege?","options":["A) A szivárványhártya pigmentes szövetének degenerációja","B) A szem lencséjének elhomályosulása","C) A retina leválása az érhártyáról","D) A látóideg atrófiája"],"correctLetter":"B","explanation":"A szürkehályog a lencse maradandó elhomályosulása, mely műtéti eltávolítást igényel."},{"type":"MC","text":"Mely enzim szabadít fel cGMP-t sötétben a pálcikasejtben?","options":["A) Transzducin","B) Guanilát-cikláz","C) Foszfodiészteráz","D) Triptofán hidroxiláz"],"correctLetter":"B","explanation":"A guanilát-cikláz GTP-ből nagy mennyiségben termel cGMP-t, amely nyitva tartja az ioncsatornákat sötétben."},{"type":"BLANK","text":"A csapok fotoreceptor pigmentje _____ néven ismert, amely az opszen három féle típusának egyik változatát tartalmazza.","answer":"jodopszin","explanation":"A jodopszin az opszen és retinal kombinációja csapokban, három különböző opszin típusban."},{"type":"TF","text":"A látóideg félig kereszteződik az agy alapján találhatón.","isTrue":true,"explanation":"Az orr felőli retinafélből származó rostok kereszteződnek, a halánték felőli nem, így a jobb látótér bal féltekébe kerül."},{"type":"MC","text":"A zöldhályog (glaukóma) kialakulásának oka?","options":["A) A szaruhártya elhomályosulása","B) A csarnokvíz termelődése és elfolyása közötti egyensúly felbomlása, növekvő szemnyomás","C) A retina pigmentsejtjei defektusa","D) A szivárványhártya gyulladása"],"correctLetter":"B","explanation":"A túlzott szemnyomás szaruhártyavizenyőt és retina vérellátási zavarát okoz, ide szigetvérzést és látásromlást."},{"type":"MC","text":"Hol helyezkedik el az elsődleges látókéreg?","options":["A) Homloklebenyben","B) Nyakszirtlebenyben","C) Halántéklebenyben","D) Szagitális lebenyben"],"correctLetter":"B","explanation":"Az elsődleges látókéreg a nyakszirtlebenyen található, ahol a retináról pontszerű vetítés történik."},{"type":"BLANK","text":"Az akkomodáció során a sugártest izmai _____, amitől a lencsefüggesztő rostok ellazulnak és a lencse domborodik.","answer":"összehúzódnak","explanation":"Ez a paraszimpatikus reflexív működés lehetővé teszi a közelről való éles látást."},{"type":"TF","text":"A pupilla szűkülése erős fényre egy paraszimpatikus reflexív működés eredménye.","isTrue":true,"explanation":"A pupillareflex kiváltása során a szivárványhártya körkörös szűkítő izmai (paraszimpatikus) húzódnak össze."},{"type":"MC","text":"A pálcikák mely retinarétegben helyezkednek el?","options":["A) Pigmenthám réteg","B) Fotoreceptor réteg (csapok és pálcikák rétege)","C) Bipoláris érzősejt réteg","D) Ganglion sejt réteg"],"correctLetter":"B","explanation":"A pálcikák és csapok a retina külső részén helyezkednek el, az érhártya felé."},{"type":"MC","text":"Mit okoz a cisz-retinal transz-retinallá való átalakulása megvilágításkor?","options":["A) A rodopszin regenerációja","B) A rodopszin lebomlása és az opszen felszabadulása","C) A glutamát felszabadulása","D) A cGMP szintézise"],"correctLetter":"B","explanation":"Ez az átalakulás a G-fehérje (transzducin) aktivációjához vezet és az ingerület terjedéséhez."},{"type":"BLANK","text":"A látópályán az 1. neuron a fotoreceptor, a 2. neuron a _____, a 3. neuron a ganglion sejt.","answer":"bipoláris sejt","explanation":"Ez a háromszintű szervezet alapja az ingerület feldolgozásának a retinacsapokon át az agyba."},{"type":"TF","text":"A sötétadaptáció során a pálcikák rodopszinja felépül, ami növeli a szem érzékenységét.","isTrue":true,"explanation":"Erős fényből sötétbe lépéskor kb. 15-20 percig tart, míg a rodopszin regenerálódik és szem érzékenysége nő."},{"type":"MC","text":"A színvakság kialakulásának oka?","options":["A) A szaruhártya homályosodása","B) Az egyik csapsejt típus hiánya vagy nem megfelelő működése az ideghártyában","C) A szivárványhártya pigmentációs zavara","D) A retina leválása"],"correctLetter":"B","explanation":"A leghíresebb formák a vörös és zöld receptorok hibái, melyek az X-kromoszómához kötöttek."},{"type":"MC","text":"Mit jelent a dioptria?","options":["A) A fénytörő képesség mértékegysége (reciprok fókusztávolság méterben)","B) A pupilla átmérője","C) A retina vastagságának mértéke","D) A szem folyadéknyomása"],"correctLetter":"A","explanation":"D = 1/f, ahol f a fókusztávolság méterben kifejezve."},{"type":"BLANK","text":"A binokuláris látás alapja az, hogy a két szem legalább kissé eltérő nézőpontjából adódóan ugyanazon tárgy retináján kialakuló képek eltérnek, ezt _____ nak nevezzük.","answer":"binokuláris eltérésnek","explanation":"Ez az eltérés alapja a mélységészlelésnek és a térlátásnak."},{"type":"TF","text":"A talamusz a látópályán az 5. neuront tartalmazza.","isTrue":false,"explanation":"A talamusz a 4. neuront tartalmazza, ahol a látópálya rostjai átkapcsolódnak az 5. neuron (primer látókéreg neuron) elé."},{"type":"MC","text":"A közeli akomodációs hatása során a szem mely része nem változik?","options":["A) A szem lencséjének domborulata","B) A pupilla mérete","C) A szaruhártya görbülete","D) A lencsefüggesztő rostok húzása"],"correctLetter":"C","explanation":"A szaruhártya görbülete - és így fénytörése - állandó marad, mivel az izom nem tudja módosítani az alakját."},{"type":"MC","text":"Az érzőidegvégződések mely csapfajta az áttetsző szaruhártyára nem terjednek ki?","options":["A) Szabad idegvégződések","B) Érzőreceptorok","C) Nociceptorok","D) Mechanoreceptorok"],"correctLetter":"D","explanation":"A szaruhártya nagy számú szabadideg-vége (fájdalom, hőmérséklet) miatt igen érzékeny, de ereket nem tartalmaz."},{"type":"BLANK","text":"A szem fő előbetegségei közül a teljes vaksághoz vezet a műtét nélkül a _____.","answer":"szürkehályog","explanation":"A szürkehályog műtéti eltávolítása szükséges, majd műlencse behelyezése."},{"type":"TF","text":"Az L, M és S csapok abszorpciós maximuma eltérő hullámhosszakon van, mely alapján a különféle színek érzete keletkezik.","isTrue":true,"explanation":"Az L (hosszú/vörös), M (közepes/zöld), S (rövid/kék) csapok szelektív érzékenysége alapján alakul ki a szín érzete."},{"type":"MC","text":"A szaruhártya melyik jellemzője biztosítja annak nagy érzékenységét?","options":["A) Pigmenttartalma","B) Nagy számú érző idegvégződése és ereket nem tartalmaz","C) Vastag kollagén rétege","D) Vas-tartalmú pigmentei"],"correctLetter":"B","explanation":"A szaruhártya nagy számú szabad idegvégződésből fakadóan érzékeny, mely mechanikai és hőhatásokra reagál."}],"hallas":[{"type":"MC","text":"A hang feldolgozásának mely lépése közvetlenül követi a dobhártya rezgésbe hozását?","options":["A) Az ovális ablakon keresztüli rezgésátvitel","B) A hallócsontocskák által közvetített rezgésátvitel","C) A Corti-szerv szőrsejtjeinek elhajlása","D) A hallóideg impulzusainak a halántéklebenyhez való eljutása"],"correctLetter":"B","explanation":"A dobhártyát rezgésbe hozó levegőrezgések után a hallócsontocskák veszik fel és közvetítik az ovális ablakhoz az erősített rezgéseket."},{"type":"MC","text":"Melyik szerv szabályozza a hang terjedésének helyét a csiga belsejében, amely a frekvencia-kódolás alapja?","options":["A) A kerek ablak","B) Az alaphártya","C) A fedőlemez","D) A csigavezeték"],"correctLetter":"B","explanation":"Az alaphártya szélessége a csiga csúcsától az alapig változik, különböző frekvenciájú hangok eltérő helyeken deformálják, így a frekvencia helyileg kódolódik."},{"type":"TF","text":"Az emberi hallástartomány 20-20000 Hz közötti, ahol a beszédtartomány 300-3000 Hz között helyezkedik el.","isTrue":true,"explanation":"Az emberi hallás normál tartománya 16-20000 Hz, beszédhez szükséges tartomány 300-3000 Hz közé esik, mely az akusztikus információ nagy részét tartalmazza."},{"type":"MC","text":"A külső fül mely strukturális jellemzője akadályozza meg a víz és más anyagok felgyülemlését a hallójáratban?","options":["A) A fülzsír antibakteriális hatása","B) A hallójárat görbülete","C) A szőrszálak szűrő funkciója","D) A dobhártya rugalmassága"],"correctLetter":"B","explanation":"A hallójárat természetes görbülete meg akadályozza a víz és egyéb anyagok felgyülemlését, mely a hallószerv védelme."},{"type":"MC","text":"A hallócsontocskák mely arányban erősítik meg a hangnyomást a dobhártya és az ovális ablak között?","options":["A) 5:1","B) 10:1","C) 15:1","D) 20:1"],"correctLetter":"D","explanation":"A hallócsontocskák a felületi arány miatt és a mechanikai erősítésnek köszönhetően kb. 20x-ra erősítik meg a hangnyomást."},{"type":"MC","text":"Mely szöveteké az a folyadék - endolympha -, amely a hártyás labirintust tölti ki?","options":["A) A kéreg","B) A csontok közötti tér","C) Az agyi folyadék","D) Az agyvelő"],"correctLetter":"A","explanation":"Az endolympha a hártyás labirintus belsejében helyezkedik el, ellentétben a perilymphával, amely a csontos labirintusban van."},{"type":"TF","text":"A Corti-szerv szőrsejtjei kizárólag az akusztikus információ közvetítésére specializálódtak.","isTrue":false,"explanation":"A szőrsejtek nemcsak a halláshoz, hanem az egyensúlyérzéshez is szükségesek, a belső füléban több típusú szőrsejt szenzor található."},{"type":"MC","text":"Mely szerkezet zárja le a csiga kerek ablakát, amely a perilympha nyomáscsökkentésében játszik szerepet?","options":["A) Az alaphártya","B) A dobcsatorna","C) A fedőlemez","D) A vesztibuláris csatorna"],"correctLetter":"B","explanation":"A kerek ablak a dobcsatornához vezetik, amely a perilympha nyomását felszabadítja és csillapítja a hullámokat."},{"type":"MC","text":"Az alacsony frekvenciájú hangok (mély hangok) a csiga mely részében deformálják az alaphártyát?","options":["A) Az alapján","B) Az közepén","C) A csúcsán","D) A vesztibuláris csatornában"],"correctLetter":"C","explanation":"Az alacsony frekvenciájú hangok a csiga csúcsán deformálják az alaphártyát, a magas frekvenciájúak az alapján."},{"type":"TF","text":"Az otoszklerózis egy olyan fülbetegség, amelyben a kengyel fokozatosan mozgásképtelenné válik.","isTrue":true,"explanation":"Az otoszklerózis középfülbetegség, melyben a kengyel közelében szivacsos anyag halmozódik fel, amely megkeményedik és mozgásképtelenné teszi a csontot."},{"type":"MC","text":"Az presbyacusis (öregedés miatti hallásvesztés) mely frekvenciáknál jelentkezik először?","options":["A) Az alacsony frekvenciáknál (2000 Hz alatt)","B) A magas frekvenciáknál (12000 Hz fölött)","C) Az összes frekvencián egyszerre","D) A beszédtartományban (300-3000 Hz)"],"correctLetter":"B","explanation":"Az öregedéssel a magas frekvenciájú hangok hallása romlik először, 50 év fölött 12000 Hz fölötti hangok nem hallhatók."},{"type":"BLANK","text":"A dobhártyafeszítő-izom és a kengyelizom az erős zajok hatására _____, így csökkentik a túl nagy nyomást az ovális ablaken.","answer":"összehúzódnak","explanation":"Erős zaj hatására az izmocskák összehúzódnak (akusztikus reflex), merevebbé válik a hallócsontlánc, így mérséklődik az ovális ablakon terhelő nyomás."},{"type":"MC","text":"A Wernicke-mező (beszédértő központ) mely agytörzsi területben helyezkedik el?","options":["A) A frontális lebeny inferior gyrusában","B) A temporális lebeny felső részében","C) A nyúltvelőben","D) A talamuszban"],"correctLetter":"B","explanation":"A Wernicke-mező a halántéklebeny felső részében található és a beszédértésért felelős."},{"type":"MC","text":"A hangirány meghatározásának mely mechanizmusa játszik szerepet az oldalsó hangforrások lokalizációjában?","options":["A) Kizárólag az intenzitáskülönbség","B) Az időkülönbség és intenzitáskülönbség","C) A rezgési frekvencia","D) A hallócsontocskák erősítése"],"correctLetter":"B","explanation":"A hangirány meghatározása azon alapul, hogy az oldalsó hangforrás eltérő időpontban és intenzitással éri el a két füléket."},{"type":"MC","text":"Mely receptor típusok találhatók a tömlőcske és a zsákocska szöveteiben?","options":["A) Kizárólag fotoreceptorok","B) Szőrsejtek támasztósejtekkel között mészkristályos kocsonyás burokkal","C) Csak mechanoreceptorok","D) Akusztikus hallóreceptorok"],"correctLetter":"B","explanation":"A tömlőcske és zsákocska szőrsejtjeit kocsonyás burok fedi apró mészkristályokkal, mely a fej helyzetét és egyenes vonalú gyorsulását érzékeli."},{"type":"TF","text":"A félkörös ívjáratok a szöggyorsulásra (fej elfordulási sebességére) reagálnak, nem az egyenes vonalú gyorsulásra.","isTrue":true,"explanation":"A három félkörös ívjárat a fej valamely síkjában történő szöggyorsulásra lépnek ingerületbe, míg a tömlőcske és zsákocska az egyenes vonalú gyorsulást érzékeli."},{"type":"MC","text":"A Bárány-féle kalorikus reakció mely szerv működésének vizsgálatára szolgál?","options":["A) A szaglópályára","B) Az egyensúlyérzésre","C) A látásra","D) Az ízlelésre"],"correctLetter":"B","explanation":"A Bárány-féle kalorikus reakció a fül körüli hőmérséklet-változások által kiváltott szimmetrikus nystagmus a vesztibuláris rendszer tesztelésének módszere."},{"type":"BLANK","text":"Az egyensúlyzás érzékszervei a tömlőcskét, a zsákocskát és az elfordulás síkjaiban helyezkedő _____ nem.","answer":"félkörös ívjáratokat","explanation":"Az egyensúlyérzés három komponensből áll: tömlőcske (statikus állás), zsákocska (statikus állás) és a három félkörös ívjárat (dinamikus mozgások)."},{"type":"MC","text":"Melyik kémiai receptor típus szabályozza a légzést a nyúltvelőben az CO2 (H+-ion) kimutatásával?","options":["A) Szaglóreceptorok","B) Ízlelőbimbók","C) Nyúltvelői CO2/H+-érzékeny kemoreceptorok","D) Bőrreceptorok"],"correctLetter":"C","explanation":"A nyúltvelőben elhelyezkedő kemoreceptorok a szén-dioxid (H+-ion) koncentrációjára reagálnak és a légzés szabályozásáért felelősek."},{"type":"MC","text":"A szaglópályán mely szerkezet képez szinaptikus kapcsolatot az olfactory bulbusban?","options":["A) Az ízlelőbimbó","B) A szaglógumó","C) A bazális ganglia","D) Az agytörzs"],"correctLetter":"B","explanation":"A szaglópálya a szaglóhámban található receptorokból az agyidegből a szaglógumbáig fut, ahol az átkapcsolás történik."},{"type":"TF","text":"A szaglórendszer gyorsan adaptálódik, ezért hosszú időn keresztül azonos szagot kevésbé érzékelünk.","isTrue":true,"explanation":"A szaglórendszer gyorsan adaptálódó rendszer, amely elsősorban a szaglóközpont működési sajátosságának köszönhető."},{"type":"MC","text":"Melyik alapíz keletkezik a nagy Na+-koncentráció hatására?","options":["A) Sós","B) Savanyú","C) Keserű","D) Édes"],"correctLetter":"C","explanation":"A kisebb töltésű kationok (Na+) kis koncentrációban sós ízt okoznak, de nagy koncentrációban (és a Ca2+, Mg2+ ionok) keserű ízt váltanak ki."},{"type":"MC","text":"Az ízlelőbimbók mely életkor körül érik el maximális számát az embernél?","options":["A) A születéskor","B) A 10-15 életév között","C) A 40. életév körül","D) A 60. életév után"],"correctLetter":"C","explanation":"Az ízlelőbimbók száma születéskor viszonylag kevés, utána gyorsan nő, 40. életév tájékán éri el a maximumot, később csökken."},{"type":"BLANK","text":"Az ízlelőbimbók átlagosan _____ nap alatt elpusztulnak és újak lépnek a helyükbe.","answer":"10","explanation":"Az ízlelőbimbók állandóan pusztulnak és újak lépnek a helyükbe, átlagéletkoruk körülbelül 10 nap."},{"type":"MC","text":"Az umami ízét kiváltó mesterséges adalékanyag mely szubsztancia?","options":["A) Nátrium-cián","B) Nátrium-glutamát","C) Kalcium-acetát","D) Magnézium-szulfát"],"correctLetter":"B","explanation":"Az umami ízét a nátrium-glutamát (E 621) és az L-glutamát okozza, mely a paradicsomban és a japán konyhában használt kombu alga összetevője."},{"type":"MC","text":"Az agykamra falánál elhelyezkedő Na+-koncentrációt érzékelő receptorok mely szervmoduláció szerv működésében játszik szerepet?","options":["A) A hallásban","B) A szomjúság és hipotalamikus vazopresszin (ADH) termelésében","C) A szaglásban","D) Az egyensúlyérzésben"],"correctLetter":"B","explanation":"Az agykamra falánál található neuronok Na+-koncentrációt érzékelik, ezek a szomjúságközpont részei, amely az ADH termelést és szomjúságérzetet szabályozzák."},{"type":"TF","text":"A szaglóhámban található receptorok primer szenzorok, saját axonnal rendelkező valódi idegsejtek.","isTrue":true,"explanation":"A szaglóhám receptorai (kb. 1000 fajta) valódi idegsejtek, saját axonnal rendelkeznek, mely a szaglógumóba fut az információ továbbítása céljából."},{"type":"MC","text":"Az ízlelőbimbók mely alapízét váltja ki a H+-ion koncentrációja?","options":["A) Az édes íz","B) A sós íz","C) A savanyú íz","D) Az umami"],"correctLetter":"C","explanation":"A savanyú ízérzet közvetlen függvénye az oldatban lévő H+-ion (proton) koncentrációjának, melyre ízlelőbimbók receptorai reagálnak."},{"type":"MC","text":"Az ADH (vazopresszin) mely hatása játszik szerepet a vérnyomás emelésében?","options":["A) A hőmérséklet csökkentése","B) A vízvisszaszívás növelése és az erek tónusának fokozása","C) A sóleadás csökkentése","D) A vér glükózkoncentrációjának emelése"],"correctLetter":"B","explanation":"Az ADH a vesék gyűjtőcsatornáiban a vízvisszaszívást és az erek tónusát fokozza, mely a vérnyomást emeli és a vízháztartást szabályozza."}],"magatartas":[{"type":"MC","text":"A klasszikus kondicionálás és az operáns kondicionálás közötti alapvető különbség melyik?","options":["A) A klasszikus kondicionálásban az állat aktív szerepet játszik a viselkedés kialakításában","B) Az operáns kondicionálásban a viselkedés következménye befolyásolja a jövőbeli viselkedést","C) A klasszikus kondicionálásban az inger spontán kapcsolódik a válaszhoz","D) Az operáns kondicionálás csak embereknél figyelhető meg"],"correctLetter":"B","explanation":"Az operáns kondicionálásban (Skinner) a megerősítés vagy büntetés módosítja a spontán viselkedést. A klasszikus kondicionálásban (Pavlov) egy semleges inger feltételes ingerré válik."},{"type":"MC","text":"Az LTP (hosszú távú potencírozás) mechanizmusa során az NMDA receptorok aktiválódása milyen ionok beáramlását teszi lehetővé?","options":["A) Nátrium és kálium ionok","B) Kalcium ionok, amelyek erősebb szinaptikus kapcsolatot eredményeznek","C) Klór ionok","D) Magnézium ionok"],"correctLetter":"B","explanation":"Az LTP során az NMDA receptorok megnyílása kalcium ionok beáramlását teszi lehetővé, amely elindítja az AMPA receptorok beépülését és a szinaptikus erősítést. Ez a tanulás sejtszintű alapja."},{"type":"MC","text":"A szenzoros tárak (sensory store) kapacitása és időtartama hogyan jellemzi azokat?","options":["A) Korlátozott kapacitás, hosszú tárolási idő (perc)","B) Végtelen kapacitás, nagyon rövid tárolási idő (másodpercek)","C) Korlátozott kapacitás, rövid tárolási idő","D) Az ikonikus tár tartósabb az echoikus tárnál"],"correctLetter":"B","explanation":"A szenzoros tárak minden információt képesek befogadni, de az ikonikus tár csak 1 másodpercig, az echoikus 2-4 másodpercig őrzi az információt. Sperling kísérlete ezt bizonyította."},{"type":"MC","text":"A Harlow-féle majomkísérlet (szőr- és drótanya) fő következtetése melyik volt?","options":["A) A gyerekeknek legfőképpen táplálkozásra van szükségük","B) Az érintés biztonsága és az érzelmi kötődés alapvetőbb, mint a táplálás","C) A szőr és a drót egyforma hatékonyságú pótanyaként","D) Az állatok nem képeznek érzelmi kötelékeket"],"correctLetter":"B","explanation":"A makákókölykök túlnyomórészt a szőranyánál töltötték az időt még akkor is, amikor a drótanyánál volt az étel. Ez bizonyítja, hogy a biztonságos érzelmi kapcsolat nélkülözhetetlen a harmonikus fejlődéshez."},{"type":"MC","text":"A habituáció és szenzitizáció közötti alapvető különbség hogyan jellemez?","options":["A) A habituáció erős ingerekre, a szenzitizáció gyenge ingerekre hat","B) A habituáció a megismerés elmaradása, a szenzitizáció az erősödő válaszadás","C) A habituáció tanult, a szenzitizáció öröklött","D) Nem létezik közöttük lényeges különbség"],"correctLetter":"B","explanation":"Habituáció során az alany megszokik egy közömbös ingert (pl. fali óra ketyegése). Szenzitizációban az ismételt ingerlés erősebb reagálást vált ki, általában fontos vagy erős ingerek esetén."},{"type":"TF","text":"Az imprinting (bevésődés) egy teljes életre szóló, kitörölhetetlen tanulási forma, amely csak bizonyos kritikus időszakban lehetséges.","isTrue":true,"explanation":"Az imprinting jellemzője, hogy csak bizonyos életkorra jellemző (pl. a beszédtanulás 7 éves korig), és kitörölhetetlen. Azt mutatja, hogy 7 éves korukig nem kerülő kapcsolatba a nyelvvel később sem tudják tökéletesen elsajátítani."},{"type":"TF","text":"Az explicit memória magában foglal epizodikus és szemantikus memóriát, míg az implicit memória a képességek és tevékenységek rögzítésérére szolgál.","isTrue":true,"explanation":"Az LTM (hosszú távú memória) két fő komponense az implicit (képességek, pl. biciklizés) és explicit memória. Az explicit memória két részre tagolódik: szemantikus (általános információk, szavak) és epizodikus (személyes események)."},{"type":"TF","text":"A róvidtávú memória (STM) kapacitása korlátlan, és az információk benne akár több órán keresztül is megmaradhatnak.","isTrue":false,"explanation":"Az STM kapacitása korlátozott, 7±2 elem (Miller törvénye). Az információk ebben maximum 20-30 másodpercig maradnak, hacsak nem ismételgetjük őket. A rövidtávú memória korlátozott kapacitású és időtartamú."},{"type":"TF","text":"Az érzelmi fejlődés és az értelmi fejlődés között szoros kapcsolat áll fenn, az érzelmi biztonság javítja a tanulást és a kognitív teljesítményt.","isTrue":true,"explanation":"Az érzelmi fejlődés segíti az értelmi fejlődést. Az érzelmi biztonság, a stressz csökkentése javítja a koncentrációt és tanulási készséget. A pozitív érzelmek alatt gyorsabban hozunk döntéseket és jobban tanuljuk meg az információkat."},{"type":"BLANK","text":"A tanulás alatt az idegsejtek szintjén megváltozik a _____ hatékonyság, ami új szinaptikus kapcsolatok kialakulásához vezethet.","answer":"szinaptikus","explanation":"A tanulás során az idegsejtek szintjén megváltozik a szinaptikus hatékonyság, új szinapsok kialakulhatnak, vagy már meglévő szinapsok erősödhetnek. Az LTP az ilyen hosszú távú szinaptikus erősítés."},{"type":"BLANK","text":"A _____ az emberi magatartás olyan sajátos formája, amely végigkíséri az embert egész életén, szabadon választott és önmagáért való tevékenység.","answer":"játék","explanation":"A játék önként, szabadon választott, céltalan, vágykielégítő tevékenység, amely alapvető szerepet játszik az értelmi, érzelmi és szociális fejlődésben. A játéknak feszültségcsökkentő és örömszerző szerepe van."},{"type":"BLANK","text":"Az _____ egy viszonylag állandó viselkedésváltozás, amely a gyakorlás és tapasztalatszerzés következtében jelenik meg.","answer":"tanulás","explanation":"A tanulás fogalma: a gyakorlás és/vagy tapasztalatszerzés következtében bekövetkező viszonylag állandó viselkedésváltozás. Ez a folyamat során a memória változásai kialakulnak az idegsejtek szintjén."},{"type":"MC","text":"A pozitív és negatív érzelmek hogyan befolyásolják az információfeldolgozást és emlékezést?","options":["A) A negatív érzelmek gyorsabb döntéshozatalt eredményeznek","B) A pozitív érzelmek alatt gyorsabban hozunk döntéseket, de az erős érzelmeket kiváltó helyzetekről többet gondolkodunk","C) Az érzelmek nem befolyásolják az emlékezeti folyamatokat","D) Csak a negatív érzelmek javítják a hosszú távú memóriából való felidézhetőséget"],"correctLetter":"B","explanation":"A pozitív érzelmek gyorsabb döntéseket eredményeznek. Az erős érzelmeket kiváltó helyzetekről többet gondolkodunk, gyakrabban felidézzük, ami javítja a hosszú távú memóriából való felidézhetőséget."},{"type":"MC","text":"Az emberi viselkedés kialakulásában az evolúciós pszichológia mely állítása helyes?","options":["A) A legtöbb viselkedésünk tudatos pszichológiai válaszok","B) A legtöbb viselkedésünk mögött nem tudatosult pszichológiai adaptáció áll","C) Az evolúciós adaptációk az utolsó 100 évben alakultak ki","D) Az édes és zsíros ételek iránti vonzódás csak megfelelő neveléssel alakul ki"],"correctLetter":"B","explanation":"Az evolúciós pszichológia szerint a legtöbb viselkedésünk, vágyunk és érzésünk mögött nem tudatosult pszichológiai adaptáció áll. Az édes és zsíros ételek iránti vonzódás genetikai adaptáció, amely jobb fizikai kondícióhoz vezetett."},{"type":"MC","text":"A szocializáció és az emberi viselkedés között milyen kapcsolat áll fenn?","options":["A) A szocializáció csak az iskola során történik","B) A szocializáció során az egyén társadalmi lénnyé válik, megtanulja az adott kultúra szokásait és viselkedési mintáit","C) A szocializáció nem befolyásolja az öröklött viselkedési formákat","D) A szocializáció csak az első egy évben lényeges"],"correctLetter":"B","explanation":"A szocializáció az a fejlődési folyamat, amely során az emberek az adott kulturális közegben történő felnövekedése során megtanulják az adott társadalom szokásait, hiedelmeit és viselkedési mintáit."},{"type":"MC","text":"A drogfüggőség operáns kondicionálás alapján magyarázható melyik mechanizmus révén?","options":["A) A pozitív megerősítés során a dopamin felszabadulása jutalmazó hatás","B) Az alapvető reflexek közvetlenül kiváltják a szerhasználatot","C) A klasszikus kondicionálás kizárólag csak alkohollal működik","D) Az érzelmek nem játszanak szerepet a szerhasználatban"],"correctLetter":"A","explanation":"A pszichoaktív szerek fogyasztása azért válik szokássá, mert pozitív megerősítő hatásúak. A limbikus rendszeri jutalmazási központok dopamin felszabadulása az alapja a motivációnak és a jutalomkereső magatartásnak."}],"hormonrendszer":[{"type":"MC","text":"A hormonreceptorok elhelyezkedésének alapján melyik állítás helyes?","options":["A) A peptidhormonok sejten belüli receptorokhoz kötődnek","B) A szteroid hormonok és tiroxin sejten belüli receptorokat használnak, mivel vízben rosszul oldódnak","C) Az összes hormon membránreceptorokhoz kötődik","D) A receptorok típusa nem befolyásolja a hormonhatás típusát"],"correctLetter":"B","explanation":"A vízben rosszul oldódó (apoláris) hormonok - szteroid hormonok (tesztoszteron, kortizol) és tiroxin - receptorai a sejtplazma vagy sejtmag rezervoárjában helyezkednek el. A peptidhormonok membránreceptorokat használnak."},{"type":"MC","text":"Az inzulin és a glukagon közötti antagonista kapcsolat milyen anyagcsere-folyamatra vonatkozik?","options":["A) Fehérje lebontás","B) Szénhidrát-anyagcsere és vércukorszint szabályozása","C) Lipid szintézis","D) Köpeny nyirokcsomó működés"],"correctLetter":"B","explanation":"Az inzulin csökkenti a vércukorszintet (glikogénszintézis, cukorfelhasználás), míg a glukagon emeli azt (glikogén lebontása). Ez az antagonista működés az ország vércukor szintjének dinamikus egyensúlyát biztosítja."},{"type":"MC","text":"Az LTP (hosszú távú potencírozás) során AMPA receptorok beépülése miért erősítik a szinaptikus jelölést?","options":["A) Több glutamát receptort jelent, így nagyobb mennyiségű ionsáv tud átjutni","B) Az NMDA receptorok felváltódnak az AMPA receptorokkal","C) Az AMPA receptorok az NMDA receptorokat gátolják","D) Az AMPA receptorok csökkentik a kalciumáramlást"],"correctLetter":"A","explanation":"Az LTP során az NMDA receptorok aktiválódásakor beáramló kalcium elindítja az AMPA receptorok beépülését a posztszinaptikus membránba. Ez nagyobb szinaptikus áramot eredményez az axonvégződés aktiválódásakor."},{"type":"MC","text":"A kortizol (mellékvesekéreg-hormon) milyen típusú receptor-mediált jelölésen keresztül fejti ki hatását?","options":["A) Membránreceptoron keresztüli cAMP aktiváció","B) Sejten belüli citoplazmatikus receptor, amely transzkripciós faktorként működik","C) Csak kirekesztő hatás az idegrendszerre","D) Közvetlen enzimatikus aktiváció"],"correctLetter":"B","explanation":"A kortizol sejten belüli receptorhoz (GR) kötődik, majd a receptor-hormon komplex transzkripciós faktorként a DNS-hez kapcsolódik, amely gén aktiválódást indít. Ez szteroid hormonok működésének tipikus mechanizmusa."},{"type":"MC","text":"Az ADH (vazopresszin) mely folyamatok szabályozásáért felelős?","options":["A) Csupán vérhőmérséklet-szabályozás","B) Vízháztartás és vérnyomás szabályozása aquaporin fehérjék útján","C) Glükozanyagcsere","D) Nemi hormon termelés"],"correctLetter":"B","explanation":"Az ADH a vese gyűjtőcsöveiben fokozza a víz passzív visszaszívását (antidiuretikus hatás), ami csökkenti a vizelet mennyiségét. Nagyobb koncentrációban az ereket is szűkíti, emeléve a vérnyomást (vazopresszin)."},{"type":"TF","text":"A negatív visszacsatolás a hormonális rendszerben a szabályozórendszert stabilizálja, egy dinamikus egyensúlyt fenntartva.","isTrue":true,"explanation":"A negatív visszacsatolás során a rendszerből kilépő hatások csökkentik a folyamatok mértékét (növekedésre csökkentés, csökkenésre növelés). Ez stabilizálja a rendszert és a belső környezet állandóságát (homeosztázist) biztosítja."},{"type":"TF","text":"Az inzulin egy szteroid hormon, amelyet a hasnyálmirigy béta sejtjei termelnek.","isTrue":false,"explanation":"Az inzulin egy peptid hormon (polipeptid), amelyet a hasnyálmirigy béta (B) sejtjei termelnek. A szteroid hormonok közé a mellékvesekéreg hormonjai (kortizol) és a nemi hormonok (tesztoszteron, ösztrogén) tartoznak."},{"type":"TF","text":"A pajzsmirigy tiroxin termelésének szabályozása negatív visszacsatoláson alapul, ahol a magasabb T4 szint gátolja a TSH elválasztást.","isTrue":true,"explanation":"A pajzsmirigy TSH (pajzsmirigyserkentő hormon) által szabályozott. A tiroxin (T4) szintjének emelkedésének hatására a negatív visszacsatolás csökkenti a TSH elválasztást. Ha T4 alacsony, TSH szint nő."},{"type":"TF","text":"Az oxitocin az agyi elválasztású sejtekből származik és szülés alatt valamint a szoptatás közben játszik lényeges szerepet.","isTrue":true,"explanation":"Az oxitocin a hipotalamusz nagysejtes állományában termelődik és az agyalapi mirigy hátulsó lebenyén keresztül szabadul fel. A szoptatás során az emlőbimbó ingerlése oxitocin felszabadulást vált ki, amely a tej kiürülését teszi lehetővé."},{"type":"BLANK","text":"A hasnyálmirigy _____ sejtjei az inzulint termelik és bocsátják ki a vérbe.","answer":"B-sejtek (béta-sejtek)","explanation":"A Langerhans-szigetek béta-sejtjei termelik az inzulint, amelynek legfőbb szerepe a vércukor csökkentése. Az alfa-sejtek glukagont, a delta-sejtek szomatosztatint termelnek."},{"type":"BLANK","text":"A hormonok vérben általában _____ -hoz kötve szállítódnak, így lassabban bomlanak le és kevésbé ürülnek ki a vesén keresztül.","answer":"fehérjékhez","explanation":"A hormonok általában szállítófehérjékhez (carrier proteins) kötve szállítódnak a vérben. Ez lassítja a lebomlásuk sebességét és csökkenti a vesén keresztüli kiürülésüket, ezáltal hosszabb ideig maradnak az áramlásban."},{"type":"BLANK","text":"Az agyalapi mirigy _____ lebenye idegsejtetből áll, és hormonokat raktároz és szabadít fel, nem pedig szintetizálja azokat.","answer":"hátulsó","explanation":"Az agyalapi mirigy hátulsó lebenye (neurohipofízis) idegsejtetből összeálló szerv. A hormonok (ADH, oxitocin) a hipotalamuszban szintetizálódnak és a hipofízisnyélen keresztül a hátulsó lebenyhez jutnak, ahol raktározódnak és felszabadulnak."},{"type":"MC","text":"A növekedési hormon (STH, GH) mely hatása alapozza meg az óriásnövekedés kialakulását?","options":["A) Direkt gén aktiválás az összes sejtben","B) Az IGF-1 közvetítésével a porcsejtek osztódásának serkentése és csont hosszabb-/szélességi növekedés","C) A tirokszin szintézis fokozása","D) Az inzulin szintézis gátlása"],"correctLetter":"B","explanation":"A növekedési hormon az IGF-1 (inzulinszerű növekedési faktor) közvetítésével fejti ki növekedésre gyakorolt hatását. Az IGF-1
