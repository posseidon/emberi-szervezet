karbonátionként?","options":["A) Passzív diffúzió és enzimaktivitás","B) Aktív transzport","C) Endocitózis","D) Receptor-mediált transzport"],"correctLetter":"A","explanation":"A szén-dioxid az érythrocitákban karboanidráz enzim segítségével bikarbonátionná alakul."},{"type":"MC","text":"Mi az alveoláris nyomás és a légköri nyomás közötti eltérés hatása?","options":["A) Meghatározza a szén-dioxid szintjét","B) Levegő beáramlásának irányát és sebességét biztosítja","C) Nem befolyásolja a légzést","D) Csak a kilégzésben van szerepe"],"correctLetter":"B","explanation":"A nyomáskülönbség hajtóereje a légbeáramlásnak és a kilégzésnek."},{"type":"BLANK","text":"Az orrüreg rövid, párosított csatornák által összeköttetésben van a paranaális _____ -ekkel.","answer":"sinusokkal","explanation":"A paranaális sinusok az orrüreg melletti csontüreg, amelyek nyákot termelnek és rezonanciaként működnek."},{"type":"BLANK","text":"A garat három részre tagolható: nazofarynx, _____, és larynofarynx.","answer":"orofarynx","explanation":"Az orofarynx (szájfaring) a szájüregből nyílik és a garat középső szakasza."},{"type":"BLANK","text":"A gége (larynx) alatt helyezkedik el a _____, amely csöncsörmintázatú csontgyűrűkből áll.","answer":"légcső (trachea)","explanation":"A légcső csöncsörmintázatú csontgyűrűkből áll, amelyek biztosítják szerkezetét és nyitottságát."},{"type":"BLANK","text":"A tüdő főhörgöi az _____ jobb és bal ágára osztódnak.","answer":"hörgőkre","explanation":"A főhörgök (bronchi) a légcsőből oszlanak fel jobb és bal hörgőkre, amelyek a tüdőbe jutnak."},{"type":"BLANK","text":"A mellüreg falát a _____ nevű csontos és izomváz támasztja meg.","answer":"mellkas","explanation":"A mellkas (thorax) csontjai és izmai védik a szerveket és részt vesznek a légzésben."},{"type":"BLANK","text":"Az alveolusok egyrétegű _____ -mal borítottak, amely ultraszűrést tesz lehetővé.","answer":"laphámsejtek (endotél)","explanation":"Az alveolusok egysejtű laphámbórítása lehetővé teszi a gázok gyors diffúzióját."},{"type":"BLANK","text":"A tüdőt körülvevő kétréteges hártya a _____, amely csökkenti a súrlódást.","answer":"mellhártya","explanation":"A mellhártya (pleura) két rétege közötti folyadék csökkenti a súrlódást a légzési mozgások során."},{"type":"BLANK","text":"Az intrapleurális nyomás nyugalmi állapotban _____ Hgmm (negatív), amely biztosítja a tüdő expandálódását.","answer":"-5 (körülbelül)","explanation":"Az intrapleurális nyomás körülbelül -5 Hgmm, amely a mellpleurát a tüdőhöz húzza."},{"type":"BLANK","text":"A legátszűrődő levegő mennyisége az egy percben kilégzett levegő térfogata, az _____.","answer":"kilégzési térfogat","explanation":"A kilégzési térfogat körülbelül 500 ml, az egy felszívott-kilélegzett levegő mennyisége."},{"type":"BLANK","text":"A hemoglobin által szállított oxigén mennyisége és az O₂ parciális nyomásának kapcsolatát a _____ görbe írja le.","answer":"oxihemoglobin-disszociációs","explanation":"Ez a görbe S-alakú, amely az oxigen progresszív kötéséről és felszabadulásáról információt ad."},{"type":"BLANK","text":"Az oxigén a hemoglobin _____ csoportjához kötödik.","answer":"hém (vastartalmazó)","explanation":"A hemoglobin négy hém-csoportja képes oxigénhez kötödni, az egyik molekulának pedig 4 O₂-molekula köthető meg."},{"type":"BLANK","text":"A szén-dioxid az emlősök véréből a _____ formájában szállítódik el, amely a szözetekben képződik.","answer":"bikarbónátionként (HCO3-)","explanation":"Az eritrocitákban a szén-dioxid és víz börtönöz szénsavvá alakul, amely disszociál HCO3--ra és H+-ra."},{"type":"BLANK","text":"A szén-dioxid diffúziójában az eritrocitákban a _____ enzim katalizálja a szénsav képzését.","answer":"karboanidráz (szénhidráz)","explanation":"Ez az enzim az 1000-szeresére felgyorsítja a szén-dioxid és víz közötti kémiai reakciót."},{"type":"BLANK","text":"A szövetekben megnőtt szén-dioxid-szint és megnövekedett laktát csökkentik a vér pH-ját, az agyban ezt a _____ érzékeli.","answer":"kemoreceptor","explanation":"A nyúltvelőben lévő kemoreceptorok az artériás vér O₂, CO₂ és pH szintjét érzékelik."},{"type":"BLANK","text":"A periférikus kemoreceptorok a _____ és a _____ falában helyezkednek el.","answer":"karóid artéria, aorta","explanation":"A karóid-test és az aortív test periférikus kemoreceptorai az O₂, CO₂ és pH szintjét érzékelik."},{"type":"MC","text":"Melyik szerv működésének eredménye a karbaminohemoglobin?","options":["A) A tüdő szén-dioxid-felszabadítása","B) A hemoglobin szén-dioxidához kötődése a szövetekben","C) Az oxigen felszabadulása az alveolusokban","D) Az eritrocita sérülése"],"correctLetter":"B","explanation":"A karbaminohemoglobin az a molekula, amely szén-dioxidot szállít a szövetekből a tüdőhöz."},{"type":"MC","text":"Mi az extrém magasságban a hipoxia megelőzésére alkalmazott élettani alkalmazkodás?","options":["A) Az alveoláris nyomás fokozódása","B) Az eritrocita-termelés fokozódása (erytropoetin hatása)","C) A hemoglobin-affinitás csökkenése","D) A szén-dioxid felszívódása"],"correctLetter":"B","explanation":"Az alacsony oxigennyomáson a vese több erytropoetin-t termel, amely fokozza a vörösvértest-képződést."},{"type":"MC","text":"Melyik folyamat biztosítja az intenzív légzésközéppontok kontrolját?","options":["A) Csak az oxigenszint","B) A pH-szint és a szén-dioxid-szint kombinációja","C) Csak a szén-dioxid-szint","D) Az alveoláris térfogat"],"correctLetter":"B","explanation":"A nyúltvelő az artériás vér pH-ját és CO₂-szintjét monitorozza a légzés szabályozásához."},{"type":"BLANK","text":"A _____ a tüdőkben az ő-nyomás csökkenésének eredménye alatt nyílnak fel légzéskor.","answer":"alveolusok","explanation":"Az intrapleurális nyomás csökkenésével az alveolusok nyílnak fel és teleszívódnak levegővel."},{"type":"BLANK","text":"A vitális kapacitásból levonva az inspirációs és exspirációs tartalékmennyiséget kapjuk meg az _____.","answer":"kilégzési térfogat","explanation":"A megmérhető vitális kapacitásból levonjuk az IRV és ERV értékeit, marad az adott tidal volume."}],"anyagszallitas":[{"type":"MC","text":"Mi a hemoglobin hem-csoportjának központi ionja normál állapotban?","options":["A) Fe³⁺ (ferri-vas)","B) Fe²⁺ (ferro-vas)","C) Fe⁰ (elemi vas)","D) Fe⁴⁺ (ferryl-vas)"],"correctLetter":"B","explanation":"A hemoglobin csak ferro-vassal (Fe²⁺) képes oxigént megkötni. Ha a vas Fe³⁺-tá oxidálódik, methemoglobin keletkezik, amely nem köt O₂-t."},{"type":"MC","text":"A vér alakos elemeinek térfogat-százalékos arányát milyen szakszóval nevezzük?","options":["A) Hematokrit","B) Hemoglobintartalom","C) Leukocita-szám","D) Plazmavlozat"],"correctLetter":"A","explanation":"A hematokrit a vér térfogatának azt a százalékát adja meg, amelyet a sejtes alkotóelemek (alakos elemek) képeznek."},{"type":"MC","text":"A vérplazmában oldott mely fehérje hozza létre az optimális ozmotikus nyomást és szállít vízben rosszul oldódó anyagokat?","options":["A) Fibrinogén","B) Albumin","C) Globulin","D) Protrombin"],"correctLetter":"B","explanation":"Az albuminok az összes plazmafehérje körülbelül 60%-át adják, és transzportfehérjéként működnek, valamint az ozmotikus nyomás kialakításában is szerepet játszanak."},{"type":"MC","text":"A vörösvérsejtek szárazanyagának hány százalékát teszi ki a hemoglobin?","options":["A) 50%","B) 70%","C) 95%","D) 100%"],"correctLetter":"C","explanation":"A vörösvérsejtek szárazanyagának 95%-át a hemoglobin tölti ki, amely az oxigénszállítás központi eleme."},{"type":"MC","text":"Mely sejtes elemeket nevezzük multipotens őssejtknek, amelyekből a vérsejtek képződnek?","options":["A) Monocitákat","B) Limfocitákat","C) Olyan differenciálatlan sejteket, amelyekből különféle vérsejt-vonalak keletkeznek","D) Granulocitákat"],"correctLetter":"C","explanation":"A multipotens őssejteknek korlátlan osztódóképességük van, és a vér alakos elemeinek előállításához szükséges differenciálódási folyamatokon mennek keresztül."},{"type":"MC","text":"A szövetekben keletkező szén-dioxid szállítása során mely folyamatok játszanak szerepet?","options":["A) Csak a hemoglobin szállítja a CO₂-t","B) A CO₂ hidrát formában diffundál, majd enzim segítségével szénsavvá alakul a vörösvérsejtben","C) A CO₂ közvetlenül az aortában kerül a tüdőbe","D) A CO₂ kalciumionokhoz kötődik"],"correctLetter":"B","explanation":"A szövetekből keletkezett CO₂ szövetfolyadékban hidrát formában oldódik, majd a vörösvérsejtbe diffundál, ahol egy enzim segítségével szénsavvá alakul."},{"type":"MC","text":"Melyik puffer-rendszer tekinthető a vér pH-szabályozásának legfontosabb mechanizmusának?","options":["A) Bikarbonát puffer-rendszer","B) Plazmafehérje puffer-rendszer","C) Hemoglobin puffer-rendszer","D) Foszfát puffer-rendszer"],"correctLetter":"A","explanation":"A bikarbonát puffer-rendszer H+ + HCO₃⁻ = H₂CO₃ = CO₂ + H₂O formájában működik és kulcsfontosságú a vér pH-jának fenntartásában."},{"type":"MC","text":"A fehérvérsejtek melyik típusa tagadja el a kórokozókat fagocitózis révén?","options":["A) Thrombociták","B) Granulociták","C) T limfociták","D) Érythrocyták"],"correctLetter":"B","explanation":"A granulociták (különösen a neutrofilek) amőboid mozgásra képesek, kemotaxissal a fertőzés helyére vándorolnak, és fagocitózis révén elpusztítják a kórokozókat."},{"type":"MC","text":"Mely szerv termeli az albumint a vérplazmában?","options":["A) Csontvelő","B) Máj","C) Vese","D) Lép"],"correctLetter":"B","explanation":"Az albuminok egyszerű fehérjék, amelyeket a máj termel és az összes plazmafehérje körülbelül 60%-át adják."},{"type":"MC","text":"A véralvadás külső útját (extrinsic) melyik esemény indítja meg?","options":["A) Az érfal sérülése és a kollagénrostok megjelenése","B) A vér érintkezése az érfal külső sejtjeinek membránján lévő szöveti faktorral","C) A kalciumionok felszaporodása","D) A trombociták aktiválása"],"correctLetter":"B","explanation":"A külső út az sérülés helyén a vér érintkezésével az érfal külső sejtjeinek szöveti faktorával indul meg, amely a VII. faktort aktiválja."},{"type":"MC","text":"Mely vitamin szükséges a protrombin máj által történő szintéziséhez?","options":["A) A-vitamin","B) C-vitamin","C) K-vitamin","D) B12-vitamin"],"correctLetter":"C","explanation":"A K-vitamin elengedhetetlen a normális véralvadáshoz, mivel a protrombin szintéziséhez szükséges. Hiánya vérzékenységhez vezethet."},{"type":"MC","text":"A véralvadási folyamat mely szakaszában keletkezik a vérszérum (vérsavó)?","options":["A) Az érösszehúzódás során","B) A vérlemezke fázis alatt","C) A fibrinolízis alatt","D) A sérülés helyén szűrődő folyadékként"],"correctLetter":"D","explanation":"A vérszérum a vérlepényen át szűrődő sárgás áttetsző folyadék, amely fibrinogén mentes vérplazma."},{"type":"MC","text":"Az örökletes vérzékenység (hemofília) mely enzim/faktor hiányára vezethető vissza?","options":["A) Fibrinogén hiánya","B) A VIII. vagy IX. véralvadási faktor hiánya","C) Kalcium hiánya","D) Szöveti faktor hiánya"],"correctLetter":"B","explanation":"A hemofília az X-kromoszómához kötött örökletes betegség, amely a VIII. (A típus) vagy IX. (B típus) véralvadási faktor hiányára vezethet."},{"type":"MC","text":"Mely vörösvérsejt rendellenesség okozza, hogy a hemoglobin béta-láncainak szintézise zavart szenved?","options":["A) Thalassemia","B) Sarlósejtes vérszegénység","C) Hemofília","D) Leukémia"],"correctLetter":"A","explanation":"A béta-thalassemia a vörösvértestek betegsége, amelyben a hemoglobin béta-láncainak szintézise zavart szenved, így a sejtek feloldódnak."},{"type":"MC","text":"Az NK sejtek (Natural Killer sejtek) funkcióját tekintve mely folyamatban játszanak szerepet?","options":["A) Szerzett humorális immunválaszban","B) A szerzett sejtes immunválaszban","C) A veleszületett (természetes) immunitásban","D) A véralvadásban"],"correctLetter":"C","explanation":"Az NK sejtek a veleszületett immunitás részét képezik, és közvetlenül az idegen vagy sérült sejteket támadják meg anélkül, hogy előzetes aktivációra szorulnának."},{"type":"MC","text":"A T limfociták érésének mely szerv a helyszíne?","options":["A) Vörös csontvelő","B) Csecsemőmirigy (tímusz)","C) Lép","D) Nyirokcsomók"],"correctLetter":"B","explanation":"A T limfociták a vörös csontvelőben keletkeznek, de a csecsemőmirigyben (tímuszban) fejezik be érésüket és antigén-felismerési képességüket."},{"type":"MC","text":"A monociták szövetekbe való átlépése után milyen sejtekké alakulnak?","options":["A) Granulocitákká","B) Limfocitákká","C) Makrofágokká","D) Thrombocitákká"],"correctLetter":"C","explanation":"A monociták nagyméretű fagocitáló sejtek, amelyek átlépve a hajszálerek falán a szövetekben makrofágokká alakulnak és antigénbemutatási funkciókat végeznek."},{"type":"MC","text":"Az ABO vércsoportrendszer szempontjából egy „O\" vércsoportú személy vérsejtjein mely antigének hiányoznak?","options":["A) Az A és B antigén is hiányzik","B) Csak az A antigén hiányzik","C) Csak a B antigén hiányzik","D) Sem az A, sem a B antigén nem hiányzik"],"correctLetter":"A","explanation":"A „0\" vércsoportú emberek vörösvérsejt-membránjában sem az A, sem a B antigén nem található meg."},{"type":"MC","text":"Egy Rh-negatív anya milyen helyzet során keletkezhet az Rh-összeférhetetlenség?","options":["A) Az első terhesség során","B) Csak a második terhesség során","C) A második és a későbbi terhességek során","D) A harmadik és későbbi terhességek során"],"correctLetter":"C","explanation":"Az Rh-negatív anya az első Rh-pozitív magzattal szemben még nem termel elég anti-Rh-antitestet, de a második és későbbi Rh-pozitív terhességekben már Rh-összeférhetetlenség alakulhat ki."},{"type":"MC","text":"Melyik vércsoportú személy adhat vért bármely másik vércsoportú személynek vészes szükség esetén?","options":["A) Az A vércsoportú","B) A B vércsoportú","C) Az AB vércsoportú","D) A 0 vércsoportú"],"correctLetter":"D","explanation":"A 0 vércsoportú emberek univerzális adók, mivel vörösvérsejtjeiken sem A, sem B antigén nem található, így nem váltanak ki immun válaszreakciót más vércsoportú személyekben."},{"type":"MC","text":"A szív melyik rétegét szerkezeti erősségéhez és simaizomtartalmához képest vastag falúnak nevezzük?","options":["A) A szívburkot","B) A szívbelhártyát","C) A szívizomzatot (miocardiumot)","D) Az endocardiumot"],"correctLetter":"C","explanation":"A szívizomzat a szív vastag középső rétege, amely az agy szívizom összehúzódásáért felelős, és simaizomsejtekből áll."},{"type":"MC","text":"A szívet tápláló koszorúerek mely érből erednek?","options":["A) Az aortából","B) A tüdőartériából","C) Az alsó testvénából","D) A felsőérvénából"],"correctLetter":"A","explanation":"A koszorúerek az aorta kezdetén erednek, behálózzák a szívet, és a szívizomzat megfelelő vérellátásáért felelősek."},{"type":"MC","text":"A szív falát függőlegesen két részre osztó szerkezetet miként nevezzük?","options":["A) Szeptumnak","B) Billentyűnek","C) Válaszfalnak (szeptumnak)","D) Harántlapnak"],"correctLetter":"A","explanation":"A szepulum (válaszfal) függőleges falazat, amely a szív jobb és baloldali részét választja el egymástól."},{"type":"MC","text":"A magzat keringésében az aortát a tüdőartériával összekötő vezetéket miként hívjuk?","options":["A) Foramen ovale","B) Botallo-vezeték (ductus arteriosus)","C) Köldökvér","D) Umbilicalis artéria"],"correctLetter":"B","explanation":"A Botallo-vezeték az aortát a tüdőartériával köti össze a magzatban, és születéskor elzárul, mivel a tüdő működésbe lép."},{"type":"MC","text":"A szív mely kamrájának fala jóval vastagabb, és miért?","options":["A) A jobb kamrá, mert a nagyvérkört ellátja","B) A bal kamrá, mert a nagyvérkört ellátja","C) A jobb kamrá, mert a kisvérkört ellátja","D) A bal kamrá, mert a kisvérkört ellátja"],"correctLetter":"B","explanation":"A bal kamra fala jóval vastagabb a jobb kamráénál, mivel a bal kamra fejti ki a nagyobb munkát a nagyvérkör kialakításához."},{"type":"MC","text":"A szív zsebes billentyűi mely helyen találhatók?","options":["A) A pitvarok és kamrák között","B) A kamrák és az artériák között","C) Az artériákban és a venulákban","D) A vénákban és a pitvarok között"],"correctLetter":"B","explanation":"A zsebes billentyűk a kamrák és az artériák határán találhatók, és megakadályozzák a vér visszaáramlását a kamrákba."},{"type":"MC","text":"A szívciklus melyik fázisában kerül a vér a pitvarokból a kamrákba?","options":["A) A pitvar szisztolé során","B) Az izovolumetriás kamrai kontrakció során","C) A kamrai vér kiáramlás során","D) Az izovolumetriás kamrai elernyedés során"],"correctLetter":"A","explanation":"A pitvar szisztolé során a pitvar összehúzódik, és nyomása megemelkedik, így a vitorlás billentyűk megnyílnak, és a vér a kamrákba áramlik."},{"type":"MC","text":"Az egy szívösszehúzódás alatt kipumpált vér mennyiségét miként nevezzük?","options":["A) Perctérfogat","B) Pulzustérfogat (verőtérfogat)","C) Érfallal keringő vér","D) Artériás nyomás"],"correctLetter":"B","explanation":"A pulzustérfogat vagy verőtérfogat az egy szívösszehúzódás alatt kipumpált vér mennyisége, amely felnőtteknél nyugalomban körülbelül 60-80 ml."},{"type":"MC","text":"A gerincesek keringési rendszere mely típusúnak tekinthető az ér struktúrája alapján?","options":["A) Nyílt keringési rendszer","B) Félig nyílt keringési rendszer","C) Zárt keringési rendszer","D) Félzárt keringési rendszer"],"correctLetter":"C","explanation":"A gerincesek (így az ember is) zárt keringési rendszerrel rendelkeznek, ahol a vér a vérerekbe kerül és nem közvetlenül a szövetekbe."},{"type":"MC","text":"Az artériák falát mely típusú sejtek alkotják elsősorban?","options":["A) Zsírszövet","B) Simaizom és rugalmas rost","C) Szövetmag és mitokondrium","D) Vörösvértestek"],"correctLetter":"B","explanation":"Az artériák középső rétege simaizomból épül fel, amelyet rugalmas rostok támogatnak, ami rugalmasságot biztosít."},{"type":"MC","text":"A vénák falában mely réteg sokkal kevesebb simaizmot tartalmaz az artériákhoz képest?","options":["A) A külső réteg","B) A középső réteg","C) A belső réteg","D) Az adventitia"],"correctLetter":"B","explanation":"A vénák fala vékonyabb, mivel a középső réteg sokkal kevesebb simaizmot tartalmaz, ami nagyobb tágulékonyságot eredményez."},{"type":"MC","text":"A kapillárisok fala mely sejtekből áll?","options":["A) Simaizom és rugalmas rost","B) Egyrétegű laphámsejtek és alaphártya","C) Vörösvértestek és fehérvérsejtek","D) Kollagén és elastin"],"correctLetter":"B","explanation":"A kapillárisok igen vékony falúak, csak egyrétegű laphámsejtek és alaphártya alkotja őket, amely anyagcserét könnyít."},{"type":"MC","text":"Az intenzíven működő szövetekben, ahol magasabb az oxigénigény, mely típusú kapillárisok felé áramlik a vér?","options":["A) Az artéria-véna kapillárisok felé","B) A valódi kapillárisok felé","C) A szinuszoid kapillárisok felé","D) Az ablakos kapillárisok felé"],"correctLetter":"B","explanation":"Az élénk anyagcseréjű szövetekben a vér a valódi kapillárisok felé áramlik, ahol az anyagcsere a legintenzívebb."},{"type":"MC","text":"A szisztolés vérnyomás melyik réteg működésé az eredménye?","options":["A) A jobb pitvar szisztolé","B) A jobb kamra szisztolé","C) A bal pitvar szisztolé","D) A bal kamra szisztolé"],"correctLetter":"D","explanation":"A szisztolés vérnyomás (körülbelül 120 Hgmm) a bal kamra összehúzódásának eredménye, amely az aorta falára gyakorolt nyomás."},{"type":"MC","text":"Az arteriolák mely funkció miatt a legfontosabb a keringési rendszerben az anyagcsere szempontjából?","options":["A) A vér lepumpálása","B) A legnagyobb áramlási ellenállást képviselik","C) Az oxigén szállítása","D) A vér tárrolása"],"correctLetter":"B","explanation":"Az arteriolák (rezisztenciaerek) képviselik a keringési rendszer legnagyobb áramlási ellenállását, ahol a vérnyomás jelentősen csökken."},{"type":"MC","text":"A pulzus (vérnyomáshullám) mely érségben érzékelhető a legjellegzetesebben?","options":["A) A mélyvénákban","B) A kapillárisok területén","C) A nagyvérkör nagy, közép és kis artériáin","D) Az arteriolákban"],"correctLetter":"C","explanation":"A pulzushullám az artériák falán végigterjedő nyomás- és térfogatváltozás, amely leginkább a nagyvérkör artériáin érzékelhető."},{"type":"MC","text":"A pitvar-kamrai csomó (AV-csomó) milyen funkciót tölt be a szívingerületvezetésben?","options":["A) Az elsődleges ingerképző központ","B) Másodlagos ingerképző központ, amely késleltetést okoz az impulzus átadásban","C) A szívizomsejtek depolarizációjáért felelős","D) A billentyűk záródásáért felelős"],"correctLetter":"B","explanation":"Az AV-csomó késleltetett vezetést biztosít, amely időt ad a pitvaroknak az összehúzódásra, mielőtt az impulzus a kamrákba menne."},{"type":"MC","text":"Az EKG-n mely intervallum mutatja meg az átvezetési időt a pitvar és kamra között?","options":["A) P-hullám","B) P-Q intervallum","C) QRS-komplexum","D) ST-szakasz"],"correctLetter":"B","explanation":"A P-Q távolság az átvezetési időt mutatja az ingerület pitvari és kamrai részei között."},{"type":"BLANK","text":"Az emberi vér normál pH-értéke _____ körüli, amelyet puffer-rendszerek és a vesék tartanak fenn.","answer":"7,38–7,42","explanation":"A vér pH-jának enyhe lúgossága (7,38–7,42) elengedhetetlen az enzimek és fehérjék normál működéséhez."},{"type":"BLANK","text":"Az oxygen-szállítás Bohr-effektusa azt jelenti, hogy minél _____ a vér, annál kevésbé kötődik az oxigén a hemoglobinhoz.","answer":"savasabb","explanation":"A Bohr-effektus értelmében a szövetekben keletkezett szén-dioxid savas kémhatást okoz, amely elősegíti, hogy a hemoglobin könnyebben adja le az oxigént."},{"type":"BLANK","text":"A véralvadás kaszkádrendszerében összesen _____ féle véralvadási faktor vesz részt, amelyeket római számokkal jelzünk.","answer":"13","explanation":"A véralvadási rendszer 13 féle faktorból áll, amelyek láncreak ció szerűen aktiválják egymást a fibrin keletkezéséig."},{"type":"BLANK","text":"A trombin enzim funkcióját tekintve az oldott _____ ből lehasít egy oligopeptidet, így létrehozva a polimerizálódó fibrint.","answer":"fibrinogénből","explanation":"A trombin egy serin-proteáz enzim, amely a fibrinogén molekuláit hasítja, hogy fibrin monomerekké alakítsa, amelyek polimerizálódnak."},{"type":"BLANK","text":"A fibrin lebontásáért főként a _____ nevű enzim a felelős, amely a fibrinolízis folyamán több darabra hasítja a fibrint.","answer":"plazmin","explanation":"A plazmin a fibrin megjelenésére aktiválódik, és felelős a vérrög lebontásáért az ún. fibrinolízis során."},{"type":"BLANK","text":"A B limfociták által termelt _____ molekulák az immunitásban antitestekként működnek, és immunoglobulinoknak is nevezzük őket.","answer":"gamma-globulinok","explanation":"A gamma-globulinok az ún. immunoglobulinok, amelyeket a B limfociták termelnek az immunitás során."},{"type":"BLANK","text":"A makrofágok az immunitásban _____ sejtekként működnek, mivel bizonyos T-limfociták számára teszik lehetővé az idegen anyagok felismerését.","answer":"antigénbemutató","explanation":"A makrofágok a sejtes immunitás legfontosabb elemei, mivel az antigéneket feldolgozzák és bemutatják a T-limfocitáknak."},{"type":"BLANK","text":"Az Rh-pozitív vércsoportú személyek vörösvérsejtjein a _____ antigén található meg, amely Rh-összeférhetetlenséget okozhat.","answer":"Rh-antigén (D-antigén)","explanation":"Az Rh-pozitív vércsoportú embereknek az Rh-antigén (D-antigén) megtalálható a vörösvérsejt-membránjukon."},{"type":"BLANK","text":"A szívburok (pericardium) kétrétegű savós hártya, amelynek két lemeze között _____ folyadékkal töltött szívburoküreg található.","answer":"súrlódáscsökkentő savós","explanation":"A szívburok két lemeze között szívburoküreg van, amely súrlódáscsökkentő savós folyadékkal töltött."},{"type":"BLANK","text":"A szívinfarktus (szívizominfarktus) akkor alakulhat ki, amikor a koszorúerek elzáródnak, amely _____ a szívizomzat elhalásához vezethet.","answer":"csökkenti a szívizom vérellátását","explanation":"A koszorúerek elzáródása csökkenti a szívizom vérellátását, ami az oxigénhiány miatt a szívizomzat elhalásához (infarktusához) vezethet."},{"type":"BLANK","text":"Az embrionális fejlődés során a magzat szívében a bal pitvar felé nyíló _____ végül a születés után bezáródik és eltűnik.","answer":"foramen ovale","explanation":"A foramen ovale az embrionális szívben a két pitvar között nyílás, amely a születés után bezáródik, amikor a kisvérkör megkezdi működését."},{"type":"BLANK","text":"A vitorlás billentyűkhez a kamra felből _____ kapcsolódnak, amelyek a kamraterület falából kiinduló szemölcsizmokról erednek.","answer":"ínhúrok","explanation":"Az ínhúrok (chordae tendineae) a vitorlás billentyűkhez kapcsolódnak, és megakadályozzák, hogy a billentyűk túlmozduljanak."},{"type":"BLANK","text":"Az első szívhang tompa, mély hangját az _____ billentyűk záródása okozza.","answer":"vitorlás","explanation":"Az első szívhang az izovolumetriás összehúzódás során a vitorlás billentyűk becsapódásábó keletkezik."},{"type":"BLANK","text":"A szívfrekvencia nyugalmi állapotban egy felnőttnél átlagosan _____ / percet jelent.","answer":"72","explanation":"A nyugalmi szívfrekvencia egy egészséges felnőttnél körülbelül 72 ütés/perc."},{"type":"BLANK","text":"A perctérfogat kiszámításához a pulzustérfogat értékét meg kell _____ a szívfrekvenciával.","answer":"szorozni","explanation":"A perctérfogat = pulzustérfogat × szívfrekvencia képlettel számítható ki, amely nyugalomban körülbelül 5000 ml."},{"type":"BLANK","text":"Az artériák falának rugalmassága lehetővé teszi az ún. _____ funkciót, amely a szívből jövő lökéshullámokat mérsékel.","answer":"szélkazán","explanation":"A szélkazán funkció az artériák rugalmas falának azon tulajdonsága, hogy a szív lökéseit felhasználva a vért folyamatosan szállítja."},{"type":"BLANK","text":"A vénás vér visszaáramlását a vázizmok ritmikus összmehúzódása elősegíti, ezt az _____ hatásnak nevezzük.","answer":"izompumpa","explanation":"Az izompumpa az a mechanizmus, amellyel a vázizmok összehúzódásakor a bennük átmenő vénákat összenyomják, és a billentyűk révén a vér csak a szív irányába halad."},{"type":"BLANK","text":"Az ablakos kapillárisok jellemzője, hogy a sejteken _____ nm méretű „ablakok\" vannak, amelyek vese és érgomolyag szöveteiben fordulnak elő.","answer":"50-60","explanation":"Az ablakos kapillárisok (fenestrációs kapillárisok) a vesékben és érgomolyagban találhatók, ahol a szűrés és reabszorpció történik."},{"type":"BLANK","text":"A diasztolés vérnyomás az aortában körülbelül _____ Hgmm értéket mutat.","answer":"80","explanation":"A diasztolés vérnyomás körülbelül 80 Hgmm, amely a bal kamra elernyedésének függvénye."},{"type":"BLANK","text":"A kapillárisok területén a vérnyomás _____ Hgmm közötti értéket mutat.","answer":"35-15","explanation":"A kapillárisok területén továbbra nyomásesés következik be, az érték 35-15 Hgmm közötti."},{"type":"BLANK","text":"A szinuszcsomó (SA-csomó) alapvető funkciója az _____ generálása percenként körülbelül 72 impulzus formájában.","answer":"akciós potenciál","explanation":"A szinuszcsomó az elsődleges ingerképző központ, amely percenként akciós potenciálokat (elektromos impulzusokat) generál."}],"kivalasztas":[{"type":"MC","text":"Melyik szerv felelős az elsődleges vizelet-kiválasztásért?","options":["A) Húgyhólyag","B) Vese","C) Húgycső","D) Húgyvezeték"],"correctLetter":"B","explanation":"A vesék végzik a szűrletképzést, visszaszívást és a kiválasztást, amelynek eredménye a vizelet."},{"type":"MC","text":"Melyik szerv nem vesz részt a kiválasztásban?","options":["A) Tüdő","B) Bőr","C) Máy","D) Lép"],"correctLetter":"D","explanation":"A tüdő, bőr és máj kiválasztó szerepet játszik, de a lép nem közvetlenül kiválaszt."},{"type":"MC","text":"Mi a nefron alapvető funkcionális egysége?","options":["A) Vese szövete","B) Vesetestecske és elvezető csatorna","C) Csak az alveolusok","D) A nefron egy önálló szűrő szerv"],"correctLetter":"B","explanation":"A nefron a vese legkisebb funkcionális egysége, amely szűrletképzésre és visszaszívásra képes."},{"type":"MC","text":"Melyik nyomás alakul ki az érgomolyagban a szűrőműködés során?","options":["A) Csak deszillátív nyomás","B) Szűrési nyomás (kb. 50 Hgmm)","C) Csak ozmotikus nyomás","D) Nincs nyomáskülönbség"],"correctLetter":"B","explanation":"Az érgomolyag kapillárisaiban nagy vérnyomás (kb. 50 Hgmm) biztosítja a szűrőműködést."},{"type":"MC","text":"Melyik folyamat az elsődleges szűrletképzésben szerepet játszó szűrési mechanizmus?","options":["A) Aktív szállítás","B) Passzív diffúzió a vérnyomás hatására","C) Osmotikus csapatok","D) Enzimaktivitás"],"correctLetter":"B","explanation":"A szűrletképzés passzív folyamat, a vérnyomás préseli ki a vérplazmát az érgomolyagból."},{"type":"MC","text":"Mit tartalmaz az elsődleges szűrlet?","options":["A) Vörösvértestek és fehérjék","B) Csak vizet","C) Fehérjementes vérplazma összetevői","D) Csak sók"],"correctLetter":"C","explanation":"Az elsődleges szűrlet gyakorlatilag a vérplazma összes összetevőjét tartalmazza a fehérjéket kivéve."},{"type":"MC","text":"Melyik szerv-szakasz feladata a glükóz 100%-os visszaszívása?","options":["A) Henle-kacs","B) Disztális tubulus","C) Proximális tubulus","D) Gyűjtőcsatorna"],"correctLetter":"C","explanation":"A proximális tubulus aktív transzporttal teljes mennyiségben visszaszívja az átszűrődött glükózt."},{"type":"MC","text":"Hogyan nevezik a Henle-kacs működésének elvenként biztosított mechanizmusát?","options":["A) Direkt transzport","B) Ellenáramú sokszorozás","C) Ozmotikus diffúzió","D) Aktív szűrés"],"correctLetter":"B","explanation":"A Henle-kacs leszálló és felszálló ágainak ellentétes irányú működése növeli a szövetnedv ozmotikus koncentrációját."},{"type":"MC","text":"Melyik hormon szabályozza a víz visszaszívódását a gyűjtőcsatornában?","options":["A) Aldoszteron","B) ADH (vazopresszin)","C) Inzulin","D) Tiroid hormon"],"correctLetter":"B","explanation":"Az ADH (antidiuretikus hormon) a hipotalamuszban termelődik és szabályozza a víz visszaszívódását."},{"type":"MC","text":"Milyen hatással van az aldoszteron a nátrium-visszaszívódásra?","options":["A) Csökkenti a Na+ visszaszívódást","B) Serkenti az aktív Na+-visszaszívódást","C) Nem befolyásolja","D) Megfordítja a visszaszívódást"],"correctLetter":"B","explanation":"Az aldoszteron (mellékvesekéreg-hormon) fokozza a Na+ visszaszívódást a disztális tubulusban és gyűjtőcsatornában."},{"type":"MC","text":"Mi a renin-angiotenzin-aldoszteron rendszer funkciója?","options":["A) Szén-dioxid szállítása","B) Hemoglobin termelés","C) Vérnyomás és sóháztartás szabályozása","D) Kalcium felszívódása"],"correctLetter":"C","explanation":"Ez a hormonális rendszer szabályozza a vérnyomást és az ionkoncentrációt a vesében."},{"type":"MC","text":"Mi a glomerularis filtrációs ráta (GFR)?","options":["A) Az egy percben szűrődő szövetnedv térfogata","B) Az egy percben kiválasztott vizelet mennyisége","C) Az egy percben visszaszívódott anyag mennyisége","D) Az egy percben a vérből szűrődő folyadék térfogata"],"correctLetter":"D","explanation":"A normál GFR körülbelül 120 ml/perc, amely a vese szűrésének hatékonyságát mutatja."},{"type":"MC","text":"Mi a clearance fogalma?","options":["A) Az egy percben szűrődik szövetnedv","B) Az a plazmatérfogat, amely tartalmazza az időegység alatt kiürült anyag mennyiségét","C) Az egy percben visszaszívódott vizelet","D) A vér sókoncentrációja"],"correctLetter":"B","explanation":"A clearance azt adja meg, hogy az időegység alatt mekkora plazmatérfogat tisztul meg az adott anyagtól."},{"type":"MC","text":"Miért nincs az egészséges ember vizeletében glükóz?","options":["A) A glükóz nem szűrődik át","B) A glükóz teljesen visszaszívódik az alveolusban","C) A glükóz teljesen visszaszívódik a proximális tubulusban","D) A glükóz mérgező az alveolusban"],"correctLetter":"C","explanation":"Az átszűrődött glükóz aktív transzporttal 100%-ban visszaszívódik, így nem jelenik meg a vizeletben."},{"type":"MC","text":"Mi okozza a glükóz megjelenését a cukorbetegek vizeletében?","options":["A) Sóhiány","B) Víztöbblet","C) A megnövekedett vércukorszint felülmegy a visszaszívódási kapacitáson","D) Vesegyulladás"],"correctLetter":"C","explanation":"Amikor a vércukor túl magas, a proximális tubulus szállítómolekulái nem képesek mindent visszaszívni."},{"type":"MC","text":"Mit jelent az izoozmózis","options":["A) Az ozmotikus koncentráció egyenlősége","B) A sejtek deformálódása","C) Az ionok szabad mozgása","D) A fehérjék eltűnése"],"correctLetter":"A","explanation":"Az izoozmózis azt jelenti, hogy a belső és külső ozmotikus nyomás egyensúlyban van."},{"type":"MC","text":"Mi a sav-bázis egyensúly biztosításának szerepe a vesében?","options":["A) Fehérjék szintézise","B) H+-ionok kiválasztása és HCO3--ionok visszaszívódása","C) Glükóz lebontása","D) Sók tárolása"],"correctLetter":"B","explanation":"A gyűjtőcsatorna sejtjei H+-ionokat választanak ki, míg HCO3--ionok visszaszívódnak a vérbe."},{"type":"MC","text":"Mit jelent az ozmotikus diurezis?","options":["A) A víz visszaszívódásának fokozódása","B) Az ozmotikusan aktív anyagok által okozott fokozott vizeletürítés","C) A nátrium teljes visszaszívódása","D) Az alveolusok összeomlása"],"correctLetter":"B","explanation":"Az ozmotikus diurezis akkor fordul elő, amikor nagyobb mennyiségű cukor vagy más ozmotikusan aktív anyag csökkenti a víz visszaszívódását."},{"type":"MC","text":"Melyik betegség jellemzi a napi 15 liter híg vizelet kiválasztása?","options":["A) Cukorbetegség","B) Veseelégtelenség","C) ADH-hiány (diabetes insipidus)","D) Vesekő"],"correctLetter":"C","explanation":"Az ADH hiánya miatt a gyűjtőcsatornák nem szívódnak vissza az szükséges mennyiségű vizet, így nagy mennyiségű híg vizelet képződik."},{"type":"MC","text":"Mi okozza a vesekő kialakulását?","options":["A) Víz felesleg","B) Hypertóniás sóoldatok","C) Kissé lúgosabb és töményebb vizelet az optimálisnál","D) Fehérje hiány"],"correctLetter":"C","explanation":"A vesekő a sók kikristályosodásából alakul ki, amikor a vizelet lúgosabb és töményebb az átlagnál."},{"type":"BLANK","text":"A páros _____ -ek a hasüreg hátsó falán helyezkednek el, az alsó bordák magasságában.","answer":"vesék","explanation":"A vesék a retroperitoneális régióban helyezkednek el, mindkét oldalon a gerincoszlop mellett."},{"type":"BLANK","text":"A nefron Malpighi-testecskéje a _____ és a Bowman-tok együttesét jelenti.","answer":"glomerulusnak","explanation":"A glomerulus kapillárisgomolyagból áll, amelyet a Bowman-tok fog körül"},{"type":"BLANK","text":"Az érgomolyagot a _____ -ből érkező arteriola táplál, amely nagyobb az odavezető arteriola átmérőjénél.","answer":"kilépő","explanation":"A kilépő arteriola kisebb átmérőjű az odavezető arteriola, ami biztosítja az erős szűrőnyomást."},{"type":"BLANK","text":"A proximális tubulus a _____ -ben helyezkedik el, nagy felszínű mikrobolyok segítségével szívódnak fel a tápanyagok.","answer":"kéregállományban","explanation":"A proximális tubulus csatornafala mikrobolyos epitélium, amely megnöveli a felszínt a visszaszívódáshoz."},{"type":"BLANK","text":"A Henle-kacs leszálló ágában a _____ szívódik vissza, míg a felszálló ágban a sók kilépnek.","answer":"víz","explanation":"A Henle-kacs működésében a leszálló ág hidrofil, a felszálló ág pedig hidrofób, amely biztosítja az ellenáramú sokszorozást."},{"type":"BLANK","text":"A disztális tubulusban az aldoszteron hatására a _____ szívódik vissza aktív transzporttal.","answer":"nátrium (Na+)","explanation":"Az aldoszteron fokozza a Na+-K+ csere pumpa működését, amely nátrium-visszaszívódáshoz vezet."},{"type":"BLANK","text":"A gyűjtőcsatornában az ADH hatására az _____ válik áteresztővé a víz számára.","answer":"fal","explanation":"Az ADH akvaporin-2 csatornákat aktivál a gyűjtőcsatorna sejtfalában, amely lehetővé teszi a víz passzív transzportját."},{"type":"BLANK","text":"A testtüdőnegyed literenkénti ozmolalitása _____ mOsm/kg körül van.","answer":"290","explanation":"Az ozmolalitást az összes oldott részecske mennyisége határozza meg, amelynek legnagyobb része az ionok."},{"type":"BLANK","text":"Az onkotikus nyomás (kolloidozmotikus nyomás) az ozmotikus nyomás azon része, amelyet a nem diffundáló _____ -ök okoznak.","answer":"kolloidok (főleg fehérjék)","explanation":"Az onkotikus nyomást elsősorban az albuminok és egyéb nagy molekulájú fehérjék hozzák létre."},{"type":"BLANK","text":"A napi szűrletmennyiség körülbelül _____ liter, míg a vizelet napi mennyisége csak 1,5 liter.","answer":"180","explanation":"Ez azt jelenti, hogy a szűrletnek 99%-a visszaszívódik, és csak 1%-a válik vizelette."},{"type":"BLANK","text":"A karbamid az _____ -in bomlásából keletkezik a májban.","answer":"aminosavak nitrogéntartalmú részéből (ammónia)","explanation":"A karbamid (urea) az aminosavak deaminálódásának terméke, amely a szervezetből mérgez lenne."},{"type":"BLANK","text":"A vérplazma szűrletében a vér karbamid-koncentrációja a _____ szintjét tükrözi.","answer":"fehérje-anyagcsere","explanation":"A vizelet karbamid-tartalma jelzi az aminosav-bomlás intenzitását."},{"type":"BLANK","text":"Az egészséges ember vizeletében a _____ jelenléte a gyulladásos vagy fertőzéses folyamatra utal.","answer":"fehérje","explanation":"Az albumin és más fehérjék csak az egészségtelen szűrés esetén jelennek meg a vizeletben."},{"type":"BLANK","text":"A vizelet mennyiségének fokozódása a _____ hormon szintjének csökkenésére utalhat.","answer":"ADH (vazopresszin)","explanation":"Az ADH-szint csökkenése csökkenti a víz visszaszívódását, ezért több vizelet képződik."},{"type":"BLANK","text":"A veséknek percenként átlagosan _____ dm3 vérplazma áramlik át.","answer":"0,67","explanation":"Ez az érték meghatározza az átszűrődő folyadék mennyiségét és a GFR-t."}],"idegrendszer":[{"type":"MC","text":"Mi történik a neuron membránpotenciáljával a nyugalmi állapotban?","options":["A) A membrán polarizált, ~ –70 mV potenciálkülönbséggel","B) A membrán nem mutat potenciálkülönbséget","C) A membránpotenciál állandóan változik","D) A membrán negatív ion koncentrációja azonos a külső térrel"],"correctLetter":"A","explanation":"A nyugalmi membránpotenciál az ion-szivattyú (Na⁺-K⁺ ATPáz) és a differenciális permeabilitás eredménye. Az intracellulráis K⁺ és intracellulris fehérjék negatívak, ezért a belső potenciál negatív."},{"type":"BLANK","text":"A _____ felelős az ionkoncentrációs gradiens fenntartásáért az idegsejt membránjában.","answer":"Na⁺-K⁺ ATPáz","explanation":"Ez az enzim aktív szállítás révén 3 Na⁺-t pumpál ki a sejtből, míg 2 K⁺-t pumpál be, így fenntartva az iongradienseket és a negatív belső potenciált."},{"type":"MC","text":"Mit jelent az „adekvát inger\" fogalma?","options":["A) Bármilyen mechanikai vagy kémiai inger, amely egy receptort talál","B) Az a specifikus inger, amelyre a receptor biológiailag érzékeny","C) Egy inger, amely nem váltja ki az idegsejt aktiválódását","D) Az agy által feldolgozott összes inger"],"correctLetter":"B","explanation":"Például a fény a retina fotoreceptoraira adekvát, míg a hanghullám nem. Az adekvát inger a receptor típusára jellemző és a legalacsonyabb küszöb mellett váltja ki az ingerületet."},{"type":"MC","text":"Mi jellemzi a nyugalmi potenciálban a szabad ionok eloszlását?","options":["A) Szabad Na⁺ és K⁺ ionok egyensúlyban vannak mindkét oldalon","B) K⁺ több a sejten belül, Na⁺ több a sejten kívül","C) K⁺ több a sejten kívül, Na⁺ pedig egyenletes eloszlást mutat","D) A sejt nem tartalmaz significans ionkoncentrációt"],"correctLetter":"B","explanation":"Ez az ion-szivattyú fennköltségére és a membránpermeabilitásra jellemző. A sejten belüli nagy K⁺ és a sejten kívüli nagy Na⁺ teremt stabil –70 mV potenciálkülönbséget."},{"type":"BLANK","text":"A dendrit az idegsejt _____ , amely információt fogad más neuronok axonterminaléból.","answer":"sejtnyúlványa","explanation":"A dendrit az idegsejt receptív oldala, ahol szinaptikus kapcsolatok alakulnak ki. A dendriten lévő receptorok a neurotranszmitter-molekulákkal kötnek, ezáltal módosítva a sejttest membránpotenciálját."},{"type":"MC","text":"Hogyan változik a membránpotenciál depolarizáció során?","options":["A) –70 mV-ról 0 mV felé halad, végül pozitív értékre is kerülhet","B) –70 mV-ról -100 mV-ra csökken","C) Nem változik, konstans marad","D) Szinuszos rezgésmonoton módosul"],"correctLetter":"A","explanation":"Depolarizáció során a feszültségfüggő Na⁺-csatornák megnyílnak, Na⁺ áramlik be a sejtbe. Az akciós potenciál csúcsa körülbelül +30 mV, ahol a membrán belül pozitívabb lesz, mint kívül."},{"type":"MC","text":"Mi okozza az akciós potenciál repolarizációs fázisát?","options":["A) Na⁺-csatornák nyílnak meg újra","B) A feszültségfüggő Na⁺-csatornák becsukódnak és a K⁺-csatornák megnyílnak","C) Az ion-szivattyú áll vissza a nyugalmi állapotba","D) Gátló szinaptikus hatások terjednek az axonon"],"correctLetter":"B","explanation":"Repolarizáció az akciós potenciál felemelkedésének csúcsa után kezdődik. Bár a Na⁺-csatornák inaktiválódnak, a K⁺-csatornák később nyílnak meg, lehetővé téve a K⁺ kiáramlást, ami helyreállítja a negatív belső potenciált."},{"type":"BLANK","text":"A _____ az idegsejt hosszú, az ingerületet a sejttest elől továbbítő sejtnyúlványa.","answer":"axon","explanation":"Az axon az idegsejt vezetési oldala, amely potenciálokat elvezet az axonterminálékhoz. Az axon hossza a mikrométert nagyobb lehet, például a gerincvelő és a lábak közötti motoros neuronok több mint egy métert is elérhetnek."},{"type":"MC","text":"Mi a refrrakteres periódus biológiai funkciója?","options":["A) Megakadályozza az akciós potenciálok fordított irányú terjedését","B) Egy betérő szinaptikus potenciál kiváltja az akciós potenciált","C) Az axon felépítésének szükséges termodinamikus folyamata","D) A neurotranszmitter felszabadulásának szabályozása"],"correctLetter":"A","explanation":"Az abszolút refrrakteres periódus alatt az Na⁺-csatornák inaktiválódása miatt új akciós potenciál nem lehet kiváltott. Ez biztosítja az egyik irányú szaltatórikus ingerületvezetést az axon mentén és a szinapszisok közötti irányított információ-átvitelt."},{"type":"MC","text":"Hogyan befolyásolja a mielinhüvely az ingerületvezetés sebességét?","options":["A) Lassítja az ingerületet, mivel szigetelést biztosít","B) Felgyorsítja az ingerületet, mivel a Ranvier-befűzéseken közvetlenül ugrál az ingerület","C) Nem befolyásolja az ingerületet","D) Csak depolarizáció közben hat lassító erőként"],"correctLetter":"B","explanation":"A mielinhüvely-szigetelés és a Ranvier-befűzéseken történő szaltatórikus ingerületvezetés ~100-120 m/s sebességet tesz lehetővé, míg az isolált axonokon csak 0,5-2 m/s a sebesség. Ez az ugrásszerű szaltatórikus vezető energetikai szempontból is hatékony."},{"type":"BLANK","text":"A _____ a mielinhüvelyet termelő gliasejt az központi idegrendszerben.","answer":"oligodendrocita","explanation":"Az oligodendrocita egy axon több szegmentét is boríthatja mielinnel, míg a periférális Schwann-sejt csak egyetlen axon szegmentét borítja. Ez a különbség a központi és periférális idegrendszer szervezésének különbsége."},{"type":"MC","text":"Mi a szinaptikus rés (synaptic cleft) funkciója?","options":["A) Az ingerület elektromos terjedésének közvetítésére","B) A neurotranszmitter diffúziójának közege a pre- és posztszinaptikus membránok között","C) Az ingerület optikai szignálok segítségével továbbadása","D) Az axon-terminálé védelme az oxidatív stressztől"],"correctLetter":"B","explanation":"A szinaptikus rés (ún. 20-40 nm széles) kémiai szignálvétel helye. Az axonterminálé az akciós potenciál alatt Ca²⁺-influxus hatására neurotranszmitter-vezikulákat bocsát ki, melyek a szinaptikus résbe kerülnek és a posztszinaptikus receptorok felismerik őket."},{"type":"MC","text":"Mi jellemzi az elektromos szinaptikus kapcsolatokat?","options":["A) Szinaptikus vezikulum szükséges az információ-átvitelhez","B) Az ionok közvetlenül a szinaptikus részen át kontinuitásban jutnak","C) Lassúbb az ingerület átadása, mint a kémiai szinaptikus kapcsolatoknál","D) Csak a központi idegrendszerben fordulnak elő"],"correctLetter":"B","explanation":"Az elektromos szinapszisok gap junction-kapcsolódásokkal működnek, ahol az ionok és kis molekulák közvetlenül áramolhatnak a két sejt között. Ez nagyon gyors, de kevésbé modulálható, mint a kémiai szinapszisok."},{"type":"BLANK","text":"Az _____ a szinaptikus résbe kerülő vegyület, amely a posztszinaptikus membránban lévő receptorokkal kötödik.","answer":"neurotranszmitter","explanation":"A neurotranszmitterek (pl. acetilkolin, dopamin, szerotonin, GABA, glutamát) az akciós potenciál által kiváltott Ca²⁺-influxus eredményeképpen felszabadulnak az axonterminálébó, a szinaptikus résbe és a posztszinaptikus receptorokhoz kötödnek."},{"type":"MC","text":"Mi az acetilkolin (ACh) funkciója a neuromusculáris szinápszisban?","options":["A) Gátol az izomösszehúzódást","B) Serkenti az izomösszehúzódást, mivel aktiválja a nikotinikus receptorokat","C) Csökkenti az izom ingerküszöbét, de nem váltja ki az összehúzódást","D) Szinaptikus hosszú-távú potenciálódást vált ki"],"correctLetter":"B","explanation":"Az ACh a motoros neuronok axonterminálé-jéből felszabadul, a véglemez receptoraira kötödik és Na⁺/Ca²⁺ influxust vált ki, ami depolarizálja az izomsejtet és akciós potenciált okoz, végeredményben izomösszehúzódáshoz vezet."},{"type":"MC","text":"Milyen hatása van a dopaminnak az idegrendszerre?","options":["A) Kizárólag serkentő hatást gyakorol","B) Kizárólag gátló hatást gyakorol","C) Kontextustól függően serkentő vagy gátló hatást gyakorol, és fontos a mozgásszabályozásban és a motívációban","D) Nem hat az idegrendszer működésére"],"correctLetter":"C","explanation":"A dopamin mesokortikolimbikus és nigrosztrális útvonalon működik, befolyásolja a mozgásszabályozást, a jutalmazás érzékelést és az érzelmi feldolgozást. A Parkinson-kórban csökkent dopamin szint figyelhető meg."},{"type":"BLANK","text":"A _____ az idegsejt között lévő fizikai és funkcionális kapcsolat, ahol az információ kémiailag vagy elektromosan kerül átadásra.","answer":"szinapszis","explanation":"A szinapszis az ideghálózat alapvető funkcionális egysége, ahol a pre- és posztszinaptikus membránok között érintkezés van. Az információ-átvitel lehet kémiai (neurotranszmitter közvetítésű) vagy elektromos (ioncsatorna-közvetítésű)."},{"type":"MC","text":"Mit jelent az ingerösszegzés (summation) az idegsejt szinten?","options":["A) Az összes szinaptikus potenciál egyenlő mértékben hozzájárul az akciós potenciál kiváltásához","B) A téri és időbeli szinaptikus potenciálok integrálódnak, hogy meghatározzák az idegsejt aktiválódásának valószínűségét","C) Az apotenciálok önmagukban összegződnek anélkül, hogy az akciós potenciál kiváltódna","D) Az ingerület integrációja kizárólag az agy szürkeállományában történik"],"correctLetter":"B","explanation":"Téri összegzéskor az egy időben érkeződ több EPSP/IPSP összeadódik a sejttest membránján. Időbeli összegzés során az egymás után gyorsan érkeződ potenciálok összegződnek. Ha az összeg elér a küszöbértéket, akciós potenciál váltódik ki."},{"type":"BLANK","text":"Az _____ egy szinaptikus potenciál, amely a posztszinaptikus sejtben depolarizáló hatást gyakorol.","answer":"excitatory postsynaptic potential (EPSP)","explanation":"Az EPSP akkor jön létre, amikor a serkentő neurotranszmitter kötödik receptorára, nyitva Na⁺/Ca²⁺ ioncsatornákat, amely depolarizálja a posztszinaptikus sejtet és az akciós potenciál kiváltásához közelebb hozza azt."},{"type":"MC","text":"Mi az inhibitory postsynaptic potential (IPSP) hatása az idegsejtre?","options":["A) Depolarizálja a sejtet és serkenti az akciós potenciál kiváltódését","B) Hiperpolarizálja a sejtet (többnyire –80 mV körüli potenciálhoz közelíti) és csökkenti az akciós potenciál kiváltódásának valószínűségét","C) Nem módosítja az idegsejt membránpotenciálját","D) Gátló szinaptikus receptorokkal működik, de az idegsejt aktiválódásához vezet"],"correctLetter":"B","explanation":"Az IPSP-t egy gátló neurotranszmitter (például GABA vagy glicin) váltja ki, amely K⁺ vagy Cl⁻ ioncsatornákat nyit meg, ezáltal hiperpolarizálva a posztszinaptikus sejtet, amitől az ingerület gyorsabban kellene összegződnie az akciós potenciál kiváltásához."},{"type":"MC","text":"Mit jelent az GABA (gamma-aminobutyric acid) funkciója az agyban?","options":["A) Serkentő neurotranszmitter, amely IPSP-ket vált ki","B) Gátló neurotranszmitter, amely az agyban az egyik legfontosabb fékező anyag","C) Szinaptikus hosszú-távú potenciálódást váltja ki","D) Csak az izomössehúzódások szabályozásában vesz részt"],"correctLetter":"B","explanation":"A GABA a főbb gátló neurotranszmitter az agyban és gerincvelőben. Kötödése Cl⁻ ioncsatornákhoz vezet, amely hiperpolarizációt okoz. A GABA-A receptorokra ható szerek (pl. benzodiazepinek) a GABA-szignálzást erősítik, ezáltal szorongáscsökkentő és szedatív hatást gyakorolnak."},{"type":"BLANK","text":"A _____ az agyi szövetet körülvevő védelmi rendszer, amely szelektíven átenged bizonyos anyagokat az és gátolja mások belépését.","answer":"vér-agy gát","explanation":"A vér-agy gát a centrális idegrendszer védelme érdekében vastag endotellis sejtek (fog-süllyedői szoros kapcsolatokkal) és asztrocitáik által képezett barrierből áll. Megakadályozza a legtöbb nagy molekula és patogén bejutásában az agyba."},{"type":"MC","text":"Mi az asztrocita funkciója az idegsejtek körül?","options":["A) Axonokat borít mielinvel a központi idegrendszerben","B) Táplál és támogat idegsejtet, csökkenti a neurotranszmitter koncentrációt, és homeosztatikus funkciókat lát el","C) Immuiális funkciókat lát el, patogéneket elpusztít","D) Memória tárolásáért felelős protein szintézist végez"],"correctLetter":"B","explanation":"Az asztrocita a központi idegrendszer leggyakoribb gliacellája. Táplálóanyagokat szolgáltat az idegsejten, felszívja az idegsejteket körülvevő ionokat és neurotranszmittereket, és szabályozza az extracelluláris K⁺ szintjét a neuronális működés optimalizálása érdekében."},{"type":"MC","text":"Milyen szerepet játszanak a Schwann-sejtek a periférális idegrendszerben?","options":["A) Az axonokat mielinnel borítják egyetlen egy axont több szegmensére nézve","B) Az axonokat egyedi mielinhüvellyel borítják, izolálva az elektromos hatásokat","C) Gátolja az akciós potenciál terjedését","D) Fehérjék szintézise az idegsejt sejttestében"],"correctLetter":"A","explanation":"A Schwann-sejt az egyik axon szegmentét borítja mielinnel (az oligodendrocita által végzett központi idegrendszeri funkcióval szemben, amely több axont borít). Ez a periférális mielinhüvely-borítás szaltatórikus ingerületvezetésnek teszi lehetővé a nagysebességű akciós potenciál terjedést."},{"type":"BLANK","text":"A _____ a központi idegrendszer rákszöveteit elpusztító gliasejt, amely immuiális funkciókat lát el.","answer":"mikroglia","explanation":"A mikroglia az agy és gerincvelő immuiális sejtje. Képes felvételre patogéneket, eltörlödött idegsejtanyagot és szinapszisokat (synaptic pruning). Az aktiválódott mikroglia termel gyulladásos citokint, amelyek a gyulladásos neurodegeneratív betegségekben szerepet játszanak."},{"type":"MC","text":"Mi jellemzi a perifériás idegrendszer szerkezetét az anatómiai szempontból?","options":["A) Csak az agyból és gerincvelőből áll","B) Idegekből, dúcokból és érzőreceptorokból áll a központi idegrendszeren kívül","C) Kizárólag az agyvelő nélküli funkciókat végzi","D) A központi idegrendszer agy-hoz közvetlenül csatlakozó része"],"correctLetter":"B","explanation":"A perifériás idegrendszer az agy és gerincvelő külső részén található 12 pár agyidegből és 31 pár gerincvelői idegből áll, valamint az ezeket támogató dúcokból és az érzőreceptorokból. Ezek közvetítik az információt a központi idegrendszer és a test között."},{"type":"BLANK","text":"Az _____ az idegsejt (neuron) sejtteste, amely a magot tartalmazza és ahol az axon hilla kezdődik.","answer":"perikaryon (sejttest)","explanation":"Az idegsejt perikaryonja a fő \"feldolgozó központ\", ahol a szinaptikus bemeneteket az ingerösszegzés integrálják. Az axonhilla az idegsejt azon része, amely az akciós potenciál generálásáért felelős első egység."},{"type":"MC","text":"Hogyan működik a szinaptikus plaszticitás a tanulásban?","options":["A) Az szinapszisok közötti erő (szinaptikus hatékonyság) nem változik az idő során","B) Az idegsejtek közötti kapcsolatok erőssége megváltozik az idegsejtek közötti aktivitásparitás alapján, ami az alapja a tanulásnak és memóriának","C) A tanulás kizárólag új idegsejtek szintézisén alapul","D) Az agy szerkezete biológiailag fix és nem mutat tanulás-függő megváltozásokat"],"correctLetter":"B","explanation":"A szinaptikus plaszticitás (pl. hosszú-távú potenciálódás és depresszió) a szinapszisok között működő erő nagyságának megváltozása, amely a tanulás és memória cellularis alapja. A Hebb-szabály (\"fire together, wire together\") az egyik alapvető mecanizmus."},{"type":"MC","text":"Mit jelent az akciós potenciál hiperpolarizáló fázisa?","options":["A) A membránpotenciál a depolarizáció után a nyugalmi értéknél negatívabb lesz","B) Az axon permanens megváltozik az aktiválódás után","C) A K⁺-csatornák becsukódnak és a Na⁺-csatornák nyílnak","D) Az idegsejt nem képes új akciós potenciálok generálni"],"correctLetter":"A","explanation":"A hiperpolarizáció (az ~70 mV alatti értékre lehet, például –90 mV) akkor lép fel, amikor a K⁺-csatornák továbbra is nyitva maradnak a repolarizáció után. Ez az afterhyperpolarization, amely az akciós potenciál végén figyelhető meg és időlegesen korlátozza a kedvezőtlen akciós potenciálok kiváltódásának valószínűségét."},{"type":"BLANK","text":"A _____ az inger-válasz görbe középpontja az idegsejt és más szervek számára, amely meghatározza, hogy egy inger kiváltja-e az választ.","answer":"ingerküszöb (threshold)","explanation":"Az ingerküszöb a membránpotenciál azon értéke (általában -55 mV körüli), amelynél az akciós potenciál generálódik. Ez alatt nem keletkezik akciós potenciál (\"minden vagy semmi\" törvény), felette pedig garantált az akciós potenciál kiváltódása."},{"type":"MC","text":"Milyen funkciót lát el a szinaptikus vesicula az axon-terminálé-ben?","options":["A) A neurotranszmitterek tárolódnak bennük és az akciós potenciál vételekor exocitózis révén felszabadulnak","B) Az ion-szivattyú működésének energiaforrásaként szolgál","C) A myelin képződésében vesz részt","D) Az axon mekanikán stabilizációját biztosítja"],"correctLetter":"A","explanation":"A szinaptikus vezikulák az axon-terminálé-ben nagyon nagy számban találhatók (több tízezer). Az akciós potenciál Ca²⁺-influxust vált ki, amely a SNARE-komplex-mediálta exocitózisvét, így a vezikulák az axon-terminálé membránnal olvadnak össze és a neurotranszmittert a szinaptikus résbe felszabadítják."},{"type":"MC","text":"Mi az agyburkok (meninges) szerkezete?","options":["A) Egyetlen réteg szerkezetű pajzs","B) Három réteg: kemény agyhártya (dura mater), pókhálóhártya (arachnoidea) és lágy agyhártya (pia mater)","C) Az agy szerves része, csak funkcionális, nem fizikai struktúra","D) Kizárólag az agy felületét borítja, nem érinti a gerincvelőt"],"correctLetter":"B","explanation":"Az agyburkok az agy és gerincvelő mechanikai védelmét biztosítják. A dura mater a legvastagabb és legmerevebb, az arachnoidea alatt agy-gerincvelői folyadék folyik, és a pia mater közvetlenül az agyhöz tapad. A burkok között az erek futnak, amely az idegszövet tápanyag-ellátásáét biztosítja."},{"type":"BLANK","text":"Az _____ az idegsejtek és más szövetek közötti folyadék, amely a sejtek szükséges anyagok szállítása és az hulladéktermelések eltávolítása között közvetít.","answer":"szövetközötti folyadék (extracelluláris folyadék)","explanation":"Az szövetközötti folyadék az agy-gerincvelői folyadékkal összhangban van és az idegsejtek számára az oszmotikus és ionikus homeosztatikus feltételeket biztosítja. Az idegsejtek extracelluláris kalium-szintje kritikus az ingerületvezetéshez."},{"type":"MC","text":"Milyen típusú idegsejt vezetik az érzékelést az agy felé?","options":["A) Motoros neuronok","B) Köztes idegsejtek (interneuronok)","C) Szenzoros (érzőidegsejt)","D) Szomatikus neuronok"],"correctLetter":"C","explanation":"Az érzőidegsejtek az érzékszervekből vagy receptorokból erednek és az ingerületet a központi idegrendszer felé vezetik. Az afferens neuroni az érzőidegsejtek egy másik neve, mivel az információ a periféria felé az agy/gerincvelő irányába halad (afferens = befelé)."},{"type":"BLANK","text":"A _____ az idegsejt hosszú sejtnyúlványa, amely az információt az axon-terminálé-hez vezeti.","answer":"axon (vagy axonal process)","explanation":"Az axon az idegsejt tulajdonképpeni vezetési folyománya, amely potenciálokat elektromosan vezetik az axon-terminál felé. Az axon átmérője sokkal kisebb, mint a sejttesté (mikrométer nagyságrendű), de hossza nagyobb lehet, mint 1 méter."},{"type":"MC","text":"Hogyan befolyásolja az ingerösszegzés az idegsejt aktiválódásának valószínűségét?","options":["A) Az ingerösszegzés csökkenti a valószínűséget","B) Az EPSP-k és az IPSP-k algebrailag összeadódnak, és ha az összeg eléri a küszöbértéket, akciós potenciál váltódik ki","C) Az ingerösszegzés nem befolyásolja az aktiválódást","D) Az idegsejt függetlenül összeadódik az összes EPSP és az IPSP nélkül"],"correctLetter":"B","explanation":"Az idegsejt a szinaptikus potenciálokat integrálóként működik. Az EPSP-k (depolarizáló) és az IPSP-k (hiperpolarizáló) összeadódnak a sejttest membránján, és csak ha az összeg egy kritikus küszöbértéket elér (általában -55 mV körüli), váltódik ki az akciós potenciál az axonhillában."},{"type":"MC","text":"Mit jelent az a tény, hogy idegsejtek a \"mindent vagy semmit\" törvényt követik?","options":["A) Az idegsejt erőssége az inger erősségétől függően változik","B) Ha az inger nem éri el a küszöbértéket, nincs akciós potenciál"],"correctLetter":"A","explanation":"ha eléri vagy meghaladja, teljes akciós potenciál váltódik ki C) Az idegsejt csak bizonyos típusú ingerekre válaszol D) Az idegsejt folyamatos aktiválódás alatt áll"},{"type":"BLANK","text":"A _____ az akciós potenciál egyes szakaszaiban az idegsejt membránján _____ állomány az ioncsatornákat alkalmi nyitva/zárva.","answer":"gating (csapadékképződés)","explanation":"Az ioncsatornák feszültségfüggő (voltage-gated) vagy ligandfüggő (ligand-gated) esetén állapotai közötti váltás (\"ajtónyitás/bezárás\") az ingerületvezetés és az összes szinaptikus működés alapja. A gating molekuláris szintű szerkezeti megváltozásokat jelenti."},{"type":"MC","text":"Milyen neurotranszmitterek okoznak \"gyors\" szinaptikus továbbítást ligandfüggő ioncsatornákon keresztül?","options":["A) Csak szerotonin és dopamin","B) Glutamát, GABA, acetilkolin és glicin (amelyek közvetlenül ioncsatornákat nyitnak meg)","C) Csak neuropeptidek","D) Az összes neurotranszmitter \"gyors\" jellegű"],"correctLetter":"B","explanation":"Ezek az ionotropikus receptorok azaz, közvetlenül kötödnek és ioncsatornákat nyitnak meg. Ez gyors szinaptikus továbbítást eredményez (1-2 ms). Az olyan neurotranszmitterek, mint a serotonin és dopamin, általában metabotropikus receptorokhoz kötödnek, amelyek G-protein-aktiváció és másodlagos hírvivő-rendszerek révén működnek (lassabb: több száz ms)."},{"type":"BLANK","text":"A _____ az idegsejt receptora, amely közvetlenül az ioncsatornához kapcsolódik és az ligand-kötödéskor azonnal ioncsatorna megnyílást váltja ki.","answer":"ionotropikus receptor","explanation":"Az ionotropikus receptorok membránfehérjék, amelyeknek van egy ligandum-kötödési helye (például acetilkolin vagy GABA) és egy integrál ioncsatorna komponensük. Ligand-kötödéskor az ioncsatorna megnyílik, lehetővé téve az ionoknak az átáramlást nagyon gyorsan."},{"type":"MC","text":"Mi az \"retrogád jelzés\" fogalma az idegsejtek között?","options":["A) Egy előre irányuló szinaptikus jelátvitel posztszinaptikus sejtből preszinaptikus sejtre","B) Kétirányú információ-átvitel az szinapszison keresztül","C) Az idegsejt membránpotenciálának visszahatása az ionkoncentrációra","D) Az idegsejt nem képes visszahatásra"],"correctLetter":"B","explanation":"A retrogád szignálzás fontos az idegsejt közötti kommunikáció és szinaptikus plaszticitás során. Például, a posztszinaptikus Ca²⁺ influxus aktiválja az endocannabinoid rendszert, amely visszafelé hat a preszinaptikus sejtre és módosítja az alkalmazott neurotranszmitter felszabadítás mennyiségét. Ez hosszú-távú szinaptikus módosulásokat eredményez."},{"type":"BLANK","text":"Az _____ az idegsejtek között keresztezett szinapszis, amely az információ kódolásában és az összetett ideghálózatoknak számára alapvető.","answer":"rekurrens szinapszis","explanation":"Az olyan rekurrens hálózatok, mint az idegsejt axonjának visszatérő kollateralisai más idegsejtek dennátjait szinapszálódnak, visszahurkolást hoznak létre az információ-feldolgozásban, amely az önszabályozás, stabilitás és információ szűrés alapjaivá válik."},{"type":"MC","text":"Milyen hatása van a szinaptikus kettős-kötödésnek (heterosynaptic facilitation) az idegsejt működésére?","options":["A) Csökkenti az akciós potenciál valószínűségét","B) Egy harmadik neuron modulálja az első és második neuron közötti szinaptikus erőt","C) Az idegsejtek összeszokottsé válnak az ismételt aktiválódásnak","D) Gátlja az EPSP-k és az IPSP-k keletkezését"],"correctLetter":"B","explanation":"A heterosynaptic facilitation az idegsejt \"modulátor\" inputja által kiváltott szinaptikus erő módosítása. Például, ha egy harmadik neuron Ca²⁺-függő kinázákat aktiválja a posztszinaptikus sejtben, ez fokozhatja a válasz az ismételt preszinaptikus stimulációra. Ez alapvető a tanulás és memória mechanizmusaihoz."},{"type":"MC","text":"Hogyan befolyásolja a mielinhüvely-sérülés (pl. sclerosis multiplex) az ingerületvezetést?","options":["A) Felgyorsítja az ingerületvezetést","B) Csökkenti az ingerültvezetés sebességét, mert hiányzik az elektromos szigetelés és a szaltatórikus vezetés","C) Nem befolyásolja az ingerületvezetést","D) Kizárólag az IPSP-ket gátolja"],"correctLetter":"B","explanation":"A sclerosis multiplex az autoimmun betegség, amely az oligodendrocitákat és a mielint támadja a központi idegrendszerben. Mielinhüvely nélkül az axonon az ioncsatornák közvetlen vízzel van kitéve, így az akciós potenciálnak minden pont mentén kell lecsapódnia, amely ~0,5 m/s sebességre csökkenti a vezetést (normálisan ~100 m/s)."},{"type":"BLANK","text":"A _____ a neurotranszmitter, amely szerotonin nevezett agyban számos funkcióban szerepet játszik, beleértve a hangulat és az alvás szabályozást.","answer":"szerotonin","explanation":"A szerotonin egy monoamin neurotranszmitter, amelyet a velőüregben lévő rápé-magvakban termelnek. Az alacsony szerotonin szinttel társított depresszió, szorongás és alvászavarok kialakulásához. Az SSRI (szelektív szerotonin visszafelvételi gátlók) antidepresszáns szerek a szerotonin szintjét emelik az extracelluláris térben."},{"type":"MC","text":"Mely idegsejt típusok alkotják az ideghálózat alapját a központi idegrendszerben?","options":["A) Kizárólag motoros neuronok","B) Kizárólag szenzoros neuronok","C) Interneuronok, amelyek összekapcsolják az érzőneuronokat a motoros neuronokkal","D) Gliasejtek, amelyek információt dolgoznak fel"],"correctLetter":"C","explanation":"Az ideghálózat az interneuronokra épül, amelyek a \"közves\" sejtek szerepét játsszák az érző- és motoros neuronok között. Az interneuronok integrálják a bejövő szenzoros információt és összetett feldolgozás után módosított motoros parancsokat továbbítnak."},{"type":"BLANK","text":"A _____ az idegsejt egy harmadik típusa, amely az érző- és motoros neuronok közötti információ-feldolgozást végzi.","answer":"interneuron (köztes idegsejt)","explanation":"Az interneuronok a központi idegrendszer nagytöbbsége (a legtöbb idegsejt interneuron). Ezek képesek integrálni az összetett szenzoros információt és összecsatornázni azt a motoros neuronok felé, ezáltal összetett viselkedés szabályozásában van szerepük."},{"type":"MC","text":"Mit jelent az \"glutamát\" neurotranszmitter szerepe az agyban?","options":["A) Kizárólag gátló hatást gyakorol","B) Az elsődleges serkentő neurotranszmitter, amely az agyi szövődések nagy részét működteti","C) Nincs szerepe az idegsejtek közötti kommunikációban","D) Csak az izom-csatornákon működik"],"correctLetter":"B","explanation":"A glutamát az agy elsődleges serkentő neurotranszmittere, amely ionotropikus (AMPA, NMDA, kainánt receptorok) és metabotropikus (mGluR) receptorokhoz kötödik. A túlzott glutamát-szignálzás (glutamat-excitotoxicitás) neurodegeneratív betegségekben szerepet játszik, például az ALS-ben és az Alzheimer-kórban."},{"type":"MC","text":"Mit jelent az \"hosszú-távú potenciálódás\" (LTP) az idegsejtek között?","options":["A) Az akciós potenciálok amplitúdójának csökkenése az ismételt stimuláció után","B) A szinaptikus erő tartós megerősödése a magas frekvenciájú preszinaptikus stimuláció után","C) Az idegsejt memória elvesztése","D) A neurotranszmitter kiürülésének végelemzése"],"correctLetter":"B","explanation":"Az LTP az idegsejtek közötti szinaptikus szilárdságának tartós fokozódása, amely a tanulás és memórianyomatok alapja. Az NMDA-receptorok Ca²⁺-influxusával aktiválódó kinázák (pl. PKA, CaMKII) módosítják az AMPA-receptorok és szinaptikus erősséget."},{"type":"BLANK","text":"A _____ az idegsejt közötti szinaptikus erő tartós gyengülése, amely az alacsony frekvenciájú stimuláció után következik be.","answer":"hosszú-távú depresszió (LTD)","explanation":"Az LTD az LTP ellentétes mechanizmusának tekinthető. Alacsony Ca²⁺-koncentrációk aktiválják a fosfatázákat (pl. PP1, calcineurin), amelyek eltávolítják az AMPA-receptorok egy részét a szinaptikus membránból, csökkentve az EPSP amplitúdóját. Az LTD fontos a tanulás során a szinaptikus nyomtatványok kifinomítása és a \"tanulás, hogy ne tanulj\" (learning to not learn) folyamatban."},{"type":"MC","text":"Hogyan működik a neuropeptid-közvetítésű szignálzás az idegrendszerben?","options":["A) Ionotropikus receptorokkal működik, nagyon gyors válaszokat biztosítva","B) Metabotropikus receptorokkal működik, G-protein-aktiváció és másodlagos hírvivőkkel, lassabb de tartósabb hatásokkal","C) Kizárólag a perifériás idegrendszerben működik","D) Nincs szerepe az idegrendszer működésében"],"correctLetter":"B","explanation":"A neuropeptidek (pl. szubsztancia P, enkefalinok, szomatosztatyin) a metabotropikus receptorokhoz kötödnek, G-protein-aktiválást váltanak ki és intracellulris másodlagos hírvivőket (cAMP, IP3, DAG) aktiválnak. Ez lassabb kezdettel, de tartósabb és gyakran modulációs hatásokkal működik, szemben az ionotropikus neurotranszmitterek gyors válaszaival."},{"type":"BLANK","text":"Az _____ az a jelenség, amelyben az ismételt azonos stimuláció után az idegsejt kevésbé válaszol a stimulációra az idővel.","answer":"habituation (hozzászokás)","explanation":"A habituáció a szinaptikus csökkenéshez kapcsolódik, ahol az ismételt azonos ingernek a (pl. egy zaj, amely nem okoz veszélyt) az a biológiai alapja, hogy a szinaptikus potenciálok csökkennek az ismételt prészinaptikus aktiválódás után. Ez az információ-feldolgozás hatékonyságának növeléséhez vezethet, mivel az idegrendszer fokuszálni tud az új vagy fontos ingerekre."},{"type":"MC","text":"Mi az a \"szenzitizáció\" az idegrendszerben?","options":["A) Az idegsejt válaszának csökkenése az ismételt stimuláció után","B) Az idegsejt erősített válasza az ismételt vagy intenzív stimuláció után, különösen fájdalmas ingerek után","C) Az idegsejt kimerülése","D) Az idegsejt halála"],"correctLetter":"B","explanation":"A szenzitizáció az habituáció ellentétes folyamata, amelyben az ismételt, intenzív (különösen fájdalmas) stimuláció után az idegsejt erősebben reagál. Ez moduláló neuronok által kiváltott szinaptikus erősödéshez vezet, ahol serotonin és más modulátorok fokozzák az EPSP-ket. Ez az agyban a fájdalomra való fokozódó érzékenységhez (\"wind-up\") vezethet."},{"type":"BLANK","text":"A _____ az a modulátor neuron által felszabadított anyag, amely fokozza a szinaptikus potenciálok nagyságát egy másik szinápszison.","answer":"presynaptic facilitation (preszinaptikus megkönnyítés)","explanation":"A preszinaptikus facilitáció akkor lép fel, amikor egy modulátor neuron (például egy serotonin-termelő neuron) aktiválja a preszinaptikus terminált, növelve a Ca²⁺-csatornák aktivitását, amely több neurotranszmitter felszabadulásához vezethet az eredeti szinápszisban. Ez erős alapja a szenzitizációs tanulásnak és az Aplysia (tenger csiga) neurális tanulási modellekben jól tanulmányozták."}],"gerincvelo":[{"type":"MC","text":"Hogyan nevezünk az idegsejt egy csoportosulása a központi idegrendszeren kívül?","options":["A) Mag (nucleus)","B) Dúc (ganglion)","C) Pálya (tractus)","D) Agykéreg (cortex)"],"correctLetter":"B","explanation":"A dúc periférális idegsejt-csoportosulás, amely az agy és gerincvelő kívül helyezkedik el. Például, a csigolyaközti dúc (szenzoros) vagy a szimpatikus/paraszimpatikus vegtatív dúcok az autonóm idegrendszerben."},{"type":"BLANK","text":"A gerincvelő _____ a belőle kilépő és belépő gerincvelői gyökerek okozzák.","answer":"szelvényezettségét","explanation":"A gerincvelő minden szelvénye (szegmens) egy pár gerincvelői ideggel van társítva. A szelvényezettség az emberi szervezet anatómiai alapegysége a neuráról, amely az érzo- (hátsó gyökér) és motoros (mellső gyökér) funkciókat szegmentálisan szerveznek meg."},{"type":"MC","text":"Mi a gerincvelő főbb szerkezeti jellemzője?","options":["A) Kívül szürgeállomány, belül fehérállomány","B) Kívül fehérállomány, belül pillangó alakú szürgeállomány","C) Homogén szürge szerkezet","D) Nincs megkülönböztetett szürge- és fehérállomány"],"correctLetter":"B","explanation":"A gerincvelő keresztmetszete jellegzetes: a szürgeállomány (neuronok sejttestjei és szinaptikus kapcsolatok) a középpontban pillangó alakú, a fehérállomány pedig körülveszi (idegsejt-pályák). A szürgeállomány szarvai: hátsó (szenzoros), oldalsó (vegetatív) és mellső (motoros)."},{"type":"MC","text":"Mely idegsejt típusok találhatók a gerincvelő mellső szarvában?","options":["A) Szenzoros idegsejtek","B) Szomatikus motoros neuronok","C) Interneuronok","D) Vegetatív neuronok"],"correctLetter":"B","explanation":"A mellső szarv (ventral horn) alfa-motoros neuronokat tartalmaz, amelyek axonjait a mellső gyökéren keresztül kilépnek és a vázizmokhoz vezetnek. Ez az idegsejtek az izmok összehúzódását vezérlik, ezáltal önkéntelen mozgások koordinálása történik a gerincvelő reflexek révén."},{"type":"BLANK","text":"A _____ a gerincvelő keresztmetszetében a szürgeállomány receptív része, ahol az érzőingerek szinaptikus feldolgozása történik.","answer":"hátsó szarv","explanation":"A hátsó szarv (dorsal horn) az eredeti szenzoros információ feldolgozási helyeként működik. Az érzőidegsejtek terminálísai szinapszálódnak interneuronokkal, amelyek az információt feldolgozzák és továbbítják felszálló pályákba vagy egyéb interneuronokhoz."},{"type":"MC","text":"Melyik szakaszából lépnek ki a gerincvelőnek az alsó végtagok vázizmait beidegző nerveusok?","options":["A) Nyaki szakaszból","B) Háti szakaszból","C) Ágyéki-keresztcsonti szakaszból","D) Nem lépnek ki a gerincvelőből az alsó végtagok idegeii"],"correctLetter":"C","explanation":"Az alsó végtagok idegei a gerincvelő ágyéki (lumbar) és keresztcsonti (sacral) szegmentjeiből erednek. Az ágyéki szakaszból az L2-L5 szegmentekből lépnek ki az idegeii, míg a keresztcsonti szakaszból az S1-S5 szegmentekből erednek a végtagot beidegző neuronok."},{"type":"BLANK","text":"A _____ a gerincvelő szegmentje, amely a szív beidegzéséhez kapcsolódik.","answer":"mellkasi szegment (főleg T1-T4)","explanation":"A mellkasi gerincvelői szegmentekből (thoracic) erednek az szimpatikus idegeii a szívhoz. Az T1-T4 szegmentekből eredő szimpatikus neuronok gyorsítják a szívritmust és fokozzák az erősen verést, míg a paraszimpatikus (vagusz) idegek a nyúltvelőből erednek és a szívverési frekvencia csökkentésében működnek."},{"type":"MC","text":"Mi a nyújtási reflex (stretch reflex) funkciója?","options":["A) Az izmot gátolja az összehúzódástól","B) Megelőzi az izmot a túlzott megnyúlástól, ezáltal az izomszakadást"],"correctLetter":"A","explanation":"fontos a testtartásban és az izomtónusban C) Az izmot ráveszi nyúlásra D) Csak a nagy izmokra vonatkozik"},{"type":"MC","text":"Mi a gerincvelő szelvénye (szegmentum)?","options":["A) Az agy egy funkcionális egysége","B) A gerincvelőnek egy funkcionális és anatómiai egysége, amely egy pár gerincvelői ideghez kapcsolódik","C) Az axon egy része","D) Az idegsejt sejtmagja"],"correctLetter":"B","explanation":"A gerincvelő ~30 szegmenttre van felosztva, mindegyik egy pár gerincvelői ideghez kapcsolódik (31 pár a teljes szervezetben). Minden szegmens egy dermatómát (bőrterület) és myotómát (izomcsoport) ellát a szegmentális szervezés alapján."},{"type":"BLANK","text":"A _____ az izom-nyújtásos reflexet mediáló receptor, amely az intrafuzális izomrostokba be van ágyazva.","answer":"izomorsó (muscle spindle)","explanation":"Az izomorsó egy komplex senzoros szerkezetü, amely nyújtást és kiterjesztés sebességét érzékeli. Az intrafuzális szálak az orsó belsejében vannak, és az érző-idegvégződés az intrafuzális szálakra csavarodott, amely a megnyúlási deformációt érzi és elektromos impulzusokká alakítja az szenzorokra."},{"type":"MC","text":"Melyik reflex a \"térdreflex\" közvetlenül szinaptikus szervezete?","options":["A) Poliszinaptikus reflex (interneuronok közvetítésével)","B) Monoszinaptikus reflex (direkt az érzőneuron az alfa-motoros neuronnal)","C) Nem-specifikus reflex","D) Nem lehet monoszinaptikus, mert túl gyors lenne"],"correctLetter":"B","explanation":"A nyújtási reflex monoszinaptikus, mert az izomorsó afferens nyúlványa közvetlenül szinapszálódik az alfa-motoros neuronokkal a gerincvelőben. Ez az egyik leggyorsabb reflex az idegrendszerben, amely ~1 ms szinaptikus késedelmet mutat. Az ellenkezőleg, a hajlító-reflex (withdrawal reflex) poliszinaptikus, mert interneuronokat is tartalmaz."},{"type":"BLANK","text":"A _____ a gerincvelő receptora, amely az izom-nyújtást érzékeli és szenzoros információt továbbít az idegsejtek felé.","answer":"izomorsó-receptor (proprioceptor)","explanation":"Az izomorsó egy proprioceptor, amely az izom hosszát és nyújtást érzékeli. Az ízületi és csont-receptorok szintén proprioceptorok, melyek a test helyzetét és mozgását érzékelik. Ezek az információk a gerincvelő reflexek és a nagyagykéreg által végzett mozgásszabályozás alapját képezik."},{"type":"MC","text":"Mi a különbség a szomatikus és a vegetatív reflex között?","options":["A) Nincsen különbség, azonos az működés","B) Szomatikus reflex: vázizmok"],"correctLetter":"A","explanation":"vegetatív reflex: simaizmok és mirigyek C) Szomatikus reflex gátlóan működik"},{"type":"BLANK","text":"Az _____ a bőr azon területe, amely egy adott gerincvelői ideghez tartozik és az idegsejt-telemeres sérülés felismeréséhez használják.","answer":"dermatóma","explanation":"A dermatómák a gerincvelő szegmentális szervezésének következménye. A neurológia gyakorlatban a dermatóma-térkép alapján az orvos meg tudja állapítani a gerincvelő sérülés helyét a bőr érzékelés vizsgálata alapján. Fontos a spinális anesztézia során is a megfelelő ideggyök blokkolásához."},{"type":"MC","text":"Honnan erednek az alsó húgyutak innervációja?","options":["A) Nyaki szakaszból","B) Háti szakaszból","C) Ágyéki szakaszból","D) Keresztcsonti szakaszból"],"correctLetter":"D","explanation":"Az alsó húgyutak (húgycsatorna és húgyhólyag) a keresztcsonti (sacral) gerincvelői szakaszokból (S2-S4) kapnak innervációt. A szimpatikus rendszerből a háticsigolya mellett található ganglionok adnak szimpatikus rostokat, míg a paraszimpatikus rostok a keresztcsonti idegekből erednek (pelvic splanchnics)."},{"type":"BLANK","text":"A _____ az idegsejt-sejttest csoportosulása a végtagok vázizmait irányító gerincvelői szegmentekben.","answer":"motoros neuron mag","explanation":"A motoros neuron magvak (motor nuclei) az alfa- és gamma-motoros neuronokat tartalmaznak, amelyek a vázizmokra szinaptikus kapcsolódást biztosítanak. Ezek a magvak a gerincvelő mellső szarvában találhatók szegmentálisan elrendezve az innervált izmok alapján."},{"type":"MC","text":"Mi az a \"lófarok\" (cauda equina)?","options":["A) A gerincvelő felső végzete","B) Az összes agyideg és gerincvelői ideg gyűjteménye","C) A gerincvelő alsó végzete alatti gerincvelői gyökerek kötege","D) Az agyhartya egyik rétege"],"correctLetter":"C","explanation":"A lófarok a gerinccsatornában helyezkedő gerincvelői gyökerek kötege, amely a gerincvelő végzete alatt az első ágyékcsigolya magasságában kezdődik és a keresztcsontváltó szakaszáig húzódik. Az anatómiai sérülés vagy nyomás a lófarkon a lumbális és szacrális dermatómákat és a végtagokat befolyásolja."},{"type":"MC","text":"Mely szakaszokhoz köthetők az felső végtagok vázizmainak innervációja?","options":["A) Ágyéki-keresztcsonti szakaszból","B) Nyaki szakaszból","C) Háti szakaszból","D) Egész gerincvelőből egyenlően"],"correctLetter":"B","explanation":"A felső végtagok idegeii a nyaki gerincvelői szegmentjeiből (cervical, C5-T1) erednek. A nyaki szakaszból kilépő idegeik (brachial plexus) a vállat, kart és kezet beidegzik. Az első mellkasi (T1) szegment is résztvesz az alsó felkarizmok és a kéz intrinszikus izmainak beidegzésében."},{"type":"BLANK","text":"A _____ a gerincvelő oldalsó szarvában található, amely a vegetatív motoros neuronokat tartalmazza.","answer":"oldalsó szarv (lateral horn)","explanation":"Az oldalsó szarv (intermediolateral cell column) a szimpatikus motoros neuronokat közvetlenül tartalmazza, amelyeknek axonjai a mellső gyökéren keresztül kilépnek, majd a szimpatikus ganglionok felé vezetnek. Ez csak a mellkasi és ágyéki szakaszban található, mivel a szimpatikus idegrendszer csak ezen szakaszokból lép ki."},{"type":"MC","text":"Mit jelent az \"spinális sokk\" (spinal shock)?","options":["A) Az elektromos sokk a gerincvelőben","B) Egy sérülés után a gerincvelő alatt található reflexek flaccid paralizise, amely később spaszticitássá alakul","C) Az agyvérzéshez hasonló vészhelyzet","D) A normális gerincvelői reflexek fokozódása közvetlenül a sérülés után"],"correctLetter":"B","explanation":"A spinális sokk egy függ a gerincvelő sérülésének után, amely az első 1-2 hétben flaccid paralizist (izomgyengeséget és tonuscsökkenést) mutat. Ezt követően a reflexek fokozódnak és spaszticitás alakul ki, mivel az agy gátló kontrollját elveszítik. Ez a fehér és szürkeállomány sérülésétől és az intramedullaris vérzéstől függően eltérő lehet."},{"type":"BLANK","text":"A _____ a gerincvelő szegmentálisan működő reflexköre, amelyben az érzőneuron közvetlenül vagy interneuronon keresztül szinaptizálódik a motoros neuronnal.","answer":"reflex arc (reflexív)","explanation":"A reflexív (reflex arc) az alapvető egység a gerincvelő reflexek működésében. Például a nyújtási reflex reflexívét: receptor (izomorsó) → érzőneuron (csigolyaközti dúc) → alfa-motoros neuron (mellső szarv) → effektor (vázizom). Az összetett reflexek (pl. hajlító-reflex) interneuronokat is tartalmaznak."},{"type":"MC","text":"Hogyan működik az ellenkező oldali koordináció a hajlító-reflexben?","options":["A) Az érintett oldalon a hajlító izmok összehúzódnak, míg az ellenkező oldalon a feszítőizmok is összehúzódnak","B) Mindkét oldal azonos módon válaszol","C) Az ellenkező oldalon semmi sem történik","D) Az ellenkező oldal gátolódik"],"correctLetter":"A","explanation":"Az azonos oldali hajlító-reflexben a gátló interneuronok keresztezik az ellenkező oldalra és gátolják a hajlító izmokat, míg a feszítőizmokat serkentik. Ez az egyensúly fenntartása érdekében kritikus a veszélyforrásból való elhajlás során."},{"type":"MC","text":"Mely idegsejtek találhatók a gerincvelő hátsó szarvában?","options":["A) Motoros neuronok","B) Interneuronok (köztes sej
