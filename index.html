<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioKvíz · Emelt Biológia</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07070f;
      --card: rgba(255,255,255,0.055);
      --card-hover: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.22);
      --text: #e8e8f4;
      --muted: #6b7280;
      --indigo: #6366f1;
      --violet: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(99,102,241,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 80%, rgba(139,92,246,.14) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(16,185,129,.06) 0%, transparent 70%),
        #07070f;
    }
    .glass {
      background: var(--card);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 18px;
    }
    .glass-lift { transition: transform .22s ease, background .22s ease, border-color .22s ease, box-shadow .22s ease; cursor: pointer; }
    .glass-lift:hover { background: var(--card-hover); border-color: var(--border-hover); transform: translateY(-3px); box-shadow: 0 24px 48px rgba(0,0,0,.35); }
    .glass-lift:active { transform: translateY(-1px); }
    .screen { display: none; position: relative; z-index: 1; }
    .screen.active { display: block; }
    .container   { max-width: 900px; margin: 0 auto; padding: 0 16px; }
    .container-sm{ max-width: 640px; margin: 0 auto; padding: 0 16px; }
    .gradient-text {
      background: linear-gradient(135deg, #818cf8, #c084fc, #fb7185);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 26px; border-radius: 14px;
      font-weight: 700; font-size: 15px; cursor: pointer; border: none;
      transition: all .2s ease; letter-spacing: .01em; font-family: inherit;
    }
    .btn-primary { background: linear-gradient(135deg, var(--indigo), var(--violet)); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--card-hover); border-color: var(--border-hover); }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
    .search-input {
      width: 100%; padding: 13px 16px 13px 44px;
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      color: var(--text); font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s, background .2s;
    }
    .search-input:focus { border-color: rgba(99,102,241,.55); background: var(--card-hover); }
    .search-input::placeholder { color: var(--muted); }
    .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
    .topic-card { padding: 18px 14px 14px; border-radius: 18px; position: relative; overflow: hidden; }
    .topic-card-bg { position: absolute; inset: 0; border-radius: inherit; opacity: .18; transition: opacity .22s; }
    .topic-card:hover .topic-card-bg { opacity: .28; }
    .topic-card-content { position: relative; z-index: 1; }
    .topic-emoji { font-size: 30px; margin-bottom: 10px; display: block; }
    .topic-name  { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .topic-sub   { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
    .topic-badge { display: inline-block; margin-top: 10px; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; color: #fff; }
    .mix-card {
      background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.2));
      border: 1px solid rgba(99,102,241,.35); border-radius: 18px; padding: 20px;
      cursor: pointer; display: flex; align-items: center; gap: 16px;
      transition: all .22s ease; margin-bottom: 20px;
    }
    .mix-card:hover { background: linear-gradient(135deg, rgba(99,102,241,.3), rgba(139,92,246,.3)); transform: translateY(-2px); box-shadow: 0 16px 40px rgba(99,102,241,.2); }
    .progress-bar { height: 5px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--violet)); border-radius: 999px; transition: width .5s cubic-bezier(.4,0,.2,1); }
    .question-card { padding: 24px; }
    .type-badge {
      display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 8px; background: rgba(99,102,241,.2); color: #a5b4fc;
      border: 1px solid rgba(99,102,241,.3); margin-bottom: 16px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .q-text { font-size: 16px; font-weight: 500; line-height: 1.65; color: var(--text); }
    .options-list { display: flex; flex-direction: column; gap: 9px; margin-top: 20px; }
    .option-btn {
      width: 100%; text-align: left; padding: 14px 18px; border-radius: 13px;
      border: 1.5px solid var(--border); background: rgba(255,255,255,.04);
      color: var(--text); cursor: pointer; font-size: 14px; font-weight: 500;
      line-height: 1.5; font-family: inherit; transition: all .18s ease;
    }
    .option-btn:hover:not(:disabled) { background: rgba(255,255,255,.08); border-color: rgba(99,102,241,.5); transform: translateX(3px); }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct { background: rgba(16,185,129,.18); border-color: #10b981; color: #6ee7b7; }
    .option-btn.wrong   { background: rgba(239,68,68,.18);  border-color: #ef4444; color: #fca5a5; }
    .option-btn.reveal  { background: rgba(16,185,129,.1);  border-color: rgba(16,185,129,.4); }
    .tf-container { display: flex; gap: 12px; margin-top: 20px; }
    .tf-btn {
      flex: 1; padding: 18px 12px; border-radius: 14px; border: 2px solid var(--border);
      background: rgba(255,255,255,.04); color: var(--text); cursor: pointer;
      font-size: 17px; font-weight: 800; letter-spacing: .05em;
      font-family: inherit; transition: all .18s ease;
    }
    .tf-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,.25); }
    .tf-btn.igaz-h:hover:not(:disabled) { background: rgba(16,185,129,.15); border-color: #10b981; }
    .tf-btn.hamis-h:hover:not(:disabled){ background: rgba(239,68,68,.15);  border-color: #ef4444; }
    .tf-btn.correct { background: rgba(16,185,129,.25); border-color: #10b981; color: #6ee7b7; }
    .tf-btn.wrong   { background: rgba(239,68,68,.25);  border-color: #ef4444; color: #fca5a5; }
    .tf-btn.reveal  { background: rgba(16,185,129,.1);  border-color: rgba(16,185,129,.4); color: #6ee7b7; }
    .blank-sentence { font-size: 16px; font-weight: 500; line-height: 1.7; margin-top: 10px; }
    .blank-slot { display: inline-block; min-width: 90px; padding: 2px 10px; border-bottom: 2px solid var(--violet); border-radius: 4px; background: rgba(99,102,241,.1); color: #c4b5fd; font-weight: 700; }
    .blank-ph   { color: var(--muted); }
    .self-assess { display: flex; gap: 10px; margin-top: 18px; }
    .sa-btn {
      flex: 1; padding: 14px; border-radius: 13px; border: 2px solid var(--border);
      background: rgba(255,255,255,.04); color: var(--text); cursor: pointer;
      font-size: 14px; font-weight: 700; font-family: inherit; transition: all .18s;
    }
    .sa-btn.sa-yes:hover { background: rgba(16,185,129,.15); border-color: #10b981; }
    .sa-btn.sa-no:hover  { background: rgba(239,68,68,.15);  border-color: #ef4444;  }
    .explanation {
      margin-top: 16px; padding: 14px 16px;
      background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.28);
      border-radius: 12px; font-size: 13px; color: #a5b4fc; line-height: 1.65;
    }
    .explanation.ok  { background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.3); color: #6ee7b7; }
    .explanation.err { background: rgba(239,68,68,.08);  border-color: rgba(239,68,68,.3);  color: #fca5a5; }
    .score-bar { display: flex; justify-content: center; gap: 28px; margin-top: 18px; }
    .score-item { font-size: 13px; font-weight: 700; }
    .c-green  { color: #10b981; }
    .c-red    { color: #ef4444; }
    .c-orange { color: #f97316; }
    .result-circle {
      width: 160px; height: 160px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--card); border: 1px solid var(--border); flex-direction: column;
      animation: pulse-ring 2.5s ease-in-out infinite;
    }
    .result-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 24px 0; }
    .stat-card { padding: 16px 10px; border-radius: 16px; text-align: center; }
    .stat-val  { font-size: 28px; font-weight: 900; }
    .stat-lbl  { font-size: 11px; color: var(--muted); margin-top: 4px; }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse-ring {
      0%  { box-shadow: 0 0 0 0   rgba(99,102,241,.4); }
      70% { box-shadow: 0 0 0 16px rgba(99,102,241,0); }
      100%{ box-shadow: 0 0 0 0   rgba(99,102,241,0); }
    }
    @keyframes streakPop { 0%,100%{transform:scale(1);} 50%{transform:scale(1.4);} }
    .fade-up   { animation: fadeUp .38s cubic-bezier(.22,1,.36,1) both; }
    .streak-pop{ animation: streakPop .3s ease; }
    .back-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; font-weight: 600; font-family: inherit;
      display: flex; align-items: center; gap: 6px; padding: 8px 0; transition: color .2s;
    }
    .back-btn:hover { color: var(--text); }
    .hidden { display: none !important; }
    @media (max-width: 480px) {
      .topics-grid { grid-template-columns: repeat(2, 1fr); }
      .q-text { font-size: 15px; }
    }
  </style>
</head>
<body>
<div class="bg-glow"></div>

<!-- ══ SCREEN 1: Topic Selection ══ -->
<div id="screen-topic" class="screen active">
  <div class="container" style="padding-top:40px;padding-bottom:60px;">
    <div class="fade-up" style="text-align:center;margin-bottom:36px;">
      <div style="font-size:52px;margin-bottom:10px;">🧬</div>
      <h1 style="font-size:clamp(32px,6vw,48px);font-weight:900;letter-spacing:-.02em;" class="gradient-text">BioKvíz</h1>
      <p style="color:var(--muted);font-size:15px;margin-top:8px;font-weight:500;">
        Emelt Szintű Biológia &nbsp;·&nbsp;
        <span style="color:#818cf8;font-weight:700;" id="total-label">703 kérdés</span>
      </p>
    </div>
    <div class="search-wrap fade-up" style="max-width:420px;margin:0 auto 28px;animation-delay:.05s;">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="text" class="search-input" placeholder="Téma keresése…" autocomplete="off">
    </div>
    <div class="mix-card fade-up" style="animation-delay:.08s;" onclick="startMixAll()" id="mix-card">
      <div style="font-size:38px;">🎲</div>
      <div>
        <div style="font-size:16px;font-weight:800;color:#c4b5fd;">Mindent keverve</div>
        <div style="font-size:13px;color:var(--muted);margin-top:3px;">Összes téma véletlenszerűen · 703 kérdés</div>
      </div>
    </div>
    <div id="topics-grid" class="topics-grid fade-up" style="animation-delay:.12s;"></div>
  </div>
</div>

<!-- ══ SCREEN 2: Quiz ══ -->
<div id="screen-quiz" class="screen">
  <div class="container-sm" style="padding-top:20px;padding-bottom:60px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <button class="back-btn" onclick="goHome()">← Vissza</button>
      <div style="display:flex;align-items:center;gap:18px;">
        <span style="font-size:13px;color:var(--muted);font-weight:600;"><span id="q-counter">0</span> / <span id="q-total">0</span></span>
        <span id="streak-wrap" style="font-size:13px;font-weight:800;color:#f97316;">🔥 <span id="streak-count">0</span></span>
      </div>
    </div>
    <div class="progress-bar" style="margin-bottom:22px;">
      <div id="progress-fill" class="progress-fill" style="width:0%"></div>
    </div>
    <div style="text-align:center;margin-bottom:18px;color:var(--muted);font-size:13px;font-weight:600;">
      <span id="topic-emoji-q" style="font-size:18px;"></span>
      <span id="topic-name-q" style="margin-left:6px;"></span>
    </div>
    <div id="question-card" class="glass question-card" style="margin-bottom:14px;">
      <span id="type-badge" class="type-badge">−</span>
      <div id="q-text" class="q-text"></div>
      <div id="q-options" class="options-list hidden"></div>
      <div id="q-tf" class="tf-container hidden">
        <button class="tf-btn igaz-h" id="btn-igaz"  onclick="answerTF(true)">✅ IGAZ</button>
        <button class="tf-btn hamis-h" id="btn-hamis" onclick="answerTF(false)">❌ HAMIS</button>
      </div>
      <div id="q-blank" class="hidden">
        <div id="blank-sentence" class="blank-sentence"></div>
        <div style="margin-top:16px;">
          <button class="btn btn-primary" id="btn-reveal" onclick="revealBlank()" style="font-size:14px;padding:12px 22px;">💡 Megmutatom a választ</button>
        </div>
        <div id="self-assess" class="self-assess hidden">
          <button class="sa-btn sa-yes" onclick="blankAssess(true)">✅ Tudtam</button>
          <button class="sa-btn sa-no"  onclick="blankAssess(false)">❌ Nem tudtam</button>
        </div>
      </div>
      <div id="explanation" class="explanation hidden"></div>
    </div>
    <button id="btn-next" class="btn btn-primary hidden" style="width:100%;font-size:16px;padding:16px;" onclick="nextQuestion()">Következő →</button>
    <div class="score-bar">
      <span class="score-item c-green">✓ <span id="mini-correct">0</span></span>
      <span class="score-item c-red">✗ <span id="mini-wrong">0</span></span>
    </div>
  </div>
</div>

<!-- ══ SCREEN 3: Results ══ -->
<div id="screen-results" class="screen">
  <div class="container-sm" style="padding:40px 16px 60px;text-align:center;">
    <div class="fade-up">
      <div id="result-emoji" style="font-size:64px;margin-bottom:14px;">🎉</div>
      <h2 style="font-size:32px;font-weight:900;margin-bottom:6px;">Kész!</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:28px;" id="result-topic"></p>
      <div style="margin-bottom:28px;">
        <div class="result-circle">
          <div style="font-size:42px;font-weight:900;" id="result-pct">0%</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">helyes</div>
        </div>
      </div>
      <div class="result-stats">
        <div class="stat-card glass"><div class="stat-val c-green" id="res-correct">0</div><div class="stat-lbl">Helyes</div></div>
        <div class="stat-card glass"><div class="stat-val c-red"   id="res-wrong">0</div><div class="stat-lbl">Hibás</div></div>
        <div class="stat-card glass"><div class="stat-val c-orange" id="res-streak">0</div><div class="stat-lbl">Max sorozat</div></div>
      </div>
      <p id="result-msg" style="color:#a5b4fc;font-weight:600;font-size:15px;margin-bottom:28px;"></p>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <button class="btn btn-primary" style="width:100%;font-size:15px;" onclick="restartQuiz()">🔄 Újra próbálom</button>
        <button class="btn btn-ghost"   style="width:100%;font-size:15px;" onclick="goHome()">← Témaválasztás</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// EMBEDDED QUIZ DATA (no fetch needed)
// ══════════════════════════════════════════
const QUIZ_DATA = {"homeosztazis":[{"type":"MC","text":"Mi az alapvető különbség a vezérlés és a szabályozás között?","options":["A) A vezérlés egyirányú, a szabályozás kétirányú visszacsatolású","B) A szabályozás csak az idegrendszert alkalmazhatja","C) A vezérlés biztosítja a homeosztázist","D) A szabályozás gyorsabb, mint a vezérlés"],"correctLetter":"A","explanation":"Vezérléskor az irányított rendszer nem hat vissza a vezérlő központra. Szabályozásnál folyamatos visszajelzés valósul meg, melynek alapja a negatív visszacsatolás."},{"type":"MC","text":"Mi a negatív visszacsatolás szerepe az emberi szervezetben?","options":["A) A terméktelen változások fokozása","B) A rendszer stabilizálása és az egyensúly fenntartása","C) Az előre kitervezett parancsok végrehajtása","D) Az irányítási hibák megelőzése nélkül"],"correctLetter":"B","explanation":"A negatív visszacsatolás a hibajellel ellentétes kompenzációt vált ki, így az önszabályozás révén a rendszer dinamikus egyensúlyban marad."},{"type":"MC","text":"Az alacsony vérnyomás esetén milyen kompenzációs mechanizmus működik?","options":["A) A szívfrekvencia növekedése és az erek szűkülése","B) A szívfrekvencia csökkentése és az erek tágulása","C) Csak a vese aktiválódik","D) Az idegrendszer feltétlenül lekapcsolódik"],"correctLetter":"A","explanation":"Ez a negatív visszacsatolás jellegzetes példája: az alacsony érték felfelé való kompenzációja."},{"type":"BLANK","text":"A belső környezet szabályozott dinamikus állandóságát _____ -nak nevezzük.","answer":"homeosztázisnak","explanation":"Ez a centrum fogalma az egész fejezetnél. A homeosztázis biztosítja, hogy a sejtek optimális körülmények között működjenek."},{"type":"BLANK","text":"Az irányítás alapműveletei közül az „_____ érték\" jelenti a tervezett, meghatározott állapotot.","answer":"kell","explanation":"A „kell érték\" az alapjelképzéskor adott terv, a „van érték\" pedig a rendszer tényleges állapota."},{"type":"MC","text":"Mit jelent a „hibajel\" a homeosztázisban?","options":["A) A mérési hiba az érzékelőben","B) A „van\" és a „kell\" érték közötti eltérés","C) Az irányított rendszer meghibásodása","D) A kompenzáció sikertelensége"],"correctLetter":"B","explanation":"A hibajel az összehasonlítás során keletkezik, és ez váltja ki a szükséges beavatkozást."},{"type":"MC","text":"A vízhiány esetén mely hormon termelődése fokozódik?","options":["A) Aldoszteron","B) Vazopresszin (ADH)","C) Melatonin","D) Szomatotropin"],"correctLetter":"B","explanation":"Az ADH (antidiuretikus hormon) fokozza a víz visszaszívását a vesében, így csökkenti a vizelet mennyiségét."},{"type":"BLANK","text":"A stressz hatására a szervezet homeosztázisának bizonyos paraméterei megváltozhatnak, mert a szabályozó mechanizmusok _____ kikapcsolódnak.","answer":"kikapcsolódnak / felülíródnak","explanation":"Stressz alatt a homeosztázis fenntartása hátrányos lenne a szervezet védekezésének szempontjából, így az idegrendszer felülírja a normális szabályozást."},{"type":"MC","text":"Mit értünk rendszerszemlélet alatt a biológiában?","options":["A) A szervezet egyedi komponensekre való feldarabolása","B) Az elemek kölcsönhatásaiból felépülő, emergens tulajdonságokkal bíró egység","C) A sejtek elszigetelt működésének tanulmányozása","D) A genetika abszolút dominanciája"],"correctLetter":"B","explanation":"A rendszer több, mint az elemek egyszerű összege. Az emergens tulajdonságok az alrendszerek kölcsönhatásaiból keletkeznek."},{"type":"MC","text":"Mit jelent az emerencia a rendszerszemléleti megközelítésben?","options":["A) Az azonos szerkezetű elemek ismétlődése","B) A magasabb szint új, az alrendszerekből nem vezethetô le","C) Az elemek szétszóródása","D) A hierarchia megsemmisülése"],"correctLetter":"B","explanation":"Emerencia az a jelenség, hogy a magasabb szerveződési szintek tulajdonságai nem vezethetők le az alacsonyabb szintek komponenseiből önmagukban."},{"type":"MC","text":"Az emberi szervezet működésének rendszerszemléletű megközelítésében mely alrendszerek tartoznak az információs és kontrollalrendszerek közé?","options":["A) Tápcsatorna és légzőrendszer","B) Genetikai, idegi, hormonális és immunológiai szabályozás","C) Keringési és kiválasztórendszer","D) Csontváz és izomrendszer"],"correctLetter":"B","explanation":"Ezek az alrendszerek biztosítják a szervezet összetett koordinációját és információ-feldolgozását."},{"type":"BLANK","text":"A pszichoneuro-immunológia azt vizsgálja, hogy az _____, _____ és _____ folyamatok kölcsönösen hatnak egymásra.","answer":"viselkedési / agyi / immunológiai","explanation":"A pszichoneuro-immunológia alapgondolata, hogy az idegrendszer, a hormonrendszer és az immunrendszer integrált hálózatot alkot."},{"type":"MC","text":"Mi a mikrobiom szerepe a bélrendszer működésében?","options":["A) Csak a patogén mikroorganizmusok elpusztítása","B) Az emésztés segítése, vitaminszintézis, védekezés a káros mikroorganizmusok ellen","C) Az elfogyasztott ételek tárolása","D) Az idegrendszer közvetlen vezérlése"],"correctLetter":"B","explanation":"A mikrobiom tagjai rövid láncú zsírsavakat termelnek, B és K vitamint szintetizálnak, helyfoglalással és antagonizmmussal tartják távol a patogéneket."},{"type":"BLANK","text":"A mikrobiom egyensúlyának megváltozása olyan betegségek kialakulásához vezethet, mint például _____ vagy _____.","answer":"bélproblémák / elhízás / cukorbetegség / bőrproblémák / szorongás / depresszió","explanation":"A dysbiózis (a mikrobiom összetételének zavarása) számos szisztémás betegség hátterében áll."},{"type":"MC","text":"Mely testfolyadékterek képezik az élő szervezetben a belső környezetet?","options":["A) Nyál és emésztőlé","B) Vér és szöveti folyadék","C) Vizelet és izzadság","D) Csernő és epe"],"correctLetter":"B","explanation":"A soksejtű szervezetben a sejtek a vérről és a szöveti folyadékról veszik fel a tápanyagokat, ill. idetörténik a bomlástermékek kiürítése."},{"type":"MC","text":"A homeosztázis mely legfontosabb paramétere szabályozódik elsősorban a vese működésén keresztül?","options":["A) Vérny­­omás és testhőmérséklet","B) Ozmotikus koncentráció, ionösszetétel, kémhatás és térfogat","C) Anyagcsere sebessége","D) Szívfrekvencia"],"correctLetter":"B","explanation":"A vese ezeket a paramétereket a víz, ionok és anyagcsere-termékek ürítésén és visszaszívásán keresztül szabályozza."},{"type":"BLANK","text":"A kiválasztás feladata a feleslegben felvett anyagok (víz, sók) és az anyagcsere során keletkezett mérgező anyagok (pl. _____, _____) eltávolítása a szervezetből.","answer":"ammónia / karbamid / húgysav / tejsav / bilirubin","explanation":"Ezek az anyagok az anyagcsere melléktermékeként keletkeznek és szervezetre veszélyes vagy felesleges."},{"type":"MC","text":"Mit értünk belső elválasztás alatt?","options":["A) A váladék kivezetőcsőn keresztüli kiürítése","B) A váladék közvetlenül a vérbe való kiürítése hormonok formájában","C) A váladék külső felszínekre való kiürítése","D) Az elválasztás hiánya"],"correctLetter":"B","explanation":"Az endokrin (belső elválasztású) mirigyek kivezetőcsö nélküliek, hatóanyagaik a hormonok."},{"type":"MC","text":"Az egészséges immunrendszer és mikrobiota milyen képességet biztosít?","options":["A) A gének spontán átírásának blokkolása","B) Az integrális sejtkommu­nikáció és a patogén mikroorganizmusok elleni védelem","C) A vérnyomás kizárólagos szabályozása","D) Az evolúció leállítása"],"correctLetter":"B","explanation":"A mikrobiota és az immunrendszer szoros kapcsolatban áll, együttesen védik a szervezetet és fenntartják az egészséges homeosztázist."},{"type":"MC","text":"Mely sejtszintű szabályozási mechanizmusok nem változtatják meg a DNS nukleotid-sorrendjét, de módosítják a gények működését?","options":["A) Genetikai szabályozás","B) Epigenetikai szabályozó mechanizmusok","C) Enzimműködés-szabályozás","D) Fehérjeszintézis blokkolása"],"correctLetter":"B","explanation":"Az epigenetikai szabályozás során a DNS vagy a DNS-hez kapcsolódó hiszton fehérjék kémiai módosulnak (metilcsoportok, acetil-csoportok), ami befolyásolja a gén-átírást."}],"bor":[{"type":"MC","text":"Mekkora a bőr testsúlyhoz viszonyított aránya az emberi szervezetben?","options":["A) 3-5%","B) 10-15%","C) 20-25%","D) 30-40%"],"correctLetter":"B","explanation":"A bőr a legnagyobb szervünk, összfelülete kb. 1,4-1,6 m², és testsúlyunk körülbelül 10-15%-át teszi ki."},{"type":"MC","text":"A felhám (epidermis) sejthámréteg mely típusába tartozik?","options":["A) Egyetlen rétegű laphám","B) Többrétegű elszarusodó laphám","C) Hengerhámsejt-réteg","D) Váltakozó szövet"],"correctLetter":"B","explanation":"A felhám szövettanilag többrétegű elszarusodó laphám, mely az alacsonyabb rétegekben folyamatosan mitózissal osztódó sejtek által frissül."},{"type":"BLANK","text":"A hámsejt az alhámtól a legkülső hámsorba mintegy _____ nap alatt jut ki, közben ellapul és szaruanyag halmozódik fel benne.","answer":"28","explanation":"Ez a sejtek folyamatos megújulásának időtartama, amely kulcsfontosságú a bőr regenerációjához és védelméhez."},{"type":"MC","text":"Mit jelent a szaruréteg legfontosabb védelmi funkciója?","options":["A) Csak a mechanikai sérülésektől véd","B) Kémiailag és mechanikailag véd, csökkenti a párologtatást, akadályozza a kórokozókat","C) Kizárólag UV-sugárzástól véd","D) Só- és vízháztartás-szabályozás"],"correctLetter":"B","explanation":"A szaruréteg többszintű védelmi funkciót lát el, mely a bőr vastagsága és terhelése szerint változik."},{"type":"MC","text":"Mi a melanin biológiai szerepe a bőrben?","options":["A) Kollagénrost termelése","B) Az ultraibolya sugárzás elnyselése és a mélyebb szövetek UV-védelme","C) Só- és vízháztartás-szabályozás","D) Nyálka-termelés"],"correctLetter":"B","explanation":"A melanin a festéksejtekben termelődik, és sötétsége révén véd a mutagén UV-sugárzás ellen."},{"type":"BLANK","text":"Az UV sugárzás hatására a melanin termelése fokozódik, a bőr sötétebbé válik, azonban a nagy intenzitású UV a DNS-molekulákat megváltoztatva _____ t idéz elő, amely szöveti elváltozásokhoz és bőrrákhoz vezethet.","answer":"mutációt","explanation":"Az UV-sugárzás direkt DNS-károsítást okoz, amely mutagén hatású és karcinogénné válhat."},{"type":"MC","text":"Milyen szerkezetű kötőszövet az irha (dermis)?","options":["A) Teljesen merev csontváz","B) Lazarostos kötőszövet, gazdag erekben és idegekben","C) Csak simaizomból álló szövet","D) Hámszövetből képzett belsejű szerkezet"],"correctLetter":"B","explanation":"Az irha két rétegből áll: a felső szemölcsös (finom rostos) és az alsó hálózatos (durvább rostozatú) réteg."},{"type":"MC","text":"Mit jelent az ujjnyom vagy bőrléc­rajzolat?","options":["A) A bőr betegségi jele","B) Az irha felső rétegének jellegzetes mintázatából adódó, egyénekre jellemző jellegzetesség","C) Szennyeződés a szarurétegtől","D) A köröm növekedésének nyoma"],"correctLetter":"B","explanation":"Az ujjakon, tenyéren és talpon lévő bőrlécrajzolat minden ember számára egyedi azonosítóként szolgál."},{"type":"BLANK","text":"A bőr receptorai közül a legkifinomultabb tapintásra (légmozgásra) érzékenyek a szőr­ _____ körül található idegvégződések, amelyek már 3-5° szögelhajlás esetén aktiválódnak.","answer":"tüszője / tüszőt körülvevő","explanation":"A szőrtüsző körüli receptorok a legérzékenyebbek a mechanikai ingerekre."},{"type":"MC","text":"Mely bőrreceptor-típusok felelősek a finomabb tapintás (nyomás és könnyű érintés) érzékeléséért?","options":["A) Vater-Pacini-testek","B) Meissner-test és Merkel-korong","C) Szabad idegvégződések","D) Szőrmerevítő simaizmok"],"correctLetter":"B","explanation":"Ezek a receptorok az irha felszíni rétegeiben helyezkednek el, és a finom tapintóingerekre reagálnak."},{"type":"MC","text":"A nyomásváltozások érzékelésére mely receptortípus a legalkalmasabb?","options":["A) Szabad idegvégződés","B) Szőrtüsző körüli receptor","C) Vater-Pacini-test","D) Merkel-korong"],"correctLetter":"C","explanation":"A Vater-Pacini-testek a bőr mélyebb rétegeiben, zsírszövetek közelében helyezkednek el, és erőteljes mechanikai hatásra aktiválódnak."},{"type":"MC","text":"Milyen típusú mirigyek a faggyúmirigyek?","options":["A) Belső elválasztású mirigyek","B) Külső elválasztású mirigyek, melyek a szőrtüszőkhöz csatlakoznak","C) Tej-termelő mirigyek","D) Verejtékmirigyek"],"correctLetter":"B","explanation":"A faggyúmirigyek zsíros váladékát közvetlenül a szőrszálhoz ürítik, ezáltal védelemmel látják el azokat."},{"type":"BLANK","text":"A faggyú rétegében szimbióta baktériumok élnek, amelyek savas váladékot termelve (pH _____) védik a bőrt a gombás fertőzésektől.","answer":"5,5 / 5.5","explanation":"Az alacsony pH kritikus az antimikróbás védelem szempontjából."},{"type":"MC","text":"Mely verejtékmirigy-típus játszik fő szerepet a hőszabályozásban?","options":["A) A nagy verejtékmirigyek (illatmirigyek)","B) A kisebb verejtékmirigyek","C) A tejmirigyek","D) A faggyúmirigyek"],"correctLetter":"B","explanation":"A kisebb verejtékmirigyek az egész testen megtalálhatók, és a túlhevülés esetén a verejték párolgásán keresztül hűtenek."},{"type":"BLANK","text":"A nagy verejtékmirigyek (illatmirigyek) működésének megindulása a _____ korral kezdődik, és ezek a mirigyek a szőrtüszőkbe nyílnak.","answer":"pubertás","explanation":"A pubertáskor hormonális változások indítják be a nagy verejtékmirigyek aktiválódását."},{"type":"MC","text":"Hol helyezkednek el a nagy verejtékmirigyek (illatmirigyek)?","options":["A) Az egész testen egyenletes eloszlásban","B) Hajlatokban, emlőkörnyéken, nemi szervek körül, végbélnyílás körül","C) Csak az arcon","D) Csak a végtagokon"],"correctLetter":"B","explanation":"Ezek az apokrin mirigyek az apokrin verejtékcsatorna rendszerhez tartoznak és hormon-függő funkciójuk van."},{"type":"MC","text":"Mely szövet képezi a bőralja szerkezetét?","options":["A) Többrétegű elszarusodó laphám","B) Rostos kötőszövet, amely az alatta levő szövetekhez rögzíti a bőrt","C) Tiszta kollagénrost","D) Simaizom és vér"],"correctLetter":"B","explanation":"A bőralja helyenként nagy mennyiségű zsírszövetet tartalmaz, amely tápanyagraktár és hőszigetelt szerepet tölt be."},{"type":"BLANK","text":"A bőralja alatt helyezkedő _____ szövet egyrészt tápanyagraktárként, másrészt fontos szerepet játszik a hőszigetelésben és a mélyebben húzódó szövetek mechanikai védelmében.","answer":"zsír","explanation":"A zsírszövet (lipidek) az egyik legfontosabb energiaforrás és termikus szigetelés."},{"type":"MC","text":"Mit jelent az anyajegy kialakulása?","options":["A) A bőr szennyeződése","B) A melanocita (festéksejt) felszaporodásának eredménye, amely a bőr színében vagy szerkezetében eltérés","C) A szőrszálak kóros fejlődése","D) Az irha gyulladása"],"correctLetter":"B","explanation":"Az anyajegyek kialakulásában elsősorban az UV-sugárzás játszik szerepet, és az esetek több mint felében már létező anyajegyből fejlődik a melanoma."},{"type":"MC","text":"Mi az elsőfokú égési sérülés jellemzője?","options":["A) A dermis és az irha károsodása","B) Csak a felhám épületi sérülése, vörös, feszes, sima és igen fájdalmas terület","C) Szén-szürke felszín","D) Köztövetkarmaradás"],"correctLetter":"B","explanation":"Az elsőfokú égés jellegzetesen benapozottsággal hasonlítható, és általában gyógyul a leggyorsabban."},{"type":"MC","text":"Mit jelent a másodfokú égés?","options":["A) Csak a szaruréteg sérülése","B) A hám minden rétegének és az irha több rétegének a károsodása","C) Az izomszövet és csont elérése","D) Csak az irha felső rétegének sérülése"],"correctLetter":"B","explanation":"A másodfokú égések hólyagosak, nedvesek és kifejezetten fájdalmasak, valamint fertőzésre hajlamosak."},{"type":"BLANK","text":"Az égési sérülés első ellátásakor az égett felszínt _____ - nem jeges - folyó víz alá kell helyezni, hogy megakadályozzuk a hőhatás szöveteken belüli terjedését.","answer":"hideg","explanation":"A hideg víz hatékonyabb a hő levezetésében, mint a zsiradék vagy tejföl, amely tárolja a hőt és fertőzési forrás lehet."},{"type":"MC","text":"Mely viszont nem javasolt elsősegély-nyújtás során égési sérülés esetén?","options":["A) Hideg folyóvíz","B) Szappanos vízzel történő tisztítás","C) Zsiradék, tejföl alkalmazása az égett területre","D) Steril kötözés"],"correctLetter":"C","explanation":"A zsiradék tárolja a hőt és komoly fertőzési forrást jelent, ezért elkerülendő."},{"type":"BLANK","text":"A szőr anyaga az _____, amely mind a szőrszálakban, mind a körmökben és a bőr szarurétegében megtalálható, és strukturális fehérje funkcióban működik.","answer":"keratin","explanation":"A keratin egy rostos fibrilláris fehérje, amely a bőr szerkezeti integritásához és mechanikai ellenálló-képességéhez kritikus."}],"mozgas":[{"type":"MC","text":"Mit nevezünk szarkomernek?","options":["A) Az izomrost kötőszöveti burája","B) Az izom alapegysége, amely Z-korong és Z-korong között helyezkedik el","C) A mitozondrium egyik típusa","D) Az izomrost teljes hosszúsága"],"correctLetter":"B","explanation":"A szarkomer az izom szerkezeti és funkcionális alapegysége, amely két szomszédos Z-korong között terül el, és aktin meg miozin filamentumokat tartalmaz."},{"type":"MC","text":"Mely fehérjék felelősek az izom összehúzódásáért?","options":["A) Hemoglobin és mioglobin","B) Aktin és miozin","C) Kollagén és elasztin","D) Hemoglobin és kollagén"],"correctLetter":"B","explanation":"Az aktin (vékony filamentum) és miozin (vastag filamentum) között lejátszódó kölcsönhatás okozza az izom összehúzódását. A miozin fejei az aktinra kötődnek és csúsztatják azt."},{"type":"MC","text":"Melyik ion szükséges az izomösszehúzódáshoz?","options":["A) Na+ (nátrium)","B) K+ (kálium)","C) Ca2+ (kalcium)","D) Cl- (klór)"],"correctLetter":"C","explanation":"A Ca2+ ionok a szarkoplazmikus reticulumból felszabadulva megkötődnek a tropominhoz, ami lehetővé teszi az aktin-miozin kölcsönhatást."},{"type":"MC","text":"Mi az ATP szerepe az izom összehúzódásában?","options":["A) Az aktin szintézisét katalizálja","B) Az energiaforrást biztosítja az izomösszehúzódáshoz","C) A kalciumot a szarkoplazmikus reticulumba pumpálja","D) Az izom feloldódásához szükséges energia csak az ATP lebomlásával áll elő"],"correctLetter":"B","explanation":"Az ATP hidrolízise biztosítja az energiát, amely szükséges a miozin fejek működéséhez és az aktin-miozin csúsztatásához."},{"type":"BLANK","text":"A szarkomerban az aktin és miozin filamentumok _____ révén lépnek kölcsönhatásba.","answer":"agyak (miozin-fejek)","explanation":"A miozin agyak (fejei) átmeneti kötéseket alakítanak ki az aktin molekulákkal, amely lehetővé teszi a csúsztatást."},{"type":"MC","text":"Mely csontok alkotják a gerincoszlopot?","options":["A) Csak a gerinccsigolyek","B) Gerinccsigolyek, keresztcsont és farkcsont","C) Gerinccsigolyek, bordák és szegycsont","D) Csak az ágyékcsigolyek és csigolyák"],"correctLetter":"B","explanation":"A gerincoszlop összesen 33 csigolya (7 nyaki, 12 mellkas, 5 ágyék, 5 kereszt és 4 farokcsigolyából) valamint a keresztcsont és farkcsont alkotják."},{"type":"MC","text":"Melyik jellemző a csonttömöttállományára?","options":["A) Szabálytalan, legömbölyödött szerkezete van","B) Az osteonok (Havers-csatornák körüli koncentrikus rétegek) adják meg a szilárdságát","C) Csak a hosszú csontok felszínén található","D) Szöngös szerkezetű, csontsejteket nem tartalmaz"],"correctLetter":"B","explanation":"Az osteon a tömöttállomány funkcionális egysége, amely a Havers-csatorna körül hengeresesen rendezett csontlemezekből áll."},{"type":"MC","text":"Melyik sejttípus építi fel az új csontszövetet?","options":["A) Oszteoklaszt","B) Oszteokit","C) Osteoblaszt","D) Fibroblaszt"],"correctLetter":"C","explanation":"Az osteoblaszt a fibroblasztokból származó sejt, amely az új csontmátrix anyagot szintetizálja és elhelyezi."},{"type":"BLANK","text":"A csontok lebontásáért felelős sejt a _____.","answer":"osteoclaszt (osteoklaszt)","explanation":"Az osteoclaszt egy nagy, multinukleáris sejt, amely a megakaszt és a csont-reabszorpciót végzi."},{"type":"MC","text":"Mi a periosteum funkcionalitása?","options":["A) Az izomrostok tárolása","B) A csont táplálása és az új csontszövet képzésének lehetővé tétele","C) Az idegek védelme","D) Csak a csont felületét borítja, funkciója nincs"],"correctLetter":"B","explanation":"A periosteum a csont külső rétege, amely gazdag vérellátásban, és az osteoblasztok az itt működnek az új csontszövet létrehozásához."},{"type":"MC","text":"Mely csontok tartoznak a hosszú csontok csoportjába?","options":["A) Csípőcsont, szegycsont","B) Femur (combcsont), tibia (sípcsont), fibula (kisebb lábszárcsont)","C) Bordák, laptáscsont","D) Függesztőöv csontjai"],"correctLetter":"B","explanation":"A hosszú csontok (csöves csontok) általában az végtagokat alkotják és egy central diafízisből (tengely) és két végből (epifízis) állnak."},{"type":"BLANK","text":"A csont szerves alkotóinak alapját a _____ adja, amely rugalmasságot biztosít.","answer":"kollagén","explanation":"A kollagén fehérje rugalmasságot ad a csontnak, míg a szervetlen (ásványi) anyagok, főleg a kalcium- és foszfátionok, a keménységet."},{"type":"MC","text":"Milyen csontképzési folyamat a fontanellák bezáródása?","options":["A) Endokondrális csontképzés","B) Intramembranos csontképzés","C) Csont-újramodellálás","D) Apoptózis"],"correctLetter":"B","explanation":"A fontanellák csontosodása intramembranos csontképzés útján történik, ahol a kötőszövet közvetlenül csontszövetre alakul."},{"type":"MC","text":"Mi az izületeket körülvevő szinoviális folyadék funkciója?","options":["A) Az izület stabilitásának biztosítása","B) A csontok összeépítése","C) Az ízületi felszínek síkosítása és az ízületi porc táplálása","D) Az izom erőfejlesztésének fokozása"],"correctLetter":"C","explanation":"A szinoviális folyadék egyik fő funkciója a súrlódás csökkentése és az ízületi porc táplálása, mivel a porcokon nincsenek vércsatornák."},{"type":"MC","text":"Mely ízulettípus megenged korlátlan mozgást?","options":["A) Szinarthrózis","B) Amfiartrózis","C) Diartrózis","D) Szartrózis"],"correctLetter":"C","explanation":"A diartrózisos ízületek (szabadon mozgatható ízületek) a legtöbb mozgást megengedik, például a vállízület, csípőízület."},{"type":"BLANK","text":"Az ízületi porc a szinoviális folyadékkal való közvetlen kontakt nélkül _____ útján táplálkozik.","answer":"diffúzió (osmózis)","explanation":"Az ízületi porc avaszkuláris szövet, ezért táplálkozása az ízületi folyadékból történő diffúzió útján zajlik."},{"type":"MC","text":"Mit nevezünk ligamentumnak?","options":["A) Az izom és csont közötti kötőszövet","B) A csontokat összekapcsoló rugalmas kötőszövet","C) Az ízületi felszín burája","D) Az izomszövetet körülvevő hártya"],"correctLetter":"B","explanation":"A ligamentumok (szalagok) erős kötőszöveti kötelékek, amelyek a csontokat az ízületek körül stabilizálják."},{"type":"MC","text":"Mely izomszövetcsoporthoz tartozik a szív izommodja?","options":["A) Harántcsíkolt izom","B) Sima izom","C) Szívizom (kardiális izom)","D) A szívizom nem felsorolt típusok közül"],"correctLetter":"C","explanation":"A szívizom sajátos szerkezettel rendelkezik, amely ötvözi a harántcsíkolt és sima izom jellemzőit, és autonóm ritmusban működik."},{"type":"BLANK","text":"A harántcsíkolt izom _____ szerkezete adja meg jellegzetes megjelenését.","answer":"szarkomer (szarkomerikus)","explanation":"A harántcsíkolt izmok szarkomereinek szabályos ismétlődése okozza az I és A sávok váltakozó mintázatát."},{"type":"MC","text":"Milyen csontok szöngös szerkezetűek?","options":["A) Combcsont, sípcsont","B) Csípőcsont, gerinccsigolya","C) Medencecsontok, hosszú csontok epifízise","D) Laptáscsont, szegycsont"],"correctLetter":"C","explanation":"A szöngös (trabekuláris) csontszövet szabálytalan, áttört szerkezetű, amely könnyebbé teszi a csontot, miközben megtartja szilárdságát."},{"type":"MC","text":"Melyik fejváz-csont az orrcsont?","options":["A) Lapos csont","B) Hosszú csont","C) Szabálytalan csont","D) Függesztőöv-csont"],"correctLetter":"A","explanation":"Az orrcsont lapos csont, amely az arc felépítésében vesz részt és az orrüreg fenék részét képezi."},{"type":"BLANK","text":"A másodfokú mozgások megvalósulnak például az _____ során.","answer":"pronáció/szupináció (vagy: előrehajlás/hátrametszés)","explanation":"A másodfokú mozgások a testnek az anatómiai síkban való elmozdulása, mint például a kar pronációja és szupinációja."},{"type":"MC","text":"Mely ízuleteket nevezzük gömbízületeknek?","options":["A) Vállízület, csípőízület","B) Könyökízület, térdízület","C) Csukló, bokaz","D) Csak a vállízület"],"correctLetter":"A","explanation":"A gömbízületek (enarthródik) az egyik csont gömbölydű fejével és a másik csont mélyedésével kapcsolódnak, sok irányba mozgathatók."},{"type":"MC","text":"Mit nevezünk izomfáradásnak?","options":["A) Az izom mechanikai deformációja","B) Az izom csökkent kontraktilitása a magas Ca2+ szint miatt","C) Az izom képességének csökkenése további munkavégzésre a kimerültség miatt","D) Az izomszövet élete végi elfajulása"],"correctLetter":"C","explanation":"Az izomfáradás a lakkátum felhalmozódása, az ATP-készletek csökkenése, valamint a neurális faktor kombinálódásának az eredménye."},{"type":"BLANK","text":"Az izomfáradás során _____ felhalmozódása játszik fontos szerepet.","answer":"lakkátum (tejsav)","explanation":"A lakkátum az anaerob glikolízis végterméke, mely felhalmozódása savasodást okoz az izomsejtekben, csökkentve az összehúzódás képességét."},{"type":"MC","text":"Mely csontok vannak közvetlenül a gerincoszlop alatt?","options":["A) Medencecsontok","B) Bordák","C) Szegycsont","D) A gerincoszlop alatti csontok összessége egy"],"correctLetter":"A","explanation":"A medence a gerincoszlop és az alsó végtagok közötti csontvázi egység, amely anyagcseréhez és szaporodáshoz biztosít teret."},{"type":"MC","text":"Mely csigolya típusok fordulnak elő a cervicalis (nyaki) régióban?","options":["A) 5 normális csigolya","B) 7 csigolya (atlas, tengely és 5 típusos csigolyák)","C) 12 csigolya","D) 4 csigolya"],"correctLetter":"B","explanation":"A cervicalis régióban 7 csigolya helyezkedik el: atlas (C1), tengely (C2) és öt típusos cervicalis csigolya."},{"type":"BLANK","text":"Az atlas (első cervicalis csigolya) a _____ csigolya fejtől való támogatást segíti elő.","answer":"forgatás (rotációs mozgás)","explanation":"Az atlas (C1) és a tengely (C2) között zajlik az átlóforgás, amely lehetővé teszi a fej forgatódását."},{"type":"MC","text":"Melyik csipőcsont-részlet alkotja a csípőízület medial felszínét?","options":["A) Csontfalat","B) Acetabulum (csípőmenet)","C) Felhasznált csont","D) Lágyszövet"],"correctLetter":"B","explanation":"Az acetabulum (csípőmenet) a medencecsont mélyedése, amely a combcsont fejét veszi körül, és a csípőízület képzésének alapját adja."},{"type":"MC","text":"Mit nevezünk osteoporozisnak?","options":["A) A csont nyálkacsont-feldúsulása","B) A csontállomány csökkenése, amely a csontok fragilissé válik","C) A csont túlzott calciumozódása","D) Az ízületi porcelain széthullása"],"correctLetter":"B","explanation":"Az osteoporosis a csontűrség és csontmennyiség csökkenésének eredménye, amely főleg az idősebbeket és az elágazódás utáni nőket érinti."},{"type":"BLANK","text":"Az osteoporosis gyakran _____ hiánya miatt alakul ki.","answer":"kalcium (és vitamin D)","explanation":"A kalcium és D-vitamin szükséges a csontok helyesen megépüléséhez és szilárdságához."},{"type":"MC","text":"Mely izomcsoportok működésével történik a kar flexiója?","options":["A) Triceps (háromfejű karizom)","B) Biceps (kétfejű karizom)","C) Deltoid (déllamizom)","D) Extenzor carpi radialis"],"correctLetter":"B","explanation":"A biceps a főbb flexzor a karizomok között, amely az alsó karot a felső kar felé hajlítja."},{"type":"MC","text":"Mit nevezünk antagonista izomoknak?","options":["A) Az ugyanazon ízületet mozgató izomok, de ellentétes irányban","B) Az izomzat egy azonos csoportján belüli izomok","C) Izomok, amelyek egy izületet stabilizálnak","D) Az izomrostok, amelyek vérzés miatt károsodnak"],"correctLetter":"A","explanation":"Az antagonista izomok, mint a biceps és triceps, egymáshoz képest ellentétes mozgásokat végeznek az ugyanazon az ízületen."},{"type":"BLANK","text":"A _____ izomok segítik az elmozdulás során az agonista izomok működését.","answer":"szinergiszta","explanation":"A szinergiszta izomok az agonista izomok segítségét nyújtják a mozgás végrehajtásában és az ízület stabilizálásában."},{"type":"MC","text":"Mely csont az emberi lábváz alapját képezi?","options":["A) A talus csont","B) A calcaneus (sarkcsont)","C) A cuboid csont","D) Az összes talp csont (tarsus)"],"correctLetter":"D","explanation":"A tarsus az összes talp csontjaiból áll (7 csont), amely az lábváz alapját képezi és az össztömeget megosztja."},{"type":"MC","text":"Mit nevezünk metatarzális törésnek?","options":["A) A sípcsont (tibia) törete","B) Az öt hosszú csont törete a talp közepén","C) A bokász törete","D) A sarkcsont (calcaneus) törete"],"correctLetter":"B","explanation":"A metatarzális csontok az öt hosszú csont a talp közepén helyezkedik el, és töréseiket gyakran sportsérülések okozzák."},{"type":"BLANK","text":"A _____ a kéz szerkezetének alapját képezi és a tapintási funkciót biztosítja.","answer":"carpus (csuklócsontok)","explanation":"A carpus az 8 csuklócsontból álló csoport, amely az alkar és a kéz között helyezkedik el, és rugalmas mozgást biztosít."},{"type":"MC","text":"Melyik ízület az emberi test mobilisabb ízülete?","options":["A) A térdízület","B) A bokász","C) A vállízület","D) A csípőízület"],"correctLetter":"C","explanation":"A vállízület egy szabadon mozgatható gömbízület, amely az összes síkban mozgatható, ezért a test leges mobilis ízülete."},{"type":"MC","text":"Mit nevezünk reflex mozgásnak?","options":["A) Az akaratos, tudatos mozgás","B) Az akaratlan, automatikus mozgás, amelyet egy ingerre adnak","C) Az izomfáradás miatti mozgáshiba","D) Az izmok megsérülése miatti mozgási zavar"],"correctLetter":"B","explanation":"A reflexmozgás egy rövid ideig alatt lejátszódik akaratlan cselekvés, amely a gerincvelőn keresztül közvetlenül történik, nem igényli az agy feldolgozását."},{"type":"BLANK","text":"A _____ nyúlásos reflexe például a térdzörgés vizsgálatában használatos.","answer":"patella (sípcsont)","explanation":""},{"type":"MC","text":"Mely hormon szabályozza a csontok calciumtartalmát?","options":["A) Inzulin","B) Pajzsmirigy hormon","C) Parathormon (PTH)","D) Szomatotropin"],"correctLetter":"C","explanation":"A PTH a paratireoid mirigyet termeli, amely szabályozza a vér kalcium szintjét a csontok reabszorpciójának fokozásával."},{"type":"BLANK","text":"A _____ az izomrostok száma, amely alapvetően már a születéskor meghatározott.","answer":"szám","explanation":"Az izomrostok száma a születéskor fixált, és nem nő új izomrostok képzésével, hanem az izomrost átmérőjének növekedésével (hipertrófia) fejlődnek az izmok."},{"type":"BLANK","text":"A _____ az emberi test nagy terheléseit elég erősen képes hordani az élet során.","answer":"femur (combcsont)","explanation":"A femur az emberi test legerősebb és legnehezebb csontja, amely az egész testsúlyt megterhelheti az álló és mozgó helyzetben."},{"type":"MC","text":"Melyik hormon befolyásolja az izomfejlődést?","options":["A) Glükagon","B) Szomatotropin (növekedési hormon)","C) Kortizol","D) Melatonin"],"correctLetter":"B","explanation":"A szomatotropin az izomszövet növekedésének és a fehérjeszintézisnek a fő serkentője."},{"type":"MC","text":"Mit nevezünk a csontok \"remodelláló\" folyamatának?","options":["A) A csontok súlyának csökkentése","B) Az osteoclaszt és osteoblaszt által végzett csont-lebontás és csont-felépítés","C) Az új csontszövet képzésének leállítása","D) A csontok szöveti rendezetlenségének javítása"],"correctLetter":"B","explanation":"A csontok remodelálása egy folyamatos folyamat, amely során az osteoclaszt lebomlasztja az idős csontszövetet, az osteoblaszt pedig új csontszövetet képez."},{"type":"BLANK","text":"A _____ az izomössz csoportjaként működik a gerincoszlop körül az egyensúly megőrzéséhez.","answer":"magcsizom (core muscles)","explanation":"A magcsizmok, amelyek az egyensúlyban és a testtartás fenntartásában szerepet játszanak, a gerincoszlop körüli süllyedésből és az abs-ből felépülnek."},{"type":"MC","text":"Mely csontszövet-betegség a paratireoid mirigyen-diszfunkció miatt alakul ki?","options":["A) Hiperparatiroidizmus","B) Osteomalacia","C) Pagetti-kór","D) Rickets"],"correctLetter":"A","explanation":"A hiperparatiroidizmus a PTH túltermelése miatt az vér kalcium szintje felemelik és a csont-reabszorpció fokozódik."},{"type":"MC","text":"Mit nevezünk csontban előforduló \"Volkmann-csatornáknak\"?","options":["A) A csont hossztengelye mentén futó csatornák","B) A csontot vízszintesen összekötő csatornák a Havers-csatornákat összekapcsoló","C) Az ízületi porcolok alatti csatornák","D) A csontban a sérülés után keletkezett csatornák"],"correctLetter":"B","explanation":"A Volkmann-csatornák a hosszú csontok keresztcsatornái, amelyek a Havers-csatornákat összekapcsolják és a vérellátást biztosítják."},{"type":"BLANK","text":"Az izom I. típusú rostjai _____ munkavégzésre alkalmasabbak.","answer":"aerob (állóképesség)","explanation":"Az I. típusú izomrostok (lassú, oxidatív rostok) nagy mitokondrium-tartalommal és magas oxigén-kapacitással rendelkeznek, így kitartó munkára alkalmassak."},{"type":"BLANK","text":"Az izom II. típusú rostjai a _____ típusú munkavégzésre lesznek alkalmasabbak.","answer":"anaerob (robbanásos)","explanation":"A II. típusú izomrostok (gyors, glikolitikus rostok) magas kreatin-foszfát tartalommal rendelkeznek és rövidtávú, intenzív erőkifejtésre ideálisak."}],"taplalkozas":[{"type":"MC","text":"Hol termelődik a pepszinogén, és mi aktiválja pepszinné?","options":["A) A hasnyálmirigyben; bikarbonát aktiválja","B) A gyomor fősejtjeiben; sósav aktiválja","C) A vékonybélben; enterokinász aktiválja","D) A szájnyálkahártyán; nyálamiláz aktiválja"],"correctLetter":"B","explanation":"A pepszinogén inaktív forma (zimogén), amelyet a gyomor fedősejtjei által termelt sósav (pH 1,5–2) alakít aktív pepszinné."},{"type":"MC","text":"Melyik vitamin szükséges a normális véralvadáshoz, és a vastagbél baktériumai termelik?","options":["A) A-vitamin, a máj raktározza","B) K-vitamin, a vastagbél mikrobiómja termelik","C) C-vitamin, a máj termelik","D) D-vitamin, a bőr termelik"],"correctLetter":"B","explanation":"A K-vitamin a máj véralvadási faktorainak (pl. protrombín) szintéziséhez szükséges. Részben a vastagbél flórájában található baktériumok termelik."},{"type":"MC","text":"Mely emésztőenzim a hasnyálmirigy terméke, és milyen optimális pH-n működik?","options":["A) Nyálamiláz, pH 6–7","B) Hasnyállipáz, pH 8–9","C) Pepszin, pH 1–2","D) Laktáz, pH 5–6"],"correctLetter":"B","explanation":"A hasnyálmirigy több enzim szekrécióját végzi: lipáz (zsírfelbontás), amiláz (szénhidrát-emésztés), proteázok (fehérjefelbontás). Optimális pH 8–9 (lúgos)."},{"type":"MC","text":"Mit nevezünk glikémiás indexnek, és mit befolyásol?","options":["A) A vérnyomás emelkedésének mértékét","B) A vércukorszintre gyakorolt hatást; az emészthetőség és felszívódás sebessége","C) A szénhidrátok energiatartalmát","D) Az inzulinelválasztás sebességét"],"correctLetter":"B","explanation":"A glikémiás index egy 0–100 értékű szám, amely azt jelzi, mennyire gyorsan és mekkora mértékben emeli meg az élelmiszer a vércukorszintet."},{"type":"MC","text":"Melyik hormon jelzi az éhségérzetet, és melyik a jóllakottságot?","options":["A) Inzulin és glukagon","B) Ghrelin és leptin","C) Adrenalin és noradrenalin","D) Tiroxin és kalcitonin"],"correctLetter":"B","explanation":"A ghrelin a gyomor által termelt éhséghormon\", amely éhségérzetet kelt. A leptin a zsírszövetből származó \"jóllakottsághormon\", amely teltségérzetet kelt.\""},{"type":"MC","text":"Mit nevezünk alapanyagcserének?","options":["A) Az összes anyagcsere-folyamatok összege","B) A szervezet fenntartásához szükséges minimális energia","C) Az étkezés után mért energiafogyasztás","D) Az evés során felhasznált energia"],"correctLetter":"B","explanation":"Az alapanyagcsere a szervezet fenntartásához szükséges minimális energia termelése. Napi energiaszükséglet 60–70%-a létfenntartó működések energiáját fedezi."},{"type":"MC","text":"Mely vitamin hiánya okozza a skorbutot, és mely szövetek kerülnek károkat?","options":["A) B12-vitamin; vérképzés","B) C-vitamin; fogíny, szövetek","C) D-vitamin; csontok","D) A-vitamin; látás"],"correctLetter":"B","explanation":"Az aszkorbinsav (C-vitamin) hiánya skorbutot okoz. Jellemzője: fogíny vérzékenysége, sebek elhúzódó gyógyulása, apró bevérzések."},{"type":"MC","text":"Melyik vitamin hiánya okozza a béri-béri betegséget?","options":["A) B1-vitamin (tiamin)","B) B6-vitamin (piridoxin)","C) B12-vitamin (kobalamin)","D) Folsav"],"correctLetter":"A","explanation":"A B1-vitamin (tiamin) koenzim a szénhidrátok anyagcseréjében. Hiánya béri-béri betegséget okoz: szívelégtelenség, ödémaképződés, izomgyengeség."},{"type":"MC","text":"Mi a testtömegindex (BMI) normál értéke felnőtteknél?","options":["A) 15–20 kg/m²","B) 20–25 kg/m²","C) 25–30 kg/m²","D) 30–35 kg/m²"],"correctLetter":"B","explanation":"A BMI = testsúly(kg) / testmagasság²(m²). 20–25 között egészséges; 20 alatt sovány; 25 feletti túlsúlyos; 35 felett kóros elhízás."},{"type":"MC","text":"Mik azok az esszenciális aminosavak?","options":["A) A szervezet által szintetizálható aminosavak","B) A szervezet által nem szintetizálható aminosavak; táplálékkal kell felvenni","C) Az összes szabad aminosav","D) A szénhidrátok lebontásánál keletkező molekulák"],"correctLetter":"B","explanation":"Az esszenciális aminosavak (8–9 fajta) olyan fehérjék építőelemei, amelyeket a szervezet nem tud szintetizálni, csak táplálékkal vehetjük fel."},{"type":"MC","text":"Mit jelent a minőségi éhezés\"?","options":["A) Az elfogyasztott táplálék energiatartalma kevés","B) Elegendő mennyiség, de nem megfelelő az egyes tápanyagok aránya","C) Az vitaminhiány","D) Az elhízás korai szakasza\""],"correctLetter":"B","explanation":"Minőségi éhezés: elegendő mennyiségű táplálék, de hiányos az ásványi anyagok, vitaminok, esszenciális aminosavak mennyisége."},{"type":"MC","text":"Mit csinál az epe a zsírokkal a vékonybélben?","options":["A) Denaturálja őket","B) Emulgeálja (feldarabolja) őket, nagyobb felszínt biztosítva","C) Közvetlenül lebontja őket","D) Glicerinné alakítja őket"],"correctLetter":"B","explanation":"Az epelepések felületaktív anyagok, amelyek nagy zsírcseppeket sok kis cseppecskékre bomlanak, így nagyobb felszínt biztosítva a lipáz enzimnek."},{"type":"MC","text":"Melyik szövetben található a bélbolyhok, és mi a funkciójaik?","options":["A) A gyomorban; az emésztés megkezdése","B) A vékonybél nyálkahártyájában; a tápanyagok felszívása","C) A vastagbélben; a víz felszívása","D) A máj szövetében; az anyagcsere szabályozása"],"correctLetter":"B","explanation":"A bélbolyhok (villi) a vékonybél nyálkahártyájának szövetei. Mikrobolyhokkal együtt ~600-szorosára növelik a felszívó felületet."},{"type":"MC","text":"Mit jelent a laktózintolerancia?","options":["A) A cukor túlfogyasztása","B) A laktáz enzim hiánya vagy csökkent aktivitása","C) Az allergia a tejproteinekre","D) A tejsavbaktériumok hiánya"],"correctLetter":"B","explanation":"A laktózintolerancia: a vékonybélben termelődő laktáz enzim hiánya vagy elégtelen mennyisége, amely a laktóz (tejcukor) bontásáért felelős."},{"type":"MC","text":"Mi a máj legfontosabb funkciója az anyagcserében?","options":["A) Az epe termelése és szűrés","B) A glükóz, glikogén, zsír szintézise és raktározása; fehérjefelbontás","C) Az immunsejtek termelése","D) Az hormonok szintézise"],"correctLetter":"B","explanation":"A máj központi szerepet játszik az anyagcserében: szintézisébe, raktározásba, fehérjeszintézisébe, méregtelenítésbe."},{"type":"MC","text":"Mely enzim és optimális pH a szénhidrátok emésztésének megkezdésére?","options":["A) Pepszin; pH 1–2","B) Nyálamiláz; pH 6–7","C) Hasnyállipáz; pH 8–9","D) Triptáz; pH 5–6"],"correctLetter":"B","explanation":"A szénhidrátok emésztése a szájban kezdődik nyálamiláz segítségével, amely keményítőt (poliszacharidot) maltózzá (diszzacharid) bontja."},{"type":"MC","text":"Melyik szerv termel inzulint, és mi a hatása?","options":["A) A hasnyálmirigy; csökkenti a vércukorszintet","B) A máj; növeli az energiaforgalmat","C) Az agy; szabályozza az éhségérzetet","D) A vese; szabályozza a vér pH-ját"],"correctLetter":"A","explanation":"Az inzulin a hasnyálmirigy béta-sejtjei által termelt hormon. Hatása: a glükóz felhasználásának fokozása, glikogén és zsír szintézisének segítése."},{"type":"MC","text":"Mit nevezünk mikrobióm-nak a vastagbélben, és mi a funkciója?","options":["A) Az emésztőenzimek","B) A baktériumok közössége; vitamin K termelés, rostok lebontása","C) A vastagbél izomzata","D) Az emészthetetlen anyagok"],"correctLetter":"B","explanation":"A vastagbél mikrobiómja trilló baktériumokból áll, amelyek K-vitamint termelnek, rostokat lebontanak, rövidbetűlánc zsírsavakat képeznek."},{"type":"MC","text":"Melyik vitamin-csoport szükséges a vérképzéshez?","options":["A) A-, D-, E-vitamin","B) B6-, B12-vitamin, folsav","C) C-, K-vitamin","D) B1-, E-vitamin"],"correctLetter":"B","explanation":"A B12-vitamin, B6-vitamin és folsav szükségesek az eritrocitok, leukociták, vérlemezkék képzéséhez. Hiányuk vérképzési zavarokat okoz."},{"type":"MC","text":"Mi az a cöliákia, és mi az oka?","options":["A) A glutén fehérje felismerésében zavar; genetikai hajlam + glutén","B) A laktóz felszívódásának zavar","C) A zsírfelbontás zavar","D) A gyomornedv termelésének zavar"],"correctLetter":"A","explanation":"A cöliákia: egy autoimmunis betegség, amelynek során a szervezet a glutént sérülékeny vegyületnek tekinti, így a vékonybél nyálkahártyája sérül."},{"type":"MC","text":"Mitől függ az étrendi elvárások változása?","options":["A) Csak a testmagasságtól","B) Tevékenységtől, kortól, nemtől és élettani állapottól","C) Csak a BMI-től","D) Az alapanyagcsere értékétől és a glikémiás indextől"],"correctLetter":"B","explanation":"Az étrendi elvárások változnak: fizikai aktivitás, kor, nem (férfiak magasabb alapanyagcsere), élettani állapot (terhesség, szoptatás)."},{"type":"MC","text":"Mely fogtípusok vannak az emberi fogazatban?","options":["A) Csak őrlőfogak és szemfogak","B) Metszőfogak, szemfogak, kis- és nagyőrlők","C) Előfogak, métódikafogak, őrlőfogak","D) Alsó és felső fogak egyforma típusa"],"correctLetter":"B","explanation":"Az emlős fogazat heterodont: 2 metszőfog, 1 szemfog, 2 kisőrlő, 3 nagyőrlő egy kvadránsban (összesen 32 fog felnőtteknél)."},{"type":"MC","text":"Mit nevezünk rostanyagoknak, és milyen hatásuk van?","options":["A) Fehérjeforrások","B) Az emészthetetlen szénhidrátok; vízfelvétel, perisztaltika fokozása","C) Energiaforrások","D) Enzimek; az anyagcsere gyorsítása"],"correctLetter":"B","explanation":"A rostok (cellulóz, hemicellulóz) olyan élelmiszer-összetevők, amelyeket a szervezet nem tud megemészteni. Hatásuk: vízfelvétel, perisztaltika fokozása, jóllakottságérzet."},{"type":"MC","text":"Melyik vitamin szükséges a kalcium felszívódásához és a csontok erősítéséhez?","options":["A) A-vitamin","B) B12-vitamin","C) C-vitamin","D) D-vitamin"],"correctLetter":"D","explanation":"A D-vitamin (kalcitriol) elősegíti a kalcium felszívódását a bélből és beépülését a csontokba. Hiánya kalciumhiányt, angol-kört okoz."},{"type":"MC","text":"Milyen hatása van az A-vitaminnak a hámsejtek tekintetében?","options":["A) Antioxidáns hatás","B) A hámfelületek (bőr, légutak) védelme","C) A vérnyomás szabályozása","D) Az izomfejlesztés"],"correctLetter":"B","explanation":"Az A-vitamin fontos a hámfelületek védelmében, így véd a hámon keresztül történő fertőzések ellen. Hiánya szürkületi vakság, hámszövetek sorvadása."},{"type":"MC","text":"Mely vitaminhiány-betegségből szenved az angol-kór?","options":["A) B1-vitamin hiánya","B) C-vitamin hiánya","C) D-vitamin hiánya","D) K-vitamin hiánya"],"correctLetter":"C","explanation":"Az angol-kór (rükét) a D-vitamin hiánya miatt alakul ki. Jellemzője: kalcium felszívódásának zavar, csontrendszeri deformitások."},{"type":"MC","text":"Melyik szerv működésében játszik kulcsszerepet a B12-vitamin?","options":["A) Az agyban; ideghálózat fejlesztés","B) A vérképzésben és az ideges működésekben","C) A szájüreg; nyál termelés","D) A belekben; emésztőenzimek"],"correctLetter":"B","explanation":"A B12-vitamin (kobalamin): szükséges a vörösvértestek érésében, hemoglobin képzésében és a normális ideges működésekhez."},{"type":"MC","text":"Mit jelent az E-vitamin antioxidáns hatása?","options":["A) Megemésztésében segít","B) Megakadályozza a többszörösen telítetlen zsírsavak oxidációját","C) Növeli az inzulin termelést","D) Fokozza a csontok feltöltődését"],"correctLetter":"B","explanation":"Az E-vitamin könnyen oxidálódik, miközben antioxidáns hatást fejt ki, így megakadályozza a többszörösen telítetlen zsírsavak oxidációját."},{"type":"MC","text":"Mit jelent a BMI 20 alatti értéke?","options":["A) Túlsúlyos","B) Egészséges","C) Sovány","D) Kóros elhízás"],"correctLetter":"C","explanation":"BMI kategóriák: 20 alatti = sovány; 20–25 = egészséges; 25 feletti = túlsúlyos; 35 feletti = kóros elhízás."},{"type":"MC","text":"Melyik vitamin szükséges a kötőszövetek kollagénjének képzéséhez?","options":["A) B1-vitamin","B) B6-vitamin","C) C-vitamin","D) D-vitamin"],"correctLetter":"C","explanation":"Az aszkorbinsav (C-vitamin) közreműködik a kötőszövetek kollagénjének képzésében. Antioxidáns hatása és immunrendszer-támogatása."},{"type":"MC","text":"Mit nevezünk túltápláltságnak, és mi az eredménye?","options":["A) Az étkezés túlzott gyakorisága","B) Az elfogyasztott táplálék energiatartalma meghaladja az energiaszükségletet – elhízás","C) Az alapanyagcsere magasabb értéke","D) A fizikai aktivitás hiánya"],"correctLetter":"B","explanation":"Túltápláltság: az elfogyasztott táplálék energiatartalma rendszeresen meghaladja az energiaszükségletet, így elhízás alakul ki."},{"type":"MC","text":"Mely szövet sérül a cöliákiában?","options":["A) A gyomorfal nyálkahártyája","B) A vékonybél nyálkahártyája","C) Az elégtelen enzimtermelés","D) Az epehólyag falai"],"correctLetter":"B","explanation":"A cöliákia: a vékonybél nyálkahártyája sérül glutén hatására (autoimmunis válasz), a bélbolyhok atrófiája, felszívódási zavarok."},{"type":"MC","text":"Mit termel a máj az emésztéshez, és melyik szervben tárolódik?","options":["A) Enzimeket; a hasnyálmirigyben","B) Epét; az epehólyagban","C) Sósavat; a gyomorban","D) Nyálat; a nyálmirigyben"],"correctLetter":"B","explanation":"A máj epét termel. Az epét az epehólyag tárol és koncentrálja, majd az epevezeték révén a duodenumba jut."},{"type":"MC","text":"Melyik hormon a gyomorból származik, és mi a hatása az agyon?","options":["A) Leptin; fokozza az étvágyat","B) Ghrelin; serkenti a dopaminfelszabadulást az agyi jutalmazó központban","C) Inzulin; csökkenti a vércukorszintet","D) Glukagon; növeli a glükóz termelést"],"correctLetter":"B","explanation":"A ghrelin a gyomor falából származó hormon. Az éhségérzetet kiváltja, és az agyi jutalmazó központjában (dopamin) serkenti az evéssel járó örömérzetet."},{"type":"MC","text":"Mely ásványi anyagok szükségesek a csontok szilárdságához és a fogak minőségéhez?","options":["A) Nátrium","B) Kalcium és foszfor","C) Magnézium és kén","D) Cink és réz"],"correctLetter":"B","explanation":"A kalcium és foszfor (mint hidroxiapatit: Ca10(PO4)6(OH)2) a csontok és fogak szilárd felépítésében játszik kulcsszerepet."},{"type":"MC","text":"Mit termel a szájüreg nyálkahártyájának mucinózus sejtjei?","options":["A) Sósavat","B) Pepszinogént","C) Nyákszerű mucint","D) Lipázt"],"correctLetter":"C","explanation":"A szájüreg és gyomor hámja mucinózus melléksejteket tartalmaz, amelyek nyákszerű mucint termelnek. Feladata: mechanikai védelem, kiszáradás elleni védelem."},{"type":"BLANK","text":"A vékonybél nyálkahártyájának felszívófelületét a _____ és a mikrobolyhok kb. 600-szorosára növelik.","answer":"bélbolyhok","explanation":"A bélbolyhok és mikrobolyhok (kefeszegély) óriási felszínnövelő hatása elengedhetetlen a tápanyagok hatékony felszívásához."},{"type":"BLANK","text":"A pepszin inaktív formája, amelyet a gyomor fősejtjei termelnek _____, és a sósav aktiválja pepszinné.","answer":"pepszinogén","explanation":"A pepszinogén egy zimogén (pro-enzim), melyet a gyomor fedősejtjei termelnek. Az alacsony pH (sósav) aktiválja pepszinné."},{"type":"BLANK","text":"Az emésztőnedvek közül az _____ az, amit a máj termel és az epehólyag tárol.","answer":"epe","explanation":"Az epe zsíremulgeáló hatása miatt nélkülözhetetlen a zsír emésztéséhez. Az epesav sójainak felületaktív hatása feldarabolja a nagy zsírcseppeket."},{"type":"BLANK","text":"Az enzim, amely a keményítőt maltózzá bontja, és a szájban működik, a _____.","answer":"nyálamiláz","explanation":"A nyálamiláz (α-amiláz) a szájmirigyek terméke. Semleges pH-n működik, és a keményítő lebontása megkezdődik már a szájban."},{"type":"BLANK","text":"A _____ az a hormon, amelyet a gyomor üressége esetén a gyomor fala választ el, és éhségérzetet kelt.","answer":"ghrelin","explanation":"A ghrelin az éhséghormon\". Szintje a gyomor üresítésekor megemelkedik, jelet ad az éhségközpontnak, és örömérzetet kelt az evés során.\""},{"type":"BLANK","text":"A zsírszövet sejtjeiből származó hormon, amely a jóllakottságot jelzi, a _____.","answer":"leptin","explanation":"A leptin a zsírszövetből termelt jóllakottsághormon\". A hipotalamuszban fejti ki hatását, és csökkentett szintje tartós éhségérzetet okozhat.\""},{"type":"BLANK","text":"A vékonybélben termelődő _____ enzimek a diszzacharidokat (pl. maltóz, laktóz) monoszacharidokra bontják.","answer":"szacharáz, laktáz, maltáz","explanation":"Ezek a membránpeptidázok a vékonybél börkhámjában helyezkednek el. Fontos képviselői: laktáz (laktóz), maltáz (maltóz), szacharáz (szachóz)."},{"type":"BLANK","text":"A lipáz enzim, amely a zsírokat (triglicerideket) felhasználható összetevőkre bontja, a _____ terméke.","answer":"hasnyálmirigy","explanation":"A hasnyállipáz a hasnyálmirigy sejtjei által termelt enzim. Az emésztés során a feldarabolt zsírcseppecskéket (az epe emulgeálása után) továbbá bontja."},{"type":"BLANK","text":"A tripszin, amely a fehérjéket lebontja, a hasnyálmirigy terméke és a vékonybélben _____ aktiválódik.","answer":"enterokinász","explanation":"A tripszin inaktív formában (tripszinogén) érkezik a hasnyálmirigyből. Az enterokinász enzim aktiválja peptidbevágással."},{"type":"BLANK","text":"A molekula, amely az emulgeálás során a nagy zsírcseppecskéket kis micellákká darabolja, az _____ sava.","answer":"epesav","explanation":"Az epesavak (kolsav-származékok) felületaktív anyagok, amelyek a zsír-víz határfelületen helyezkednek el. Így micellák képzésében segítik az emésztést."},{"type":"BLANK","text":"A glikémiás index egy _____ értékű szám, amely a vércukorszintre gyakorolt hatást jellemzi.","answer":"0 és 100 közötti","explanation":"A GI alacsony (0–55), közepes (56–69) vagy magas (70–100) lehet. A magas GI élelmiszerek gyorsan emelik a vércukorszintet."},{"type":"BLANK","text":"Az alapanyagcsere az a _____, amely a szervezet fenntartásához szükséges.","answer":"minimális energia","explanation":"Az alapanyagcsere az AMR (alapmetabolikus ráta), amely a szervezet pihenő állapotában szükséges energia. Ez függ a nemtől, kortól, tömegről."},{"type":"BLANK","text":"A C-vitamin hiánya a _____ betegséget okozza, amelyre a fogíny vérzékenysége jellemző.","answer":"skorbut","explanation":"A skorbut az aszkorbinsav (C-vitamin) hosszú távú hiányából adódik. Jellemzője: fogíny vérzékenysége, apró bevérzések, sebek elhúzódó gyógyulása."},{"type":"BLANK","text":"A BMI-t a _____ képlettel számolják: testsúly (kg) / testmagasság² (m²).","answer":"Quetelet","explanation":"A Quetelet-index vagy BMI segít az egészséges testsúly meghatározásában. Normál érték: 20–25 kg/m²."},{"type":"BLANK","text":"A _____ a fogazat része, amely a fogmederben helyezkedik el és a fog megtartásáért felelős.","answer":"foggyökér","explanation":"A foggyökér a cementállomány által borított része a fognak. A cementszövet és a periodonciális szalagok tartják a fogat a fogmederben."},{"type":"BLANK","text":"A D-vitamin hiánya az _____ betegséget okozza, amely csontrendszeri deformitásokkal jár.","answer":"angol-kór","explanation":"Az angol-kór (rickets) a D-vitamin hiánya miatt alakul ki. A kalcium nem szívódik fel megfelelően, így a csontok nem kemenyednek meg."},{"type":"BLANK","text":"Az a folyamat, amikor a nagy zsírcseppecskék kis cseppecskékre bomlanak az epe hatására, az _____.","answer":"emulgeálás","explanation":"Az emulgeálás a zsír feldarabolása nagy felület elérése érdekében. Ez nagyobb terület biztosít a lipáz enzim molekuláinak."},{"type":"BLANK","text":"A mikrobolyhok (mikrovilli) a _____ sejtek felszínén helyezkednek el a vékonybél nyálkahártyájában.","answer":"bélepitél","explanation":"A mikrobolyhok az epitélium apikális (felületi) oldalán helyezkednek el, és további felszínnövelést biztosítanak a tápanyagok felszívásához."},{"type":"BLANK","text":"A _____ egy olyan élelmiszer-összetevő, amelyet a szervezet nem tud megemészteni, de a vastagbél baktériumai részben lebontanak.","answer":"rost","explanation":"A rostok (cellulóz, hemicellulóz) a növények szerkezeti elemei. A vastagbél mikrobiómja fermentálja őket, rövidbetűlánc zsírsavakat termelve."}],"legzes":[{"type":"MC","text":"Melyik szerv a légzőrendszer felső része, amely a levegőt melegíti, nedvesíti és szűri?","options":["A) Garat","B) Orrüreg","C) Gége","D) Légcső"],"correctLetter":"B","explanation":"Az orrüreg epiteliuma nyáktermelő és sörte-szerű csillók segítik a levegő tisztítását, melegítését és nedvesítését."},{"type":"MC","text":"Melyik szerv tartalmazza a hangszalagokat és a hanglejtés szabályozásáért felelős?","options":["A) Légcső","B) Garat","C) Gége","D) Hörgő"],"correctLetter":"C","explanation":"A gége (larynx) tartalmazza a hangszalagokat, és felelős a hangképzésért. Működéseit az agyálapi idegek vezérlik."},{"type":"MC","text":"Melyik szerv szerepe a légzőrendszerben az oxigén és szén-dioxid cseréje az alveolusokban?","options":["A) Hörgőcskék","B) Léghólyagocskák (alveolusok)","C) Legcsatornák","D) Mellhártya"],"correctLetter":"B","explanation":"Az alveolusok egyrétegű laphámsejtek által burkoltak, és itt történik az aktív gázcsere a vérrel."},{"type":"MC","text":"Mi a fő szerepe a rekeszizomnak a belégzés folyamatában?","options":["A) Behúzza a bordákat","B) Lefelé mozdul és megnöveli a mellüreg térfogatát","C) Kifelé húzza a bordákat","D) Csökkenti az intrapleurális nyomást"],"correctLetter":"B","explanation":"A rekeszizom összehúzódásakor lefelé mozdul, növeli a mellüreg térfogatát, így csökken az intrapleurális nyomás, és levegő áramlik be."},{"type":"MC","text":"Hogyan működik a bordaközi izmok az erőteljes belégzésben?","options":["A) Lecsökkentik a mellüreg térfogatát","B) Összeédegetik és emelik a bordákat","C) Csökkentik az intrapleurális nyomást","D) Gátolják a diafragma működését"],"correctLetter":"B","explanation":"A külső bordaközi izmok az erőteljes belégzésben összehúzódnak és felemelik a bordákat, megnövelve a mellüreg térfogatát."},{"type":"MC","text":"Melyik nyomásértékre vonatkozik a Donders-modell a mellkasi légzésben?","options":["A) Légköri nyomás és alveoláris nyomás","B) Intrapleurális nyomás és alveoláris nyomás","C) Légköri nyomás és intrapulmonális nyomás","D) Szövetnyomás és pleurális nyomás"],"correctLetter":"B","explanation":"A Donders-modell az intrapleurális és alveoláris nyomáskülönbség alapján magyarázza a légzési folyamatokat."},{"type":"MC","text":"Mi a vitálkapacitás definíciója?","options":["A) Az egy percet alatt kilégzett levegő mennyisége","B) A maximális levegő, amit egyes belégzés után kilégezhetünk","C) A reziduális térfogat és a kilégzési térfogat összege","D) Az alveolusokban lévő levegő térfogata"],"correctLetter":"B","explanation":"A vitálkapacitás az a maximális levegőmennyiség, amelyet egy erőteljes kilégzéssel kiüríthetünk a tüdőből."},{"type":"MC","text":"Melyik tényező nem befolyásolja az aktív sportoló és nem sportoló fiúk vitálkapacitásának különbségét?","options":["A) Tüdő térfogata","B) Mellkas mérete","C) Vérnyomás","D) Szív-keringési rendszer teljesítménye"],"correctLetter":"C","explanation":"A vitálkapacitást a tüdő mérete, mellkas nagysága és az izmok ereje befolyásolja, nem a vérnyomás közvetlenül."},{"type":"MC","text":"Mit jelent az oxihemoglobin-disszociációs görbe meredeksége?","options":["A) A hemoglobin oxigénkötésének hatékonyságát","B) Az oxihemoglobin oxigénleadásának sebességét az O₂ parciális nyomásán","C) Az oxigen oldódásának mértékét a vérplazmában","D) A szén-dioxid kötésének erősségét"],"correctLetter":"B","explanation":"A görbe az oxihemoglobin oxigénleadásának sebességét mutatja az oxigén parciális nyomás függvényében."},{"type":"MC","text":"Mi a Bohr-effektus fiziológiai szerepe?","options":["A) Az oxihemoglobin stabilitásának növelése","B) Az hemoglobin oxigénleadásának fokozása savas és CO₂-ban gazdag szövetekben","C) Az oxigen oldódásának javítása","D) Az eritrocita membránának a rugalmasságát"],"correctLetter":"B","explanation":"A Bohr-effektus azt jelenti, hogy az alacsonyabb pH és magasabb CO₂-szint csökkenti a hemoglobin oxigénaffinitását."},{"type":"MC","text":"Hogyan szállítódik el a szén-dioxid a szövetekből a tüdőhöz?","options":["A) Teljes mennyisége oxihemoglobinban","B) Egy része hemoglobinhoz kötve, zöme bikarbonátionként az oldatban","C) Csak szabad CO₂ formában az oldatban","D) Kizárólag plazmafehérjékhez kötve"],"correctLetter":"B","explanation":"Az E szén-dioxid mintegy 23%-a hemoglobinhoz kötve, 70%-a bikarbonátionként szállítódik az oldatban."},{"type":"MC","text":"Melyik terület az agy szén-dioxid és pH-érzékelésének központja?","options":["A) Nagykéreg","B) Aprócérgi","C) Nyúltvelő","D) Agy hipotalamusza"],"correctLetter":"C","explanation":"A nyúltvelő kemoreceptorai érzékelik a szén-dioxid és a pH-változásokat, és szabályozzák a légzés sebességét."},{"type":"MC","text":"Mi történik a légzésszámban, amikor a vér CO₂-szintje megemelkedik?","options":["A) Csökken a légzésszám","B) Nő a légzésszám","C) Változatlan marad a légzésszám","D) Hirtelen leáll a légzés"],"correctLetter":"B","explanation":"A megemelkedett CO₂-szint acidózist okoz, amely stimulálja a nyúltvelő kemoreceptorait és fokozza a légzést."},{"type":"MC","text":"Melyik betegség a COPD diagnózisa?","options":["A) Krónikus bronchitis és tüdőtágulat","B) Akut tüdőgyulladás","C) Tüdőembólia","D) Általános szisztémás gyulladás"],"correctLetter":"A","explanation":"A COPD a krónikus obstruktív tüdőbetegség, amely krónikus bronchitist és tüdőtágulatot foglal magában."},{"type":"MC","text":"Mi az asztma kiváltó oka az allergiás formában?","options":["A) Vírusfertőzés","B) Allergenek által aktiválódott szöveti masztociták","C) Mechanikus légutak-szűkület","D) Szív-keringési elégtelenség"],"correctLetter":"B","explanation":"Az allergiás asztmában az allergen masztocitákat aktivál, amelyek hisztamint és más gyulladásos mediátorokat felszabadítanak."},{"type":"MC","text":"Hogyan változik a légzésszám az erőteljes fizikai munkavégzés után?","options":["A) Csökken","B) Azonnal visszatér az eredeti szintre","C) Fokozódik","D) Nullára csökken"],"correctLetter":"C","explanation":"Az izomlétesítmény megnöveli az anyagcsere-sebességet, több O₂-re van szükség és több CO₂ termelődik, ezért nő a légzésszám."},{"type":"MC","text":"Mi a mellasi légzés jellemzője?","options":["A) A bordák felemelkednek és kitágulnak","B) A bordák lesüllyednek és összehúzódnak","C) A rekeszizom lefelé mozdul","D) A hasizmok feszülnek meg"],"correctLetter":"A","explanation":"A mellási légzésben a bordaközi izmok összehúzódnak, felemelve a bordákat és kitágítva a mellüreg oldalról."},{"type":"MC","text":"Mi a hasi légzés jellemzője?","options":["A) A mellkas kitágul","B) A has kiemelkedik a belégzéskor","C) Az alsó bordák mozognak","D) A bordaközi izmok kontrahálnak"],"correctLetter":"B","explanation":"A hasi légzésben a rekeszizom összehúzódása miatt a has kiemelkedik, kiterjesztve az abdominális szöveteket."},{"type":"MC","text":"Melyik az parciális nyomás szimbóluma az alveolusban?","options":["A) PAO₂","B) PVO₂","C) PCO₂","D) PHgmm"],"correctLetter":"A","explanation":"A PAO₂ az alveolar parciális oxigén nyomásának szimbóluma, amely körülbelül 100 Hgmm."},{"type":"MC","text":"Mi az artériás oxigen parciális nyomásának normál értéke?","options":["A) 40 Hgmm","B) 100 Hgmm","C) 60 Hgmm","D) 80 Hgmm"],"correctLetter":"B","explanation":"Az artériás oxigen parciális nyomása (PaO₂) normál értéke körülbelül 80-100 Hgmm, mely jelenti az intenzív oxigenizálódást."},{"type":"MC","text":"Melyik szerv működésének zavar okozza az alveoláris-kapilláris gázcsere háborítottsága?","options":["A) Máj","B) Szív","C) Vesék","D) Tüdő"],"correctLetter":"D","explanation":"A tüdőben egyensúly biztosít az oxigen felvételéről és a szén-dioxid eltávolításáról."},{"type":"MC","text":"Hogyan működik a nagyon extrém magasságban a hemoglobin oxigénaffinitása?","options":["A) Nő","B) Nem változik","C) Csökken","D) Nullára esik"],"correctLetter":"A","explanation":"Az alacsonyabb O₂ parciális nyomáson a hemoglobin erősebben kötödik az oxigénhez az alkalmazkodás érdekében."},{"type":"MC","text":"Mi a Donders-modell alapkoncepciója?","options":["A) A légzőizmok nyomása közvetlenül mozgatja a légcsövet","B) Az intrapleurális nyomáskülönbség biztosítja a légzést","C) A hemoglobin oxigént tárol","D) A CO₂ bikarbonátként szállítódik"],"correctLetter":"B","explanation":"A Donders-modell azt írja le, hogy az intrapleurális nyomás változása vezérli a légzési folyamatokat."},{"type":"MC","text":"Milyen típusú transzport a szén-dioxid szállítása bi
