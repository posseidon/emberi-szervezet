<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lumina - Learning Hub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700&amp;f[]=satoshi@400,500&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0fbd52",
                        "primary-alt": "#5A7163",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102217",
                        "surface": "#FFFFFF",
                        "text-main": "#2B302D",
                        "text-muted": "#909893",
                        "border-color": "#E3E5E4",
                        "accent": "#D4A373"
                    },
                    fontFamily: {
                        "display": ["'Cabinet Grotesk'", "Manrope", "sans-serif"],
                        "body": ["'Satoshi'", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "sm": "0.25rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #f6f8f7;
            color: #2B302D;
            font-family: 'Satoshi', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-transition { transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover {
            border-color: #909893;
            transform: translateY(-2px);
        }
        .card-hover { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-main font-body min-h-screen flex flex-col">
    <!-- Top Navigation Bar (Always Visible) -->
    <header id="main-header" class="flex items-center justify-between border-b border-solid border-border-color bg-surface px-6 md:px-10 py-3 shrink-0 z-50">
        <div class="flex items-center gap-8">
            <a href="#/" class="flex items-center gap-4 text-text-main hover:opacity-80 transition-opacity">
                <div class="size-4 text-primary">
                    <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <g clip-path="url(#clip0_6_330)">
                            <path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
                        </g>
                        <defs>
                            <clippath id="clip0_6_330"><rect fill="white" height="48" width="48"></rect></clippath>
                        </defs>
                    </svg>
                </div>
                <h2 class="text-text-main text-lg font-bold leading-tight tracking-[-0.015em] font-display">Lumina</h2>
            </a>
            <div id="header-search" class="hidden sm:block">
                <label class="flex flex-col min-w-40 !h-10 max-w-64">
                    <div class="flex w-full flex-1 items-stretch rounded-sm h-full border border-border-color overflow-hidden">
                        <div class="text-text-muted flex bg-background-light items-center justify-center pl-4 pr-2">
                            <span class="material-symbols-outlined text-[20px]">search</span>
                        </div>
                        <input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden text-text-main focus:outline-none focus:ring-0 border-none bg-background-light h-full placeholder:text-text-muted px-2 text-sm font-medium leading-normal" placeholder="Search" value=""/>
                    </div>
                </label>
            </div>
        </div>
        <div class="flex items-center gap-4">
             <div class="hidden md:flex flex-col items-end mr-2">
                <span class="text-xs font-bold text-text-muted uppercase tracking-widest">Active Session</span>
                <span id="session-timer" class="text-sm font-medium">00:00:00</span>
            </div>
            <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 border border-border-color" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA6_tzCNo_lEtIxv5j3RqOV17ibIHNH7JIl8WJDIX2t_d7uue4vRecj3FPGkoEFA7Pj8p0uYu0NUMTgHMCcNUjKdFzEtvm_9q0nkOhtKeTmp3Y_bVKnt5hPedNiOz3cFyo4OL40k9OZ_jJ64QZSjAoHkvZQZXA4pm36JbY0wEI4fbMeyflbD4ihI-FbrlPSKfDCdUeqHrKJ_OrarYpJyGabUyhLSdGsXlcFdFlhdp2G8SW-h-KgztDZsql4xeS1zyd2iVWFYhu5Bwph");'></div>
        </div>
    </header>

    <!-- Content Area (Dynamic) -->
    <main id="app" class="flex-1 flex flex-col">
        <!-- View content will be injected here -->
        <div id="view-loading" class="flex-1 flex items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary"></div>
        </div>
    </main>

    <!-- Global Scripts -->
    <script src="js/data-service.js"></script>
    <script src="js/components.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
