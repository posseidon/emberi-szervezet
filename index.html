smirigy ellen irányul?","options":["A) Rheumatoid arthritis","B) Hashimoto-tiroiditisz","C) Rendszeres lupusz (SLE)","D) Szceródermia"],"correctLetter":"B","explanation":"A Hashimoto-tiroiditisz egy autoimmun betegség, amelyben az immunrendszer a pajzsmirigy epitélsejtjei és peroxidáz enzim ellen támad."},{"type":"MC","text":"Mi az elsődleges immunválasz jellemzője?","options":["A) Azonnal hat","B) Lassú, de hosszan tartó IgG termelés","C) Rövid latencia, IgM termelésből indul","D) Nem igényel memóriasejteket"],"correctLetter":"C","explanation":"Az elsődleges immunválasz az első antigénnel való találkozás során történik, és az IgM-mel kezdődik, mielőtt az IgG átvenne."},{"type":"MC","text":"Milyen szerepe van az immunológiai memóriának?","options":["A) Azonnal elpusztítja az összes antigént","B) Gyorsabb és erősebb válasz a második találkozáskor","C) Az antigén azonosítása a terápián keresztül","D) Az autoimmunitás megelőzése"],"correctLetter":"B","explanation":"A memória-B-sejtek és memória-T-sejtek a másodlagos immunválaszban gyorsabban és nagyobb intenzitással reagálnak."},{"type":"MC","text":"Mi az élő attenuált vakcina (1. generáció) jellemzője?","options":["A) Teljesen inaktiv kórokozó","B) Legyengített, de még fertőzőképes vakcinavírus","C) Kizárólag vírus fehérjéket tartalmaz","D) Genetikailag módosított vakcina"],"correctLetter":"B","explanation":"Az élő attenuált vakcinák (pl. MMR, sárga láz) legyengített kórokozókat tartalmaznak, erős immunválaszt váltanak ki."},{"type":"MC","text":"Mit tartalmaz a rekombináns vakcina (2. generáció)?","options":["A) Élő kórokozó","B) Meghalt teljes kórokozó","C) Genetikailag előállított vírus fehérjéket (pl. hepatitis B felszínantigen)","D) Több élő vírust egyszerre"],"correctLetter":"C","explanation":"A rekombináns vakcinák (pl. hepatitis B, HPV-vakcina) a genetikailag szintetizált vírus fehérjéket tartalmaznak."},{"type":"MC","text":"Miért biztonságos az mRNS vakcina?","options":["A) Nem tartalmaz fehérjéket","B) Az mRNS nem integrálódik a DNS-be, és gyorsan lebomlik","C) Teljesen helyreállítja a CD4⁺ T-sejteket","D) Nem vált ki immunválaszt"],"correctLetter":"B","explanation":"Az mRNS vakcinákat lipidnanopartikulák csomagolják"},{"type":"MC","text":"Mi a természetes passzív immunitás tipikus példája?","options":["A) Tetanusz elleni oltás","B) Anyai antitestek az újszülött számára a placentán keresztül","C) Hepatitis B vakcina","D) Poliomielitis oltás"],"correctLetter":"B","explanation":"Az anyai antitestek (főleg IgG) átjutnak a placentán és ideiglenesen védelmet nyújtanak az újszülöttnek."},{"type":"MC","text":"Melyik vakcina tartozik az 1. generáció közé és élő attenuált?","options":["A) Hepatitis B","B) Sárga láz vakcina","C) COVID-19 mRNS vakcina","D) Tetanusz toxoid"],"correctLetter":"B","explanation":"A sárga láz vakcina élő attenuált vakcina, amely erős és hosszú ideig tartó immunitást biztosít."},{"type":"MC","text":"Melyik sejt a fő antígénbemutatói sejt (APC)?","options":["A) T-sejt","B) Dendritikus sejt","C) Érythrocita","D) Thrombocita"],"correctLetter":"B","explanation":"A dendritikus sejt a klasszikus APC, amely az innatív T-sejteknek mutatja be az antigént az MHC II.-n keresztül."},{"type":"MC","text":"Mi történik a hízósejtekben az allergia során (I. típusú hipersenzitivitás)?","options":["A) Antitest termelés indukciója","B) Hisztamin és más mediátorok felszabadulása az IgE-kötés által","C) T-sejt aktiváció az MHC I.-n keresztül","D) Komplement aktiváció"],"correctLetter":"B","explanation":"Az allergiában az IgE az hízósejtek felszínén kötődik, és az allergén újbóli expozíción keresztszeres kötéseket indít."},{"type":"MC","text":"Mit jelent a szervtranszplantáció elutasítása (rejekció)?","options":["A) A transzplantált szerv nem működik","B) Az immunrendszer az idegentest (transzplantátum) sejtjeit ismerhe fel és támadja meg","C) A sebészeti kötés mérete nem megfelelő","D) Az anesztézia mellékhatása"],"correctLetter":"B","explanation":"Az elutasítás az adaptív immunitás következménye – a T-sejtek az MHC különbözőséget felismerik az idegentest sejtjein."},{"type":"MC","text":"Mi az HIV/AIDS kialakulásának immunológiai alapja?","options":["A) CD4⁺ T-sejtek pusztulása és az immunrendszer összeomlása","B) Az MHC I. molekulák hiánya","C) A hízósejtek nem működése","D) Az antitestek túltermelt mennyisége"],"correctLetter":"A","explanation":"A HIV a CD4⁺ T-sejteket fertőzi meg és elpusztítja, így az adaptív immunitás szétesik."},{"type":"MC","text":"Mi az NK-sejt (Natural Killer) funkciója a veleszületett immunitásban?","options":["A) Antitestek termelése","B) Antigénbemutató sejt funkció","C) Vírusos vagy malignus sejtek felismerése és elpusztítása (apoptózis)","D) Nyiroksejtek összehangzása"],"correctLetter":"C","explanation":"Az NK-sejtek az MHC I. hiánya vagy rendellenes csökkentéseit felismerik, és közvetlenül indítanak apoptózist."},{"type":"MC","text":"Hogyan működik az interferonok funkciója az immunrendszerben?","options":["A) Antitesteket termelnek","B) Vírust termelnek és szóródnak","C) Fertőzött sejtek által felszabadított szignálanyag, amely a szomszédos sejtekre figyelmeztet","D) Fagocitózis végez"],"correctLetter":"C","explanation":"Az interferonok (főleg IFN-α, IFN-β) a vírusfertőzött sejtek által termelődnek, anti-virális állapotba hozzák a szomszédos sejteket."},{"type":"MC","text":"Mi a makrofág és a dendritikus sejt közötti fő különbség az adaptív immunitásban?","options":["A) A makrofág csak sejtes, a dendritikus sejt csak humorális választ indít","B) A dendritikus sejt hatékonyabban mutatja be az antigént a naív T-sejteknek","C) A makrofág az adaptív, a dendritikus sejt a veleszületett immunitás része","D) Nincs különbség közöttük"],"correctLetter":"B","explanation":"A dendritikus sejt az \"adaptív immunitás hírnöke\" – nagyobb az MHC II. és ko-sztimuláló molekulák száma."},{"type":"MC","text":"Melyik immunológiai folyamat a \"két jel\" (kettős felismerés) modellje?","options":["A) Az antitestfelismerés és lebomlása","B) Az MHC és a ko-sztimuláló molekulák szükségessége a T-sejt aktiválásához","C) Az APC és az NK-sejt közötti kommunikáció","D) A gyulladás két szakaszos fázisa"],"correctLetter":"B","explanation":"A kettős felismerés azt jelenti, hogy a T-sejt aktiválásához szükséges az MHC-antigén komplexus (1. jel) és ko-sztimuláció (2. jel)."},{"type":"MC","text":"Mit jelent a humorális immunitás kifejezés?","options":["A) A T-sejtek által közvetített védelem","B) Az antitestek által közvetített védelem (a vérszérumban jelenlévő oldott antitestek)","C) A fizikai védelmi vonalak aktiválása","D) Az NK-sejtek funkciója"],"correctLetter":"B","explanation":"A humorális immunitás a B-sejt és antitest-függő válasz, amely az extracellularis patogénekre optimális."},{"type":"MC","text":"Mi a Treg (regulátor T-sejt) funkciója az immunrendszerben?","options":["A) Az antigén támadása","B) Az autoimmunitás és túlzott gyulladás megakadályozása az immunszuppresszió révén","C) Antitestek termelése","D) Fagocitózis közvetítése"],"correctLetter":"B","explanation":"A Treg-sejtek toleranciát és öntolerancia fenntartást biztosítanak, így megelőzik az autoimmunitást."},{"type":"MC","text":"Melyik immunsejtnek van közvetlen bakterium-pusztító képessége az antitestek nélkül?","options":["A) Plazmasejt","B) Memória-B-sejt","C) Neutrofil (micro falósejt)","D) Fibroblast"],"correctLetter":"C","explanation":"A neutrofilek a leggyorsabban reagáló fagociták, amelyek autonóm módon tudnak patogéneket pusztítani önálló fagocitózis révén."},{"type":"MC","text":"Mit jelent az \"opsonizáció\" az immunitásban?","options":["A) A fagociták megosztása","B) Az antitestek vagy komplement-fehérjék bevonják az antigént, megjelölve a fagocitózisra","C) Az interferonok felszabadítása","D) A memória-B-sejt kialakulása"],"correctLetter":"B","explanation":"Az opsonizáció az antitestek vagy komplement C3 bevonása az antigénre, így a fagociták Fc-receptoraik által könnyebben felismerik."},{"type":"MC","text":"Melyik limfocita-típus nem közvetlen pusztító, hanem segítő és szabályozó funkciót végez?","options":["A) CD8⁺ T-sejt","B) CD4⁺ T-sejt (helper)","C) Plazmasejt","D) NK-sejt"],"correctLetter":"B","explanation":"A CD4⁺ helper T-sejtek citokineket termelnek, amelyek B-sejteket és CD8⁺ T-sejteket aktiválnak."},{"type":"MC","text":"Mi az IgM antitest szerkezeti jellemzője?","options":["A) Monomér, legkisebb antitest","B) Pentamer, nagy molekula, az intravaszkuláris terekben dominál","C) Dimer, nyálkahártya-immunitásban működik","D) Tetramer, a sejtek felszínéhez kötődik"],"correctLetter":"B","explanation":"Az IgM 5 egységből áll (pentamer), nagy molekula, nem jut át a placentán, de erős komplement-aktivátor."},{"type":"MC","text":"Mit csinál a gyulladásos választ kiváltó leukotrien a hisztamin mellett?","options":["A) Antitesteket termel","B) Sima izomösszehúzódást okoz, bronkoszpazmus veszélye","C) T-sejteket pusztít","D) Patogéneket emészti"],"correctLetter":"B","explanation":"A leukotriének potensebb gyulladásmediátorok, sima izomösszehúzódást és kapillárisok permeabilitásának növelését okozzák."},{"type":"BLANK","text":"Az MHC I. molekulák minden _____ sejten jelen vannak, és az immunrendszer számára jelezik, hogy a sejt a szervezet része.","answer":"sejtmagvas","explanation":"Az MHC I. a saját sejtek \"útlevele\", amely a CD8⁺ T-sejteknek mutatja meg, hogy milyen fehérjéket tartalmaz a sejt."},{"type":"BLANK","text":"A B-limfociták az antigénnel való találkozás után _____ differenciálódnak, amelyek antitesteket termelnek.","answer":"plazmasejtté","explanation":"A plazmasejtek nagy mennyiségű, antigén-specifikus antitesteket szekretálnak"},{"type":"BLANK","text":"Az IgG antitestek a másodlagos immunválasz során dominálnak és a _____ átjutnak a placentán.","answer":"szöveteket","explanation":"Az IgG az egyetlen antitest, amely a placentabariért átjut, így védjelmet biztosít az újszülöttnek."},{"type":"BLANK","text":"A gyulladásos válasz során felszabaduló _____ okozza a duzzanatot, pirosságot és fájdalmat.","answer":"hisztamin (vagy citokinék)","explanation":"A hisztamin a hízósejtekből szabadul fel az allergiás vagy gyulladásos válasz során."},{"type":"BLANK","text":"A rendszeres lupusz (SLE) az _____ ellen irányul és az egész szervezetet érinti.","answer":"DNS","explanation":"Az SLE egy szisztémás autoimmun betegség, amelyben anti-DNS és anti-hisztondebris-antitestek keletkeznek."},{"type":"BLANK","text":"A vakcinák _____ immunitást biztosítanak anélkül, hogy a fertőzés teljes megbetegedéshez vezetne.","answer":"aktív","explanation":"A vakcinák aktív immunizálást végeznek – a szervezet antitesteket és memóriasejteket termel a meghalt vagy legyengített kórokozó ellen."},{"type":"BLANK","text":"Az elölt (inaktívált) vakcinák (1. generáció) _____ kórokozókat vagy azok részletét tartalmazzák.","answer":"inaktívált (vagy meghalt)","explanation":"Az elölt vakcinák nem tudnak reprodukálódni, biztonságosabbak, de kevésbé erős immunválaszt váltanak ki."},{"type":"BLANK","text":"Az mRNS vakcinák (3. generáció) az immunsejteknek a _____ termelésére utasítanak.","answer":"vírus fehérjék (vagy S-fehérje)","explanation":"Az mRNS vakcinák az mRNS-t szállítják, amely az immunsejtekben a vírus fehérje szintézisét irányítja."},{"type":"BLANK","text":"A passzív immunitás _____ adására alapul, amely már bevált immunválasszal rendelkezik.","answer":"antitesteknek","explanation":"A passzív immunitás rövid ideig tart, mert az adott antitestek idővel lebomnak és nincs memória."},{"type":"BLANK","text":"A Magyarországon kötelező MMR-oltás ellen _____, _____ és _____ fertőzéseket véd.","answer":"kanyó, mumpsz, rubeola","explanation":"Az MMR az 1. generációs élő attenuált vakcina, amely három vírus ellen nyújt védelmet."},{"type":"BLANK","text":"Az antigénbemutatás során az APC _____ molekuláit használja fel a CD4⁺ T-sejtek számára.","answer":"MHC II.","explanation":"Az MHC II. az APC sejteken jelenik meg, és az antigén peptideket a CD4⁺ helper T-sejteknek mutatja be."},{"type":"BLANK","text":"Az anafilaxis egy _____ reakció, amelyet az allergiás tünet felszabadulása okoz.","answer":"súlyos (vagy életveszélyes)","explanation":"Az anafilaxis az allergia súlyos formája, amely hirtelen lehet, szisztémás tüneteket okoz."},{"type":"BLANK","text":"Az immunszupresszív terápia a szervtranszplantáció után _____ megakadályozására szolgál.","answer":"elutasítás (rejekció)","explanation":"Az immunszupresszív szerek a T-sejt aktiválódást gátolják, hogy megakadályozzák a transzplantátum elutasítását."},{"type":"BLANK","text":"Az AIDS-ben az opportunista fertőzések azért fordulnak elő, mert az _____ T-sejt populáció hiányzik.","answer":"CD4⁺ (helper)","explanation":"Az AIDS-ben a CD4⁺ T-sejt szám kritikusan alacsony, így az immunrendszer nem tud elég jó védelmet nyújtani az opportunista patogének ellen."},{"type":"BLANK","text":"A komplement-rendszer egy _____ rendszer, amely az antitestekhez kötödve az antigént megsemmisít.","answer":"fehérje-kaszkád","explanation":"A komplement egy közvetett antigén-destrukció mód, amely membrános lyukakat csinál és fagocitózis-segítést (opsonizáció) végez."},{"type":"BLANK","text":"A fagociták (makrofág és neutrofil) a _____ útján pusztítják el a patogént.","answer":"fagocitózis","explanation":"A fagocitózis az endocitózis speciális formája – a fagocita bekeríti az antigént, majd enzimatikusan lebontja azt."},{"type":"BLANK","text":"A _____ sejtes immunitás a CD8⁺ T-sejtek által közvetített citotoxikus választ jelent.","answer":"sejtes (vagy celluláris)","explanation":"A sejtes immunitás az MHC I. alapú T-sejt felismerésre alapul, amely az intracellularis patogénekre (vírusok, tumorok) fókuszál."},{"type":"BLANK","text":"A memória-T-sejtek és memória-B-sejtek az _____ során termelődnek és a másodlagos immunválaszban döntő szerepet játszanak.","answer":"primer (vagy elsődleges) immunválasz","explanation":"A memória-sejtek hosszú élet élettartamúak és gyorsabban és intenzívebben reagálnak az ismételt antigénexpozícióra."},{"type":"BLANK","text":"A _____ a harmadik generációs vakcina, amely vektort (pl. módosított adenovírust) használ a gének szállítására.","answer":"vektor alapú vakcina","explanation":"A vektor alapú vakcinák (pl. AstraZeneca COVID vakcina) egy ártalmatlan vírust használnak az antigén gén szállítására a sejtekbe."},{"type":"MC","text":"Mi az IgA antitest biológiai funkciója az immunrendszerben?","options":["A) Szisztémás immunválaszt indít","B) Nyálkahártyai felszíneken lokális immunitást biztosít, patogéneket megköthet","C) Allergiás választ közvetít","D) Komplement-rendszert maximálisan aktiválja"],"correctLetter":"B","explanation":"Az IgA dimer formában választódik el (a felszálazó IgA, dIgA), és a nyál, könnyek, kolostrum által védelem nyújt a nyálkahártyákon."},{"type":"MC","text":"Mely betegség autoimmun jellegével a szisztémás sokszálas szöveti támadás jellemző?","options":["A) Hashimoto-tiroiditisz","B) Rheumatoid arthritis","C) Rendszeres lupusz (SLE)","D) Graves-betegség"],"correctLetter":"C","explanation":"Az SLE egy szisztémás autoimmun betegség, amely több szervet és szövetet érint (bőr, ízületek, vese, szív, tüdő), anti-DNS és anti-hisztondebris-antitestek jelen vannak."}],"szaporodas":[{"type":"MC","text":"Mely szervek szerepelnek a férfi belső nemi szervrendszerben?","options":["A) Petefészek, petevezeték, méh","B) Here, mellékhere, ondóvezeték, ondóhólyag, prosztata","C) Hüvely, méh, csiklió","D) Szájadék, vizelet, ondó"],"correctLetter":"B","explanation":"A férfi belső nemi szervek közé tartoznak a here (ivarmirigy és hormontermelő szerv), mellékhere (spermium-tárolás és érése), ondóvezetékek (szállítás), ondóhólyag és prosztata (váladék termelés)."},{"type":"MC","text":"Melyik sejttípus felelős a férfiak tesztoszteron-termeléséért?","options":["A) Sertoli-sejtek","B) Leydig-sejtek","C) Spermatogóniumok","D) Epitélsejtek"],"correctLetter":"B","explanation":"A Leydig-sejtek a here kötőszöveti állományában helyezkednek el és tesztozteront (valamint ösztrogént) termelnek."},{"type":"MC","text":"A spermatogenézis során melyik sejt képződik először a spermatogóniumból?","options":["A) Spermatid","B) I. rendű spermiatocita","C) II. rendű spermiatocita","D) Petesejt"],"correctLetter":"B","explanation":"A pubertáskorban a spermatogóniumok növekedésnek indulnak és az I. spermatocitát (primer spermatocita) hozzák létre, amely meiotikus osztódása az első meiotikus szakaszban zajlik."},{"type":"MC","text":"Milyen időtartam alatt képződik egy teljes értékű spermium spermatogóniumból?","options":["A) 10 nap","B) 35 nap","C) 70 nap","D) 140 nap"],"correctLetter":"C","explanation":"A haploid hímivarsejtek a diploid csírahámsejtek (spermatogóniumok) meiózisával kb. 70 nap alatt képződnek az FSH hatására."},{"type":"MC","text":"A mellékherében milyen folyamat játszik végbe a spermiumokkal?","options":["A) Osztódás az első meiotikus szakaszban","B) Utóérés és mozgásképesség-szerzés","C) Akroszóma-képződés","D) Haploidizáció"],"correctLetter":"B","explanation":"A mellékherében a spermiumok 8-12 napig tárolódnak, befejezik érésüket, laktális energia-felhasználásra kapcsolnak, és alkalmassá válnak a megtermékenyítésre."},{"type":"MC","text":"Milyen összetevőt tartalmaz az ondóhólyag váladéka?","options":["A) Prosztata lúgos váladéka","B) Fruktóz és prosztaglandinok","C) Tesztoszteront","D) Nyákot és vizeletmaradvány"],"correctLetter":"B","explanation":"Az ondóhólyagok lúgos váladéka tartalmaz fruktózt (spermiumok fő energiaforrása) és prosztaglandinokat (melyek serkentik a spermium mozgást és méhfal összehúzódást)."},{"type":"MC","text":"Mitől függ a pénisz merevségének (erekciójának) kialakulása?","options":["A) Szimpatikus idegrendszeri hatás","B) Paraszimpatikus idegrendszeri hatás és artéria-tágulás","C) Hormonális visszacsatolás","D) Endokrindaganat"],"correctLetter":"B","explanation":"A pénisz merevségét a nemi izgalom alatt keresztcsonti paraszimpatikus idegek aktivitása okozza, amely az artéria-tágulás és csökkent vénás visszaáramlás révén tölti meg az erektilis szöveteket."},{"type":"MC","text":"Hány petesejt érik meg a női petefészkekben az élete során?","options":["A) Körülbelül 10 000","B) Körülbelül 400","C) Körülbelül 200 000","D) Körülbelül 600 000"],"correctLetter":"B","explanation":"A két petefészekben az élete során mindössze kb. 400 petesejt érik meg, függetlenül attól, hogy a születéskor még 200 000 primer oocyta volt jelen."},{"type":"MC","text":"Milyen szakaszban marad meg az elsőrendű oocyta a meiózis folyamán?","options":["A) A meiózis metafázisában","B) A meiózis profázisában (diplotén stádiumban)","C) A meiózis telófázisában","D) Az anafázisban"],"correctLetter":"B","explanation":"Az elsőrendű oocyta a meiózis I. fő szakaszának profázisában, diplotén stádiumban megreked, és ebben az állapotban marad egészen a tüszőérésig és az ovulációig."},{"type":"MC","text":"Miben tér el az oogenézis a spermatogenézistől az ivarsejtképzés időzítése szempontjából?","options":["A) Az oogenézis az embrionális korban kezdődik, a spermatogenézis a pubertáskor után","B) A spermatogenézis az embrionális korban kezdődik, az oogenézis a pubertás után","C) Mindkettő az embrionális korban kezdődik","D) Mindkettő a pubertás után kezdődik"],"correctLetter":"A","explanation":"Az elsőrendű oocyta már a magzati élet alatt képződik és az születéskor adott mennyiségben jelen van. A spermatogenézis viszont a pubertáskor kezdődik és az élet végéig folyamatos."},{"type":"MC","text":"Az ovuláció mely hormon csúcsa váltja ki?","options":["A) Follikelserkentő hormon (FSH)","B) Sárgatestserkentő hormon (LH)","C) Tesztoszteron","D) Progeszteron"],"correctLetter":"B","explanation":"Az LH-csúcs az ovuláció előtti 24-36 órában bekövetkezik, és ez az LH-kiugrás indítja el a Graaf-tüsző repedését (ovuláció)."},{"type":"MC","text":"Mennyi ideig marad alkalmas a megtermékenyítésre az ovuláció után a petesejt?","options":["A) 6 órán belül","B) 24 órán belül","C) 48 órán belül","D) 72 órán belül"],"correctLetter":"B","explanation":"A kilökődött petesejt (másodrendű oocyta) körülbelül 24 órán belül alkalmas a megtermékenyítésre, ezt követően elpusztul."},{"type":"MC","text":"Milyen módosulás történik a méhnyálkahártyán az ösztrogén hatására?","options":["A) Vérzés és lelökődés","B) Regenerálódás és vastagodás (burjánzási fázis)","C) Mirigyek váladéktermelésének gátlása","D) Peritómához való összenövése"],"correctLetter":"B","explanation":"A menstruáció után, az ösztrogén hatására a megmaradt nyálkahártya foltokból megindul a regeneráció, majd a burjánzási fázisban a nyálkahártya egyre vastagabb és gazdagabb lesz vérellátásban és mirigyekben."},{"type":"MC","text":"Mit jelent az elválasztási fázis során a progeszteron hatása a méhnyálkahártyára?","options":["A) Elsorvadás és vérzés","B) Maximális vastagodás (4-5 mm), vérbőség, mirigyeinek váladéktermelése","C) Vékonyodás és regeneráció","D) Szarúsodás"],"correctLetter":"B","explanation":"Az ovuláció után, a sárgatest progeszterontermeléséből az elválasztási fázisban a méhnyálkahártya eléri maximális vastagságát és váladékprodukcióját, így felkészül az embrió beágyazódására."},{"type":"MC","text":"Hogyan működik a progeszterontartalmú fogamzásgátlás?","options":["A) Meggátolja az embrió átjutását a petevezetőn","B) Gátolja az FSH és LH termelődést, ezáltal megakadályozza a tüszőérést és ovulációt","C) Serkenti a spermium mozgást","D) Megöli a spermiumokat"],"correctLetter":"B","explanation":"A progeszteron és ösztrogén hormonális fogamzásgátlásban gátolja az FSH és LH termelődésének, így megelőzi a tüszőérést és az ovulációt."},{"type":"MC","text":"Mit mutat a hCG hormon jelenléte a vizeletben?","options":["A) Nőgyógyászati fertőzést","B) Vállfájást","C) Várandósságot","D) Méhlepény-elégtelenséget"],"correctLetter":"C","explanation":"A külső magzatburok (chorion) a fogamzás után körülbelül 10. naptól termel hCG-t (human chorionic gonadotrophin), amelyet a terhességi tesztek kimutatnak a vizeletből."},{"type":"MC","text":"Milyen funkcióval bír a petesejt körül található fénylő réteg (zona pellucida)?","options":["A) Spermiumok vonzása","B) Petesejt védelme és megtermékenyítés fázisainak szabályozása","C) Energia tárolás","D) Magzatvíz termelés"],"correctLetter":"B","explanation":"A zona pellucida egy glikoproteidburok, amely körülveszi a petesejtet. A spermiumok az akroszómális enzimek segítségével áthatolnak rajta, a beágyazódás után pedig védi az embriót a külső sérülésektől."},{"type":"MC","text":"Milyen hatása van a kortikális reakciónak a megtermékenyítésben?","options":["A) Serkenti a spermium mozgást","B) A petesejt felszínéről enzimek ürülnek, amelyek megkeményítik a zona pellucidát és megakadályozzák a többszörös megtermékenyítést","C) Megakadályozza a spermiumok behatolását","D) Képez egy magzatburkot"],"correctLetter":"B","explanation":"A kortikális reakció során a petesejt hólyagokból enzimek szabadul, amelyek felszámolják a ZP3 receptorokat és megkeményítik a petesejt burkát, megakadályozva a további spermiumok behatolását."},{"type":"MC","text":"Milyen kromoszómális összetétel jellemzi az embriót a megtermékenyítés után?","options":["A) Haploid (23)","B) Diploid (46)","C) Triploid (69)","D) Tetraploid (92)"],"correctLetter":"B","explanation":"A megtermékenyítés során a haploid (23) petesejt és a haploid (23) spermium összeolvadása diploid (46) zigótát eredményez."},{"type":"MC","text":"Mikor kezdődik az embrió barázdálódása megtermékenyítés után?","options":["A) 6 órán belül","B) 24 órán belül","C) 3-4 nappal után","D) A második hét után"],"correctLetter":"B","explanation":"A zigóta mitózisokkal osztódni kezd, és körülbelül 3-4 nappal a megtermékenyítés után szedercsíra (16 sejtes morula) állapotba jut."},{"type":"MC","text":"Mi a szedercsíra struktúrája?","options":["A) Egyetlen sejttömegből áll","B) Külső és belső sejttömegből áll","C) Üreges hólyag, amnion és szikhólyag","D) Csak csíratemázatok"],"correctLetter":"B","explanation":"A szedercsírának (morula) van egy belső sejtje (amely később embriócsomót alkot) és egy külső nagyobb sejttömege (amely később magzatburkot képez)."},{"type":"MC","text":"Hogyan különbözik a hólyagcsíra (blastula) a szedercsírától?","options":["A) A hólyagcsíra szilárd, a szedercsíra üreges","B) A szedercsíra üreges, a hólyagcsíra szilárd","C) A hólyagcsíra üreges képződmény amnionűreggel és embriócsomóval","D) Nincsen különbség"],"correctLetter":"C","explanation":"A szedercsíra belső sejtjei apoptózissal elhallnak, a megmaradó sejtek embriócsomót képeznek, és a külső sejtek által körülzárt üreges képződmény a hólyagcsíra."},{"type":"MC","text":"Mit jelent az implantáció folyamata?","options":["A) A spermium behatolása a petesejt membránjába","B) A hólyagcsíra megtapadása a méhnyálkahártyán és beágyazódása annak szöveteibe","C) Az embrió megtöbbszöröződése ikerkészítéshez","D) Az embryócsomó fejlődése"],"correctLetter":"B","explanation":"Az implantáció az a folyamat, amely során a hólyagcsíra a méhnyálkahártya felszínén megtapad, majd bontóenzimeket termel és besüllyed a méhnyálkahártya kötőszöveti állományába."},{"type":"MC","text":"Mely csíralarézek (csíralemezek) adják az idegrendszer és a bőr hámrétegét?","options":["A) Endoderma","B) Mezoderma","C) Ektoderma","D) Szikiák"],"correctLetter":"C","explanation":"Az ektoderma a külső csíralmez, amelyből a bőr hámrétege, az idegrendszer, a szemlencse, a retina és egyes koponyacsontok keletkeznek."},{"type":"MC","text":"Milyen szervek keletkeznek az endodermából?","options":["A) Izmok és csontok","B) Bélcsatorna, máj, hasnyálmirigy, légzőrendszer","C) Vér és vérerek","D) Agyalapi mirigy"],"correctLetter":"B","explanation":"Az endoderma a belső csíralmez, amelyből az emésztőrendszer szervei (bélcsatorna, máj, hasnyálmirigy) és a légzőszervrendszer eredeznek."},{"type":"MC","text":"Milyen szerepe van a mezoderma szöveteknek az embrió fejlődésében?","options":["A) Az idegrendszer képződése","B) Az összes kötő- és támasztószövet, izmok, keringési és szaporító rendszer keletkezése","C) Az emésztőcsatorna képződése","D) A bőr hámrétegének képződése"],"correctLetter":"B","explanation":"A mezoderma középső csíralmez, amelyből az izmok, a teljes keringési rendszer (szív, vér, erek), a szaporító és kiválasztó rendszer, valamint a legtöbb támasztószövet keletkezik."},{"type":"MC","text":"Milyen funkciót lát el a méhlepény (placenta)?","options":["A) Csak hormontermelés","B) Magzat rögzítése, táplálása, gázcsere, hormontermelés","C) Csak szikanyag tárolása","D) Só és víz szűrése"],"correctLetter":"B","explanation":"A méhlepény egy rendkívül vérbő szerv, amely az anyai és magzati keringés között történik az anyagtranszport diffúzióval, valamint progeszteront és ösztrogént termel."},{"type":"MC","text":"Miért van szükség a magzati hemoglobin nagyobb oxigénkötő-képességére?","options":["A) A magzati sejtek mérgezésének megelőzésére","B) Az alacsonyabb oxigénkoncentrációjú magzati vérben az oxigén felvételének biztosítására","C) A magzat fehérjeépítésének felgyorsítására","D) Nem fontos"],"correctLetter":"B","explanation":"A magzati hemoglobin nagyobb oxigénkötő-képessége biztosítja, hogy az anyai vérből az oxigén a magzati vérbe kerüljön, annak ellenére, hogy a magzat vérében az oxigenkoncentrációja alacsonyabb."},{"type":"MC","text":"Melyik foramináció (nyílás) teszi lehetővé az oxigén-gazdag anyai vér közvetlen áramlását a magzat bal pitvarába?","options":["A) Foramen ovale","B) Botallo-vezeték","C) Köldökzsinór","D) Köldökvéna"],"correctLetter":"A","explanation":"A magzatban az ovális nyílás (Foramen ovale) a jobb pitvar közvetlenül a bal pitvarhoz csatlakozik, mivel a tüdő nem működik és a kis vérkör nem működő."},{"type":"MC","text":"Mit jelent a Botallo-vezeték (Ductus arteriosus) szerepe a magzati keringésben?","options":["A) Összeköti a szív bal és jobb oldalát","B) Az aorta összeköti a köldökverőérrel","C) A tüdőartéria összeköti az aortával, elkerülve a tüdőt","D) A köldökvéna összeköti a májhoz"],"correctLetter":"C","explanation":"A Botallo-vezeték egy foetális érrendszeri kapcsolat, amely a tüdőartériából az aortába vezeti a vért, mivel a magzat tüdeje nem működik és az ellenállása nagy."},{"type":"MC","text":"Milyen a női nemi ciklus hossza felnőtt nőknél?","options":["A) 14 nap","B) 21 nap","C) 28 nap","D) 35 nap"],"correctLetter":"C","explanation":"A női nemi ciklus átlagosan 28 nap, bár normális tartománya 24-32 nap. Az ovuláció általában a ciklus 14. napján történik."},{"type":"BLANK","text":"A menstruációs ciklus első felében (follikuláris fázis) a _____ szintje fokozatosan emelkedik, amely serkenti a tüszőérést és az ösztrogén termelődését.","answer":"FSH (follikelserkentő hormon)","explanation":"A ciklus elején az FSH termelődése felszabadul a gátlás alól, amely serkenti a tüszőérést és ezáltal az ösztrogén-termelődést."},{"type":"BLANK","text":"A terhesség alatt a méhnyálkahártyája _____ hatására eléri maximális vastagságát és gazdagodása az implantáció előfeltétele.","answer":"progeszteron","explanation":"A sárgatest által termelt progeszteron előkészíti a méhnyálkahártyát az embrió befogadására, maximális vastagságot (4-5 mm) biztosítva."},{"type":"BLANK","text":"A _____ szövetelsorvadásától következtében lecsökken a progeszteron- és az ösztrogénszint, amely bekövetkezteti a menstruációt, amennyiben nem történik megtermékenyítés.","answer":"sárgatest","explanation":"Ha megtermékenyítés nem történik, a sárgatest az LH szintjének csökkenése miatt sorvadásnak indul, ami a progeszteron- és ösztrogénszint csökkenésével az endometrium vérzéssel járó lelökődéséhez vezet."},{"type":"BLANK","text":"Az újszülött szívműködésében az _____ -nyílás az első 24 óra alatt általában bezáródik, azonban az egész életre nyitva maradhat, ha nem történik meg a megfelelő záródás.","answer":"Foramen ovale","explanation":"A foetális Foramen ovale a szülés után zárul be, mivel megszűnik az közvetlenül a jobb pitvarból a bal pitvarba áramló vér szükségessége, amikor a tüdő működni kezd."},{"type":"MC","text":"Mit jelent a kapacitáció a megtermékenyítésben?","options":["A) A spermium akroszómájának feloldása","B) A spermium membránjában végbemenő biokémiai módosulások az embrió befogadásához való felkészüléshez","C) Az embrió megtapadása a méhfalhoz","D) A petesejt kiárusítása"],"correctLetter":"B","explanation":"A kapacitáció a női ivari utak ionösszetétele, pH-ja és hormonális hatásai által kiváltott folyamat, során a spermium membránja megváltozik, és a Ca2+ felvétele nő, amely az akroszóma-reaktióhoz szükséges."},{"type":"MC","text":"Milyen hormon stimulálja a Sertoli-sejtek működését és a spermiumok képződését?","options":["A) Tesztoszteron","B) Tüszőserkentő hormon (FSH)","C) Progeszteron","D) Prolaktin"],"correctLetter":"B","explanation":"Az FSH serkenti az ivarsejtképzést a Sertoli-sejteken keresztül, amelyek tartalmazzák az FSH-receptorokat. A tesztoszteron szintén szükséges a Sertoli-sejtek működéséhez, de az FSH az elsődleges ivarsejtképzés-serkentő hormon."},{"type":"MC","text":"Mely hormonok csökkent szintje következtében következik be a menopauza?","options":["A) FSH és LH","B) Ösztrogén és progeszteron","C) Tesztoszteron és prolaktin","D) hCG és oxitocin"],"correctLetter":"B","explanation":"A menopauza a petefészkek működésének leállása miatt a nemi hormonok (ösztrogén és progeszteron) csökkenése következtében történik. A petefészkek működésének csökkenésével az FSH és LH termelődése megemelkedik, de nem csökken."},{"type":"BLANK","text":"A here ondócsatornácskáinak _____ -t (vagy -eket) hozzák létre, amelyek a fejlődő spermiumok számára táplálást és védelmet nyújtanak.","answer":"Sertoli-sejtek","explanation":"A Sertoli-sejtek (dajkasejtek) az ondócsatornácskák falában helyezkednek el, a fejlődő spermiumokat táplálják, védelmet nyújtanak, és az ABP (androgénkötő fehérje) termelésén keresztül befolyásolják a tesztoszteronkoncentrációt."},{"type":"BLANK","text":"A petesejtet körülvevő, tüszőhámsejtekből álló réteg neve _____ .","answer":"corona radiata","explanation":"A corona radiata a petesejtet közvetlenül körülvevő tüszőhámsejtréteg, amely az ovuláció során együtt jut a méhkürtbe a petesejt mellett."},{"type":"BLANK","text":"Az embrió fejlődésének első 3 hetét a _____ -et követő szakasz jellemzi, amelyből az ektoderm, mezoderma és endoderma képződnek.","answer":"megtermékenyítésétől (vagy beágyazódástól)","explanation":"A megtermékenyítés után körülbelül 3-4 nappal (beágyazódás után pedig kb. 3 héttel) az embrió három csíralemezt alakít ki az alapján további szervek és szövetei."},{"type":"BLANK","text":"A _____ -ben nagyobb az oxigénkoncentrációja, mivel ott az anyai és a magzati vér közvetlenül nem keveredik, csak diffúziós anyagtranszporttal.","answer":"méhlepényben (placentában)","explanation":"A méhlepény egy szűrőberendezés, amely az anyai és a magzati vért elválasztja. Az anyai vér közvetlenül az anyai artériás rendszertől érkezik, és az oxigén diffúzióval jut a magzati vérbe."},{"type":"BLANK","text":"Az embrió fejlődésének _____ -ik hónapjában kezdenek kialakulni a nemi szervek differenciációja.","answer":"3","explanation":"A terhesség harmadik hónapjának végére a magzat nemi szervei már differenciálódnak, és az ultrahang-vizsgálattal a nemi megállapítás már lehetséges lesz a 4. hónapra."},{"type":"BLANK","text":"Az amniont (belső magzatburkot) alkotó _____ a magzathoz hozzájárul annak védelmén kívül a magzatvíz termelésével.","answer":"amnionhám","explanation":"Az amnionüreg falát borító amnionhám tereli a magzatvizet, amely véd a mechanikai hatásoktól, a kiszáradástól és a hőmérséklet-változásoktól."},{"type":"BLANK","text":"A napi terhességi szűrővizsgálatok közül a _____ -vizsgálat a magzat szívhangját figyeli meg, és nem invazív módszer.","answer":"CTG (cardiotokographia)","explanation":"A CTG-vizsgálat a magzat szívfrekvenciáját és a méhizomzat összehúzódásait monitorozza, és fontos a magzat egészségi állapotának felmérésére a terhesség alatt."},{"type":"BLANK","text":"Az ovuláció után a tüsző maradványa _____ -nek nevezik, amely a progeszteront termelik.","answer":"sárgatestnek","explanation":"A sárgatest az ovuláció után képződik, amelyből a sárga lipidcseppek halmazódása a jellegzetes szín. A sárgatest a megtermékenyítésig körülbelül 10 napig működik, és progeszteront termel."},{"type":"BLANK","text":"A _____ a nőgyógyászati szűrővizsgálatban a méhnyak felszínéről vett hámsejteket tartalmazó mintát jelent, amelyet patológus értékel ki.","answer":"kenet","explanation":"A méhnyakrákszűrés során a méhszáj területéről vett kenet mintából lehet felismerni az elváltozott hámsejteket, amelyek kóros folyamatra utalnak."},{"type":"BLANK","text":"Az in vitro megtermékenyítés (IVF) során a petesejt és spermium a _____ -en kívül egyesülnek mesterséges körülmények között, majd az embrió visszaültetésre kerül.","answer":"méh üregén (vagy méh)","explanation":"Az in vitro megtermékenyítésben a megtermékenyítés laboratóriumi körülmények között történik, majd az embrió (szedercsíra-hólyagcsíra állapotban) visszaültetésre kerül a méhbe az implantáció lehetősége érdekében."},{"type":"BLANK","text":"A _____ a petefészek felszínéről kilökődő érett petesejt és sarki sejt története, amelyet az LH-csúcs indít el.","answer":"ovuláció (vagy tüszőrepedés)","explanation":"Az ovuláció az LH-csúcs hatására bekövetkezik a ciklus körülbelül 14. napján, amikor a Graaf-tüsző felreped és az érett petesejt kilökődik."},{"type":"BLANK","text":"A pubertáskor az FSH és LH _____ termelődése felszabadul a gátlás alól, amely indítja el a nemi fejlődést.","answer":"GnRH (vagy hipotalamusz)","explanation":"A pubertáskor a hipotalamusz GnRH-termelődése megnő, amely fokozza a hipofízis FSH és LH termelődésének és ezáltal elindítja az ivarmirigyek funkcióját és a nemi fejlődést."},{"type":"BLANK","text":"A _____ az évente elvégzendő szűrővizsgálat, amely a méhnyak és a hüvely sejtrétegét vizsgálja kolposzkóppal a kóros elváltozások felismerésére.","answer":"méhnyakrákszűrés (vagy cervix vizsgálat)","explanation":"A méhnyakrákszűrés egy rendszeres szűrővizsgálat, amely a méhnyak rákos vagy precanceróz elváltozásainak korai felismerésére szolgál, és ezáltal javítja a terápia sikerességét."},{"type":"BLANK","text":"A _____ az androgén-hormonnal kötődő fehérje, amelyet a Sertoli-sejtek termelnek, és ez szabályozza a tesztoszteron-konzentációt a herecsatornácskáiban.","answer":"ABP (androgénkötő fehérje)","explanation":"Az ABP a Sertoli-sejtekből termelődik és az androgéneket kötve szállítja, így fenntartja a megfelelő lokális tesztoszteron-szintet a spermiumképzéshez."},{"type":"BLANK","text":"A nemi ciklus során az ovuláció előtti _____ -ből készülnek aktív mozgású spermiumok az inszemináció (ondóbevitel) esetén az IVF eljárásban.","answer":"ondó (vagy ejakulátum)","explanation":"Az IVF eljárás során az egyéb spermiumok kiválasztása az aktív, mozgékony spermiumokat tartalmazza, amelyeket ezután a méh üregébe juttanak az implantáció lehetőségének javítása érdekében."}],"hormontablazat":[{"type":"MC","text":"Melyik mirigy termelődik a növekedési hormon (STH, GH)?","options":["A) Pajzsmirigy","B) Mellékvese","C) Az agyalapi mirigy elülső lebeny","D) Hasnyálmirigy"],"correctLetter":"C","explanation":"A növekedési hormon az agyalapi mirigy adenohipofízisének kissejtes óriásnövekedést okozó, neuroszekréciós sejtek által termelődik."},{"type":"BLANK","text":"A növekedési hormon (STH) fiatalkorban történő túltermelődése _____ t okoz, míg felnőttkori túltermelődés esetén a test kiálló részei (orr, füll, ujjak) nagyobbodnak - ezt az állapotot _____ -nak nevezzük.","answer":"óriásnövekedést / akromegáliát","explanation":"Az óriásnövekedés és az akromegália a növekedési hormon diszfunkciójának jellegzetes klinikai megnyilvánulásai."},{"type":"MC","text":"Melyik hormon serkenti a pajzsmirigy tiriokszsz (T4) termelését?","options":["A) Kortizol","B) Tüszőserkentő hormon (FSH)","C) Pajzsmirigyserkentő hormon (TSH)","D) Sárgatest serkentő hormon (LH)"],"correctLetter":"C","explanation":"A TSH az agyalapi mirigy elülső lebenyéből termelődik, és a pajzsmirigy hormontermelésének fő szabályozójáhe."},{"type":"BLANK","text":"Az agyalapi mirigy elülső lebenyét az _____ serkentő és gátló faktora szabályozza a páros gond-gonadotrop hormonok (FSH, LH) termelésének.","answer":"hipotalamusz","explanation":"A hipotalamusz-hipofízis tengely a szexuális függvénynek és más hormonális folyamatoknak a legfontosabb szabályozója."},{"type":"MC","text":"Melyik hormon kiváltja az ovulációt és fenntartja a sárgatestet?","options":["A) Tüszőserkentő hormon (FSH)","B) Sárgatest serkentő hormon (LH)","C) Tejelválasztást serkentő hormon (PRL)","D) Tiroxin"],"correctLetter":"B","explanation":"Az LH a petefészekben az ovulációt váltja ki, valamint fenntartja a sárgatestet és progeszterontermelésének elősegítését."},{"type":"MC","text":"A tejelválasztást serkentő hormon (PRL) túltermelődése mely tünetet okozhatja nőkben?","options":["A) Magas vérnyomás","B) Rendszertelen menstruáció és megduzzadt emlők","C) Csontsűrűség-csökkenés","D) Sárgatest elhalása"],"correctLetter":"B","explanation":"A prolaktin a menstruációs ciklus gátlásán keresztül és az emlő szöveti válaszán keresztül fejti ki hatásait."},{"type":"BLANK","text":"A vízvisszaszívást serkentő hormon (ADH, vazopresszin) fokozza a víz passzív visszaszívódását a vese _____ -aiban, és emeli a vérnyomást.","answer":"gyűjtőcsatornáiban","explanation":"Az ADH az oszmotikus nyomás és a vérnyomás szabályozásában játszik központi szerepet."},{"type":"MC","text":"Az ADH hiánya (vazopresszin-hiány) mely betegséghez vezet?","options":["A) Cushing-szindróma","B) Diabetes insipidus","C) Basedow-kór","D) Addison-kór"],"correctLetter":"B","explanation":"Az ADH-hiány nagy mennyiségű híg vizelet ürítésével (poliúria) és szomjúsággal jár."},{"type":"MC","text":"Az oxitocin mely szervekre hat elsősorban?","options":["A) Máj és hasnyálmirigy","B) Szív és tüdő","C) Méh és emlőmirigyek simaizmán","D) Vese és pajzsmirigy"],"correctLetter":"C","explanation":"Az oxitocin a szülés indukciójában és a tej kiürülésében (laktációs reflex) kritikus hormon."},{"type":"BLANK","text":"A tiroxin (T4) a pajzsmirigy _____ -okban (follikulusokban) termelődik, és _____ -ot tartalmazó aminosav-származék.","answer":"hólyagocskákban / jódot","explanation":"A jód a tiroxin szerkezeti komponense, és hiánya kreatinizmushoz vezethet."},{"type":"MC","text":"A pajzsmirigy (tiroxin) alulműködése milyen állapotot okoz?","options":["A) Basedow-kór","B) Mixödéma","C) Akromegália","D) Cushing-szindróma"],"correctLetter":"B","explanation":"A mixödéma tünetei közé tartozik az alacsony testhőmérséklet, lelassult ideg- és izomműködés, valamint száraz, puffadt bőr."},{"type":"MC","text":"Mely mirigy termelődik a parathormon (PTH)?","options":["A) Pajzsmirigy","B) Mellékpajzsmirigy","C) Mellékvese kéregállománya","D) Hasnyálmirigy"],"correctLetter":"B","explanation":"A parathormon a kalcium-homeosztázis fő regulátora, amely a vér kalciumszintjét emeli."},{"type":"BLANK","text":"A parathormon hatására az alábbi folyamatok történnek: a csontok _____ leadását fokozza, a vesében a kalcium _____ csökkentését serkenti, és a bélcsőben a D vitamin segítségével a kalcium _____ -ódását serkenti.","answer":"kalcium / kiválasztás / felszívódás","explanation":"Ez a PTH három fő hatásmechanizmusa a kalcium-homeoszázis fenntartásában."},{"type":"MC","text":"A kalcitonin mely hatást fejti ki a vér kalciumszintjére?","options":["A) Emeli a kalciumszintet","B) Csökkenti a kalciumszintet","C) Nem befolyásolja a kalciumszintet","D) Kalcium helyettesítő fehérjéket termel"],"correctLetter":"B","explanation":"A kalcitonin a pajzsmirigy C-sejtjei által termelődik, és kalcium-szint emelkedésre reagálva fejti ki gátló hatását."},{"type":"MC","text":"Mely mirigy termelődik a kortizol (glükokortikoid)?","options":["A) Mellékvese medullája (velőállománya)","B) Mellékvese kéregállománya középső rétege","C) Pajzsmirigy","D) Hasnyálmirigy"],"correctLetter":"B","explanation":"A kortizol a glükokortikoidsz jellegzetes szteroidhormon, amely az anyagcsere több szintjét szabályozza."},{"type":"BLANK","text":"A kortizol elválasztásának mértékét az _____ határozza meg, amely az agyalapi mirigy elülső lebenyéből termelődik.","answer":"ACTH / mellékvesekéreg serkentő hormon","explanation":"Az ACTH a kortizol-termelés fő serkentő hormonja, amely az agy-mellékvese tengelyen keresztül szabályozódik."},{"type":"MC","text":"Az adrenalin mely testfolyadékba ürítődik közvetlenül?","options":["A) Vizelet","B) Vér","C) Nyál","D) Epe"],"correctLetter":"B","explanation":"Az adrenalin a mellékvese velőállománya által termelődik és közvetlenül a vérkeringésbe ürítődik, ezáltal gyors szervezeti válaszokat vált ki."},{"type":"MC","text":"Mely hormon az egyetlen, amely csökkenti a vércukorszintet?","options":["A) Glukagon","B) Adrenalin","C) Inzulin","D) Kortizol"],"correctLetter":"C","explanation":"Az inzulin a hasnyálmirigy Langerhans-szigetei Beta-sejtjei által termelődik, és az egyetlen vércukorszint-csökkentő hatású hormon az emberi szervezetben."},{"type":"BLANK","text":"Az inzulin hatására a sejtek _____ -ét fokozottan felveszik, a máj és izom _____ szintézisét serkenti, valamint csökkenti a vér _____ -szintjét.","answer":"cukor / glükóz / glikogén / zsírsav","explanation":"Az inzulin az energiahomeosztázis kritikus regulátora, amely az anabolikus folyamatokat erősíti."},{"type":"MC","text":"Mely cukorbetegség típusban hiányzik az inzulinszekréció vagy csökkent?","options":["A) Csak az 1-es típusú cukorbetegség","B) Csak a 2-es típusú cukorbetegség","C) Az 1-es és 2-es típusú egyaránt","D) Nem cukorbetegség, hanem hormonális zavar"],"correctLetter":"C","explanation":"Az 1-es típusban az inzulin teljes hiánya, a 2-esben pedig csökkent inzulin-szekréció vagy inzulin-rezisztencia jellemző."},{"type":"MC","text":"Mit jelent a Basedow-kór?","options":["A) Pajzsmirigy alulműködése (hipotireózis)","B) Pajzsmirigy túlműködése, mely autoimmun betegség (hipertireózis)","C) Parathormon-hiány","D) Kalcitonin-túltermelés"],"correctLetter":"B","explanation":"A Basedow-kór autoimmun hipertireózis, amelyet a pajzsmirigy túl sok tiroxin-termelése jellemez, tünetei közül feltűnő a kidülledt szem."}]};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S = { topicId:null, topicName:'', topicEmoji:'', questions:[], index:0,
          correct:0, wrong:0, streak:0, maxStreak:0, answered:false, isMix:false };

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init() {
  renderTopics(TOPICS);
  g('search-input').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    const f = q ? TOPICS.filter(t => t.name.toLowerCase().includes(q) || t.sub.toLowerCase().includes(q)) : TOPICS;
    g('mix-card').style.display = q ? 'none' : 'flex';
    renderTopics(f);
  });
}

function renderTopics(topics) {
  g('topics-grid').innerHTML = topics.map(t => {
    const qs = (QUIZ_DATA[t.id] || []).length;
    const [c1,c2] = t.grad.split(',');
    return `<div class="glass glass-lift topic-card" onclick="startTopic('${t.id}')">
      <div class="topic-card-bg" style="background:linear-gradient(135deg,${c1},${c2})"></div>
      <div class="topic-card-content">
        <span class="topic-emoji">${t.emoji}</span>
        <div class="topic-name">${t.name}</div>
        <div class="topic-sub">${t.sub}</div>
        <span class="topic-badge" style="background:linear-gradient(135deg,${c1},${c2})">${qs} kérdés</span>
      </div></div>`;
  }).join('');
}

// ══════════════════════════════════════════
// START QUIZ
// ══════════════════════════════════════════
function startTopic(id) {
  const t = TOPICS.find(x => x.id === id);
  if (!t) return;
  resetState();
  S.topicId = id; S.topicName = t.name; S.topicEmoji = t.emoji; S.isMix = false;
  S.questions = shuffle(QUIZ_DATA[id] || []);
  if (!S.questions.length) { alert('Nincsenek kérdések ehhez a témához.'); return; }
  showScreen('quiz');
  g('topic-emoji-q').textContent = t.emoji;
  g('topic-name-q').textContent  = t.name;
  renderQuestion();
}

function startMixAll() {
  resetState();
  S.topicId = 'mix'; S.topicName = 'Mindent keverve'; S.topicEmoji = '🎲'; S.isMix = true;
  const all = Object.values(QUIZ_DATA).flat();
  S.questions = shuffle(all);
  showScreen('quiz');
  g('topic-emoji-q').textContent = '🎲';
  g('topic-name-q').textContent  = 'Mindent keverve';
  renderQuestion();
}

function resetState() {
  S.index=0; S.correct=0; S.wrong=0; S.streak=0; S.maxStreak=0; S.answered=false;
}

// ══════════════════════════════════════════
// RENDER QUESTION
// ══════════════════════════════════════════
function renderQuestion() {
  S.answered = false;
  const q = S.questions[S.index], tot = S.questions.length;

  g('q-counter').textContent = S.index + 1;
  g('q-total').textContent   = tot;
  g('progress-fill').style.width = `${(S.index / tot) * 100}%`;

  const labels = { MC:'Feleletválasztós', TF:'Igaz / Hamis', BLANK:'Kiegészítős' };
  g('type-badge').textContent = labels[q.type] || q.type;
  g('q-text').textContent     = q.text;

  ['q-options','q-tf','q-blank','explanation','btn-next'].forEach(id => g(id).classList.add('hidden'));

  const card = g('question-card');
  card.classList.remove('fade-up'); void card.offsetWidth; card.classList.add('fade-up');

  if      (q.type === 'MC')    renderMC(q);
  else if (q.type === 'TF')    renderTF();
  else if (q.type === 'BLANK') renderBlank(q);
}

function renderMC(q) {
  g('q-options').innerHTML = q.options.map(opt =>
    `<button class="option-btn" onclick="answerMC('${opt.trim()[0]}',this)">${opt.trim()}</button>`
  ).join('');
  g('q-options').classList.remove('hidden');
}

function renderTF() {
  ['btn-igaz','btn-hamis'].forEach(id => {
    const b = g(id); b.disabled = false;
    b.className = 'tf-btn ' + (id === 'btn-igaz' ? 'igaz-h' : 'hamis-h');
  });
  g('q-tf').classList.remove('hidden');
}

function renderBlank(q) {
  const html = q.text.replace(/_{3,}/, '<span class="blank-slot blank-ph">_____</span>');
  g('blank-sentence').innerHTML = html;
  g('btn-reveal').disabled = false;
  g('self-assess').classList.add('hidden');
  g('q-blank').classList.remove('hidden');
}

// ══════════════════════════════════════════
// ANSWER HANDLERS
// ══════════════════════════════════════════
function answerMC(letter, btn) {
  if (S.answered) return;
  S.answered = true;
  const q = S.questions[S.index];
  g('q-options').querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim()[0] === q.correctLetter) b.classList.add('correct');
  });
  const ok = letter === q.correctLetter;
  if (!ok) btn.classList.add('wrong');
  onAnswer(ok, q.explanation, true);
}

function answerTF(pick) {
  if (S.answered) return;
  S.answered = true;
  const q = S.questions[S.index], ok = pick === q.isTrue;
  const ib = g('btn-igaz'), hb = g('btn-hamis');
  ib.disabled = hb.disabled = true;
  (pick ? ib : hb).classList.add(ok ? 'correct' : 'wrong');
  if (!ok) (pick ? hb : ib).classList.add('reveal');
  onAnswer(ok, q.explanation, true);
}

function revealBlank() {
  if (S.answered) return;
  S.answered = true;
  const q = S.questions[S.index];
  g('blank-sentence').innerHTML = q.text.replace(/_{3,}/, `<span class="blank-slot">${q.answer}</span>`);
  g('btn-reveal').disabled = true;
  showExplanation(q.explanation, null);
  g('self-assess').classList.remove('hidden');
}

function blankAssess(knew) {
  g('self-assess').classList.add('hidden');
  onAnswer(knew, null, false);
}

function onAnswer(ok, expl, showExpl) {
  if (ok) { S.correct++; S.streak++; if (S.streak > S.maxStreak) S.maxStreak = S.streak; }
  else    { S.wrong++; S.streak = 0; }
  g('mini-correct').textContent = S.correct;
  g('mini-wrong').textContent   = S.wrong;
  const sw = g('streak-wrap');
  g('streak-count').textContent = S.streak;
  if (S.streak > 0) { sw.classList.remove('streak-pop'); void sw.offsetWidth; sw.classList.add('streak-pop'); }
  if (showExpl && expl) showExplanation(expl, ok);
  const isLast = S.index >= S.questions.length - 1;
  const nb = g('btn-next');
  nb.textContent = isLast ? '📊 Eredmény →' : 'Következő →';
  nb.classList.remove('hidden');
}

function showExplanation(text, ok) {
  if (!text) return;
  const el = g('explanation');
  el.className = 'explanation' + (ok === true ? ' ok' : ok === false ? ' err' : '');
  const icon = ok === true ? '✅ ' : ok === false ? '❌ ' : '💡 ';
  el.innerHTML = `${icon}<strong>Magyarázat:</strong> ${text}`;
  el.classList.remove('hidden');
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════
function nextQuestion() {
  S.index++;
  if (S.index >= S.questions.length) showResults();
  else renderQuestion();
}

function showResults() {
  const tot = S.questions.length, pct = tot > 0 ? Math.round((S.correct / tot) * 100) : 0;
  g('result-pct').textContent   = pct + '%';
  g('res-correct').textContent  = S.correct;
  g('res-wrong').textContent    = S.wrong;
  g('res-streak').textContent   = S.maxStreak;
  g('result-topic').textContent = S.topicEmoji + '  ' + S.topicName;
  g('progress-fill').style.width = '100%';
  let emoji='😐', msg='Érdemes még egyszer átnézni az anyagot!';
  if (pct>=90){emoji='🏆';msg='Kiváló! Felkészültél az emelt szintű érettségire!';}
  else if(pct>=75){emoji='🌟';msg='Nagyon jó! Még egy kis ismétléssel tökéletes lesz!';}
  else if(pct>=60){emoji='👍';msg='Jó munka! Nézd át még egyszer a hibás válaszokat!';}
  else if(pct>=40){emoji='📚';msg='Dolgozz rajta – olvasd el újra az anyagot!';}
  g('result-emoji').textContent = emoji;
  g('result-msg').textContent   = msg;
  showScreen('results');
  if (pct >= 75) {
    setTimeout(()=>confetti({particleCount:180,spread:90,origin:{y:.55}}), 350);
    if (pct>=90) {
      setTimeout(()=>confetti({particleCount:100,angle:120,spread:55,origin:{x:0}}),650);
      setTimeout(()=>confetti({particleCount:100,angle:60, spread:55,origin:{x:1}}),650);
    }
  }
}

function restartQuiz() { S.isMix ? startMixAll() : startTopic(S.topicId); }
function goHome()       { showScreen('topic'); }
function showScreen(n)  {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  g('screen-' + n).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function g(id) { return document.getElementById(id); }
function shuffle(a) {
  a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

init();
</script>

</html>
