<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioKvíz · Emelt Biológia</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07070f;
      --card: rgba(255,255,255,0.055);
      --card-hover: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.22);
      --text: #e8e8f4;
      --muted: #6b7280;
      --indigo: #6366f1;
      --violet: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(99,102,241,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 80%, rgba(139,92,246,.14) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(16,185,129,.06) 0%, transparent 70%),
        #07070f;
    }
    .glass {
      background: var(--card);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 18px;
    }
    .glass-lift { transition: transform .22s ease, background .22s ease, border-color .22s ease, box-shadow .22s ease; cursor: pointer; }
    .glass-lift:hover { background: var(--card-hover); border-color: var(--border-hover); transform: translateY(-3px); box-shadow: 0 24px 48px rgba(0,0,0,.35); }
    .glass-lift:active { transform: translateY(-1px); }
    .screen { display: none; position: relative; z-index: 1; }
    .screen.active { display: block; }
    .container   { max-width: 900px; margin: 0 auto; padding: 0 16px; }
    .container-sm{ max-width: 640px; margin: 0 auto; padding: 0 16px; }
    .gradient-text {
      background: linear-gradient(135deg, #818cf8, #c084fc, #fb7185);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 26px; border-radius: 14px;
      font-weight: 700; font-size: 15px; cursor: pointer; border: none;
      transition: all .2s ease; letter-spacing: .01em; font-family: inherit;
    }
    .btn-primary { background: linear-gradient(135deg, var(--indigo), var(--violet)); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99,102,241,.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--card-hover); border-color: var(--border-hover); }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
    .search-input {
      width: 100%; padding: 13px 16px 13px 44px;
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      color: var(--text); font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s, background .2s;
    }
    .search-input:focus { border-color: rgba(99,102,241,.55); background: var(--card-hover); }
    .search-input::placeholder { color: var(--muted); }
    .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
    .topic-card { padding: 18px 14px 14px; border-radius: 18px; position: relative; overflow: hidden; }
    .topic-card-bg { position: absolute; inset: 0; border-radius: inherit; opacity: .18; transition: opacity .22s; }
    .topic-card:hover .topic-card-bg { opacity: .28; }
    .topic-card-content { position: relative; z-index: 1; }
    .topic-emoji { font-size: 30px; margin-bottom: 10px; display: block; }
    .topic-name  { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .topic-sub   { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
    .topic-badge { display: inline-block; margin-top: 10px; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px; color: #fff; }
    .mix-card {
      background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(139,92,246,.2));
      border: 1px solid rgba(99,102,241,.35); border-radius: 18px; padding: 20px;
      cursor: pointer; display: flex; align-items: center; gap: 16px;
      transition: all .22s ease; margin-bottom: 20px;
    }
    .mix-card:hover { background: linear-gradient(135deg, rgba(99,102,241,.3), rgba(139,92,246,.3)); transform: translateY(-2px); box-shadow: 0 16px 40px rgba(99,102,241,.2); }
    .progress-bar { height: 5px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--indigo), var(--violet)); border-radius: 999px; transition: width .5s cubic-bezier(.4,0,.2,1); }
    .question-card { padding: 24px; }
    .type-badge {
      display: inline-block; font-size: 11px; font-weight: 700; padding: 4px 10px;
      border-radius: 8px; background: rgba(99,102,241,.2); color: #a5b4fc;
      border: 1px solid rgba(99,102,241,.3); margin-bottom: 16px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .q-text { font-size: 16px; font-weight: 500; line-height: 1.65; color: var(--text); }
    .options-list { display: flex; flex-direction: column; gap: 9px; margin-top: 20px; }
    .option-btn {
      width: 100%; text-align: left; padding: 14px 18px; border-radius: 13px;
      border: 1.5px solid var(--border); background: rgba(255,255,255,.04);
      color: var(--text); cursor: pointer; font-size: 14px; font-weight: 500;
      line-height: 1.5; font-family: inherit; transition: all .18s ease;
    }
    .option-btn:hover:not(:disabled) { background: rgba(255,255,255,.08); border-color: rgba(99,102,241,.5); transform: translateX(3px); }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct { background: rgba(16,185,129,.18); border-color: #10b981; color: #6ee7b7; }
    .option-btn.wrong   { background: rgba(239,68,68,.18);  border-color: #ef4444; color: #fca5a5; }
    .option-btn.reveal  { background: rgba(16,185,129,.1);  border-color: rgba(16,185,129,.4); }
    .tf-container { display: flex; gap: 12px; margin-top: 20px; }
    .tf-btn {
      flex: 1; padding: 18px 12px; border-radius: 14px; border: 2px solid var(--border);
      background: rgba(255,255,255,.04); color: var(--text); cursor: pointer;
      font-size: 17px; font-weight: 800; letter-spacing: .05em;
      font-family: inherit; transition: all .18s ease;
    }
    .tf-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,.25); }
    .tf-btn.igaz-h:hover:not(:disabled) { background: rgba(16,185,129,.15); border-color: #10b981; }
    .tf-btn.hamis-h:hover:not(:disabled){ background: rgba(239,68,68,.15);  border-color: #ef4444; }
    .tf-btn.correct { background: rgba(16,185,129,.25); border-color: #10b981; color: #6ee7b7; }
    .tf-btn.wrong   { background: rgba(239,68,68,.25);  border-color: #ef4444; color: #fca5a5; }
    .tf-btn.reveal  { background: rgba(16,185,129,.1);  border-color: rgba(16,185,129,.4); color: #6ee7b7; }
    .blank-sentence { font-size: 16px; font-weight: 500; line-height: 1.7; margin-top: 10px; }
    .blank-slot { display: inline-block; min-width: 90px; padding: 2px 10px; border-bottom: 2px solid var(--violet); border-radius: 4px; background: rgba(99,102,241,.1); color: #c4b5fd; font-weight: 700; }
    .blank-ph   { color: var(--muted); }
    .self-assess { display: flex; gap: 10px; margin-top: 18px; }
    .sa-btn {
      flex: 1; padding: 14px; border-radius: 13px; border: 2px solid var(--border);
      background: rgba(255,255,255,.04); color: var(--text); cursor: pointer;
      font-size: 14px; font-weight: 700; font-family: inherit; transition: all .18s;
    }
    .sa-btn.sa-yes:hover { background: rgba(16,185,129,.15); border-color: #10b981; }
    .sa-btn.sa-no:hover  { background: rgba(239,68,68,.15);  border-color: #ef4444;  }
    .explanation {
      margin-top: 16px; padding: 14px 16px;
      background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.28);
      border-radius: 12px; font-size: 13px; color: #a5b4fc; line-height: 1.65;
    }
    .explanation.ok  { background: rgba(16,185,129,.08); border-color: rgba(16,185,129,.3); color: #6ee7b7; }
    .explanation.err { background: rgba(239,68,68,.08);  border-color: rgba(239,68,68,.3);  color: #fca5a5; }
    .score-bar { display: flex; justify-content: center; gap: 28px; margin-top: 18px; }
    .score-item { font-size: 13px; font-weight: 700; }
    .c-green  { color: #10b981; }
    .c-red    { color: #ef4444; }
    .c-orange { color: #f97316; }
    .result-circle {
      width: 160px; height: 160px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--card); border: 1px solid var(--border); flex-direction: column;
      animation: pulse-ring 2.5s ease-in-out infinite;
    }
    .result-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin: 24px 0; }
    .stat-card { padding: 16px 10px; border-radius: 16px; text-align: center; }
    .stat-val  { font-size: 28px; font-weight: 900; }
    .stat-lbl  { font-size: 11px; color: var(--muted); margin-top: 4px; }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse-ring {
      0%  { box-shadow: 0 0 0 0   rgba(99,102,241,.4); }
      70% { box-shadow: 0 0 0 16px rgba(99,102,241,0); }
      100%{ box-shadow: 0 0 0 0   rgba(99,102,241,0); }
    }
    @keyframes streakPop { 0%,100%{transform:scale(1);} 50%{transform:scale(1.4);} }
    .fade-up   { animation: fadeUp .38s cubic-bezier(.22,1,.36,1) both; }
    .streak-pop{ animation: streakPop .3s ease; }
    .back-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 14px; font-weight: 600; font-family: inherit;
      display: flex; align-items: center; gap: 6px; padding: 8px 0; transition: color .2s;
    }
    .back-btn:hover { color: var(--text); }
    .hidden { display: none !important; }
    @media (max-width: 480px) {
      .topics-grid { grid-template-columns: repeat(2, 1fr); }
      .q-text { font-size: 15px; }
    }
  </style>
</head>
<body>
<div class="bg-glow"></div>

<!-- ══ SCREEN 1: Topic Selection ══ -->
<div id="screen-topic" class="screen active">
  <div class="container" style="padding-top:40px;padding-bottom:60px;">
    <div class="fade-up" style="text-align:center;margin-bottom:36px;">
      <div style="font-size:52px;margin-bottom:10px;">🧬</div>
      <h1 style="font-size:clamp(32px,6vw,48px);font-weight:900;letter-spacing:-.02em;" class="gradient-text">BioKvíz</h1>
      <p style="color:var(--muted);font-size:15px;margin-top:8px;font-weight:500;">
        Emelt Szintű Biológia &nbsp;·&nbsp;
        <span style="color:#818cf8;font-weight:700;" id="total-label">494 kérdés</span>
      </p>
    </div>
    <div class="search-wrap fade-up" style="max-width:420px;margin:0 auto 28px;animation-delay:.05s;">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="text" class="search-input" placeholder="Téma keresése…" autocomplete="off">
    </div>
    <div class="mix-card fade-up" style="animation-delay:.08s;" onclick="startMixAll()" id="mix-card">
      <div style="font-size:38px;">🎲</div>
      <div>
        <div style="font-size:16px;font-weight:800;color:#c4b5fd;">Mindent keverve</div>
        <div style="font-size:13px;color:var(--muted);margin-top:3px;">Összes téma véletlenszerűen · 494 kérdés</div>
      </div>
    </div>
    <div id="topics-grid" class="topics-grid fade-up" style="animation-delay:.12s;"></div>
  </div>
</div>

<!-- ══ SCREEN 2: Quiz ══ -->
<div id="screen-quiz" class="screen">
  <div class="container-sm" style="padding-top:20px;padding-bottom:60px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <button class="back-btn" onclick="goHome()">← Vissza</button>
      <div style="display:flex;align-items:center;gap:18px;">
        <span style="font-size:13px;color:var(--muted);font-weight:600;"><span id="q-counter">0</span> / <span id="q-total">0</span></span>
        <span id="streak-wrap" style="font-size:13px;font-weight:800;color:#f97316;">🔥 <span id="streak-count">0</span></span>
      </div>
    </div>
    <div class="progress-bar" style="margin-bottom:22px;">
      <div id="progress-fill" class="progress-fill" style="width:0%"></div>
    </div>
    <div style="text-align:center;margin-bottom:18px;color:var(--muted);font-size:13px;font-weight:600;">
      <span id="topic-emoji-q" style="font-size:18px;"></span>
      <span id="topic-name-q" style="margin-left:6px;"></span>
    </div>
    <div id="question-card" class="glass question-card" style="margin-bottom:14px;">
      <span id="type-badge" class="type-badge">−</span>
      <div id="q-text" class="q-text"></div>
      <div id="q-options" class="options-list hidden"></div>
      <div id="q-tf" class="tf-container hidden">
        <button class="tf-btn igaz-h" id="btn-igaz"  onclick="answerTF(true)">✅ IGAZ</button>
        <button class="tf-btn hamis-h" id="btn-hamis" onclick="answerTF(false)">❌ HAMIS</button>
      </div>
      <div id="q-blank" class="hidden">
        <div id="blank-sentence" class="blank-sentence"></div>
        <div style="margin-top:16px;">
          <button class="btn btn-primary" id="btn-reveal" onclick="revealBlank()" style="font-size:14px;padding:12px 22px;">💡 Megmutatom a választ</button>
        </div>
        <div id="self-assess" class="self-assess hidden">
          <button class="sa-btn sa-yes" onclick="blankAssess(true)">✅ Tudtam</button>
          <button class="sa-btn sa-no"  onclick="blankAssess(false)">❌ Nem tudtam</button>
        </div>
      </div>
      <div id="explanation" class="explanation hidden"></div>
    </div>
    <button id="btn-next" class="btn btn-primary hidden" style="width:100%;font-size:16px;padding:16px;" onclick="nextQuestion()">Következő →</button>
    <div class="score-bar">
      <span class="score-item c-green">✓ <span id="mini-correct">0</span></span>
      <span class="score-item c-red">✗ <span id="mini-wrong">0</span></span>
    </div>
  </div>
</div>

<!-- ══ SCREEN 3: Results ══ -->
<div id="screen-results" class="screen">
  <div class="container-sm" style="padding:40px 16px 60px;text-align:center;">
    <div class="fade-up">
      <div id="result-emoji" style="font-size:64px;margin-bottom:14px;">🎉</div>
      <h2 style="font-size:32px;font-weight:900;margin-bottom:6px;">Kész!</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:28px;" id="result-topic"></p>
      <div style="margin-bottom:28px;">
        <div class="result-circle">
          <div style="font-size:42px;font-weight:900;" id="result-pct">0%</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">helyes</div>
        </div>
      </div>
      <div class="result-stats">
        <div class="stat-card glass"><div class="stat-val c-green" id="res-correct">0</div><div class="stat-lbl">Helyes</div></div>
        <div class="stat-card glass"><div class="stat-val c-red"   id="res-wrong">0</div><div class="stat-lbl">Hibás</div></div>
        <div class="stat-card glass"><div class="stat-val c-orange" id="res-streak">0</div><div class="stat-lbl">Max sorozat</div></div>
      </div>
      <p id="result-msg" style="color:#a5b4fc;font-weight:600;font-size:15px;margin-bottom:28px;"></p>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <button class="btn btn-primary" style="width:100%;font-size:15px;" onclick="restartQuiz()">🔄 Újra próbálom</button>
        <button class="btn btn-ghost"   style="width:100%;font-size:15px;" onclick="goHome()">← Témaválasztás</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// EMBEDDED QUIZ DATA (no fetch needed)
// ══════════════════════════════════════════
const QUIZ_DATA = {"homeosztazis":[{"type":"MC","text":"A vezetéklés és a szabályozás közötti alapvető különbség melyik jellemzője a kontrollmechanizmusnak?","options":["A) Azonos mértékben függenek a központi idegrendszertől","B) A vezetéklés gyorsabb, mint a szabályozás","C) A szabályozás kétirányú visszacsatoláson alapul, míg a vezetéklés egyirányú","D) A vezetéklés csak tudatos irányításra képes"],"correctLetter":"C","explanation":""},{"type":"MC","text":"Amikor a test hőmérséklete 36°C-re csökken (van érték), és az alapértékelése 37°C (kell érték), az agyban képződött hibajel melyik kompenzációs folyamatot indít el?","options":["A) A szintesejt aktiválódása, amely párologtatást csökkent","B) A fűtőközpont aktivitásának fokozódása, amely növeli a testhőmérsékletet","C) A hipotalamusz gátlása, amely csökkenti az anyagcserét","D) A verejtékmirigyek megnyílása, amely fokozza a hőleadást"],"correctLetter":"B","explanation":""},{"type":"MC","text":"A negatív visszacsatolás homeosztázist stabilizáló hatásmechanizmusa melyik alapvető tulajdonságára alapul?","options":["A) A rendszer memóriájára és tanulásképességére","B) Az ingerek egyesítésére több vezérlési szintben","C) A hormonális és idegi szabályozás párhuzamos működésére","D) A rendszer kimeneti hatásai gyengítik a belépő ingert, ezáltal csökkentik az eltérést"],"correctLetter":"D","explanation":""},{"type":"MC","text":"Milyen fiziológiai körülmény között kapcsolódik ki normális körülmények között a negatív visszacsatolású kompenzációs mechanizmus?","options":["A) Stressz állapotában, amikor a hipotalamusz az agytörzsi szabályozást felülírja","B) Az éjszakai alvás során, amikor a szimpatikus rendszer lecsengő aktivitása","C) Normális anyagcsere alatt, amikor az enzimműködés optimális","D) Előrehajlási (anticipatory) folyamatban, amikor az agy várható terhelésre készül"],"correctLetter":"A","explanation":""},{"type":"MC","text":"Az aldoszteron hormon nátriumhiány esetén kiváltott fokozódott elválasztása milyen szintű biológiai szabályozásnak az eredménye?","options":["A) Sejtszintű genetikai szabályozásnak","B) Sejtszintű enzimműködés szabályozásnak","C) Szervezetszintű endokrin szabályozásnak","D) Szervezetszintű idegi reflexnek"],"correctLetter":"C","explanation":""},{"type":"MC","text":"A belső környezet homeosztázisa mely paraméter értékét NEM szabályozza direkt módon a vese működése révén?","options":["A) Az ozmotikus koncentrációt","B) Az ionösszetételt","C) A testfolyadékok térfogatát","D) A testfolyadékok tápanyagkoncentrációját"],"correctLetter":"D","explanation":""},{"type":"TF","text":"A homeosztázis-összetevők értékei (pl. hormonszintek, ionkoncentráció) minden körülmények között állandóak, hogy biztosítsák a sejtek optimális működését.","isTrue":false,"explanation":""},{"type":"TF","text":"A pozitív visszacsatolás a biológiai rendszerekben az önszabályozást és a stabilitást erősíti, hasonlóan a negatív visszacsatoláshoz.","isTrue":false,"explanation":""},{"type":"TF","text":"A sejtek között működő kommunikációs rendszer hiánya vagy megzavarása elvezethet kóros elváltozásokhoz, például daganatos sejtekhez, amelyek kimaradnak a normális szabályozásból.","isTrue":true,"explanation":""},{"type":"TF","text":"A jelmolekulák (hormonok, neurotranszmitterek) élettartama viszonylag hosszú (órák, napok), hogy biztosítsák a stabil szabályozást.","isTrue":false,"explanation":""},{"type":"TF","text":"A rendszerszemléletű orvoslás holisztikus megközelítésben tekinti az emberi szervezetet, ahol a gének, fehérjék, sejtek és szervek komplex, kölcsönhatásban álló egységet képeznek.","isTrue":true,"explanation":""},{"type":"BLANK","text":"Az irányítási folyamat alapműveleteinek sorrendje: alapjelképzés, _____, összehasonlítás, döntés.","answer":"mérés","explanation":""},{"type":"BLANK","text":"A _____ a folyamat, amikor a szabályozórendszer a hibajellel ellentétes előjelű hatással módosítja a rendszer működését, ezáltal stabilizálva a szervezetet.","answer":"negatív visszacsatolás t verejtékmirigyek és járulékos nemi mirigyek","D) Kollagén-termelő fibroblaszt-sejtcsalád"],"correctLetter":"C","explanation":""},{"type":"MC","text":"A szőr életciklusa során a hájyszőr papillára gyakorolt nyomása milyen szöveti jellegzetességet biztosít?","options":["A) Az epidermisz-irha határfelület erősítését","B) A bőr pigmentáció-termelésének stimulálása","C) Az izzadság termelés fokozása","D) A papilla az osztódó sejtekben a szőrszál szaruanyagát (keratin) hozza létre"],"correctLetter":"D","explanation":""},{"type":"MC","text":"Az ujjnyomatok karakterisztikus bőrlécrajzolata az irha mely szöveti rétegének jellegzetes mintázatán alapul?","options":["A) Az irha felső, finom rostos szemölcsös rétegének karakterisztikus mintázatán","B) Az epidermisz szarurétegének elszarusodásán","C) A bőralja zsírszövetének csomósodásán","D) A faggyúmirigyek csatornáinak geometriai elrendezésén"],"correctLetter":"A","explanation":""},{"type":"MC","text":"A köröm melynek az elsődleges biológiai funkciója?","options":["A) A szőrszál-termeléshez szükséges vasékszállítás","B) Az ujjak végpercének mechanikus védelme","C) Az epidermisz sebészeti érckötésének biztosítása","D) Az ujjak hőszabályozása"],"correctLetter":"B","explanation":""},{"type":"MC","text":"A köröm melyik része az a puffad, félhold alakú terület, amely a köröm növekedési aktivitásának a szöveti indikátora?","options":["A) Az oldalsó körömsánc","B) A hátsó körömsánc","C) A félhold (lunula), amely a körömlemez alatt található növekedési zóna","D) A körömlemez külső bordája"],"correctLetter":"C","explanation":""},{"type":"MC","text":"A bőralja zsírszövetének duális funkciója mely két aspektusban nyilvánul meg?","options":["A) Kollagén-termelés és faggyú-szintézis","B) Tápanyagraktár és mechanikai védelem, valamint hőszigetelés","C) Pigment-termelés és UV-védekezés","D) Lympha-termelés és immunsejt-szaporodás"],"correctLetter":"B","explanation":""},{"type":"TF","text":"Az epidermisz (felhám) szarurétege a külső- és belső felszínen is azonos vastagságú, mivel az összes testrészen egyenletes védelmet nyújt.","isTrue":false,"explanation":""},{"type":"TF","text":"Az epidermisz hámsejtek felfelé haladása során a keratin halmozódása az apoptotikus sejtkockázat növekedésé vezethet, amely végül a szarupikkely-elpusztuláshoz vezet.","isTrue":true,"explanation":""},{"type":"TF","text":"Az ultraibolya sugárzás által okozott DNS-mutáció kizárólag melanomához vezethet, és más bőrműködési zavarokra nincsen hatása.","isTrue":false,"explanation":""},{"type":"TF","text":"A verejtékmirigyek kiválasztó szerepét illetően, mivel a verejték egy nagyon híg folyadék, funkcionálisan szinte vizeletnek tekinthető.","isTrue":true,"explanation":""},{"type":"TF","text":"A szőrtüszőkhöz kapcsolódó faggyúmirigyek váladéka a szőr rugalmasságának csökkentésére szolgál, hogy az könnyen törhető legyen.","isTrue":false,"explanation":""},{"type":"TF","text":"A szimbióta baktériumok a faggyúrétegben szavas védelmet biztosítanak a bőrnek, ami azt jelzi, hogy a fizika-kémiai és biológiai védelmet nem lehet élesen szétválasztani.","isTrue":true,"explanation":""},{"type":"TF","text":"A nagyobb verejtékmirigyek (illatmirigyek) működésük kezdetekor közvetlenül a pubertás előtt megindul és egyenletes mértékben működnek az egész életben.","isTrue":false,"explanation":""},{"type":"TF","text":"Az ujjnyomatok bőrlécrajzolata az epidermisz szarurétegének mintázatán alapul, amely minden egyes embernél egyedi és genetikailag meghatározott.","isTrue":false,"explanation":""},{"type":"BLANK","text":"Az epidermiszis egy nagyon fontos belső réteg, amely sebességű sejtoszlódást végez, hogy a felszínen leöltés után az új sejteket felszín felé _____ az idősebb sejteket.","answer":"tolj","explanation":""},{"type":"BLANK","text":"A melanin a bőr pigmentsejteiben termelődik, és az általa elnyelt _____ sugárzást a mélyebb bőrrétegek védelmét biztosítja.","answer":"ultraibolya (UV)","explanation":""},{"type":"BLANK","text":"Az irha gazdag kollagén- és _____ rostokban gazdag rostos kötőszövet, amely felelős a bőr rugalmasságáért.","answer":"rugalmas (vagy elastin)","explanation":""},{"type":"BLANK","text":"A bőr legfelső védőrétege az _____, amely szövettanilag többrétegű elszarusodó laphámból áll.","answer":"felhám (vagy epidermisz)","explanation":""},{"type":"BLANK","text":"A kétpont-küszöb az a legkisebb távolság, melynél két vékony pálca érintéseit különbözőnek érezzük, amely az _____ sűrűségétől függően az ujjbegyen a legkisebb.","answer":"receptorok (vagy bőrreceptorok)","explanation":""},{"type":"BLANK","text":"A szőr szerkezete a bőrből kiemelkedő szőr szárból és a bőrben fekvő _____ alkotják, amely a hám csőszerű betüremkedéséből jön létre.","answer":"szőrtüsző","explanation":""},{"type":"BLANK","text":"A szőrtüszőhöz csatlakozó _____ simaizmok a szőr felállításáért felelősek, amely az szőrborzolást (libabőr) okozza.","answer":"szőrmerevítő","explanation":""},{"type":"BLANK","text":"A szőrszál anyaga a _____, amely a szőrtüsző alapján, a hagymában foglalt osztódó sejtekből szintetizálódik.","answer":"keratin","explanation":""},{"type":"BLANK","text":"A verejtékmirigyek csatornái a _____ felszínén keresztül nyílnak a bőr felszínére, ahonnan a verejték lecsepeg.","answer":"bőr (vagy epidermisz)","explanation":""},{"type":"BLANK","text":"A mitesszer (faggyúdugasz) akkor keletkezik, ha a megvastagodott szaruréteg elzárja a _____ vagy a faggyúmirigy nyílását.","answer":"szőrtüsző","explanation":""},{"type":"BLANK","text":"Az akne (pattanás) alakul ki, ha az elzáródott szőrtüszők _____ vagy felülfertőződnek, begennyesednek.","answer":"begyulladnak","explanation":""},{"type":"BLANK","text":"A vízhólyag a kézen és a lábfejen a _____ és nyomástól kialakuló, szövetnedv tartalmazó megemelkedett bőrterület.","answer":"dörzsölődés","explanation":""},{"type":"MC","text":"Az anyajegy (mola) kialakulása szempontjából melyik tényező játszik az elsődleges szerepet?","options":["A) A genetikai tényezők kizárólagos hatása","B) A bőrt ért UV-sugárzás (napfény, szolárium) mennyisége","C) Az epidermisz vérkeringésének zavara","D) A faggyúmirigyek túlműködése"],"correctLetter":"B","explanation":""},{"type":"MC","text":"A melanoma malignum kialakulásánál melyik anatómiai jelenség a legjellegzetesebb korai figyelmeztető jel?","options":["A) A szaruréteg felszíni hámlik és hámlást","B) A bőr fokozat szőrösödése az anyajegy körül","C) Az anyajegy színének, pigmentációjának, felszínének vagy alakjának megváltozása, valamint a határ elmosódása","D) Az anyajegy körüli bőr hőmérsékletének emelkedése"],"correctLetter":"C","explanation":""},{"type":"MC","text":"A HPV vírus miért támadja meg elsősorban a bőr hámsejtjeit?","options":["A) Mert a hámsejteknek nincs sejtmagi membránja","B) Mert az enyhe savas pH megakadályozza más sejteket","C) Mert az epidermisz anyagcseréje a leggyorsabb az összes között","D) Akkor, amikor azok védekező rendszere nem tökéletes és a bőr vagy nyálkahártya sérült"],"correctLetter":"D","explanation":""},{"type":"MC","text":"Az egészséges immunrendszer ellenére mely körülmények között képes a HPV fertőzés megjelenni a bőrön?","options":["A) Stressz, erős dohányzás, krónikus betegségek vagy egyéb gyulladások legyengítik az immunrendszert","B) Amikor az emberek túl sok vizet isznak","C) Csak akkor, amikor az immunrendszer öreg vagy fiatal","D) Az UV-sugárzás által kiváltott DNS-kár miatt"],"correctLetter":"A","explanation":""},{"type":"MC","text":"A HPV fertőzés után átlagosan milyen időpont alatt jelennek meg a szemölcsök?","options":["A) Az esetek többségében azonnal a fertőzés után","B) Megközelítőleg a vírus szervezetbe kerülésétől számított 3-6 hónap elteltével","C) Több év után, főként az öregkor során","D) Csak akkor, ha az immunrendszer legyengül a vakcinációból"],"correctLetter":"B","explanation":""},{"type":"MC","text":"Az elsőfokú égésben mely bőrréteg vagy rétegek károsodnak?","options":["A) Az epidermisz és az irha felső rétegei","B) Az epidermisz, az irha és a bőralja","C) Csak az epidermisz (felhám)","D) Az irha és a bőralja, de az epidermisz sértetlen marad"],"correctLetter":"C","explanation":""},{"type":"MC","text":"A másodfokú égés mely jellegzetes klinikai karakterisztikáit mutatja?","options":["A) Nedves, hólyagos felszín, kifejezetten fájdalmas","B) Szürke, pergamenszerű felszín, fájdalommentes","C) Vörös, feszes, sima, igen fájdalmas","D) Fekete, szenes felszín, mely felületén vér látható"],"correctLetter":"A","explanation":""},{"type":"MC","text":"A harmadfokú égésben mely jellegzetes szöveti változás veszélyes?","options":["A) Az epidermisz elasztikus visszanyerése","B) Az irha vérkeringésének fokozódása","C) Az idegvégződések elpusztulása által okozott fájdalommentesség","D) A faggyúmirigyek váladékának fokozódása"],"correctLetter":"C","explanation":""},{"type":"MC","text":"Az égési sérülés kezelésében az első lépés melyik?","options":["A) Zsiradék vagy tejföl alkalmazása az égett területre","B) Az égést kiváltó tényező eltávolítása, majd hideg, nem jeges, folyó víz alá helyezés","C) Azonnal antibiotikus kötés felvétele","D) A nagy kiterjedésű égésben azonnal izomnak összeesése"],"correctLetter":"B","explanation":""},{"type":"MC","text":"Az égési sérülés melyik fokozatában indokolt lehet csak steril körülmények között szakember által végzett hólyag-megnyitás?","options":["A) Az elsőfokú égésben azonnal","B) A harmadfokú égésben, ahol szöveti elhalás van","C) A másodfokú égésben, ahol a hólyagok megnyitása szükséges lehet","D) A negyedfokú égésben, ahol az izomszövet elégetett"],"correctLetter":"C","explanation":""}],"mozgas":[{"type":"MC","text":"A szarkomer az izom mely szerkezeti szintjén jelenik meg?","options":["A) Izomrost szintjén","B) Izomfonalak (miofilamentumok) szintjén","C) Izomfonal-köteg (miofibrillum) szintjén","D) Izomnyaláb szintjén"],"correctLetter":"C","explanation":"A szarkomer az izomfonalköteg (miofibrillum) két Z-lemezt között eső periodikusan ismétlődő egysége, amely az izom-összehúzódás funkcionális alapegysége."},{"type":"MC","text":"Az aktin-miozin csúszómechannizmusban melyik folyamat közvetlenül az ATP-hidrolízis energiájához kötött?","options":["A) A Ca2+ felszabadulása a szarkoplazmatikus reticulumból","B) A miozinfej konformációváltozása és bólintó mozgása","C) A troponin konformációváltozása","D) A tropomiozin elmozdulása az aktinon"],"correctLetter":"B","explanation":"Az ATP bontása közvetlenül az energia forrása a miozinfej csuklószerű mozdulatához, amely a vékony fonalak becsúsztatásában döntő szerepet játszik."},{"type":"MC","text":"Melyik ion hiánya vezethet rigor állapothoz az izomban?","options":["A) K+","B) Na+","C) Mg2+","D) Ca2+"],"correctLetter":"C","explanation":"Az Mg2+ ion nélkül az ATP nem képes a miozin fejhez kötődni, amelynek következtében a miozinfej véglegesen az aktinhoz rögzül (rigor állapot)."},{"type":"MC","text":"A porckorongsérv kialakulása mely szerkezet meggyengüléséhez vezethet közvetlenül?","options":["A) A csigolyatest porosodásához","B) A rostos gyűrű átszakadásához","C) A gerincvelő sérüléséhez","D) A csigolyák ízesülésének zavarásához"],"correctLetter":"B","explanation":"A porckorong külső rostos gyűrűjének meggyengülésekor a belső kocsonyás mag kiboltosodik a gerinccsatornába."},{"type":"MC","text":"A gerincoszlop S-alakú görbülete emberi adaptációjának mely funkciójához kapcsolódik?","options":["A) A csontok vastagodásához","B) A két lábon járás során a koponyacsont rugalmas alátámasztásához","C) A vörösvérkoponyák termeléséhez","D) A gerincvelő védelmének optimalizálásához"],"correctLetter":"B","explanation":"A nyílirányú középsíkban meglévő kettős S-görbe (nyaki lordózis és háti kifózis) rugalmas alátámasztást biztosít a fejnek és a törzs teherbírásához szükséges egyensúlyt."},{"type":"MC","text":"Az emelőelv alapján, melyik megállapítás IGAZ az izom hajlítóizmainak működésére?","options":["A) Az erőkar mindig hosszabb, mint a teherkar","B) Az izom tapadási pontja általában közelebb van a forgásponthoz, mint a teher","C) A forgástengely az ízület, az erő a csont közepéről hat","D) Az erőkar és teherkar azonos hosszúságú"],"correctLetter":"B","explanation":"Az emberi izmok által előállított mozgások tipikusan egyoldalú emelőként működnek, ahol az izom erőkarma rövidebb, mint a teher karja, ezért nagyobb erőt igényelnek a mozgáshoz."},{"type":"MC","text":"A kreatin-foszfát fiziológiai szerepe az izom-összehúzódás mely szakaszában a legfontosabb?","options":["A) Az erjedés során","B) A biológiai oxidáció során","C) A maximális terhelés első 7 másodpercében","D) A hosszantartó terhelés alatt"],"correctLetter":"C","explanation":"A kreatin-foszfát az ATP kiürülő készleteit regenerálja, a maximális terhelés kezdetén (0-7 másodperc) domináló energiaforrásként működik."},{"type":"MC","text":"A mioglobin oxigénkötésének sajátos mechanizmusa mely szempontból különbözik a hemoglobintól?","options":["A) Magasabb pH-n és alacsonyabb oxigénkoncentrációnál képes oxigént kötni","B) Egy helyett több polipeptidláncból épül fel","C) Vastagabb szöveti eloszlása miatt könnyebben hozzáférhető","D) Kizárólag anaerob körülmények között működik"],"correctLetter":"A","explanation":"A mioglobin alacsonyabb pH-n és alacsonyabb oxigénkoncentráció esetén is képes az oxigént kötni, amely oxigénraktárzási funkciójának előfeltétele."},{"type":"MC","text":"Az izmok melyik típusára jellemzően magas mioglobin-tartalom?","options":["A) Gyors, fehér izmokra (végtagok izmai)","B) Lassú, tartós összehúzódásra képes vörös izmokra (testtartásizmok)","C) Mimikai izmokra","D) Rágóizmokra"],"correctLetter":"B","explanation":"A magas mioglobin-tartalom az oxigén raktározásban és tartós, fáradékonyabb terhelés esetén az oxigénellátás biztosításában játszik szerepet."},{"type":"MC","text":"A gerincferdülés (skoliózis) mely szövődménye közvetlenül a mellkas deformációjához kapcsolódik?","options":["A) Az izomláz kialakulása","B) A szív és tüdő működésének zavara","C) A porckorongsérv képződése","D) A csonttöréké"],"correctLetter":"B","explanation":"A gerinc oldalirányú elhajlása a mellkas deformációját okozza, amely a szív és tüdő működésében zavarok kialakulásához vezethet."},{"type":"TF","text":"A szarkomerek rövidülése során az F-aktin és a miozin fonalak hossza változatlan marad.","isTrue":true,"explanation":"A csúszómechanizmusban a vékony és vastag fonalak saját hossza nem változik, csak egymás felé csúsznak, ezáltal a szarkomer rövidül."},{"type":"TF","text":"A kreatin-foszfát a vázizomszövetben közvetlenül ATP-t termel az oxidatív foszforilációban.","isTrue":false,"explanation":"A kreatin-foszfát az ATP-készleteket regenerálja egy kémiai transzfer-reakción keresztül, nem pedig az oxidatív foszforilációban vesz részt."},{"type":"TF","text":"Az izotóniás izomösszehúzódás során az izom hossza csökken, miközben a feszültsége nagyjából állandó marad.","isTrue":true,"explanation":"Az izotóniás összehúzódás definíciója szerint az izom megrövidül azonos feszültség mellett, ellentétben az izometriás összehúzódással."},{"type":"TF","text":"Az izomtónus akaratlagos, tudatos izomfeszülés, amely a testtartás alapját képezi.","isTrue":false,"explanation":"Az izomtónus akaratlan, állandó, kismértékű izomfeszülés, amely a testtartás alapja, azonban nem akaratlagos."},{"type":"TF","text":"A csonthártya belső rétegében található csontképző sejtek aktívan részt vesznek a csont vastagodásában és a sérült csont regenerációjában.","isTrue":true,"explanation":"A csonthártya belső rétegében levő csontképző sejtek meghatározó szerepet játszanak a csont radiális növekedésében és a sérült csont helyreállításában."},{"type":"TF","text":"Az idősebb korban a csontok törékenysége csökken a kollagén és vizek tartalma növekedésének hatására.","isTrue":false,"explanation":"Az idősebb korban éppen az ellenkezője történik: a csontok kollagén- és víztartalma csökken, karbonáttartalma nő, ami a törékenység fokozódásához vezet."},{"type":"TF","text":"A szalagok erős kötőszöveti képletek, amelyek az ízületi tok összetartásában és az ízületek stabilitásában játszanak szerepet.","isTrue":true,"explanation":"Az ízületi szalagok az ízület erősítésében és stabilizálásában alapvető szerepet játszanak, részben az ízületi tokon kívüli, részben hozzá tartozó képletek."},{"type":"TF","text":"A gömbízület (pl. csípő, váll) csak egy tengely körüli mozgást tesz lehetővé.","isTrue":false,"explanation":"A gömbízület soktengelyű ízület, amely több tengely körüli mozgást (flexió, extenszió, abdukció, addukció, rotáció) engedélyez."},{"type":"TF","text":"A csípőficam diagnózisához a születés után 3-6 héten és 4 hónapos korban végzett szűrés rutinmódszere.","isTrue":true,"explanation":"Magyarországon a csípőficam felismerésére többlépcsős szűrési program van, amely a születés után 3-6 héten és 4 hónapos korban végzett vizsgálatokat tartalmaz."},{"type":"TF","text":"A nyílt (kompound) csonttörés során a bőr felszíne megmarad érintetlen, a törtvégek a bőr alatt vannak.","isTrue":false,"explanation":"A nyílt törés során a bőr átszakad és a törtvégek láthatók. A zárt (egyszerű) törésnél marad érintetlen a bőr."},{"type":"BLANK","text":"Az izomműködéshez szükséges kalcium-ionok az izomrost _____ részéből szabadulnak fel összehúzódáskor.","answer":"szarkoplazmatikus reticulumból (SER-ből)","explanation":"A Ca2+ ionok az izomrost endoplazmatikus retikulumából (SER) felszabaduló nagy mennyiségben az ingerületátvivő anyag hatására kerülnek a citoplazmába."},{"type":"BLANK","text":"Az ízület felépítésében az _____ nevű képlet termeli az ízületi nedvet, amely súrlódáscsökkentő és csúszóssá teszi az ízületi porcokat.","answer":"ízületi tok","explanation":"Az ízületi tok belső nyálkahártyája termel ízületi nedvet (synovialis folyadékot), amely biztosítja a simó mozgást az ízületben."},{"type":"BLANK","text":"A normális csípőízület anatómiai felépítésében a combcsont feje és az őt befogadó medencecsonti _____ pontosan összeilleszkednek.","answer":"vápa (ízületi árok)","explanation":"A csípőízület két komponense a feji része (combcsont feje) és a vápája (medencecsont homorú felszíne), amelyek megfelelő illeszkedése az ízület normális működéséhez szükséges."},{"type":"BLANK","text":"A csigolyák közötti _____ magas víztartalmú kocsonyás magot tartalmaz, amely porckorongsérv esetén a gerinccsatorna felé kiboltosodik.","answer":"porckorong","explanation":"A porckorong (intervertebral disc) külső rostos gyűrűjéből és belső kocsonyás magjából épül fel, amelynek sérülése gerincmű szövődmények oka."},{"type":"BLANK","text":"Az agykoponyacsontok összecsontosodása az idősödéssel szemben az arckoponya és agykoponyacsontok _____ összeköttetésein keresztül történik.","answer":"varratos","explanation":"Az agykoponya csontjai varratok (sutores) révén kapcsolódnak, amelyek az élet folyamán fokozatosan összecsontosodnak, különösen idősebb korban."},{"type":"BLANK","text":"Az izomfej az _____ olyan elnevezése, amely több részre osztott izmok, mint a bicepsz vagy tricepsz, egyes részeit jelöli.","answer":"izom","explanation":"Az izomfej az izom azon külön része, amely több, különálló tapadási pont vagy eredési pont nélkül szerveződik, amelyek száma szerint biceps, triceps, quadriceps név keletkezik."},{"type":"BLANK","text":"A csont szerves állománya a csontok _____, a szervetlen állománya pedig a csontok szilárdságát biztosítja.","answer":"rugalmasságát","explanation":"A csont szerves komponensei (kollagénrostok) az eredeti rugalmasságot adják, míg a szervetlen komponensek (kalciumsók) a szilárdságot."},{"type":"BLANK","text":"A _____ a gerinc görbületeinek és a medence dőlésszögének megfelelő egyensúlyát jelenti, amelynél a tekintet előre néz és fejtetővel felfelé nyújtózkodunk.","answer":"helyes testtartás","explanation":"A helyes testtartás biomechanikailag és ergonómiai szempontból az optimális gerinc-, medence- és végtaghelyzet, amely az izmok egyenletes terhelésén alapul."},{"type":"BLANK","text":"A feltételezetlen mozgásreflexek, mint pl. a nyújtási vagy hajlító reflex, automatikusan mennek végbe, amelyeket elsősorban _____ irányítanak.","answer":"gerincvelői és agytörzsi központok","explanation":"Az izmok reflektoros működése az akaratunktól függetlenül zajlik, amelyet az agy felsőbb központjai helyett a gerincvelő és agytörzsi magcsoportok szabályoznak."},{"type":"BLANK","text":"Az izmok kifáradásának hátterében többféle tényező áll, többek között az izomrost pH-jának csökkenése és a _____ tartalom megemelkedése.","answer":"tejsav","explanation":"Az izomrost acidózisa a szénhidrát anaerob lebomlása során keletkezett tejsav felgyülemlésének köszönhető, amely az izom kontraktilis funkcióját csökkenti."}],"taplalkozas":[{"type":"MC","text":"A pepszin enzim termelődésének helyét és optimális működési kémhatását tekintve, melyik állítás HELYES?","options":[],"correctLetter":"A","explanation":"A pepszin a gyomorban a fősejtekben termelődik pepszinogén precursor formájában, amely az erős sósav hatására aktív formában szabadul fel. Optimális pH-ja 2, ez az oka annak, hogy a fehérjebontás elsősorban a gyomorban kezdődik meg"},{"type":"MC","text":"Az alábbiak közül melyik jellemzés IGAZ az emésztés folyamatára a tápcsatorna különböző szakaszaiban?","options":[],"correctLetter":"D","explanation":"A nyálamiláz a szájüreg nyálmirigyek által termelt enzim, amely a keményítőt maltózzá bontja. A hasnyálamiláz pedig a hasnyálmirigy által termelt enzim, amely a vékonybélben folytatja a szénhidrát emésztést"},{"type":"MC","text":"A máj szerepét az emésztésben és anyagcserében tekintve, melyik funkció NEM tartozik a máj fő feladata közé?","options":[],"correctLetter":"C","explanation":"A máj epét termel, amely nem enzim, hanem emulgeáló folyadék. A máj nem termel közvetlenül emésztőenzimeket a tápcsatornában. Az összes vizsgált funkció közül a máj nem végez enzimtermelést az emésztéshez"},{"type":"TF","text":"Az amiláz enzim specifikus szubsztrátja a keményítő, amely α-1,4 és α-1,6 glikozid kötéseket hasít fel.","isTrue":true,"explanation":"Az amiláz valóban az amilóz és amilopektin α-glikozid kötéseit bontja fel. A nyálamiláz α-1,4 kötéseket, az enzimek egy része pedig ágáthasító enzimként működik."},{"type":"MC","text":"A lipáz enzim működésének tekintetében melyik jellemzés HELYES?","options":[],"correctLetter":"B","explanation":"A hasnyállipáz optimális pH-ja 8-8,5, azaz a vékonybél lúgos közegében működik. A máj által termelt epe szükséges az emulgeáláshoz, de nem enzim. A lipáz a zsírok esterképződésének feloldására szolgál"},{"type":"BLANK","text":"A tripszin, amely a hasnyálmirigy által termelt proteolit enzim, az alapszubsztrátja _____ kötések hasítása révén működik.","answer":"peptid. Magyarázat: A tripszin a hasnyálmirigy által termelt szerin-protease enzim, amely peptidkötéseket hasít fel. A tripszin specifikusan az arginin és lizin maradékok után lévő peptidkötéseket bontja.","explanation":"A tripszin a hasnyálmirigy által termelt szerin-protease enzim, amely peptidkötéseket hasít fel. A tripszin specifikusan az arginin és lizin maradékok után lévő peptidkötéseket bontja."},{"type":"TF","text":"A ghrelin hormon az éhségérzet kialakulásáért felelős, és szintje az étkezés után közvetlenül a legmagasabb.","isTrue":false,"explanation":"A ghrelin szintje az étkezés előtt maximális, az étkezés után pedig a legalacsonyabb. A ghrelin az éhség kialakulásáért felelős hormon, amely a gyomor falán termelt peptidhormon."},{"type":"MC","text":"A leptin és a ghrelin hormonok közötti antagonisztikus viszony szempontjából melyik állítás HELYES?","options":[],"correctLetter":"A","explanation":"A leptin a zsírszövet által termelt hormon, amely a hipotalamuszban a jóllakottsági centrumra hat. A ghrelin ellentétes hatást fejt ki, az éhség érzését indukálja. Leptinrezisztencia során magas leptinszint mellett is fennáll az éhségérzet."},{"type":"BLANK","text":"A D-vitamin felszívódása és hatása szempontjából a _____ hormonként működik a nyálkahártyán a kalcium felszívódásának fokozásában.","answer":"kalcitriol vagy 1,25-dihidroxikolkalciferol. Magyarázat: A D-vitamin aktív formája a kalcitriol, amely hormonként működik. Elősegíti a kalcium felszívódását az epiteliális sejtekben a vékonybélben.","explanation":"A D-vitamin aktív formája a kalcitriol, amely hormonként működik. Elősegíti a kalcium felszívódását az epiteliális sejtekben a vékonybélben."},{"type":"MC","text":"A bélbolyhok (villi) felépítésénél melyik jellemzés HELYES az a felszívódás szempontjából?","options":[],"correctLetter":"C","explanation":"A bélbolyhok egyrétegű oszlopos hámból épülnek fel, amely alatt erős kötőszöveti bázis van. Az epitél sejtek gazdag mitokondrium-tartalommal rendelkeznek az aktív transzporthoz szükséges ATP előállítása miatt."},{"type":"TF","text":"A felszívódás szempontjából a monoszszaharidok (glükóz, fruktóz) passzív diffúzióval szívódnak fel a bélnyálkahártyán.","isTrue":false,"explanation":"A glükóz aktív transzporttal szívódik fel cotranszporter fehérjék segítségével. A fruktóz pedig főként fasicilis diffúzióval, de egyes részben aktív transzporttal is."},{"type":"MC","text":"A bélmikroflóra szerepét tekintve az alábbiak közül melyik NEM igaz?","options":[],"correctLetter":"D","explanation":"A vastagbélben élő baktériumok termelik meg a K-vitamint. A K-vitamin a vastagbélben, nem a szájüregben szívódik fel. Az antibiotikum szedés hosszú ideig tartó hiánya a K-vitaminhiányhoz vezethet."},{"type":"BLANK","text":"A tápcsatorna _____ szakaszában végzik le a zsírok és lipidek teljes emésztését, mivel itt működik a hasnyállipáz enzim és a máj epéje a hasnyálmirigy bikarbonátal biztosítja a szükséges lúgos kémhatást.","answer":"vékonybél (vagy patkóbél). Magyarázat: Az emésztés szakaszaiban vékonybél az a régió, ahol a lipidek és zsírok teljes lebontása megtörténik. A patkóbél az első szakasza a vékonybélnek, ahova az összes emésztőnedv beáramlik.","explanation":"Az emésztés szakaszaiban vékonybél az a régió, ahol a lipidek és zsírok teljes lebontása megtörténik. A patkóbél az első szakasza a vékonybélnek, ahova az összes emésztőnedv beáramlik."},{"type":"MC","text":"A szájüreg nyálkahártyáját borító nyálkaanyag (mucin) és a nyál funkciójának összefüggéseit tekintve melyik HELYES?","options":[],"correctLetter":"B","explanation":"A mucin olyan szerkezet, amely viszkózus és nyújtó csapadékot képez. Ez a mucin összeragasztja az élelmiszereket és segít a falat képzésében a rágás során."},{"type":"TF","text":"Az emberi fog zománcrétege sejtmentes, élettelen, a szervezet által nem regenerálható, azonban az alatt lévő dentin tudja új dentin képzésével helyreállítani a sérüléseket.","isTrue":true,"explanation":"A zománc valóban regeneráció-képtelen réteg. Az alatt lévő dentin azonban odontoblastok segítségével képes másodlagos dentint termelni sérülésre válaszul."},{"type":"MC","text":"A fogképlet és fogváltás folyamatát tekintve melyik állítás HELYES?","options":[],"correctLetter":"D","explanation":"A fogváltás körülbelül 6 éves korban kezdődik, amikor a tejfogak gyökerei felszívódnak és a fogak kiesnek. Az utolsó tejőrlő kihullása körülbelül 11 éves korban következik be."},{"type":"BLANK","text":"A fogképlet az egyik oldali _____ és alsó kvadránson belül az egyes fogtípusok számát mutatja, ahol egy kvadránsban 8 fog helyezkedik el.","answer":"felső vagy felsô. Magyarázat: A fogképlet a felső és alsó fogaknak az egyik oldalát ábrázolja. A fogak 4 kvadránsra oszlanak, melyek közül egyik felső és egy alsó oldal egy oldalát reprezentálja.","explanation":"A fogképlet a felső és alsó fogaknak az egyik oldalát ábrázolja. A fogak 4 kvadránsra oszlanak, melyek közül egyik felső és egy alsó oldal egy oldalát reprezentálja."},{"type":"MC","text":"A glikémiás index (GI) fogalmát tekintve melyik jellemzés HELYES?","options":[],"correctLetter":"A","explanation":"A magas GI-indexű élelmiszerek gyorsan és nagymértékben emelik meg a vércukorszintet, ami az inzulin termelésének fokozódásához vezet. Ezt követően 1-2 órával hipoglikémia alakul ki."},{"type":"TF","text":"A rostanyagok emésztésénél az emberi szervezetben termelődő emésztőenzimek teljes mértékben felszívódtatják a celluláz szerkezetű rostokat.","isTrue":false,"explanation":"Az emberi szervezetben nincs cellulázis enzim. A rostok a vastagbél baktériumai által csak részben szétbontva kerülnek kiürítésre a széklettel."},{"type":"MC","text":"A vitaminok közül melyik csoport oldódik zsírban (zsíroldékony vitaminok)?","options":[],"correctLetter":"C","explanation":"Ezek mind zsírban oldódó vitaminok, amelyek szöveti tárolódásra képesek a máj és a zsírszövetekben. Túlzott bevitelük hipervitaminózishoz vezethet."},{"type":"BLANK","text":"A _____ vitamin hiánya szürkületi vakságot (farkasvakságot) és végül teljes vakságot okozhat, mivel előanyaga a szem retinájában a fényelektront befogó retinal vegyületnek.","answer":"A-vitamin. Magyarázat: Az A-vitamin esszenciális a látáshoz, és ennek hiánya szürkületi vakságot, majd teljes vakságot okozhat. A retinal a retina fotoreceptor sejtjeiben van jelen.","explanation":"Az A-vitamin esszenciális a látáshoz, és ennek hiánya szürkületi vakságot, majd teljes vakságot okozhat. A retinal a retina fotoreceptor sejtjeiben van jelen."},{"type":"MC","text":"A C-vitamin biokémiai funkcióit tekintve melyik állítás HELYES?","options":[],"correctLetter":"B","explanation":"Az aszkorbinsav több biokémiai szerepet játszik: hidrogén adományozó, antioxidáns, és a vas-felszívódás katalitikus faktora. A skorbutban ezeknek a funkciónak hiánya nyilvánvalóvá válik."},{"type":"TF","text":"A B1-vitamin (tiamin) koenzimként működik elsősorban a szénhidrátok lebontása során az energiaforgalom során, hiánya a beri-beri betegséghez vezet.","isTrue":true,"explanation":"A B1-vitamin a szénhidrátemésztés és energiatermelés koenzime. Hiánya szívelégtelenség, ödémaképződés, és neurológiai panaszok miatt kialakuló beri-beri betegséget okozhat."},{"type":"MC","text":"A K-vitamin szerepét a szervezetben melyik állítás írja le helyesen?","options":[],"correctLetter":"A","explanation":"A K-vitamin nélkülözhetetlen a véralvadás normális működéséhez. A hosszú antibiotikum-kezelés vagy bélgyulladás miatt K-vitamin-hiány alakulhat ki."},{"type":"BLANK","text":"Az alapanyagcsere (alapmetabolizmus) a szervezet fenntartásához szükséges _____ energia termelése, amely körülbelül 60-70 %-a a napi energiaszükségletnek.","answer":"minimális. Magyarázat: Az alapanyagcsere az olyan vitális funkciók energiaigénye, mint a keringés, kiválasztás, idegi szabályozás, és hőtermelés fenntartása.","explanation":"Az alapanyagcsere az olyan vitális funkciók energiaigénye, mint a keringés, kiválasztás, idegi szabályozás, és hőtermelés fenntartása."},{"type":"MC","text":"A testtömegindex (BMI) értékelésénél melyik állítás HELYES?","options":[],"correctLetter":"D","explanation":"A BMI tájékoztató érték, de nem tökéletes, mert nem veszi figyelembe a testösszetételt. Sportolóknál nagy izomtömeg magasabb BMI-t eredményez az azonos súlyú nem sportolóhoz képest."},{"type":"TF","text":"A rendszeresen magas glikémiás indexű élelmiszerek fogyasztása révén az inzulin termelésének fokozódása és az azt követő hipoglikémia hosszú ideig tartó, erős éhségérzetet okozhat.","isTrue":true,"explanation":"A magas GI-indexű élelmiszerek gyors vércukor-emelkedést okoznak, amelyre az inzulin erős válasza nagy vércukor-zuhanást eredményez, ami kifejezett éhséget kiválthat."},{"type":"MC","text":"A szomjúságközpontot tekintetbe véve, mely hipotalamikus regio-t aktiválja a vér ozmotikus koncentrációjának emelkedése?","options":[],"correctLetter":"C","explanation":"Az ozmotikus receptorok felfedik a sót és a vízkoncentráció viszonyát. A szomjúságközpont aktiválódása vízkereső magatartást válthat ki."},{"type":"BLANK","text":"A nyálamiláz enzim specifikus szubsztrátja a _____, amely glikozidkötéseit malózára bontja szájüreg.","answer":"keményítő (vagy amilóz). Magyarázat: A nyálamiláz a keményítő (amilóz) és a glikogén α-1,4 glikozid kötéseit hasítja fel maltózzá. Ez a szénhidrát emésztés kezdete.","explanation":"A nyálamiláz a keményítő (amilóz) és a glikogén α-1,4 glikozid kötéseit hasítja fel maltózzá. Ez a szénhidrát emésztés kezdete."},{"type":"MC","text":"A máj funkciójáról vallhatunk-e azt, hogy az nem játszik közvetlenül szerepet az emésztőenzimek termelésében?","options":[],"correctLetter":"A","explanation":"A máj epét termel, amely nem enzim. Az emésztőenzimek a nyálmirigyek, a gyomor és a hasnyálmirigy termelik. Az enzimek a tápcsatornában szabadul fel."},{"type":"TF","text":"A telített és telítetlen zsírsavak közötti különbség az, hogy a telített zsírsavaknak vannak kettős szénkötéseiket, míg a telítetlen zsírsavaknak nincs.","isTrue":false,"explanation":"Éppen az ellenkezője igaz: a telített zsírsavak NO kettős szénkötéseket tartalmaznak, míg a telítetlen zsírsavaknak VAN egy vagy több kettős szénkötése."},{"type":"MC","text":"A laktáz enzim szerepe melyik szénhidrátnak a lebontásában áll?","options":[],"correctLetter":"B","explanation":"A laktáz a vékonybél nyálkahártyájában termelődő enzim, amely a laktóz emésztéséhez szükséges. Laktózintoleranciában a laktáz termelődése csökken az életkor előrehaladtával."},{"type":"BLANK","text":"A bélperistaltika szervezete az ellentétes irányú _____ simaizom-rétegek összehúzódása révén biztosítja a táplálék mozgását lefelé a tápcsatornában.","answer":"hosszanti és körkörös. Magyarázat: A peristaltika hosszanti és körkörös izomrétegek koordinált munkájával működik, amely falvolt típusú hullámban mozgatja a táplálékot szájától a végbélnyílásig.","explanation":"A peristaltika hosszanti és körkörös izomrétegek koordinált munkájával működik, amely falvolt típusú hullámban mozgatja a táplálékot szájától a végbélnyílásig."},{"type":"MC","text":"A pepszin enzim működésének tekintetében melyik állítás NEM IGAZ?","options":[],"correctLetter":"D","explanation":"A pepszin proteolaktikus enzim, amely a fehérjéket lebontja, nem a szénhidrátokat. A szénhidrátok lebontása a amiláz enzimek által végzett funkcció."},{"type":"TF","text":"Az emésztésében szereplő szekrétin hormon a hasnyálmirigyből termelődik és a gyomor ürítésének szabályozásában játszik szerepet.","isTrue":false,"explanation":"A szekrétin a vékonybél S sejtjei által termelődik, nem a hasnyálmirigytől. A szekrétin a gyomor savtermelésének csökkentésére és a hasnyálmirigy bikarbonat-termelésének fokozására hat."},{"type":"MC","text":"Az eppenhatás (epperisztaltika) szempontjából melyik szerv játszik kulcsszerepet az emésztésben?","options":[],"correctLetter":"A","explanation":"Az epe nem enzim, hanem emulgeáló folyadék, amely a zsíroknak a felszívódási felület növelésre. Koleszterinből és sóból áll."},{"type":"BLANK","text":"A _____ a vékonybélben a membránhoz kötött enzimek egy csoportja, amelyek az amino-oligopeptideket monosaccharidokra bontják fel a teljes fehérje-emésztés befejezésében.","answer":"membránpeptidázok. Magyarázat: A membránpeptidázok a bélnyálkahártya mikrovilliához kötöttek, és végzik az aminosav-felszívódás előtti végső bontást.","explanation":"A membránpeptidázok a bélnyálkahártya mikrovilliához kötöttek, és végzik az aminosav-felszívódás előtti végső bontást."},{"type":"MC","text":"A beri-beri betegség tünetei közül melyik NEM jellemző?","options":[],"correctLetter":"C","explanation":"A beri-beri B1-vitamin hiányból ered, amely szívelégtelenség, fájdalom, bénulás, és neurológiai panaszokat okoz. Nem okozza a zsírszövet felszaporodást, hanem az izomgyengeséget és fáradtságot."},{"type":"TF","text":"A skorbutban az érintett szövetek jellegzetesen vérzékenyekké válnak a C-vitamin hiánya miatt, amely a kollagénszintézisben játszik szerepet.","isTrue":true,"explanation":"A C-vitamin nélkülözhetetlen a kollagén hidroxilálásához. A hiánya az érfalak és az íny meggyengítése miatt vérzékenységet okoz."},{"type":"MC","text":"A szajüreg ízműködése szempontjából melyik állítás HELYES az umami ízzel kapcsolatban?","options":[],"correctLetter":"B","explanation":"Az umami japánul finom ízt jelent. A mesterséges umami-adalékanyag az E621 nátrium-glutamát. Előfordul paradicsomban és parmezán sajtban."},{"type":"BLANK","text":"A K-vitamin hiánya hosszú antibiotikum-terápia vagy bélgyulladás során kialakulhat, mivel a _____ szakaszban élő baktériumok termelik meg a K-vitamint.","answer":"vastagbél. Magyarázat: A vastagbélben (kolon) élő baktériumflóra nagy mennyiségben termel K-vitamint. Antibiotikumok megsemmisítik a baktériumokat, így a K-vitamin-hiány kialakul.","explanation":"A vastagbélben (kolon) élő baktériumflóra nagy mennyiségben termel K-vitamint. Antibiotikumok megsemmisítik a baktériumokat, így a K-vitamin-hiány kialakul."},{"type":"MC","text":"A D-vitaminhiányának következtében az angol-kór kialakulásánál melyik folyamat zavarodik meg?","options":[],"correctLetter":"D","explanation":"A D-vitamin hiánya kalcium hiányt eredményez, amely a csontok ásványi összetevőjének demineralizációjához vezethet, így csontritkulás, deformáció és csonttörések jelennek meg főleg gyermekekben."},{"type":"TF","text":"Az E-vitamin (tokoferol) antioxidáns szerepe az, hogy megvédi a többszörösen telítetlen zsírsavak oxidációját csökkentve a szabadgyökök által okozódhat káros hatásokat.","isTrue":true,"explanation":"Az E-vitamin könnyen oxidálódik, amíg megvédi más molekulákat a szabadgyökkeltől. Ez a lipidperoxidáció gátlásában fontos."},{"type":"MC","text":"Az emésztés folyamatát és a tápanyagok anyagcseréjét tekintve melyik állítás HELYES?","options":[],"correctLetter":"A","explanation":"Az emésztésben és felszívódásban nyert monomerek (glükóz, aminosavak, zsírsavak) a sejtekbe kerülnek, ahol az anyagcserében szerepet játszanak."},{"type":"BLANK","text":"A _____ a testsúlynak a magasság négyzetével való felosztásából kiszámított szám (kg/m2), amely felnőttek egészséges testsúlyának becslésére szolgál.","answer":"testtömegindex vagy BMI. Magyarázat: A BMI a testtömegindex, amely az egészséges súlytartomány meghatározásában segít, azonban nem veszi figyelembe a testösszetételt és az izomtömeget.","explanation":"A BMI a testtömegindex, amely az egészséges súlytartomány meghatározásában segít, azonban nem veszi figyelembe a testösszetételt és az izomtömeget."},{"type":"MC","text":"A zsírfiltrációs szerepe a tápcsatorna működésében melyik szervnek az funkciójával áll összefüggésben?","options":[],"correctLetter":"B","explanation":"Az epe nem enzim, de szükséges ahhoz, hogy a lipáz zavartalan módon működjön a zsír felszívódásakor."},{"type":"TF","text":"A hipotalamusz éhségközpontjának aktiválódása során a ghrelin hormon szintje csökken, és az étvágy növekedik.","isTrue":false,"explanation":"A hipotalamusz éhségközpontjának aktiválódása magas ghrelin-szinttel jár. Az alacsony ghrelin-szint a jóllakottság jelét jelzi."},{"type":"MC","text":"A glükóz felszívódása a vékonybél nyálkahártyáján melyik transzportmechanizmus révén valósul meg?","options":[],"correctLetter":"C","explanation":"A glükóz fő felszívódási módja a SGLT1 cotranszporter által közvetített Na+-glükóz symporter. Ez aktív transzport, amely ATP-t igényelhet."}],"legzes":[{"type":"MC","text":"A parciális nyomás fogalmában melyik megállapítás IGAZ?","options":["A) Az összes gázok azonos parciális nyomással rendelkeznek","B) A parciális nyomás a gázkeverék összes nyomásából az illető komponensre jutó rész","C) A parciális nyomás független a gázkoncentrációtól","D) A légköri nyomásban a CO2 parciális nyomása nem mérhető"],"correctLetter":"B","explanation":"A parciális nyomás az adott gáz azonos térfogat tekintetében mért nyomása, amely meghatározza a gázok diffúzió irányát."},{"type":"MC","text":"A léghólyagocskák közötti válaszfalban mely struktúra nem található meg?","options":["A) A tüdő hajszálerei","B) Az F-aktin és miozin filamentumok","C) A rugalmas rostot termelő kötőszöveti sejtek","D) A légzőfelületet képező szöveti elemek"],"correctLetter":"B","explanation":"Az aktin-miozin filamentumok az izmok szerkezete, nem a tüdő hajszáleres szövetei. A tüdőben csak a gázcserét támogató struktúrák vannak."},{"type":"MC","text":"A hemoglobin oxigénszaturációja mely tényezőtől függ elsősorban?","options":["A) Kizárólag a vér széndioxid-tartalmától","B) A közeg oxigénkoncentrációjától és parciális nyomásától","C) Az izomszövet tejsav-tartalmától","D) A vér pH-értéke nem befolyásolja"],"correctLetter":"B","explanation":"Az oxigénkoncentráció és az azzal arányos parciális nyomás a hemoglobin oxigénbindási affinitását elsősorban meghatározza."},{"type":"MC","text":"A Hering-Breuer-reflex mely receptortípus stimulációja révén működik?","options":["A) Kemoreceptorok","B) A tüdőfalban található feszülésérzékeny mechanikai receptorok","C) Nyomásreceptorok","D) Hőérzékelő receptorok"],"correctLetter":"B","explanation":"A Hering-Breuer-reflex a pulmonális stretch receptorokból kiinduló inger, amely a belégzés végén a tüdő kitágulásakor gátolja a belégzőközpontot."},{"type":"MC","text":"A Donders-modellben melyik struktúra modellezi a mellhártyákat?","options":["A) A gumidugó","B) A rugalmas léggömb","C) A harang és a léggömb közötti tér","D) Az üvegcső"],"correctLetter":"C","explanation":"A Donders-féle tüdőmodellben a harang-modell (mellkas) és a léggömb (tüdő) közötti tér modellezi a mellhártyák közötti helyet."},{"type":"MC","text":"A vitálkapacitás melyik tüdővolumen-kategóriát foglalja magában?","options":["A) Csak a légzési térfogat","B) A légzési térfogat és az inspiratórikus rezerv térfogat","C) Az inspiratórikus rezerzv, a légzési és az expiratórikus rezerv térfogat összege","D) Az összes lehetséges tüdővolumen"],"correctLetter":"C","explanation":"A vitálkapacitás a maximális levegőmennyiség, amely egy mély belégzés után kilégzésre képes."},{"type":"MC","text":"Az ASZTMA kórfejtésében mely folyamat játszik döntő szerepet?","options":["A) Az alveolaris falak felszívódása","B) Az epilépsziai rohamok","C) Az érzékeny légútfal összehúzódása és nyálkatermelés fokozódása","D) A szívizomzat elgyengülése"],"correctLetter":"C","explanation":"Az asthma bronchiale esetén a luftutak simaizomzatának görcsös összehúzódása és nyálkahártyai duzzanata okozza a nehézlégzést."},{"type":"MC","text":"A COPD-ben a légzőfelület csökkenésének oka mely szerkezeti elváltozás?","options":["A) A hörgők fibrózisa","B) A léghólyagocskák közötti válaszfalak felszívódása","C) A mellkas deformációja","D) A gerincoszlop görbülete"],"correctLetter":"B","explanation":"A krónikus obstruktív tüdőbetegségnél a dohányzás miatt a léghólyagocskák közötti septumok felszívódnak (emphyzéma), amely az effektív légzőfelületet csökkenti."},{"type":"MC","text":"A szén-monoxid (CO) mérgezésében a hemoglobin dysfunkció oka mely mechanizmus?","options":["A) A hemoglobin szerkezetének roncsolódása","B) A hemoglobin CO-vel való erős kötődése, mely megakadályozza az oxigénszállítást","C) Az érfalban lévő simaizmok ellazulása","D) A vörösvértestek membránának sérülése"],"correctLetter":"B","explanation":"A szén-monoxid sokkal erősebben kötődik a hemoglobinhoz, mint az oxigén, így meggátolva az oxigénszállítást a szövetekbe."},{"type":"MC","text":"Az agytörzsi légzésszabályozás mely központja generálja automatikusan a nyugodt légzés alapritmusát?","options":["A) A kilégzőközpont","B) A belégzőközpont","C) A híd légzésszabályozó magcsoportjai","D) Az aortaív reflexe"],"correctLetter":"B","explanation":"A nyúltvelő belégzőközpontja autonomikusan generálja a nyugodt légzés alapritmusát, míg a kilégzőközpont csak erőltetett légzésben aktív."},{"type":"TF","text":"A szurfaktáns (felületaktív anyag) a léghólyagocskákat borító folyadékfilm felületi feszültségét csökkenti, ezáltal meggátolva az alveolák összetapadását.","isTrue":true,"explanation":"A szurfaktáns-termelő sejtek által kibocsátott váladék csökkenti a felületi feszültséget, amely kritikus az alveolák szétmaradásához és rugalmas működéséhez."},{"type":"TF","text":"A mellhártya két lemeze közötti nyomás a belégzés és kilégzés során azonos marad.","isTrue":false,"explanation":"A mellhártyák közötti nyomás a belégzéskor csökken, a kilégzéskor nő, mindig alacsonyabb marad, mint a tüdőben mért nyomás."},{"type":"TF","text":"Az erőltetett légzésben a kilégzőközpont aktivációja szükséges, amely a hasizmokat és az alsó bordaközti izmokat idegzi be.","isTrue":true,"explanation":"Az erőltetett kilégzésben a kilégzőközpont működtetésével járulékos izmok aktiválódnak az exspirációs térfogat növelésére."},{"type":"TF","text":"A légmell (pneumothorax) kialakulásakor a tüdő rugalmas rostjainak köszönhetően összeesik.","isTrue":true,"explanation":"Ha a mellhártyák közé levegő kerül, az intramurális nyomás megemelkedik, és a tüdő rugalmas rostjai által a tüdő gombóccá összehúzódik."},{"type":"TF","text":"A hemoglobin és a mioglobin oxigénkötési mechanizmusa azonos szerkezetű fehérjék miatt teljesen azonos.","isTrue":false,"explanation":"Bár szerkezetileg hasonlóak, a mioglobin alacsonyabb pH és oxigénkoncentráció mellett képes az oxigént kötni a hemoglobinhoz képest."},{"type":"TF","text":"A Bohr-effektus a hemoglobin oxigénaffinitásának csökkenésé azt jelenti, hogy a szövetek számára több oxigén lesz elérhető.","isTrue":true,"explanation":"Az enzimek és szöveti szénmonoxid-termelésének következménye az alacsonyabb pH, amely az oxigén felszabadulását elősegíti."},{"type":"TF","text":"A dohányzás okozta nikotin-függőség a dopamin felszabaduláshoz kötött, amely a jutalmazó központokban történik.","isTrue":true,"explanation":"A nikotin az agy jutalmazó központjaiban a dopamin felszabadulást váltja ki, amely a nikotinfüggőség neurobiológiai alapja."},{"type":"TF","text":"Az alapalkalmazottságú légzés során a légzési térfogat átlagosan 500 ml.","isTrue":true,"explanation":"A nyugalmi légzési térfogat (tidal volume) az egészséges felnőtteknél körülbelül 500 ml levegőmennyiség."},{"type":"TF","text":"A tüdőgyulladás diagnózisát sztetoszkópikus hallgatódzás mellett mellkasröntgenfelvétel erősíti meg.","isTrue":true,"explanation":"A tüdőgyulladásnál a mellkasröntgen jellegzetes infiltrációkat mutat, amelyek erősítik a sztetoszkóppal detektált hangtöbblet mellett a diagnózist."},{"type":"BLANK","text":"A léghólyagocskák falát borító laphámsejtek mellett találhatók _____ sejtek is, amelyek fagocitálják a léghólyagokig eljutott porszemcséket.","answer":"makrofágok (fagocitáló sejtek)","explanation":"Az alveolus falában többféle sejttípus működik"},{"type":"BLANK","text":"Az izzadásban az egyensúly biztosításához szükséges _____ a vérkeringés szabályozásában alapvető szerepet játszik.","answer":"vérnyomás","explanation":"A vérnyomás az oxigén- és tápanyagszállítás hatékonyságát biztosítja a tüdőn keresztüli gázcsere során."},{"type":"BLANK","text":"A légzésszabályozásban a vér _____ koncentrációja a belégzőközpont működésének legfontosabb ingerült, mivel az idegszövet sejtközötti állomány pH-értékét meghatározza.","answer":"szén-dioxid","explanation":"A vér CO2-tartalma és az azzal arányos H+ koncentráció a belégzőközpont működésének elsődleges szabályozási szignálja."},{"type":"BLANK","text":"A légútakba bejutott idegen test légúti _____ okozhat, amely az oxigén-utánpótlás megszűnése miatt életveszélyes lehet.","answer":"elzáródást","explanation":"Az idegen test okozta légúti obstrukció meggátolhatja az oxigén beáramlását, ami azonnali szövődményekhez vezethet."},{"type":"BLANK","text":"A Donders-modellben a gumimembrán lehúzása a _____ modellezi, amely csökkenti a nyomást a harang és a léggömb közötti térben.","answer":"rekeszizom összehúzódását","explanation":"A modellban a gumimembrán a rekeszizmot képviseli, amelynek összehúzódása alulról növeli a mellkasi térfogatot."},{"type":"BLANK","text":"A belégzés első szakaszában az ezután a tüdő nyomása _____, amely az ideális gáz állapotegyenletének következménye.","answer":"csökken","explanation":"A térfogat növekedésével a nyomás kezdetben csökken, amíg a levegő áramlása befejeződik."},{"type":"BLANK","text":"A dohányzás hatására a légutak csillóinak működése _____, amelynek következménye a szennyeződések eltávolításának hatékonyságának csökkenése.","answer":"gátlódik","explanation":"A dohányfüst gátolja a légútfal hámszövete cilliumainak csapkodó mozgását, így felborulnak a természetes tisztító mechanizmusok."},{"type":"BLANK","text":"Az agytörzs mellett a légzésszabályozásban a _____ és a limbikus rendszer közvetíti a belső környezeti és emocionális hatásokat.","answer":"hipotalamusz","explanation":"Az agytörzs alapritmusát a hipotalamusz és limbikus rendszer modulálja, ezáltal az érzelmi és hormonális tényezők is befolyásolják a légzést."},{"type":"BLANK","text":"A felületaktív anyag (szurfaktáns) hiánya újszülöttekben a _____ szindrómáját okozza, amely súlyos légzési elégtelenséggel jár.","answer":"respirációs distressz (RDS) / neonatális légzési elégtelenség","explanation":"Az éretlen tüdőkben az elégtelen szurfaktáns-termelés az alveolák összetapadásához és súlyos hipoxiához vezet."}],"anyagszallitas":[{"type":"MC","text":"A hemoglobin molektula oxigénkötő-képességét elsősorban melyik tényező határozza meg?","options":["A) A vörösvértestben található mitokondrium száma","B) A közeg oxigénkoncentrációja és parciális nyomása","C) A vérplazma albumin koncentrációja","D) A vörösvértest élettartama"],"correctLetter":"B","explanation":"A hemoglobin oxigéntelítettségének mértékét elsősorban a közeg oxigénkoncentrációja, illetve az azzal arányos parciális nyomása (pO2) határozza meg."},{"type":"MC","text":"Melyik szövethöz kötődik az A és B antigén a vörösvértestek felszínén?","options":["A) A lipidmembránhoz","B) A H-antigénhez","C) A fibrinogenhez","D) A hemoglobinhoz"],"correctLetter":"B","explanation":"Az A és B antigének csak akkor jelenhetnek meg a vörösvértestek felszínén, ha egy speciális szénhidrát-molekulához, a H-antigénhez kapcsolódnak."},{"type":"TF","text":"Az artériás vérben a hemoglobin oxigéntelítettsége körülbelül 97%.","isTrue":true,"explanation":"Az artériás vérben (95 Hgmm pO2 mellett) a hemoglobin szaturációja körülbelül 97%-os."},{"type":"MC","text":"A véralvadás kaszkád-reaktív rendszerét mely vitamin jelenléte nélkülözi?","options":["A) A-vitamin","B) K-vitamin","C) C-vitamin","D) E-vitamin"],"correctLetter":"B","explanation":"A protrombin a májban K-vitamin segítségével termelődik, enélkül a normális véralvadás nem lehetséges, és hiánya vérzékenységhez vezet."},{"type":"BLANK","text":"A véralvadás biokémiai kaszkádreakciója összesen _____ különféle véralvadási faktorból áll.","answer":"13","explanation":"A véralvadási folyamatnak 13-féle összetevője van, amelyeket I-XIII római számokkal jelzett faktoroknak nevezünk."},{"type":"MC","text":"Milyen alakú sejtek a vörösvértestek?","options":["A) Kerek, sejtmaggal rendelkező","B) Középen homorú, bikonkáv korong alakú, sejtmag nélküli","C) Hosszú, rugalmas, sejtmaggal rendelkező","D) Amőboid, szabálytalan alakú, sejtmag nélküli"],"correctLetter":"B","explanation":"Az emlősök vörösvértestei sejtmag nélküli, önálló mozgásra képtelen, középen homorú, korong alakú sejtek."},{"type":"TF","text":"A sarlósejtes vérszegénységben szenvedő emberek hemoglobinja könnyebben adja le az oxigént a szövetekben, mint az egészséges emberé.","isTrue":true,"explanation":"A sarlósejtes vérszegénységben a hemoglobin kevésbé köti az oxigént, de a felvett oxigén egy részét a szövetekben képes leadni."},{"type":"MC","text":"Mely sejt típus termeli az immunoglobulinokat (antitesteket)?","options":["A) A granulociták","B) A monociták","C) A B limfociták","D) A T limfociták"],"correctLetter":"C","explanation":"A gamma-globulinok az ún. immunoglobulinok, melyeket a B limfociták termelnek és az immunitásban játszanak szerepet."},{"type":"MC","text":"Mi a vérlemezke másik neve?","options":["A) Trombus","B) Trombocita","C) Fibrin","D) Monocita"],"correctLetter":"B","explanation":"A vérlemezkék másik neve a trombociták, amelyek sejtmag nélküli, apró sejttöredékek."},{"type":"BLANK","text":"Az emberi szervezet napi vas szükséglete átlagosan _____ mg.","answer":"1","explanation":"Egy átlagos emberi szervezetnek naponta 1 mg vasra van szüksége, azonban várandós nők esetén ez akár meg is duplázódhat."},{"type":"MC","text":"Melyik hormon serkenti a vörösvértestek képződését?","options":["A) A tireoidin","B) Az eritropoetin","C) Az inzulin","D) A progeszteron"],"correctLetter":"B","explanation":"A vörösvértestek képződését hormonálisan a vesében termelődő eritropoetin hormon serkenti, melynek hatását a férfi nemi hormonok tovább fokozzák."},{"type":"TF","text":"Az Rh-faktor az AB0 vércsoportrendszer részét képezi.","isTrue":false,"explanation":"Az Rh-faktor (D-antigén) egy külön vércsoportrendszert alkot, amely függetlenül működik az AB0-rendszertől."},{"type":"MC","text":"Mi történik a Bombay-jelenségben?","options":["A) A vörösvértestekre A és B antigén is feljelenik","B) Az Rh-faktor eltűnik a vörösvértestekről","C) Nem működik az az enzim, amely a H-antigént hozza létre","D) A fibrinogén nem alakul fibrinné"],"correctLetter":"C","explanation":"A Bombay-jelenség egy mutáció, amelynek következtében nem működik az az enzim, ami a H-antigént létrehozná, így A és B antigén sem képeződik."},{"type":"MC","text":"Az albuminok az összes plazmafehérje hány százalékát adják?","options":["A) Kb. 30%-át","B) Kb. 45%-át","C) Kb. 60%-át","D) Kb. 80%-át"],"correctLetter":"C","explanation":"Az albuminok az összes plazmafehérje körülbelül 60%-át adják."},{"type":"TF","text":"A hemoglobin oxigéntelítettsége függetlenül változik a vér pH-jától.","isTrue":false,"explanation":"A hemoglobin oxigéntelítettsége pH-függő, minél savasabb a vér, úgy csökken az oxigénkötés erőssége."},{"type":"MC","text":"Hány liter a 70 kg-os testsúlyú ember átlagos vértérfogata?","options":["A) Kb. 3 liter","B) Kb. 5 liter","C) Kb. 7 liter","D) Kb. 10 liter"],"correctLetter":"B","explanation":"Egy 70 kg-os testsúlyú ember átlagos vértérfogata körülbelül 5 liter."},{"type":"BLANK","text":"A vérplazma térfogat-százalékos aránya a teljes vértérfogat _____ %-a.","answer":"56","explanation":"A vérplazma, amely a sejtközötti állomány, a teljes vértérfogat mintegy 56%-a."},{"type":"MC","text":"Melyik szerv vonja ki a forgalomból az elöregedett vörösvértesteket?","options":["A) A máj","B) A lép","C) A vese","D) A lép és a máj együtt"],"correctLetter":"D","explanation":"Az elöregedett sejteket a lép és a máj vonják ki a forgalomból."},{"type":"MC","text":"Mi a magzati hemoglobin és a felnőtt hemoglobin közötti legfontosabb strukturális különbség?","options":["A) A magzati hemoglobin több hem csoportot tartalmaz","B) A magzati hemoglobinban gamma alegység van a béta helyett","C) A magzati hemoglobinban nincs vas-ion","D) A magzati hemoglobin több globin láncot tartalmaz"],"correctLetter":"B","explanation":"A magzat hemoglobin molekulái abban különböznek a felnőttétől, hogy bennük a béta alegység helyett gamma alegység van, így erősebben kötik az oxigént."},{"type":"TF","text":"A mioglobin egy alegységből és egy hemből álló fehérje.","isTrue":true,"explanation":"A mioglobin csupán egy polipeptidláncból és egy hemből álló fehérje, amely a vázizmokban található."},{"type":"MC","text":"Mennyi a vörösvérsejt átlagos élettartama?","options":["A) 30 nap","B) 60 nap","C) 120 nap","D) 200 nap"],"correctLetter":"C","explanation":"A vörösvértestek átlagos élettartalma 120 nap."},{"type":"BLANK","text":"A CO2 mintegy _____ %-a a globin láncok N-terminálisához kötve szállítódik.","answer":"20","explanation":"A CO2 molekulák a globin láncok N-terminálisához kötődnek karboxil-csoportot alkotva, így a tüdőbe az összes CO2 mintegy 20%-a jut el ezen az úton."},{"type":"MC","text":"A vörös csontvelő mely szerveiben (szöveteiben) található?","options":["A) Csak a lapos csontok szivacsos állományában","B) Lapos csontok, csigolyatesti rész és hosszú csöves csontok végei","C) Csak a hosszú csöves csontok közepében","D) Kizárólag a medencecsontban"],"correctLetter":"B","explanation":"A vörös csontvelő előfordulási helyei: lapos csontok szivacsos állományában, csigolyák csigolyatesti részében és hosszú csöves csontok végein."},{"type":"MC","text":"Mi a sarlósejtes vérszegénységet okozó genetikai rendellenesség?","options":["A) Egy gén duplikációja","B) Egy pontmutáció, amely a hatodik pozícióban glutamint valinra cserél","C) Egy teljes kromooszóma hiánya","D) Egy inverzió a hemoglobin génben"],"correctLetter":"B","explanation":"A sarlósejtes vérszegénység oka egy pontmutáció, amely a globin lánc N-terminálistól számított hatodik helyén glutamint valinra cserél."},{"type":"TF","text":"A sarlósejtes vérszegénységben a kóros vörösvértesteket a szervezet 1-2 nap alatt vonja ki a forgalomból.","isTrue":false,"explanation":"A deformált sejteket a szervezet – a lép - 10-20 nap múlva vonja ki a forgalomból."},{"type":"MC","text":"Melyik vércsoportba tartozó ember lehet általános donor az AB0-rendszerben?","options":["A) A-csoport","B) B-csoport","C) AB-csoport","D) 0-csoport"],"correctLetter":"D","explanation":"A 0-as vércsoportú emberek az általános donorok, mivel nem rendelkeznek A és B antigennal."},{"type":"BLANK","text":"Az Rh-rendszerben az ellenanyag eredendően _____ a vérplazmában.","answer":"nincs","explanation":"Rh-ellenanyag eredendően nincs a vérplazmában, csak akkor termelődik, ha egy Rh-negatív ember Rh-pozitív vért kap."},{"type":"MC","text":"Mi a Rh-összeférhetetlenség problémájának megelőzésére a szülés után 72 órán belül szükséges eljárás?","options":["A) Az anya számára K-vitamin adása","B) Az anya számára Rh-pozitív ellenanyag adása","C) Az újszülöttnek vérátömlesztés","D) Az anya számára trombin injection"],"correctLetter":"B","explanation":"A szülést követően 72 órán belül az anyának Rh-pozitív ellenanyagot adva megakadályozható az immunreakció kialakulása."},{"type":"MC","text":"Mennyi a vérlemezkék (trombociták) normális száma?","options":["A) 50 000/mm3","B) 150 000/mm3","C) 300 000/mm3","D) 600 000/mm3"],"correctLetter":"C","explanation":"A vérlemezkék száma 300 000/mm3."},{"type":"TF","text":"A vérlemezkék élettartama 5-10 nap.","isTrue":true,"
